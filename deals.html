        @font-face{font-family:'HelveticaNeue';src:local('Helvetica Neue Medium'),local('HelveticaNeue-Medium');font-weight:500}
        @font-face{font-family:'HelveticaNeue';src:local('Helvetica Neue Bold'),local('HelveticaNeue-Bold');font-weight:600}
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--gold:#D4AF37;--gold-light:rgba(212,175,55,0.15);--gold-dark:#B8960C;--green:#34C759;--green-light:rgba(52,199,89,0.12);--red:#FF3B30;--red-light:rgba(255,59,48,0.12);--orange:#FF9500;--orange-light:rgba(255,149,0,0.12);--blue:#007AFF;--blue-light:rgba(0,122,255,0.12);--purple:#AF52DE;--bg:#000;--bg-card:#0A0A0A;--bg-elevated:#141414;--bg-input:#1A1A1A;--border:rgba(255,255,255,0.08);--text:#FFF;--text-secondary:#999;--text-muted:#666}
        body{font-family:'HelveticaNeue','Helvetica Neue','Helvetica',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;font-weight:300}
        ::selection{background:var(--gold);color:#000}
        .header{background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .header-left{display:flex;align-items:center;gap:12px}
        .logo-circle{width:32px;height:32px;background:linear-gradient(135deg,#FFD54F,#F5A623);border-radius:50%;box-shadow:0 0 12px rgba(212,175,55,0.4)}
        .logo-text{font-size:18px;font-weight:300;letter-spacing:4px}
        .badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border-radius:100px;background:rgba(175,82,222,0.12);color:#AF52DE}
        .header-right{display:flex;gap:8px;align-items:center}
        .btn{padding:10px 20px;background:var(--gold);border:none;border-radius:12px;color:#000;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
        .btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(212,175,55,0.3)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-secondary{background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border)}
        .btn-secondary:hover{border-color:var(--gold);color:var(--gold);transform:none;box-shadow:none}
        .btn-sm{padding:6px 14px;font-size:11px}
        .wrap{max-width:640px;margin:0 auto;padding:16px}
        .card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px}
        .card-title{font-size:13px;font-weight:600;color:var(--gold);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px}
        .input{width:100%;padding:10px 14px;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:13px;transition:border .2s}
        .input:focus{outline:none;border-color:var(--gold)}
        .input::placeholder{color:var(--text-muted)}
        select.input{cursor:pointer}select.input option{background:var(--bg-card)}
        textarea.input{min-height:70px;resize:vertical}
        .label{display:block;font-size:9px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:1.5px}
        .row{display:grid;gap:10px}
        .row-2{grid-template-columns:1fr 1fr}.row-3{grid-template-columns:1fr 1fr 1fr}.row-4{grid-template-columns:1fr 1fr 1fr 1fr}
        @media(max-width:500px){.row-3,.row-4{grid-template-columns:1fr 1fr}}
        .field{margin-bottom:10px}
        .check-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;cursor:pointer;border:1px solid var(--border);transition:all .15s;margin-bottom:6px;font-size:13px}
        .check-item:hover{border-color:rgba(255,255,255,0.15)}
        .check-item.on{background:var(--gold-light);border-color:rgba(212,175,55,0.3)}
        .check-item.green{background:var(--green-light);border-color:rgba(52,199,89,0.2)}
        .check-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold);cursor:pointer}
        .check-num{font-size:9px;font-weight:700;color:var(--text-muted);width:16px;text-align:center}
        .toggle-row{display:flex;gap:8px;margin-bottom:16px}
        .toggle-btn{flex:1;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--bg-elevated);color:var(--text-secondary);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s}
        .toggle-btn.on{background:var(--gold-light);color:var(--gold);border-color:var(--gold)}
        .steps{display:flex;gap:4px;margin-bottom:16px}
        .step-btn{flex:1;padding:8px;border-radius:8px;border:none;font-family:inherit;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all .15s}
        .step-btn.current{background:var(--gold);color:#000}
        .step-btn.done{background:var(--green-light);color:var(--green)}
        .step-btn.todo{background:var(--bg-elevated);color:var(--text-muted)}
        .highlight-box{border-radius:12px;padding:14px;text-align:center}
        .gold-box{background:var(--gold-light);border:1px solid rgba(212,175,55,0.3)}
        .green-box{background:var(--green-light);border:1px solid rgba(52,199,89,0.3);color:var(--green)}
        .red-box{background:var(--red-light);border:1px solid rgba(255,59,48,0.3);color:var(--red)}
        .zone-dropdown{position:absolute;z-index:50;width:100%;margin-top:4px;border-radius:12px;background:var(--bg-elevated);border:1px solid var(--border);max-height:260px;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,0.5)}
        .zone-item{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;transition:background .1s}
        .zone-item:hover{background:var(--bg-input)}
        .area-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;color:#fff}
        .fascia-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center}
        .fascia-cell{border-radius:10px;padding:10px;background:var(--bg-input);border:1px solid var(--border)}
        .fascia-cell.active{background:var(--gold-light);border-color:var(--gold)}
        .fascia-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)}
        .fascia-value{font-size:12px;font-weight:700;margin-top:4px}
        .fascia-unit{font-size:9px;color:var(--text-muted)}
        .stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center}
        .stat-box{background:var(--bg-elevated);border-radius:10px;padding:10px}
        .stat-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)}
        .stat-value{font-size:18px;font-weight:700;margin-top:4px}
        .nav-bottom{display:flex;justify-content:space-between;padding:16px 0 40px}
        .email-output{font-family:'SF Mono',Monaco,Consolas,monospace;font-size:11px;color:var(--text-secondary);background:var(--bg-elevated);border:1px solid var(--border);border-radius:12px;padding:16px;white-space:pre-wrap;word-break:break-word;max-height:55vh;overflow-y:auto;line-height:1.7}
        .saved-badge{font-size:9px;font-weight:700;padding:4px 10px;border-radius:100px;background:var(--green-light);color:var(--green)}
        .radio-row{display:flex;gap:16px;margin-top:8px}
        .radio-row label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px}
        .radio-row input{accent-color:var(--gold)}
        /* Deal list */
        .deal-item{display:flex;align-items:center;justify-content:space-between;padding:16px;border-radius:16px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .15s}
        .deal-item:hover{transform:translateY(-1px);border-color:rgba(255,255,255,0.12)}
        .deal-left{flex:1;min-width:0}
        .deal-right{text-align:right;flex-shrink:0;margin-left:16px}
        .deal-status{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:100px;display:inline-block}
        .deal-addr{font-weight:500;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .deal-meta{font-size:12px;color:var(--text-secondary);margin-top:4px}
        .deal-canone{font-size:17px;font-weight:600;color:var(--gold)}
        .deal-date{font-size:10px;color:var(--text-muted);margin-top:4px}
        .empty-state{text-align:center;padding:60px 20px;border-radius:16px;background:var(--bg-card);border:1px solid var(--border)}
        .empty-state .icon{font-size:40px;margin-bottom:12px}
        .adj-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
        .adj-row label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px}
        .adj-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold);cursor:pointer}
        .adj-row .input{width:70px;text-align:center}
    </style>
</head>

function calcSup(s){let r=0;const c=parseFloat(s.supCalp)||0;if(c>0){if(c<46)r+=c*1.3;else if(c<=70)r+=52.9+(c-46)*1.15;else if(c<=120)r+=52.9+27.6+(c-70);else r+=52.9+27.6+50+(c-120)*0.85;}r+=(parseFloat(s.boxP)||0)*.8+(parseFloat(s.box)||0)*.5+(parseFloat(s.paP)||0)*.5+(parseFloat(s.pa)||0)*.2+(parseFloat(s.bal)||0)*.25+(parseFloat(s.sco)||0)*.15+(parseFloat(s.ver)||0)*.1;return Math.round(r*100)/100;}
function getFascia(n){return n<=2?"A":n<=6?"B":"C";}
function calcCanone(st,sup){const z=Z.find(x=>x.c===st.zc);if(!z||!sup)return null;const pc=st.pm.filter(Boolean).length;const f=getFascia(pc);const rng=f==="A"?z.a:f==="B"?z.b:z.d;let adj=0;if(st.amm)adj+=parseFloat(st.ammP)||0;if(st.semi)adj-=10;if(st.noAsc)adj-=10;if(st.att)adj+=10;if(st.enABC)adj+=10;if(st.eco)adj+=5;if(st.sisma)adj+=10;const m=1+adj/100;const t=st.ct==="transitorio"?1.2:1;return{z,pc,f,rMin:rng[0],rMax:rng[1],adj,minM:Math.round(rng[0]*sup*m*t/12*100)/100,maxM:Math.round(rng[1]*sup*m*t/12*100)/100,minA:Math.round(rng[0]*sup*m*t*100)/100,maxA:Math.round(rng[1]*sup*m*t*100)/100};}

function h(tag,attrs,...children){
    const el=document.createElement(tag);
    if(attrs)Object.entries(attrs).forEach(([k,v])=>{
        if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
        else if(k.startsWith('on'))el[k.toLowerCase()]=v;
        else if(k==='className')el.className=v;
        else if(k==='checked')el.checked=v;
        else if(k==='value')el.value=v;
        else if(k==='innerHTML')el.innerHTML=v;
        else el.setAttribute(k,v);
    });
    children.flat(Infinity).forEach(c=>{
        if(c==null||c===false)return;
        el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);
    });
    return el;
}

function inp(key,opts={}){
    const el=h(opts.tag||'input',{className:'input',type:opts.type||'text',value:S[key]||'',placeholder:opts.ph||'',...(opts.attrs||{}),
        onInput:e=>{S[key]=e.target.value;if(opts.live!==false)render();}});
    return el;
}

    S.can=String(d.canone_pattuito||'');S.dep=String(d.deposito||'2');S.ced=d.cedolare_secca!==false;
    S.mot=d.motivo_transitorieta||'';S.corso=d.corso_studi||'';S.uni=d.universita||'';
    S.lN=d.locatore_nome||'';S.lCF=d.locatore_cf||'';
    S.cN=d.conduttore_nome||'';S.cCF=d.conduttore_cf||'';S.cDoc=d.conduttore_documento||'';
    S.em=d.email_body||'';
}

// ── FORM PAGE ──
function renderForm(app){
    const sup=calcSup(S);const cn=calcCanone(S,sup);const z=Z.find(x=>x.c===S.zc);const pc=S.pm.filter(Boolean).length;
    let adj=0;if(S.amm)adj+=parseFloat(S.ammP)||0;if(S.semi)adj-=10;if(S.noAsc)adj-=10;if(S.att)adj+=10;if(S.enABC)adj+=10;if(S.eco)adj+=5;if(S.sisma)adj+=10;

    // Header
    const hdr=h('header',{className:'header'},
        h('div',{className:'header-left'},
            h('button',{className:'btn btn-secondary btn-sm',onClick:()=>{S.page='list';loadDeals();}},'← Deal'),
            h('span',{style:{color:'var(--text-muted)',fontSize:'12px'}},'|'),
            h('span',{style:{fontSize:'13px',fontWeight:'500'}},S.addr||'Nuovo deal')
        ),
        h('div',{className:'header-right'},
            S.dealId?h('span',{className:'saved-badge'},'Salvato'):null,
            h('button',{className:'btn btn-sm',onClick:saveDeal,disabled:S.saving},S.saving?'...':'Salva')
        )
    );
    app.appendChild(hdr);

    const wrap=h('div',{className:'wrap'});

    // Contract type toggle
    const tgl=h('div',{className:'toggle-row'});
    ['transitorio','studenti'].forEach(t=>{
        tgl.appendChild(h('button',{className:'toggle-btn'+(S.ct===t?' on':''),onClick:()=>u('ct',t)},t==='transitorio'?'🏠 Transitorio':'🎓 Studenti'));
    });
    wrap.appendChild(tgl);

    // Steps
    const steps=['Immobile','Parametri','Canone','Contratto','Parti','Output'];
    const stRow=h('div',{className:'steps'});
    steps.forEach((l,i)=>{
        const n=i+1;
        stRow.appendChild(h('button',{className:'step-btn '+(S.step===n?'current':S.step>n?'done':'todo'),onClick:()=>u('step',n)},l));
    });
    wrap.appendChild(stRow);

    // ── Step 1: Immobile ──
    if(S.step===1){
        const c1=h('div',{className:'card'});
        c1.appendChild(h('div',{className:'card-title'},'Dati catastali'));
        c1.appendChild(field('Indirizzo',inp('addr',{ph:'Via Roma 1, Roma'})));
        const r1=h('div',{className:'row row-4'});
        r1.appendChild(field('Piano',inp('fl')));r1.appendChild(field('Scala',inp('sc')));
        r1.appendChild(field('Interno',inp('int')));r1.appendChild(field('Vani',inp('vani')));
        c1.appendChild(r1);
        const r2=h('div',{className:'row row-3'});
        r2.appendChild(field('Foglio',inp('fog')));r2.appendChild(field('Particella',inp('part')));r2.appendChild(field('Subalterno',inp('sub')));
        c1.appendChild(r2);
        const r3=h('div',{className:'row row-3'});
        r3.appendChild(field('Mq catastali',inp('mqc')));r3.appendChild(field('Rendita €',inp('ren')));r3.appendChild(field('Classe energ.',inp('cle',{ph:'es. G'})));
        c1.appendChild(r3);
        wrap.appendChild(c1);

        const c2=h('div',{className:'card'});
        c2.appendChild(h('div',{className:'card-title'},'Superficie'));
        c2.appendChild(field('Superficie calpestabile (mq)',inp('supCalp',{type:'number',ph:'es. 65'})));
        const r4=h('div',{className:'row row-2'});
        r4.appendChild(field('Box pregio (mq)',inp('boxP',{type:'number'})));r4.appendChild(field('Box (mq)',inp('box',{type:'number'})));
        c2.appendChild(r4);
        const r5=h('div',{className:'row row-2'});
        r5.appendChild(field('P. auto pregio',inp('paP',{type:'number'})));r5.appendChild(field('Posto auto',inp('pa',{type:'number'})));
        c2.appendChild(r5);
        const r6=h('div',{className:'row row-3'});
        r6.appendChild(field('Balconi',inp('bal',{type:'number'})));r6.appendChild(field('Scoperta',inp('sco',{type:'number'})));r6.appendChild(field('Verde cond.',inp('ver',{type:'number'})));
        c2.appendChild(r6);
        if(sup>0){
            const hb=h('div',{className:'highlight-box gold-box',style:{marginTop:'12px'}});
            hb.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'600',textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--gold)'}},'Superficie Convenzionale'));
            hb.appendChild(h('div',{style:{fontSize:'20px',fontWeight:'700',marginTop:'4px',color:'var(--gold)'}},sup.toFixed(2)+' mq'));
            c2.appendChild(hb);
        }
        wrap.appendChild(c2);
    }

    // ── Step 2: Parametri ──
    if(S.step===2){
        const c1=h('div',{className:'card'});
        c1.appendChild(h('div',{className:'card-title'},'Caratteristiche (4)'));
        CHARS.forEach((c,i)=>{
            const item=h('label',{className:'check-item'+(S.chars[i]?' green':'')});
            const cb=h('input',{type:'checkbox',checked:S.chars[i],onChange:()=>toggleCh(i)});
            item.appendChild(cb);item.appendChild(document.createTextNode(c));
            c1.appendChild(item);
        });
        wrap.appendChild(c1);

        const c2=h('div',{className:'card'});
        const hdr2=h('div',{className:'card-title',style:{display:'flex',justifyContent:'space-between',alignItems:'center'}});
        hdr2.appendChild(h('span',{},'20 Parametri'));
        const fBadge=h('span',{});
        const fColor=pc<=2?'var(--blue)':pc<=6?'var(--orange)':'var(--green)';
        const fBg=pc<=2?'var(--blue-light)':pc<=6?'var(--orange-light)':'var(--green-light)';
        fBadge.appendChild(h('span',{style:{fontSize:'18px',fontWeight:'700',color:'var(--gold)',marginRight:'8px'}},String(pc)));
        fBadge.appendChild(h('span',{style:{fontSize:'9px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'1px',padding:'3px 8px',borderRadius:'100px',background:fBg,color:fColor}},'Fascia '+getFascia(pc)));
        hdr2.appendChild(fBadge);
        c2.appendChild(hdr2);

        PARAMS.forEach((p,i)=>{
            const item=h('label',{className:'check-item'+(S.pm[i]?' on':'')});
            const cb=h('input',{type:'checkbox',checked:S.pm[i],onChange:()=>togglePm(i)});
            item.appendChild(cb);
            item.appendChild(h('span',{className:'check-num'},String(i+1)));
            item.appendChild(document.createTextNode(p));
            c2.appendChild(item);
        });
        wrap.appendChild(c2);

        const c3=h('div',{className:'card'});
        c3.appendChild(h('div',{className:'card-title'},'Maggiorazioni / Riduzioni'));
        // Ammobiliato with percentage
        const ar1=h('div',{className:'adj-row'});
        const al1=h('label',{});al1.appendChild(h('input',{type:'checkbox',checked:S.amm,onChange:e=>{S.amm=e.target.checked;render();}}));al1.appendChild(document.createTextNode(' Ammobiliato'));ar1.appendChild(al1);
        if(S.amm){const ai=h('input',{className:'input',type:'number',value:S.ammP,style:{width:'70px',textAlign:'center'},onInput:e=>{S.ammP=e.target.value;render();}});ar1.appendChild(ai);}
        c3.appendChild(ar1);
        [{k:'semi',l:'Seminterrato (-10%)'},{k:'noAsc',l:'Senza ascensore (-10%)'},{k:'att',l:'Attico (+10%)'},{k:'enABC',l:'Classe energ. A/B/C (+10%)'},{k:'eco',l:'Eco Bonus (+5%)'},{k:'sisma',l:'Sisma Bonus (+10%)'}].forEach(({k,l})=>{
            const ar=h('div',{className:'adj-row'});
            const al=h('label',{});al.appendChild(h('input',{type:'checkbox',checked:S[k],onChange:e=>{S[k]=e.target.checked;render();}}));al.appendChild(document.createTextNode(' '+l));ar.appendChild(al);
            c3.appendChild(ar);
        });
        if(adj!==0)c3.appendChild(h('div',{style:{textAlign:'right',fontSize:'13px',fontWeight:'600',color:adj>=0?'var(--green)':'var(--red)'}},'Totale: '+(adj>=0?'+':'')+adj+'%'));
        wrap.appendChild(c3);
    }

    // ── Step 3: Canone ──
    if(S.step===3){
        const c1=h('div',{className:'card'});
        c1.appendChild(h('div',{className:'card-title'},'Zona OMI'));
        const zWrap=h('div',{style:{position:'relative'}});
        const zInput=h('input',{className:'input',value:S.zq,placeholder:'Cerca zona: codice, nome, via, area...',
            onInput:e=>{S.zq=e.target.value;S.szOpen=true;render();},
            onFocus:()=>{S.szOpen=true;render();}
        });
        zWrap.appendChild(zInput);
        if(S.szOpen){
            const q=S.zq.toLowerCase();
            const filtered=q?Z.filter(x=>`${x.c} ${x.n} ${x.r} ${x.g}`.toLowerCase().includes(q)):Z;
            const dd=h('div',{className:'zone-dropdown'});
            if(filtered.length===0)dd.appendChild(h('div',{style:{padding:'12px',fontSize:'12px',color:'var(--text-muted)'}},'Nessuna zona'));
            else filtered.slice(0,30).forEach(zi=>{
                const item=h('div',{className:'zone-item',onClick:()=>{S.zc=zi.c;S.zq=zi.c+' – '+zi.n;S.szOpen=false;render();}});
                item.appendChild(h('span',{className:'area-badge',style:{backgroundColor:AC[zi.g]}},zi.g));
                item.appendChild(h('span',{style:{fontWeight:'500'}},zi.c));
                item.appendChild(h('span',{style:{color:'var(--text-secondary)'}},zi.n));
                if(zi.r)item.appendChild(h('span',{style:{fontSize:'10px',color:'var(--text-muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},zi.r));
                dd.appendChild(item);
            });
            zWrap.appendChild(dd);
        }
        c1.appendChild(zWrap);

        if(z){
            const zInfo=h('div',{style:{background:'var(--bg-elevated)',border:'1px solid var(--border)',borderRadius:'12px',padding:'14px',marginTop:'10px'}});
            const zHdr=h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'10px'}});
            zHdr.appendChild(h('span',{className:'area-badge',style:{backgroundColor:AC[z.g]}},AF[z.g]));
            zHdr.appendChild(h('span',{style:{fontWeight:'600',fontSize:'13px'}},z.c+' – '+z.n));
            zInfo.appendChild(zHdr);
            const fg=h('div',{className:'fascia-grid'});
            [['A',z.a],['B',z.b],['C',z.d]].forEach(([f,v])=>{
                fg.appendChild(h('div',{className:'fascia-cell'+(cn&&cn.f===f?' active':'')},
                    h('div',{className:'fascia-label'},'Fascia '+f),
                    h('div',{className:'fascia-value'},'€ '+v[0].toFixed(2)+' – '+v[1].toFixed(2)),
                    h('div',{className:'fascia-unit'},'/mq/anno')
                ));
            });
            zInfo.appendChild(fg);
            c1.appendChild(zInfo);
        }
        wrap.appendChild(c1);

        if(cn){
            const c2=h('div',{className:'card'});
            c2.appendChild(h('div',{className:'card-title'},'Calcolo'));
            const sg=h('div',{className:'stat-grid'});
            sg.appendChild(h('div',{className:'stat-box'},h('div',{className:'stat-label'},'Sup. Conv.'),h('div',{className:'stat-value'},sup.toFixed(2))));
            sg.appendChild(h('div',{className:'stat-box'},h('div',{className:'stat-label'},'Parametri'),h('div',{className:'stat-value'},pc+'/20')));
            sg.appendChild(h('div',{className:'stat-box'},h('div',{className:'stat-label'},'Fascia'),h('div',{className:'stat-value'},cn.f)));
            c2.appendChild(sg);
            const rInfo=h('div',{style:{background:'var(--bg-elevated)',borderRadius:'10px',padding:'10px',textAlign:'center',marginTop:'10px',fontSize:'13px'}});
            rInfo.appendChild(document.createTextNode('€ '+cn.rMin.toFixed(2)+' – € '+cn.rMax.toFixed(2)+' /mq/anno'));
            if(adj!==0)rInfo.appendChild(h('div',{style:{fontSize:'11px',color:'var(--gold)',marginTop:'4px'}},'Maggiorazione: '+(adj>=0?'+':'')+adj+'%'));
            if(S.ct==='transitorio')rInfo.appendChild(h('div',{style:{fontSize:'11px',color:'var(--gold)',marginTop:'2px'}},'+20% transitorio'));
            c2.appendChild(rInfo);
            const rng=h('div',{className:'highlight-box gold-box',style:{marginTop:'10px'}});
            rng.appendChild(h('div',{style:{fontSize:'9px',fontWeight:'600',textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--gold)'}},'Range Canone Mensile'));
            rng.appendChild(h('div',{style:{fontSize:'22px',fontWeight:'700',marginTop:'4px',color:'var(--gold)'}},'€ '+cn.minM.toFixed(2)+' — € '+cn.maxM.toFixed(2)));
            rng.appendChild(h('div',{style:{fontSize:'11px',color:'var(--text-secondary)',marginTop:'4px'}},'Annuo: € '+cn.minA.toFixed(2)+' — € '+cn.maxA.toFixed(2)));
            c2.appendChild(rng);
            wrap.appendChild(c2);
        }

        const c3=h('div',{className:'card'});
        c3.appendChild(field('Canone mensile pattuito €',inp('can',{type:'number',ph:'es. 800.00',attrs:{step:'0.01'}})));
        if(cn&&S.can){
            const v=parseFloat(S.can);const ok=v>=cn.minM&&v<=cn.maxM;
            c3.appendChild(h('div',{className:'highlight-box '+(ok?'green-box':'red-box'),style:{fontSize:'13px',fontWeight:'500'}},ok?'✓ Canone nel range — asseverazione OK':'✗ FUORI RANGE — asseverazione a rischio'));
        }
        wrap.appendChild(c3);
    }

    // ── Step 4: Contratto ──
    if(S.step===4){
        const c1=h('div',{className:'card'});
        c1.appendChild(h('div',{className:'card-title'},S.ct==='transitorio'?'Transitorio (max 18 mesi)':'Studenti (6–36 mesi)'));
        const r1=h('div',{className:'row row-3'});
        r1.appendChild(field('Durata mesi',inp('dur',{type:'number'})));
        r1.appendChild(field('Data inizio',inp('di',{type:'date'})));
        r1.appendChild(field('Data fine',inp('df',{type:'date'})));
        c1.appendChild(r1);
        const r2=h('div',{className:'row row-2'});
        r2.appendChild(field('Deposito (max 3)',inp('dep',{type:'number',attrs:{max:'3'}})));
        const cedF=h('div',{className:'field'});
        cedF.appendChild(h('label',{className:'label'},'Cedolare secca'));
        const rr=h('div',{className:'radio-row'});
        [{v:true,l:'Sì (10%)'},{v:false,l:'No'}].forEach(o=>{
            const lb=h('label',{});
            const rd=h('input',{type:'radio',name:'ced',checked:S.ced===o.v,onChange:()=>u('ced',o.v)});
            lb.appendChild(rd);lb.appendChild(document.createTextNode(o.l));rr.appendChild(lb);
        });
        cedF.appendChild(rr);r2.appendChild(cedF);
        c1.appendChild(r2);
        if(S.ct==='transitorio')c1.appendChild(field('Motivo transitorietà',h('textarea',{className:'input',value:S.mot,placeholder:'es. Temporary work relocation...',onInput:e=>{S.mot=e.target.value;}})));
        else{c1.appendChild(field('Corso di studi',inp('corso')));c1.appendChild(field('Università',inp('uni')));}
        wrap.appendChild(c1);
    }

    // ── Step 5: Parti ──
    if(S.step===5){
        [{t:'Locatore (Proprietario)',p:'l'},{t:'Conduttore (Inquilino)',p:'c'}].forEach(({t,p})=>{
            const c=h('div',{className:'card'});
            c.appendChild(h('div',{className:'card-title'},t));
            c.appendChild(field('Nome e cognome',inp(p+'N')));
            const r=h('div',{className:'row row-2'});
            r.appendChild(field('Nato/a a',inp(p+'NA')));r.appendChild(field('Data nascita',inp(p+'DN',{type:'date'})));
            c.appendChild(r);
            c.appendChild(field('Residenza',inp(p+'R')));
            const cfI=inp(p+'CF');cfI.style.textTransform='uppercase';cfI.addEventListener('input',e=>{S[p+'CF']=e.target.value.toUpperCase();});
            c.appendChild(field('Codice fiscale',cfI));
            if(p==='c')c.appendChild(field('Documento',inp('cDoc',{ph:'es. Passport AB1234567'})));
            wrap.appendChild(c);
        });
    }

    // ── Step 6: Output ──
    if(S.step===6&&S.em){
        const c=h('div',{className:'card'});
        const hdr=h('div',{className:'card-title',style:{display:'flex',justifyContent:'space-between',alignItems:'center'}});
        hdr.appendChild(h('span',{},'Email per CAF Partner'));
        const btns=h('div',{style:{display:'flex',gap:'8px'}});
        btns.appendChild(h('button',{className:'btn btn-secondary btn-sm',onClick:saveDeal,disabled:S.saving},S.saving?'...':'💾 Salva'));
        btns.appendChild(h('button',{className:'btn btn-sm',style:{background:S.cp?'var(--green)':'var(--gold)'},onClick:copyEmail},S.cp?'✓ Copiato!':'📋 Copia'));
        hdr.appendChild(btns);
        c.appendChild(hdr);
        c.appendChild(h('pre',{className:'email-output'},S.em));
        wrap.appendChild(c);
    }

    // Navigation
    const nav=h('div',{className:'nav-bottom'});
    if(S.step>1)nav.appendChild(h('button',{className:'btn btn-secondary',onClick:()=>u('step',S.step-1)},'← Indietro'));
    else nav.appendChild(h('div',{}));
    if(S.step<5)nav.appendChild(h('button',{className:'btn',onClick:()=>u('step',S.step+1)},'Avanti →'));
    else if(S.step===5)nav.appendChild(h('button',{className:'btn',onClick:genEmail},'Genera Email CAF →'));
    else nav.appendChild(h('button',{className:'btn btn-secondary',onClick:()=>{resetForm();render();}},'+ Nuovo Deal'));
    wrap.appendChild(nav);

    app.appendChild(wrap);
}

// Close zone dropdown on outside click
document.addEventListener('mousedown',e=>{
    if(S.szOpen&&!e.target.closest('.zone-dropdown')&&!e.target.classList.contains('input')){S.szOpen=false;render();}
});

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
loadDeals();
</script>
</body>
