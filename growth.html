<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Growth — BOOM Rome</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#08080A">
  <meta name="color-scheme" content="dark">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root{
      --gold:#D4AF37; --gold-light:rgba(212,175,55,.15); --gold-dark:#B8960C;
      --bg:#000; --bg-card:#0A0A0A; --bg-elevated:#141414; --bg-input:#1A1A1A;
      --border:rgba(255,255,255,.08); --text:#FFF; --text-secondary:#999; --green:#3FB97A; --red:#E25563;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Inter,system-ui,sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;min-height:100vh}
    a{color:inherit}
    .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px}
    header.top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:8px}
    .brand{font-size:13px;letter-spacing:6px;color:var(--gold);text-transform:uppercase}
    h1{font-weight:200;font-size:30px;letter-spacing:2px;margin:6px 0 2px}
    .sub{color:var(--text-secondary);font-size:13px;letter-spacing:1px}
    .ranges{display:flex;gap:8px}
    .ranges button{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-secondary);
      padding:8px 14px;border-radius:999px;font-size:12px;letter-spacing:1px;cursor:pointer;transition:.15s}
    .ranges button.active,.ranges button:hover{border-color:var(--gold);color:var(--gold)}
    .grid{display:grid;gap:16px}
    .kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin:26px 0}
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:20px}
    .kpi .label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-secondary)}
    .kpi .val{font-size:30px;font-weight:200;margin-top:8px;letter-spacing:1px}
    .kpi .val .live{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-left:8px;vertical-align:middle;animation:pulse 1.6s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
    .two{grid-template-columns:1fr 1fr}
    @media(max-width:820px){.two{grid-template-columns:1fr}}
    .card h2{font-weight:300;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{text-align:left;padding:9px 6px;border-bottom:1px solid var(--border)}
    th{color:var(--text-secondary);font-weight:300;font-size:11px;letter-spacing:1px;text-transform:uppercase}
    td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
    .bar{height:5px;border-radius:3px;background:var(--gold);opacity:.85;margin-top:5px}
    .funnel{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-top:4px}
    .fn{background:var(--bg-elevated);border:1px solid var(--border);border-radius:14px;padding:16px}
    .fn .n{font-size:11px;letter-spacing:1px;color:var(--text-secondary);text-transform:uppercase}
    .fn .c{font-size:26px;font-weight:200;margin-top:6px;color:var(--gold)}
    .muted{color:var(--text-secondary);font-size:13px;line-height:1.7}
    .pill{display:inline-block;font-size:11px;letter-spacing:1px;padding:2px 9px;border-radius:999px;border:1px solid var(--border);color:var(--text-secondary)}
    .setup{border:1px solid var(--gold-light);background:linear-gradient(180deg,rgba(212,175,55,.06),transparent)}
    .setup code{background:var(--bg-input);padding:2px 7px;border-radius:6px;color:var(--gold);font-size:12px}
    .setup ol{margin:14px 0 0 18px}.setup li{margin:10px 0;line-height:1.6}
    .err{color:var(--red);font-size:13px}
    .center{display:flex;align-items:center;justify-content:center;min-height:50vh;color:var(--text-secondary);letter-spacing:2px;font-size:13px}
    canvas{max-height:260px}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div>
        <div class="brand">BOOM · Growth</div>
        <h1>Analytics & Growth</h1>
        <div class="sub" id="sub">Live Google Analytics — boomrome.com</div>
      </div>
      <div class="ranges" id="ranges" hidden>
        <button data-d="7">7d</button>
        <button data-d="28" class="active">28d</button>
        <button data-d="90">90d</button>
      </div>
    </header>

    <div id="root"><div class="center">Authenticating…</div></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/boom-portal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
  (function () {
    var root = document.getElementById('root');
    var ranges = document.getElementById('ranges');
    var sub = document.getElementById('sub');
    var days = 28, chart = null;

    var nf = new Intl.NumberFormat('en-US');
    function fmt(n){ return nf.format(Math.round(n||0)); }
    function dur(s){ s=Math.round(s||0); var m=Math.floor(s/60); return m+'m '+(s%60)+'s'; }
    function pct(x){ return (Math.round((x||0)*1000)/10)+'%'; }
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

    BoomPortal.requireAuth(['admin'], { loginUrl: '/login.html' })
      .then(function () { wireRanges(); return load(); })
      .catch(function () { root.innerHTML = '<div class="center">Redirecting to sign in…</div>'; });

    function wireRanges(){
      ranges.hidden = false;
      ranges.querySelectorAll('button').forEach(function (b) {
        b.addEventListener('click', function () {
          ranges.querySelectorAll('button').forEach(function (x){ x.classList.remove('active'); });
          b.classList.add('active'); days = parseInt(b.dataset.d, 10); load();
        });
      });
    }

    async function load(){
      root.innerHTML = '<div class="center">Loading analytics…</div>';
      try {
        var token = await firebase.auth().currentUser.getIdToken();
        var res = await fetch('/api/analytics?days=' + days, { headers: { Authorization: 'Bearer ' + token } });
        var data = await res.json();
        if (data && data.configured === false) return renderSetup(data);
        if (!data || !data.ok) return renderError(data);
        render(data);
      } catch (e) {
        renderError({ detail: e.message });
      }
    }

    function kpi(label, val, live){
      return '<div class="card kpi"><div class="label">'+label+'</div><div class="val">'+val+
        (live?'<span class="live" title="active now"></span>':'')+'</div></div>';
    }

    function render(d){
      var k = d.kpis || {};
      var rt = (d.realtime && d.realtime.activeUsers != null) ? fmt(d.realtime.activeUsers) : '—';
      sub.textContent = 'Live Google Analytics · property ' + d.propertyId + ' · last ' + d.range.days + ' days';

      var html = '';
      html += '<div class="grid kpis">' +
        kpi('Sessions', fmt(k.sessions)) +
        kpi('Users', fmt(k.totalUsers)) +
        kpi('New users', fmt(k.newUsers)) +
        kpi('Page views', fmt(k.pageViews)) +
        kpi('Engagement', pct(k.engagementRate)) +
        kpi('Active now', rt, true) +
      '</div>';

      // Lead funnel (boom-track conversion events)
      html += '<div class="card"><h2>Lead funnel — conversion events</h2><div class="grid funnel">';
      (d.funnel || []).forEach(function (f) {
        html += '<div class="fn"><div class="n">'+esc(f.name).replace(/_/g,' ')+'</div><div class="c">'+fmt(f.count)+'</div></div>';
      });
      html += '</div></div>';

      // Trend chart
      html += '<div class="card" style="margin-top:16px"><h2>Sessions & users over time</h2><canvas id="trend"></canvas></div>';

      // Channels + top pages
      html += '<div class="grid two" style="margin-top:16px">';
      html += '<div class="card"><h2>Acquisition channels</h2>'+channelTable(d.channels)+'</div>';
      html += '<div class="card"><h2>Top pages</h2>'+pageTable(d.topPages)+'</div>';
      html += '</div>';

      root.innerHTML = html;
      drawTrend(d.timeseries || []);
    }

    function channelTable(rows){
      rows = rows || []; if (!rows.length) return '<p class="muted">No data yet.</p>';
      var max = Math.max.apply(null, rows.map(function(r){return r.sessions;}).concat([1]));
      var h = '<table><thead><tr><th>Channel</th><th class="num">Sessions</th><th class="num">Users</th></tr></thead><tbody>';
      rows.forEach(function(r){
        h += '<tr><td>'+esc(r.channel)+'<div class="bar" style="width:'+Math.max(4,Math.round(r.sessions/max*100))+'%"></div></td>'+
             '<td class="num">'+fmt(r.sessions)+'</td><td class="num">'+fmt(r.users)+'</td></tr>';
      });
      return h + '</tbody></table>';
    }

    function pageTable(rows){
      rows = rows || []; if (!rows.length) return '<p class="muted">No data yet.</p>';
      var h = '<table><thead><tr><th>Path</th><th class="num">Views</th><th class="num">Sessions</th></tr></thead><tbody>';
      rows.forEach(function(r){
        h += '<tr><td>'+esc(r.path)+'</td><td class="num">'+fmt(r.views)+'</td><td class="num">'+fmt(r.sessions)+'</td></tr>';
      });
      return h + '</tbody></table>';
    }

    function drawTrend(ts){
      var el = document.getElementById('trend'); if (!el) return;
      if (chart) chart.destroy();
      var labels = ts.map(function(p){ var s=p.date||''; return s.slice(4,6)+'/'+s.slice(6,8); });
      chart = new Chart(el, {
        type: 'line',
        data: { labels: labels, datasets: [
          { label:'Sessions', data: ts.map(function(p){return p.sessions;}), borderColor:'#D4AF37',
            backgroundColor:'rgba(212,175,55,.12)', fill:true, tension:.35, pointRadius:0, borderWidth:2 },
          { label:'Users', data: ts.map(function(p){return p.users;}), borderColor:'#888',
            fill:false, tension:.35, pointRadius:0, borderWidth:1.5 },
        ]},
        options: {
          responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
          plugins:{ legend:{ labels:{ color:'#999', boxWidth:12, font:{size:11} } } },
          scales:{
            x:{ grid:{color:'rgba(255,255,255,.05)'}, ticks:{color:'#666',maxTicksLimit:10,font:{size:10}} },
            y:{ grid:{color:'rgba(255,255,255,.05)'}, ticks:{color:'#666',font:{size:10}}, beginAtZero:true },
          },
        },
      });
    }

    function renderSetup(d){
      ranges.hidden = true;
      var s = d.setup || {};
      root.innerHTML =
        '<div class="card setup">' +
        '<h2>Connect Google Analytics</h2>' +
        '<p class="muted">The dashboard is live — it just needs read access to BOOM\'s GA4 property ' +
        '(<span class="pill">'+esc(s.measurementId||'G-EYCD59RDVJ')+'</span>). One-time setup in Vercel:</p>' +
        '<ol>' +
        '<li>In Google Cloud, create a <strong>service account</strong> and download its JSON key.</li>' +
        '<li>In GA → <em>Admin → Property Access Management</em>, add that service-account email with <strong>Viewer</strong> access.</li>' +
        '<li>In Vercel → Project → Settings → Environment Variables, set ' +
            '<code>GA_SERVICE_ACCOUNT_JSON</code> (paste the JSON) and ' +
            '<code>GA4_PROPERTY_ID</code> (the numeric id from <em>Admin → Property Settings</em>).</li>' +
        '<li>Redeploy. This page lights up automatically.</li>' +
        '</ol></div>';
    }

    function renderError(d){
      ranges.hidden = false;
      root.innerHTML = '<div class="card"><h2>Couldn\'t load analytics</h2>' +
        '<p class="err">'+esc((d && (d.detail||d.error)) || 'Unknown error')+'</p>' +
        '<p class="muted" style="margin-top:10px">If this persists, check the service-account access on the GA4 property and the Vercel env vars.</p></div>';
    }
  })();
  </script>
</body>
</html>
