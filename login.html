    <style>
        *,
        *::before,
        *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* Brand — aligned with the live BOOM palette */
            --gold: #FFD700;
            --gold-light: #FFE55C;
            --gold-dark: #E5C200;
            --gold-deep: #C9A400;
            --violet: #635BFF;
            --green: #00FF88;
            --red: #FF5C5C;

            --black: #030303;
            --void: #060607;
            --surface: #0B0B0C;
            --surface-card: #0E0E10;
            --surface-input: #121214;
            --surface-input-focus: #161618;

            --text-primary: #FAFAFA;
            --text-secondary: rgba(250, 250, 250, 0.72);
            --text-tertiary: rgba(250, 250, 250, 0.44);
            --text-muted: rgba(250, 250, 250, 0.26);

            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-default: rgba(255, 255, 255, 0.09);
            --border-gold: rgba(255, 215, 0, 0.30);

            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-display: 'Helvetica Neue', Helvetica, Arial, sans-serif;

            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

            --radius: 20px;
            --radius-input: 13px;
        }

        html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; height: 100%; }

        body {
            font-family: var(--font-sans);
            background: var(--black);
            color: var(--text-primary);
            font-weight: 300;
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
            position: relative;
            overflow: hidden;
            line-height: 1.6;
        }

        /* ─── Atmospheric background ──────────────────────────────────── */
        .bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            will-change: transform;
        }
        .orb-gold {
            width: 620px; height: 620px;
            background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            opacity: 0.07;
            top: -240px; right: -120px;
            animation: drift-a 24s ease-in-out infinite;
        }
        .orb-violet {
            width: 520px; height: 520px;
            background: radial-gradient(circle, var(--violet) 0%, transparent 70%);
            opacity: 0.05;
            bottom: -200px; left: -140px;
            animation: drift-b 30s ease-in-out infinite;
        }
        .orb-center {
            width: 760px; height: 760px;
            background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 65%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes drift-a {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-50px, 60px) scale(1.08); }
        }
        @keyframes drift-b {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(60px, -40px) scale(1.12); }
        }

        .grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(255,215,0,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,215,0,0.025) 1px, transparent 1px);
            background-size: 64px 64px;
            mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 30%, transparent 80%);
        }

        /* Fine film-grain for premium depth */
        .grain {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            opacity: 0.018;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* ─── Back link ───────────────────────────────────────────────── */
        .back-link {
            position: fixed; top: max(24px, env(safe-area-inset-top)); left: 24px;
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--text-tertiary);
            text-decoration: none;
            font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase;
            padding: 8px 4px;
            transition: color 0.3s var(--ease-out), transform 0.3s var(--ease-out);
            z-index: 10;
        }
        .back-link svg { transition: transform 0.3s var(--ease-out); }
        .back-link:hover { color: var(--gold); }
        .back-link:hover svg { transform: translateX(-4px); }
        .back-link:focus-visible { outline: 2px solid var(--border-gold); outline-offset: 4px; border-radius: 6px; }

        /* ─── Card ────────────────────────────────────────────────────── */
        .login-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 430px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)) ,
                var(--surface-card);
            border: 1px solid var(--border-default);
            border-radius: var(--radius);
            padding: 52px 44px 40px;
            box-shadow:
                0 1px 0 rgba(255,255,255,0.04) inset,
                0 40px 80px -20px rgba(0,0,0,0.7),
                0 0 120px -40px rgba(255,215,0,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: card-in 0.7s var(--ease-out) both;
        }
        /* Gold hairline along the top edge */
        .login-card::before {
            content: '';
            position: absolute; top: -1px; left: 24px; right: 24px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0.5;
        }

        @keyframes card-in {
            from { opacity: 0; transform: translateY(16px) scale(0.985); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ─── Header ──────────────────────────────────────────────────── */
        .header { text-align: center; margin-bottom: 36px; }

        .logo-ring {
            width: 76px; height: 76px;
            margin: 0 auto 22px;
            display: grid; place-items: center;
            border-radius: 50%;
            border: 1px solid var(--border-gold);
            background: radial-gradient(circle at 50% 30%, rgba(255,215,0,0.10), transparent 70%);
            position: relative;
            animation: halo 5s ease-in-out infinite;
        }
        @keyframes halo {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,215,0,0.0), 0 0 30px -6px rgba(255,215,0,0.35); }
            50%      { box-shadow: 0 0 0 6px rgba(255,215,0,0.03), 0 0 44px -6px rgba(255,215,0,0.55); }
        }
        .logo-svg {
            width: 46px; height: 46px; display: block;
            filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.45));
        }

        .brand-name {
            font-family: var(--font-display);
            font-size: 34px; font-weight: 300;
            letter-spacing: 8px; text-transform: uppercase;
            color: var(--text-primary);
            margin: 0 0 10px;
            padding-left: 8px; /* optical centering for tracked caps */
        }
        .brand-sub {
            font-size: 10.5px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase;
            color: var(--text-tertiary);
        }
        .brand-sub b { color: var(--gold); font-weight: 600; }

        /* ─── Messages ────────────────────────────────────────────────── */
        .message {
            padding: 13px 16px; border-radius: 12px;
            font-size: 13px; font-weight: 400; line-height: 1.5;
            margin-bottom: 22px;
            display: none;
            align-items: flex-start; gap: 10px;
            animation: msg-in 0.35s var(--ease-out);
        }
        .message.show { display: flex; }
        .message svg { flex-shrink: 0; margin-top: 1px; }
        @keyframes msg-in { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
        .message.error   { background: rgba(255, 92, 92, 0.08); border: 1px solid rgba(255, 92, 92, 0.28); color: #FF8A8A; }
        .message.success { background: rgba(0, 255, 136, 0.08); border: 1px solid rgba(0, 255, 136, 0.28); color: #6BFFB4; }

        /* ─── Form ────────────────────────────────────────────────────── */
        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 10.5px; font-weight: 600; letter-spacing: 1.8px; text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 9px;
        }

        .input-wrap { position: relative; display: flex; align-items: center; }
        .input-icon {
            position: absolute; left: 16px;
            color: var(--text-muted);
            pointer-events: none;
            display: flex;
            transition: color 0.3s var(--ease-out);
        }
        .input-wrap:focus-within .input-icon { color: var(--gold); }

        .form-input {
            width: 100%;
            padding: 15px 16px 15px 46px;
            background: var(--surface-input);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-input);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 15px; font-weight: 400;
            transition: border-color 0.25s var(--ease-out), box-shadow 0.25s var(--ease-out), background 0.25s var(--ease-out);
            outline: none;
        }
        /* room for the reveal toggle on the password field */
        #password { padding-right: 48px; }

        .form-input::placeholder { color: var(--text-muted); font-weight: 300; }
        .form-input:hover { border-color: rgba(255,255,255,0.16); }
        .form-input:focus {
            border-color: var(--gold);
            background: var(--surface-input-focus);
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.12);
        }
        .form-input:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-input:-webkit-autofill,
        .form-input:-webkit-autofill:focus {
            -webkit-text-fill-color: var(--text-primary);
            -webkit-box-shadow: 0 0 0 1000px var(--surface-input) inset;
            caret-color: var(--text-primary);
        }

        .reveal-btn {
            position: absolute; right: 8px;
            width: 34px; height: 34px;
            display: grid; place-items: center;
            background: transparent; border: none; cursor: pointer;
            color: var(--text-muted); border-radius: 8px;
            transition: color 0.25s var(--ease-out), background 0.25s var(--ease-out);
        }
        .reveal-btn:hover { color: var(--text-secondary); background: rgba(255,255,255,0.04); }
        .reveal-btn:focus-visible { outline: 2px solid var(--border-gold); outline-offset: 1px; }

        .caps-hint {
            display: none;
            margin-top: 8px;
            font-size: 11px; letter-spacing: 0.3px;
            color: var(--gold-light);
        }
        .caps-hint.show { display: block; animation: msg-in 0.25s var(--ease-out); }

        .forgot-row { text-align: right; margin: -6px 0 24px; }
        .forgot-link {
            font-size: 11px; font-weight: 500; letter-spacing: 0.5px;
            color: var(--text-tertiary); text-decoration: none;
            background: none; border: none; cursor: pointer; font-family: inherit;
            transition: color 0.25s var(--ease-out);
        }
        .forgot-link:hover { color: var(--gold); }
        .forgot-link:focus-visible { outline: 2px solid var(--border-gold); outline-offset: 3px; border-radius: 4px; }

        /* ─── Submit ──────────────────────────────────────────────────── */
        .submit-btn {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 45%, var(--gold-dark) 100%);
            border: none; border-radius: var(--radius-input);
            color: #1a1500;
            font-family: inherit;
            font-size: 12.5px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
            cursor: pointer;
            position: relative; overflow: hidden;
            transition: transform 0.25s var(--ease-out), box-shadow 0.3s var(--ease-out), filter 0.25s var(--ease-out);
        }
        /* shimmer sweep */
        .submit-btn::after {
            content: '';
            position: absolute; top: 0; left: -120%;
            width: 60%; height: 100%;
            background: linear-gradient(100deg, transparent, rgba(255,255,255,0.55), transparent);
            transform: skewX(-18deg);
            transition: left 0.7s var(--ease-out);
        }
        .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 14px 36px -10px rgba(255, 215, 0, 0.5); }
        .submit-btn:hover:not(:disabled)::after { left: 130%; }
        .submit-btn:active:not(:disabled) { transform: translateY(0); }
        .submit-btn:focus-visible { outline: 2px solid #fff; outline-offset: 3px; }
        .submit-btn:disabled { cursor: wait; filter: saturate(0.7); }

        .btn-text { transition: opacity 0.2s ease; }
        .submit-btn.loading .btn-text { opacity: 0; }
        .spinner {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; margin: -10px 0 0 -10px;
            border: 2px solid rgba(26,21,0,0.25); border-top-color: #1a1500;
            border-radius: 50%; opacity: 0;
            animation: spin 0.7s linear infinite;
        }
        .submit-btn.loading .spinner { opacity: 1; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Divider + secondary ─────────────────────────────────────── */
        .divider { display: flex; align-items: center; margin: 28px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border-default); }
        .divider span { padding: 0 14px; font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }

        .whatsapp-btn {
            display: flex; align-items: center; justify-content: center; gap: 11px;
            width: 100%; padding: 14px 24px;
            background: transparent;
            border: 1px solid var(--border-default); border-radius: var(--radius-input);
            color: var(--text-secondary); text-decoration: none;
            font-size: 11.5px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
            transition: border-color 0.3s var(--ease-out), color 0.3s var(--ease-out), background 0.3s var(--ease-out);
        }
        .whatsapp-btn:hover { border-color: rgba(0,255,136,0.4); color: var(--green); background: rgba(0,255,136,0.04); }
        .whatsapp-btn:focus-visible { outline: 2px solid rgba(0,255,136,0.5); outline-offset: 2px; }

        /* ─── Footer ──────────────────────────────────────────────────── */
        .footer {
            margin-top: 28px; padding-top: 22px;
            border-top: 1px solid var(--border-subtle);
            display: flex; flex-direction: column; align-items: center; gap: 14px;
        }
        .footer-link { color: var(--gold); text-decoration: none; font-size: 12px; font-weight: 500; letter-spacing: 0.5px; transition: opacity 0.25s ease; }
        .footer-link:hover { opacity: 0.75; }
        .footer-link:focus-visible { outline: 2px solid var(--border-gold); outline-offset: 3px; border-radius: 4px; }

        .secure-badge {
            display: inline-flex; align-items: center; gap: 7px;
            font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;
            color: var(--text-muted);
        }
        .secure-badge svg { color: var(--green); opacity: 0.8; }

        /* ─── Responsive ──────────────────────────────────────────────── */
        @media (max-width: 480px) {
            .login-card { padding: 40px 26px 32px; border-radius: 18px; }
            .back-link { left: 16px; }
            .brand-name { font-size: 30px; letter-spacing: 6px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition-duration: 0.01ms !important; }
            .submit-btn::after { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg" aria-hidden="true">
        <div class="orb orb-gold"></div>
        <div class="orb orb-violet"></div>
        <div class="orb orb-center"></div>
    </div>
    <div class="grid" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <a href="/" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span>Home</span>
    </a>

    <main class="login-card">
        <div class="header">
            <div class="logo-ring">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" class="logo-svg" role="img" aria-label="BOOM Rome">
                    <defs>
                        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#FFE55C"/>
                            <stop offset="100%" stop-color="#E5C200"/>
                        </linearGradient>

                    <g transform="translate(0,1024) scale(0.1,-0.1)" fill="url(#goldGrad)">

    <script>
        // ═══════════════════════════════════════════════════════════════
        // BOOM LOGIN — runs after deferred Firebase scripts have executed
        // ═══════════════════════════════════════════════════════════════
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize Firebase Auth (public web config — not a secret)
            firebase.initializeApp({
                apiKey: "AIzaSyDDb8UeSc8RhO_VxQrhLrupu1aPD4rwRso",
                authDomain: "boom-property-dashboards.firebaseapp.com",
                projectId: "boom-property-dashboards"
            });
            const auth = firebase.auth();

            const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

            // Honour ?next= for redirect destination — internal paths only.
            // Hardened against open-redirect: must be a single-leading-slash
            // path, never protocol-relative (//), never backslash-tricked,
            // never carrying a scheme. Falls back to the portal.
            function getNextDest() {
                try {
                    const raw = new URLSearchParams(location.search).get('next');
                    if (!raw) return '/portal.html';
                    const v = raw.trim();
                    if (v.length > 512) return '/portal.html';
                    if (!v.startsWith('/')) return '/portal.html';
                    if (v.startsWith('//') || v.startsWith('/\\')) return '/portal.html';
                    if (v.includes('\\') || v.includes(':')) return '/portal.html';
                    return v;
                } catch { return '/portal.html'; }
            }
            const NEXT_DEST = getNextDest();

            // Persistence with graceful fallback
            (async () => {
                try {
                    await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
                } catch {
                    try { await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION); } catch {}
                }
            })();

            // Already signed in → straight to destination
            auth.onAuthStateChanged(user => { if (user) window.location.href = NEXT_DEST; });

            // ── DOM refs ──
            const form        = document.getElementById('loginForm');
            const emailInput  = document.getElementById('email');
            const pwInput     = document.getElementById('password');
            const submitBtn   = document.getElementById('submitBtn');
            const messageEl   = document.getElementById('message');
            const revealBtn   = document.getElementById('revealBtn');
            const eyeIcon     = document.getElementById('eyeIcon');
            const capsHint    = document.getElementById('capsHint');
            const forgotBtn   = document.getElementById('forgotBtn');

            const EYE  = '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
            const EYE_OFF = '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c6.5 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.5 13.5 0 0 0 2 12s3.5 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/>';

            function showMessage(html, type) {
                messageEl.innerHTML =
                    (type === 'error'
                        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
                        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'
                    ) + '<span>' + html + '</span>';
                messageEl.className = 'message show ' + type;
            }
            function clearMessage() { messageEl.className = 'message'; messageEl.innerHTML = ''; }

            function setLoading(on) {
                submitBtn.disabled = on;
                submitBtn.classList.toggle('loading', on);
                emailInput.disabled = on;
                pwInput.disabled = on;
            }

            // ── Password reveal ──
            revealBtn.addEventListener('click', () => {
                const show = pwInput.type === 'password';
                pwInput.type = show ? 'text' : 'password';
                eyeIcon.innerHTML = show ? EYE_OFF : EYE;
                revealBtn.setAttribute('aria-pressed', String(show));
                revealBtn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
                pwInput.focus();
            });

            // ── Caps Lock awareness ──
            function capsCheck(e) {
                const on = e.getModifierState && e.getModifierState('CapsLock');
                capsHint.classList.toggle('show', !!on);
            }
            pwInput.addEventListener('keydown', capsCheck);
            pwInput.addEventListener('keyup', capsCheck);
            pwInput.addEventListener('blur', () => capsHint.classList.remove('show'));

            // ── Sign in ──
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = emailInput.value.trim();
                const password = pwInput.value;

                if (!email || !password) {
                    showMessage('Please enter your email and password.', 'error');
                    return;
                }

                setLoading(true);
                clearMessage();

                try {
                    await auth.signInWithEmailAndPassword(email, password);
                    showMessage('Welcome back — signing you in…', 'success');
                    setTimeout(() => { window.location.href = NEXT_DEST; }, isSafari ? 500 : 120);
                } catch (err) {
                    // Generic message to avoid account enumeration. The only
                    // codes we surface specifically are non-enumerating ones.
                    let msg = 'Incorrect email or password. Please try again.';
                    if (err.code === 'auth/too-many-requests') {
                        msg = 'Too many attempts. Please wait a moment and try again.';
                    } else if (err.code === 'auth/network-request-failed') {
                        msg = 'Network error. Check your connection and try again.';
                    } else if (err.code === 'auth/user-disabled') {
                        msg = 'This account has been disabled. Contact support.';
                    }
                    showMessage(msg, 'error');
                    setLoading(false);
                    pwInput.focus();
                    pwInput.select();
                }
            });

            // ── Forgot password (non-enumerating confirmation) ──
            forgotBtn.addEventListener('click', async () => {
                const email = emailInput.value.trim();
                if (!email) {
                    showMessage('Enter your email above, then tap “Forgot password?” again.', 'error');
                    emailInput.focus();
                    return;
                }
                forgotBtn.disabled = true;
                try {
                    await auth.sendPasswordResetEmail(email);
                } catch (err) {
                    // Swallow user-not-found so we don't reveal whether the
                    // email is registered. Only surface hard errors.
                    if (err.code === 'auth/invalid-email') {
                        showMessage('That doesn’t look like a valid email address.', 'error');
                        forgotBtn.disabled = false;
                        return;
                    }
                    if (err.code === 'auth/too-many-requests') {
                        showMessage('Too many requests. Please wait a moment.', 'error');
                        forgotBtn.disabled = false;
                        return;
                    }
                }
                showMessage('If an account exists for that email, a reset link is on its way.', 'success');
                setTimeout(() => { forgotBtn.disabled = false; }, 4000);
            });
        });
    </script>
