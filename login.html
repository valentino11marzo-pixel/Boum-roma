  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root{
      --bg:#08080A;
      --card:rgba(14,14,17,.72);
      --field:rgba(255,255,255,.035);
      --field-hover:rgba(255,255,255,.055);
      --field-focus:rgba(255,255,255,.07);
      --text:#ECECEE; --text-2:rgba(236,236,238,.60); --text-3:rgba(236,236,238,.40); --text-4:rgba(236,236,238,.24);
      --line:rgba(255,255,255,.10); --line-2:rgba(255,255,255,.06);
      --gold:#E9C766; --gold-bright:#F6E4A6; --gold-deep:#B98E2E;
      --red:#F08585; --green:#5FD08C;

      --font:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;
      --ease:cubic-bezier(.22,1,.36,1);
    }

    html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;height:100%}
    body{
      font-family:var(--font); background:var(--bg); color:var(--text); font-weight:400;
      min-height:100svh; display:flex; align-items:center; justify-content:center;
      padding:max(24px,env(safe-area-inset-top)) 22px max(24px,env(safe-area-inset-bottom));
      position:relative; overflow:hidden; line-height:1.5; letter-spacing:-.01em;
    }

    /* ════ Subtle dark Rome photo backdrop (atmosphere only) ════ */
    .photo{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:#08080A url('https://i.imgur.com/hxai5bz.jpeg') center/cover no-repeat;
      filter:grayscale(.45) brightness(.42) contrast(1.04) saturate(.85);
      opacity:.22}
    .photo-tint{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(120% 90% at 50% -10%, rgba(233,199,102,.10), transparent 45%),
        linear-gradient(180deg, rgba(8,8,10,.55) 0%, rgba(8,8,10,.78) 55%, rgba(8,8,10,.95) 100%)}
    .spot{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(60% 45% at 50% 32%, rgba(255,255,255,.045), transparent 60%);
      animation:breathe 12s ease-in-out infinite}
    @keyframes breathe{0%,100%{opacity:.7}50%{opacity:1}}
    .grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

    /* ── Back link ── */
    .back{position:fixed;top:max(24px,env(safe-area-inset-top));left:28px;z-index:10;
      display:inline-flex;align-items:center;gap:8px;color:var(--text-3);text-decoration:none;
      font-size:13px;font-weight:500;letter-spacing:-.01em;transition:color .3s var(--ease)}
    .back svg{transition:transform .3s var(--ease)}
    .back:hover{color:var(--text)} .back:hover svg{transform:translateX(-3px)}
    .back:focus-visible{outline:1px solid var(--line);outline-offset:5px;border-radius:4px}

    /* ════ Card — solid dark with gradient hairline border (Linear/Vercel) ════ */
    .card{
      position:relative;z-index:2;width:100%;max-width:400px;padding:38px 36px 30px;border-radius:20px;
      background:var(--card);
      backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);
      box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 24px 60px -22px rgba(0,0,0,.85), 0 6px 18px -10px rgba(0,0,0,.6);
      animation:enter .7s var(--ease) both;
    }
    /* gradient border (top-lit, faint gold catch) */
    .card::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:1px;pointer-events:none;
      background:linear-gradient(180deg, rgba(246,228,166,.40), rgba(255,255,255,.10) 22%, rgba(255,255,255,.02) 55%, rgba(255,255,255,0) 100%);
      -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;mask-composite:exclude}
    /* subtle pointer glow */
    .card::after{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;opacity:0;
      background:radial-gradient(300px 220px at var(--mx,50%) var(--my,0%), rgba(233,199,102,.10), transparent 60%);
      transition:opacity .5s var(--ease)}
    .card:hover::after{opacity:1}
    @keyframes enter{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

    /* ── Header ── */
    .head{margin-bottom:26px}
    .brandrow{display:flex;align-items:center;gap:11px;margin-bottom:26px}
    .logo{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex-shrink:0;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      border:1px solid var(--line)}
    .logo svg{width:21px;height:21px}
    .brandtxt{font-size:15px;font-weight:600;letter-spacing:.02em;color:var(--text)}
    .brandtxt .roma{color:var(--text-4);font-weight:500;margin-left:6px}

    .title{font-size:22px;font-weight:600;letter-spacing:-.02em;color:var(--text)}
    .subtitle{margin-top:5px;font-size:13.5px;font-weight:400;color:var(--text-3)}

    /* ── Messages ── */
    .msg{display:none;align-items:flex-start;gap:9px;padding:11px 13px;border-radius:10px;
      font-size:12.5px;line-height:1.5;margin-top:18px;animation:fade .3s var(--ease)}
    .msg.show{display:flex}
    .msg svg{flex-shrink:0;margin-top:1px}
    .msg.error{background:rgba(240,133,133,.09);border:1px solid rgba(240,133,133,.24);color:#F1A2A2}
    .msg.success{background:rgba(95,208,140,.09);border:1px solid rgba(95,208,140,.24);color:#8FE0AE}
    @keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

    form{margin-top:24px}
    /* ── Fields ── */
    .label{display:block;font-size:12px;font-weight:500;color:var(--text-2);margin:0 0 7px 2px;letter-spacing:0}
    .field{position:relative;margin-bottom:14px}
    .field input{
      width:100%;height:44px;padding:0 14px;
      background:var(--field);border:1px solid var(--line);border-radius:10px;
      color:var(--text);font-family:var(--font);font-size:14px;font-weight:400;letter-spacing:-.01em;outline:none;
      transition:border-color .2s var(--ease),background .2s var(--ease),box-shadow .2s var(--ease)}
    #password{padding-right:60px}
    .field input::placeholder{color:var(--text-4)}
    .field input:hover{background:var(--field-hover);border-color:rgba(255,255,255,.16)}
    .field input:focus{border-color:rgba(233,199,102,.6);background:var(--field-focus);box-shadow:0 0 0 3px rgba(233,199,102,.13)}
    .field input:disabled{opacity:.5;cursor:not-allowed}
    .field input:-webkit-autofill,.field input:-webkit-autofill:focus{
      -webkit-text-fill-color:var(--text);-webkit-box-shadow:0 0 0 1000px #141417 inset;caret-color:var(--text)}

    .reveal{position:absolute;right:6px;top:6px;height:32px;padding:0 9px;display:grid;place-items:center;
      background:transparent;border:none;cursor:pointer;color:var(--text-4);border-radius:7px;
      font-family:var(--font);font-size:11px;font-weight:600;letter-spacing:0;
      transition:color .2s var(--ease),background .2s var(--ease)}
    .reveal:hover{color:var(--text-2);background:rgba(255,255,255,.05)}
    .reveal:focus-visible{outline:1px solid var(--line);outline-offset:1px}

    .caps{display:none;margin:8px 2px 0;font-size:11.5px;color:var(--gold)}
    .caps.show{display:block}

    .labelrow{display:flex;align-items:center;justify-content:space-between;margin:0 2px 7px}
    .labelrow .label{margin:0}
    .link{background:none;border:none;cursor:pointer;font-family:var(--font);
      font-size:12px;font-weight:500;color:var(--text-3);transition:color .2s var(--ease)}
    .link:hover{color:var(--gold)}
    .link:focus-visible{outline:1px solid var(--line);outline-offset:3px;border-radius:4px}

    /* ── Submit (metallic gold, crisp) ── */
    .submit{position:relative;width:100%;height:46px;margin-top:6px;border:none;border-radius:10px;cursor:pointer;
      background:linear-gradient(180deg, var(--gold-bright), var(--gold) 48%, var(--gold-deep));
      color:#1c1503;font-family:var(--font);font-size:14px;font-weight:600;letter-spacing:-.01em;
      box-shadow:0 1px 0 rgba(255,255,255,.4) inset, 0 6px 18px -8px rgba(233,199,102,.45);
      transition:filter .2s var(--ease),transform .12s var(--ease),box-shadow .2s var(--ease)}
    .submit:hover:not(:disabled){filter:brightness(1.05);box-shadow:0 1px 0 rgba(255,255,255,.45) inset, 0 10px 24px -8px rgba(233,199,102,.55)}
    .submit:active:not(:disabled){transform:scale(.99)}
    .submit:focus-visible{outline:2px solid var(--gold-bright);outline-offset:3px}
    .submit:disabled{cursor:wait;opacity:.9}
    .submit .t{transition:opacity .2s ease}
    .submit.loading .t{opacity:0}
    .spin{position:absolute;top:50%;left:50%;width:17px;height:17px;margin:-8.5px 0 0 -8.5px;opacity:0;
      border:2px solid rgba(28,21,3,.3);border-top-color:#1c1503;border-radius:50%;animation:rot .7s linear infinite}
    .submit.loading .spin{opacity:1}
    @keyframes rot{to{transform:rotate(360deg)}}

    /* ── Secondary ── */
    .alt{margin-top:20px;text-align:center;font-size:12.5px;color:var(--text-3)}
    .alt a{color:var(--text-2);text-decoration:none;font-weight:500;transition:color .2s var(--ease)}
    .alt a:hover{color:var(--gold)}
    .alt a:focus-visible{outline:1px solid var(--line);outline-offset:3px;border-radius:4px}
    .alt .sep{margin:0 8px;color:var(--text-4)}

    .foot{margin-top:24px;padding-top:18px;border-top:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;gap:7px;
      font-size:11px;font-weight:500;letter-spacing:0;color:var(--text-4)}
    .foot svg{color:var(--green);opacity:.7}

    @media (max-width:430px){
      .back{left:18px}
      .card{padding:32px 24px 26px;border-radius:18px}
    }
    @media (prefers-reduced-motion:reduce){
      *,*::before,*::after{animation:none!important;transition-duration:.01ms!important}
      .card{opacity:1;transform:none}
    }
  </style>
</head>

  <script>
    // Subtle pointer glow on the card (hover devices, motion-on)
    (function(){
      if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      if(window.matchMedia('(hover: none)').matches) return;
      const card=document.getElementById('card'); if(!card) return;
      card.addEventListener('pointermove',(e)=>{
        const r=card.getBoundingClientRect();
        card.style.setProperty('--mx', ((e.clientX-r.left)/r.width*100)+'%');
        card.style.setProperty('--my', ((e.clientY-r.top)/r.height*100)+'%');
      },{passive:true});
    })();

    document.addEventListener('DOMContentLoaded',()=>{
      firebase.initializeApp({
        apiKey:"AIzaSyDDb8UeSc8RhO_VxQrhLrupu1aPD4rwRso",
        authDomain:"boom-property-dashboards.firebaseapp.com",
        projectId:"boom-property-dashboards"
      });
      const auth=firebase.auth();
      const isSafari=/^((?!chrome|android).)*safari/i.test(navigator.userAgent);

      function getNextDest(){
        try{
          const raw=new URLSearchParams(location.search).get('next');
          if(!raw) return '/portal.html';
          const v=raw.trim();
          if(v.length>512) return '/portal.html';
          if(!v.startsWith('/')) return '/portal.html';
          if(v.startsWith('//')||v.startsWith('/\\')) return '/portal.html';
          if(v.includes('\\')||v.includes(':')) return '/portal.html';
          return v;
        }catch{ return '/portal.html'; }
      }
      const NEXT_DEST=getNextDest();

      (async()=>{
        try{ await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL); }
        catch{ try{ await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION); }catch{} }
      })();

      auth.onAuthStateChanged(u=>{ if(u) window.location.href=NEXT_DEST; });

      const form=document.getElementById('loginForm');
      const emailInput=document.getElementById('email');
      const pwInput=document.getElementById('password');
      const submitBtn=document.getElementById('submitBtn');
      const messageEl=document.getElementById('message');
      const revealBtn=document.getElementById('revealBtn');
      const capsHint=document.getElementById('capsHint');
      const forgotBtn=document.getElementById('forgotBtn');

      function showMessage(html,type){
        messageEl.innerHTML=(type==='error'
          ?'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
          :'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>')
          +'<span>'+html+'</span>';
        messageEl.className='msg show '+type;
      }
      function clearMessage(){ messageEl.className='msg'; messageEl.innerHTML=''; }
      function setLoading(on){
        submitBtn.disabled=on; submitBtn.classList.toggle('loading',on);
        emailInput.disabled=on; pwInput.disabled=on;
      }

      revealBtn.addEventListener('click',()=>{
        const show=pwInput.type==='password';
        pwInput.type=show?'text':'password';
        revealBtn.textContent=show?'Hide':'Show';
        revealBtn.setAttribute('aria-pressed',String(show));
        revealBtn.setAttribute('aria-label',show?'Hide password':'Show password');
        pwInput.focus();
      });

      function capsCheck(e){
        const on=e.getModifierState&&e.getModifierState('CapsLock');
        capsHint.classList.toggle('show',!!on);
      }
      pwInput.addEventListener('keydown',capsCheck);
      pwInput.addEventListener('keyup',capsCheck);
      pwInput.addEventListener('blur',()=>capsHint.classList.remove('show'));

      form.addEventListener('submit',async(e)=>{
        e.preventDefault();
        const email=emailInput.value.trim();
        const password=pwInput.value;
        if(!email||!password){ showMessage('Please enter your email and password.','error'); return; }
        setLoading(true); clearMessage();
        try{
          await auth.signInWithEmailAndPassword(email,password);
          showMessage('Welcome back — signing you in…','success');
          setTimeout(()=>{ window.location.href=NEXT_DEST; }, isSafari?500:120);
        }catch(err){
          let msg='Incorrect email or password. Please try again.';
          if(err.code==='auth/too-many-requests') msg='Too many attempts. Please wait a moment and try again.';
          else if(err.code==='auth/network-request-failed') msg='Network error. Check your connection and try again.';
          else if(err.code==='auth/user-disabled') msg='This account has been disabled. Contact support.';
          showMessage(msg,'error'); setLoading(false); pwInput.focus(); pwInput.select();
        }
      });

      forgotBtn.addEventListener('click',async()=>{
        const email=emailInput.value.trim();
        if(!email){ showMessage('Enter your email above, then tap “Forgot?” again.','error'); emailInput.focus(); return; }
        forgotBtn.disabled=true;
        try{ await auth.sendPasswordResetEmail(email); }
        catch(err){
          if(err.code==='auth/invalid-email'){ showMessage('That doesn’t look like a valid email address.','error'); forgotBtn.disabled=false; return; }
          if(err.code==='auth/too-many-requests'){ showMessage('Too many requests. Please wait a moment.','error'); forgotBtn.disabled=false; return; }
        }
        showMessage('If an account exists for that email, a reset link is on its way.','success');
        setTimeout(()=>{ forgotBtn.disabled=false; },4000);
      });
    });
  </script>
</body>
</html>
