  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root{
      --gold:#D8B45A;            /* refined, muted imperial gold (not neon) */
      --gold-bright:#E8CF8C;
      --gold-deep:#A8842F;
      --black:#000;
      --ink:#050506;
      --panel:#0A0A0B;
      --field:#0E0E10;
      --field-2:#131316;
      --text:#F4F3F1;
      --text-2:rgba(244,243,241,.58);
      --text-3:rgba(244,243,241,.34);
      --text-4:rgba(244,243,241,.18);
      --line:rgba(255,255,255,.07);
      --line-2:rgba(255,255,255,.045);
      --red:#E06666;
      --green:#5FD0A0;

      /* Helvetica Neue 300 is the brand voice; Inter is only a fallback */
      --display:'Helvetica Neue','Helvetica Neue LT','Arial Nova',Helvetica,Arial,'Inter',sans-serif;
      --sans:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;
      --ease:cubic-bezier(.22,1,.36,1);
    }

    html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;height:100%}
    body{
      font-family:var(--display);
      background:var(--black);
      color:var(--text);
      font-weight:300;
      min-height:100svh;
      display:flex;align-items:center;justify-content:center;
      padding:max(24px,env(safe-area-inset-top)) 24px max(24px,env(safe-area-inset-bottom));
      position:relative;overflow:hidden;line-height:1.6;
    }

    /* ── Quiet atmosphere: one slow gold aura + arch watermark + vignette ── */
    .aura{
      position:fixed;left:50%;top:42%;transform:translate(-50%,-50%);
      width:760px;height:760px;border-radius:50%;z-index:0;pointer-events:none;
      background:radial-gradient(circle, rgba(216,180,90,.10) 0%, rgba(216,180,90,.03) 36%, transparent 68%);
      filter:blur(8px);
      animation:breathe 11s ease-in-out infinite;
    }
    @keyframes breathe{0%,100%{opacity:.55}50%{opacity:1}}

    .arch{
      position:fixed;left:50%;top:50%;transform:translate(-50%,-52%);
      width:min(560px,92vw);z-index:0;pointer-events:none;opacity:.07;
      color:var(--gold);
    }
    .vignette{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 85% 75% at 50% 45%, transparent 46%, rgba(0,0,0,.85) 100%)}
    .grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.018;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

    /* ── Back link ── */
    .back{position:fixed;top:max(28px,env(safe-area-inset-top));left:32px;z-index:10;
      display:inline-flex;align-items:center;gap:9px;color:var(--text-3);text-decoration:none;
      font-size:11px;font-weight:400;letter-spacing:2px;text-transform:uppercase;
      transition:color .4s var(--ease)}
    .back svg{transition:transform .4s var(--ease)}
    .back:hover{color:var(--gold)} .back:hover svg{transform:translateX(-4px)}
    .back:focus-visible{outline:1px solid var(--line);outline-offset:5px}

    /* ── Card ── */
    .card{
      position:relative;z-index:2;width:100%;max-width:380px;
      animation:enter 1s var(--ease) both;
    }
    @keyframes enter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

    /* ── Header ── */
    .head{text-align:center;margin-bottom:44px}
    .mark{width:46px;height:46px;margin:0 auto 26px;display:block;
      filter:drop-shadow(0 0 18px rgba(216,180,90,.32))}
    .wordmark{
      font-family:var(--display);font-weight:300;
      font-size:30px;letter-spacing:13px;text-transform:uppercase;
      color:var(--text);margin:0 0 0 13px;line-height:1; /* tracking optical centering */
    }
    /* imperial inscribed rule */
    .rule{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:18px}
    .rule .ln{height:1px;width:46px;background:linear-gradient(90deg,transparent,var(--gold-deep))}
    .rule .ln.r{background:linear-gradient(90deg,var(--gold-deep),transparent)}
    .rule .lozenge{width:5px;height:5px;background:var(--gold);transform:rotate(45deg);opacity:.9}
    .rule span{font-size:9.5px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:var(--text-3);
      font-family:var(--sans)}

    /* ── Intro ── */
    .intro{text-align:center;margin-bottom:34px}
    .intro h1{font-family:var(--display);font-weight:300;font-size:23px;letter-spacing:.2px;color:var(--text);margin-bottom:7px}
    .intro p{font-size:13px;font-weight:300;letter-spacing:.2px;color:var(--text-3);font-family:var(--sans)}

    /* ── Messages ── */
    .msg{display:none;align-items:flex-start;gap:9px;padding:12px 14px;border-radius:11px;
      font-size:12.5px;line-height:1.5;margin-bottom:22px;font-family:var(--sans);
      animation:enter .35s var(--ease)}
    .msg.show{display:flex}
    .msg svg{flex-shrink:0;margin-top:1px}
    .msg.error{background:rgba(224,102,102,.07);border:1px solid rgba(224,102,102,.24);color:#E89090}
    .msg.success{background:rgba(95,208,160,.07);border:1px solid rgba(95,208,160,.24);color:#8FE0BF}

    /* ── Fields (clean, no clutter) ── */
    .field{position:relative;margin-bottom:14px}
    .field input{
      width:100%;height:56px;padding:21px 16px 7px;
      background:var(--field);border:1px solid var(--line);border-radius:13px;
      color:var(--text);font-family:var(--sans);font-size:15px;font-weight:400;letter-spacing:.2px;outline:none;
      transition:border-color .3s var(--ease),background .3s var(--ease),box-shadow .3s var(--ease)}
    #password{padding-right:64px}
    .field input:hover{border-color:rgba(255,255,255,.13)}
    .field input:focus{border-color:var(--gold);background:var(--field-2);box-shadow:0 0 0 3px rgba(216,180,90,.10)}
    .field label{position:absolute;left:16px;top:28px;transform:translateY(-50%);
      color:var(--text-4);font-family:var(--sans);font-size:15px;font-weight:400;letter-spacing:.2px;
      pointer-events:none;transition:all .22s var(--ease)}
    .field input:focus ~ label,
    .field input:not(:placeholder-shown) ~ label{
      top:14px;font-size:9.5px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-3)}
    .field input:focus ~ label{color:var(--gold)}
    .field input:disabled{opacity:.5;cursor:not-allowed}
    .field input:-webkit-autofill,.field input:-webkit-autofill:focus{
      -webkit-text-fill-color:var(--text);-webkit-box-shadow:0 0 0 1000px var(--field) inset;caret-color:var(--text)}

    .reveal{position:absolute;right:12px;top:11px;height:34px;padding:0 8px;display:grid;place-items:center;
      background:transparent;border:none;cursor:pointer;color:var(--text-4);border-radius:8px;
      font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
      transition:color .3s var(--ease)}
    .reveal:hover{color:var(--text-2)}
    .reveal:focus-visible{outline:1px solid var(--line);outline-offset:1px}

    .caps{display:none;margin:9px 2px 0;font-size:11px;letter-spacing:.3px;color:var(--gold);font-family:var(--sans)}
    .caps.show{display:block}

    .row{display:flex;justify-content:flex-end;margin:4px 0 24px}
    .link{background:none;border:none;cursor:pointer;font-family:var(--sans);
      font-size:11.5px;font-weight:400;letter-spacing:.3px;color:var(--text-3);transition:color .3s var(--ease)}
    .link:hover{color:var(--gold)}
    .link:focus-visible{outline:1px solid var(--line);outline-offset:3px}

    /* ── Submit: flat, calm, precise ── */
    .submit{position:relative;width:100%;height:54px;border:none;border-radius:13px;cursor:pointer;
      background:var(--gold);color:#1a1304;
      font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:2.2px;text-transform:uppercase;
      transition:background .3s var(--ease),transform .15s var(--ease)}
    .submit:hover:not(:disabled){background:var(--gold-bright)}
    .submit:active:not(:disabled){transform:scale(.99)}
    .submit:focus-visible{outline:2px solid var(--gold-bright);outline-offset:3px}
    .submit:disabled{cursor:wait;opacity:.85}
    .submit .t{transition:opacity .2s ease}
    .submit.loading .t{opacity:0}
    .spin{position:absolute;top:50%;left:50%;width:18px;height:18px;margin:-9px 0 0 -9px;opacity:0;
      border:2px solid rgba(26,19,4,.3);border-top-color:#1a1304;border-radius:50%;animation:rot .7s linear infinite}
    .submit.loading .spin{opacity:1}
    @keyframes rot{to{transform:rotate(360deg)}}

    /* ── Secondary actions: quiet, Apple-style text links ── */
    .alt{margin-top:26px;text-align:center}
    .alt a{color:var(--text-2);text-decoration:none;font-family:var(--sans);font-size:12.5px;font-weight:400;
      letter-spacing:.2px;transition:color .3s var(--ease)}
    .alt a:hover{color:var(--gold)}
    .alt a:focus-visible{outline:1px solid var(--line);outline-offset:3px}
    .alt .dot{color:var(--text-4);margin:0 10px}

    .foot{margin-top:30px;padding-top:22px;border-top:1px solid var(--line-2);text-align:center}
    .badge{display:inline-flex;align-items:center;gap:7px;font-family:var(--sans);
      font-size:10px;font-weight:500;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-4)}
    .badge svg{color:var(--green);opacity:.7}

    @media (max-width:420px){
      .back{left:18px}
      .wordmark{font-size:27px;letter-spacing:11px;margin-left:11px}
    }
    @media (prefers-reduced-motion:reduce){
      *,*::before,*::after{animation:none!important;transition-duration:.01ms!important}
      .card{opacity:1;transform:none}
    }
  </style>
</head>

    </form>

    <div class="alt">
      <a href="/apartments.html">Browse apartments</a>
      <span class="dot">·</span>
      <a href="https://wa.me/393313251961" target="_blank" rel="noopener noreferrer">Contact support</a>
    </div>

    <div class="foot">
      <span class="badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/><path d="m9 12 2 2 4-4"/></svg>
        Encrypted · Firebase Auth
      </span>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded',()=>{
      firebase.initializeApp({
        apiKey:"AIzaSyDDb8UeSc8RhO_VxQrhLrupu1aPD4rwRso",
        authDomain:"boom-property-dashboards.firebaseapp.com",
        projectId:"boom-property-dashboards"
      });
      const auth=firebase.auth();
      const isSafari=/^((?!chrome|android).)*safari/i.test(navigator.userAgent);

      function getNextDest(){
        try{
          const raw=new URLSearchParams(location.search).get('next');
          if(!raw) return '/portal.html';
          const v=raw.trim();
          if(v.length>512) return '/portal.html';
          if(!v.startsWith('/')) return '/portal.html';
          if(v.startsWith('//')||v.startsWith('/\\')) return '/portal.html';
          if(v.includes('\\')||v.includes(':')) return '/portal.html';
          return v;
        }catch{ return '/portal.html'; }
      }
      const NEXT_DEST=getNextDest();

      (async()=>{
        try{ await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL); }
        catch{ try{ await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION); }catch{} }
      })();

      auth.onAuthStateChanged(u=>{ if(u) window.location.href=NEXT_DEST; });

      const form=document.getElementById('loginForm');
      const emailInput=document.getElementById('email');
      const pwInput=document.getElementById('password');
      const submitBtn=document.getElementById('submitBtn');
      const messageEl=document.getElementById('message');
      const revealBtn=document.getElementById('revealBtn');
      const capsHint=document.getElementById('capsHint');
      const forgotBtn=document.getElementById('forgotBtn');

      function showMessage(html,type){
        messageEl.innerHTML=(type==='error'
          ?'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
          :'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>')
          +'<span>'+html+'</span>';
        messageEl.className='msg show '+type;
      }
      function clearMessage(){ messageEl.className='msg'; messageEl.innerHTML=''; }
      function setLoading(on){
        submitBtn.disabled=on; submitBtn.classList.toggle('loading',on);
        emailInput.disabled=on; pwInput.disabled=on;
      }

      revealBtn.addEventListener('click',()=>{
        const show=pwInput.type==='password';
        pwInput.type=show?'text':'password';
        revealBtn.textContent=show?'Hide':'Show';
        revealBtn.setAttribute('aria-pressed',String(show));
        revealBtn.setAttribute('aria-label',show?'Hide password':'Show password');
        pwInput.focus();
      });

      function capsCheck(e){
        const on=e.getModifierState&&e.getModifierState('CapsLock');
        capsHint.classList.toggle('show',!!on);
      }
      pwInput.addEventListener('keydown',capsCheck);
      pwInput.addEventListener('keyup',capsCheck);
      pwInput.addEventListener('blur',()=>capsHint.classList.remove('show'));

      form.addEventListener('submit',async(e)=>{
        e.preventDefault();
        const email=emailInput.value.trim();
        const password=pwInput.value;
        if(!email||!password){ showMessage('Please enter your email and password.','error'); return; }
        setLoading(true); clearMessage();
        try{
          await auth.signInWithEmailAndPassword(email,password);
          showMessage('Welcome back — signing you in…','success');
          setTimeout(()=>{ window.location.href=NEXT_DEST; }, isSafari?500:120);
        }catch(err){
          let msg='Incorrect email or password. Please try again.';
          if(err.code==='auth/too-many-requests') msg='Too many attempts. Please wait a moment and try again.';
          else if(err.code==='auth/network-request-failed') msg='Network error. Check your connection and try again.';
          else if(err.code==='auth/user-disabled') msg='This account has been disabled. Contact support.';
          showMessage(msg,'error'); setLoading(false); pwInput.focus(); pwInput.select();
        }
      });

      forgotBtn.addEventListener('click',async()=>{
        const email=emailInput.value.trim();
        if(!email){ showMessage('Enter your email above, then tap “Forgot password?” again.','error'); emailInput.focus(); return; }
        forgotBtn.disabled=true;
        try{ await auth.sendPasswordResetEmail(email); }
        catch(err){
          if(err.code==='auth/invalid-email'){ showMessage('That doesn’t look like a valid email address.','error'); forgotBtn.disabled=false; return; }
          if(err.code==='auth/too-many-requests'){ showMessage('Too many requests. Please wait a moment.','error'); forgotBtn.disabled=false; return; }
        }
        showMessage('If an account exists for that email, a reset link is on its way.','success');
        setTimeout(()=>{ forgotBtn.disabled=false; },4000);
      });
    });
  </script>
</body>
</html>
