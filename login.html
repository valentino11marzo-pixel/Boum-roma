  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root{
      --gold:#E9C766; --gold-bright:#FBE9A8; --gold-deep:#B58A2E;
      --black:#000; --ink:#060608;
      --text:#F6F5F3; --text-2:rgba(246,245,243,.60); --text-3:rgba(246,245,243,.36); --text-4:rgba(246,245,243,.20);
      --line:rgba(255,255,255,.10); --line-2:rgba(255,255,255,.06);
      --red:#F08585; --green:#67D7A6;

      --display:'Helvetica Neue','Helvetica Neue LT','Arial Nova',Helvetica,Arial,'Inter',sans-serif;
      --sans:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;
      --ease:cubic-bezier(.22,1,.36,1);
      --spring:cubic-bezier(.34,1.4,.5,1);
    }

    html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;height:100%}
    body{
      font-family:var(--display); background:var(--black); color:var(--text); font-weight:300;
      min-height:100svh; display:flex; align-items:center; justify-content:center;
      padding:max(24px,env(safe-area-inset-top)) 22px max(24px,env(safe-area-inset-bottom));
      position:relative; overflow:hidden; line-height:1.55;
    }

    /* ════ Premium ambient gradient field (smooth, not busy) ════ */
    .bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
    .bloom{position:absolute;border-radius:50%;filter:blur(110px);will-change:transform,opacity}
    .b-gold{width:60vw;height:60vw;max-width:760px;max-height:760px;
      background:radial-gradient(circle, rgba(233,199,102,.20), transparent 66%);
      top:-14vh;left:50%;transform:translateX(-58%);animation:drift1 22s ease-in-out infinite}
    .b-amber{width:48vw;height:48vw;max-width:620px;max-height:620px;
      background:radial-gradient(circle, rgba(181,138,46,.18), transparent 66%);
      bottom:-18vh;right:-6vw;animation:drift2 28s ease-in-out infinite}
    .b-cool{width:44vw;height:44vw;max-width:560px;max-height:560px;
      background:radial-gradient(circle, rgba(70,84,140,.16), transparent 66%);
      bottom:-12vh;left:-8vw;animation:drift3 32s ease-in-out infinite}
    @keyframes drift1{0%,100%{transform:translateX(-58%) translateY(0)}50%{transform:translateX(-52%) translateY(34px)}}
    @keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-32px,-30px)}}
    @keyframes drift3{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-24px)}}
    .spot{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 60% 50% at 50% 38%, rgba(255,255,255,.05), transparent 60%)}
    .vignette{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 90% 80% at 50% 45%, transparent 48%, rgba(0,0,0,.78) 100%)}
    .grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.02;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

    /* ── Back link ── */
    .back{position:fixed;top:max(26px,env(safe-area-inset-top));left:30px;z-index:10;
      display:inline-flex;align-items:center;gap:9px;color:var(--text-3);text-decoration:none;
      font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:1.4px;text-transform:uppercase;
      transition:color .4s var(--ease)}
    .back svg{transition:transform .4s var(--ease)}
    .back:hover{color:var(--gold)} .back:hover svg{transform:translateX(-4px)}
    .back:focus-visible{outline:1px solid var(--line);outline-offset:5px;border-radius:4px}

    /* ════ Glass card ════ */
    .card{
      position:relative;z-index:2;width:100%;max-width:404px;padding:42px 40px 34px;
      border-radius:28px;
      background:
        radial-gradient(120% 80% at 50% 0%, rgba(233,199,102,.07), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.018));
      border:1px solid var(--line);
      backdrop-filter:blur(34px) saturate(1.4);
      -webkit-backdrop-filter:blur(34px) saturate(1.4);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.16),
        inset 0 0 0 1px rgba(255,255,255,.02),
        0 30px 70px -20px rgba(0,0,0,.75),
        0 0 90px -30px rgba(233,199,102,.18);
      overflow:hidden;
      animation:enter 1s var(--spring) both;
    }
    /* pointer-follow sheen */
    .card::before{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;opacity:0;
      background:radial-gradient(420px 320px at var(--mx,50%) var(--my,0%), rgba(255,255,255,.10), transparent 60%);
      transition:opacity .5s var(--ease)}
    .card:hover::before{opacity:1}
    /* top edge light */
    .card::after{content:'';position:absolute;top:0;left:18%;right:18%;height:1px;pointer-events:none;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent)}
    @keyframes enter{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}

    /* ── Header ── */
    .head{text-align:center;margin-bottom:30px;position:relative}
    .appicon{
      width:62px;height:62px;margin:0 auto 18px;border-radius:18px;display:grid;place-items:center;position:relative;
      background:
        radial-gradient(120% 120% at 50% 0%, rgba(255,255,255,.10), transparent 55%),
        linear-gradient(180deg, #15151a, #08080a);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        0 10px 26px -8px rgba(0,0,0,.8),
        0 0 28px -8px rgba(233,199,102,.35);
    }
    .appicon::after{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
      background:linear-gradient(180deg, rgba(255,255,255,.10), transparent 42%)}
    .appicon svg{width:34px;height:34px;filter:drop-shadow(0 0 10px rgba(233,199,102,.45));position:relative;z-index:1}

    .wordmark{font-family:var(--display);font-weight:300;font-size:21px;letter-spacing:9px;text-transform:uppercase;
      color:var(--text);margin-left:9px;line-height:1}
    .h1{font-family:var(--display);font-weight:300;font-size:25px;letter-spacing:.2px;margin-top:22px}
    .sub{font-family:var(--sans);font-size:13px;font-weight:300;letter-spacing:.2px;color:var(--text-3);margin-top:6px}

    /* ── Messages ── */
    .msg{display:none;align-items:flex-start;gap:9px;padding:12px 14px;border-radius:12px;
      font-family:var(--sans);font-size:12.5px;line-height:1.5;margin:22px 0 0;animation:fade .35s var(--ease)}
    .msg.show{display:flex}
    .msg svg{flex-shrink:0;margin-top:1px}
    .msg.error{background:rgba(240,133,133,.09);border:1px solid rgba(240,133,133,.26);color:#F2A0A0}
    .msg.success{background:rgba(103,215,166,.09);border:1px solid rgba(103,215,166,.26);color:#92E4C2}
    @keyframes fade{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}

    form{margin-top:26px}
    /* ── Fields ── */
    .field{position:relative;margin-bottom:13px}
    .field input{
      width:100%;height:55px;padding:20px 16px 6px;
      background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px;
      color:var(--text);font-family:var(--sans);font-size:15px;font-weight:400;letter-spacing:.2px;outline:none;
      transition:border-color .3s var(--ease),background .3s var(--ease),box-shadow .3s var(--ease)}
    #password{padding-right:62px}
    .field input:hover{border-color:rgba(255,255,255,.18)}
    .field input:focus{border-color:rgba(233,199,102,.65);background:rgba(255,255,255,.06);
      box-shadow:0 0 0 3px rgba(233,199,102,.14)}
    .field label{position:absolute;left:16px;top:27px;transform:translateY(-50%);
      color:var(--text-4);font-family:var(--sans);font-size:15px;font-weight:400;letter-spacing:.2px;
      pointer-events:none;transition:all .22s var(--ease)}
    .field input:focus ~ label,
    .field input:not(:placeholder-shown) ~ label{
      top:13px;font-size:9.5px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-3)}
    .field input:focus ~ label{color:var(--gold)}
    .field input:disabled{opacity:.5;cursor:not-allowed}
    .field input:-webkit-autofill,.field input:-webkit-autofill:focus{
      -webkit-text-fill-color:var(--text);-webkit-box-shadow:0 0 0 1000px rgba(20,20,22,1) inset;caret-color:var(--text)}

    .reveal{position:absolute;right:11px;top:10.5px;height:34px;padding:0 9px;display:grid;place-items:center;
      background:transparent;border:none;cursor:pointer;color:var(--text-4);border-radius:9px;
      font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;
      transition:color .3s var(--ease),background .3s var(--ease)}
    .reveal:hover{color:var(--text-2);background:rgba(255,255,255,.05)}
    .reveal:focus-visible{outline:1px solid var(--line);outline-offset:1px}

    .caps{display:none;margin:9px 2px 0;font-family:var(--sans);font-size:11px;letter-spacing:.3px;color:var(--gold)}
    .caps.show{display:block}

    .row{display:flex;justify-content:flex-end;margin:4px 0 22px}
    .link{background:none;border:none;cursor:pointer;font-family:var(--sans);
      font-size:11.5px;font-weight:400;letter-spacing:.3px;color:var(--text-3);transition:color .3s var(--ease)}
    .link:hover{color:var(--gold)}
    .link:focus-visible{outline:1px solid var(--line);outline-offset:3px;border-radius:4px}

    /* ── Submit ── */
    .submit{position:relative;width:100%;height:54px;border:none;border-radius:14px;cursor:pointer;overflow:hidden;
      background:linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 42%, var(--gold-deep) 100%);
      color:#1c1503;font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
      box-shadow:0 8px 24px -10px rgba(233,199,102,.5), inset 0 1px 0 rgba(255,255,255,.45);
      transition:transform .18s var(--ease),box-shadow .3s var(--ease),filter .3s var(--ease)}
    .submit:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 14px 34px -10px rgba(233,199,102,.6), inset 0 1px 0 rgba(255,255,255,.5);filter:brightness(1.04)}
    .submit:active:not(:disabled){transform:translateY(0) scale(.992)}
    .submit:focus-visible{outline:2px solid var(--gold-bright);outline-offset:3px}
    .submit:disabled{cursor:wait;opacity:.9}
    .submit .t{transition:opacity .2s ease}
    .submit.loading .t{opacity:0}
    .spin{position:absolute;top:50%;left:50%;width:18px;height:18px;margin:-9px 0 0 -9px;opacity:0;
      border:2px solid rgba(28,21,3,.3);border-top-color:#1c1503;border-radius:50%;animation:rot .7s linear infinite}
    .submit.loading .spin{opacity:1}
    @keyframes rot{to{transform:rotate(360deg)}}

    /* ── Secondary ── */
    .alt{margin-top:24px;text-align:center}
    .alt a{color:var(--text-2);text-decoration:none;font-family:var(--sans);font-size:12.5px;font-weight:400;letter-spacing:.2px;transition:color .3s var(--ease)}
    .alt a:hover{color:var(--gold)}
    .alt a:focus-visible{outline:1px solid var(--line);outline-offset:3px;border-radius:4px}
    .alt .dot{color:var(--text-4);margin:0 9px}

    .foot{margin-top:26px;padding-top:20px;border-top:1px solid var(--line-2);text-align:center}
    .badge{display:inline-flex;align-items:center;gap:7px;font-family:var(--sans);
      font-size:10px;font-weight:500;letter-spacing:1.3px;text-transform:uppercase;color:var(--text-4)}
    .badge svg{color:var(--green);opacity:.75}

    @media (max-width:430px){
      .back{left:18px}
      .card{padding:36px 26px 30px;border-radius:24px}
    }
    @media (prefers-reduced-motion:reduce){
      *,*::before,*::after{animation:none!important;transition-duration:.01ms!important}
      .card{opacity:1;transform:none}
    }
  </style>
</head>

    <form id="loginForm" autocomplete="on" novalidate>
      <div class="field">
        <input type="email" id="email" name="email" placeholder=" " required autocomplete="email" inputmode="email" autocapitalize="none" spellcheck="false" autofocus>
        <label for="email">Email address</label>
      </div>

      <div class="field">
        <input type="password" id="password" name="password" placeholder=" " required autocomplete="current-password">
        <label for="password">Password</label>
        <button type="button" class="reveal" id="revealBtn" aria-label="Show password" aria-pressed="false">Show</button>
      </div>
      <p class="caps" id="capsHint" aria-live="polite">⇪ Caps Lock is on</p>

      <div class="row"><button type="button" class="link" id="forgotBtn">Forgot password?</button></div>

      <button type="submit" class="submit" id="submitBtn">
        <span class="t">Sign In</span>
        <span class="spin" aria-hidden="true"></span>
      </button>
    </form>

    <div class="alt">
      <a href="/apartments.html">Browse apartments</a>
      <span class="dot">·</span>
      <a href="https://wa.me/393313251961" target="_blank" rel="noopener noreferrer">Contact support</a>
    </div>

    <div class="foot">
      <span class="badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/><path d="m9 12 2 2 4-4"/></svg>
        Encrypted · Firebase Auth
      </span>
    </div>
  </main>

  <script>
    // Pointer-follow sheen on the glass card (desktop, motion-on only)
    (function(){
      if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      if(window.matchMedia('(hover: none)').matches) return;
      const card=document.getElementById('card'); if(!card) return;
      card.addEventListener('pointermove',(e)=>{
        const r=card.getBoundingClientRect();
        card.style.setProperty('--mx', ((e.clientX-r.left)/r.width*100)+'%');
        card.style.setProperty('--my', ((e.clientY-r.top)/r.height*100)+'%');
      },{passive:true});
    })();

    document.addEventListener('DOMContentLoaded',()=>{
      firebase.initializeApp({
        apiKey:"AIzaSyDDb8UeSc8RhO_VxQrhLrupu1aPD4rwRso",
        authDomain:"boom-property-dashboards.firebaseapp.com",
        projectId:"boom-property-dashboards"
      });
      const auth=firebase.auth();
      const isSafari=/^((?!chrome|android).)*safari/i.test(navigator.userAgent);

      function getNextDest(){
        try{
          const raw=new URLSearchParams(location.search).get('next');
          if(!raw) return '/portal.html';
          const v=raw.trim();
          if(v.length>512) return '/portal.html';
          if(!v.startsWith('/')) return '/portal.html';
          if(v.startsWith('//')||v.startsWith('/\\')) return '/portal.html';
          if(v.includes('\\')||v.includes(':')) return '/portal.html';
          return v;
        }catch{ return '/portal.html'; }
      }
      const NEXT_DEST=getNextDest();

      (async()=>{
        try{ await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL); }
        catch{ try{ await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION); }catch{} }
      })();

      auth.onAuthStateChanged(u=>{ if(u) window.location.href=NEXT_DEST; });

      const form=document.getElementById('loginForm');
      const emailInput=document.getElementById('email');
      const pwInput=document.getElementById('password');
      const submitBtn=document.getElementById('submitBtn');
      const messageEl=document.getElementById('message');
      const revealBtn=document.getElementById('revealBtn');
      const capsHint=document.getElementById('capsHint');
      const forgotBtn=document.getElementById('forgotBtn');

      function showMessage(html,type){
        messageEl.innerHTML=(type==='error'
          ?'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
          :'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>')
          +'<span>'+html+'</span>';
        messageEl.className='msg show '+type;
      }
      function clearMessage(){ messageEl.className='msg'; messageEl.innerHTML=''; }
      function setLoading(on){
        submitBtn.disabled=on; submitBtn.classList.toggle('loading',on);
        emailInput.disabled=on; pwInput.disabled=on;
      }

      revealBtn.addEventListener('click',()=>{
        const show=pwInput.type==='password';
        pwInput.type=show?'text':'password';
        revealBtn.textContent=show?'Hide':'Show';
        revealBtn.setAttribute('aria-pressed',String(show));
        revealBtn.setAttribute('aria-label',show?'Hide password':'Show password');
        pwInput.focus();
      });

      function capsCheck(e){
        const on=e.getModifierState&&e.getModifierState('CapsLock');
        capsHint.classList.toggle('show',!!on);
      }
      pwInput.addEventListener('keydown',capsCheck);
      pwInput.addEventListener('keyup',capsCheck);
      pwInput.addEventListener('blur',()=>capsHint.classList.remove('show'));

      form.addEventListener('submit',async(e)=>{
        e.preventDefault();
        const email=emailInput.value.trim();
        const password=pwInput.value;
        if(!email||!password){ showMessage('Please enter your email and password.','error'); return; }
        setLoading(true); clearMessage();
        try{
          await auth.signInWithEmailAndPassword(email,password);
          showMessage('Welcome back — signing you in…','success');
          setTimeout(()=>{ window.location.href=NEXT_DEST; }, isSafari?500:120);
        }catch(err){
          let msg='Incorrect email or password. Please try again.';
          if(err.code==='auth/too-many-requests') msg='Too many attempts. Please wait a moment and try again.';
          else if(err.code==='auth/network-request-failed') msg='Network error. Check your connection and try again.';
          else if(err.code==='auth/user-disabled') msg='This account has been disabled. Contact support.';
          showMessage(msg,'error'); setLoading(false); pwInput.focus(); pwInput.select();
        }
      });

      forgotBtn.addEventListener('click',async()=>{
        const email=emailInput.value.trim();
        if(!email){ showMessage('Enter your email above, then tap “Forgot password?” again.','error'); emailInput.focus(); return; }
        forgotBtn.disabled=true;
        try{ await auth.sendPasswordResetEmail(email); }
        catch(err){
          if(err.code==='auth/invalid-email'){ showMessage('That doesn’t look like a valid email address.','error'); forgotBtn.disabled=false; return; }
          if(err.code==='auth/too-many-requests'){ showMessage('Too many requests. Please wait a moment.','error'); forgotBtn.disabled=false; return; }
        }
        showMessage('If an account exists for that email, a reset link is on its way.','success');
        setTimeout(()=>{ forgotBtn.disabled=false; },4000);
      });
    });
  </script>
</body>
</html>
