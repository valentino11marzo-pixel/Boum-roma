    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">
    <!-- Shared BOOM cinematic engine: living gold ambient light + scroll reel (brand unity with /apartments + detail) -->
    <link rel="stylesheet" href="/css/boom-cinema.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --gold:#D4AF37; --gold-2:#E6C868; --gold-deep:#9C7B16;
            --bg:#000; --bg-1:#060607; --surface:#0C0D10; --surface-2:#141519; --surface-3:#1C1D22;
            --line:rgba(255,255,255,.07); --line-2:rgba(255,255,255,.13);
            --ink:#F5F5F7; --ink-2:#9C9CA3; --ink-3:#67676E;
            --gold-soft:rgba(212,175,55,.12);
            --green:#30D158; --green-soft:rgba(48,209,88,.14);
            --red:#FF453A; --red-soft:rgba(255,69,58,.13);
            --r:20px; --r-lg:28px;
            --spring:cubic-bezier(.16,1,.3,1); --ease:cubic-bezier(.33,0,.1,1);
            --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
            --shadow:0 30px 80px -30px rgba(0,0,0,.9);
        }
        /* keep tab switches instant (boom-cinema sets smooth globally) */
        html{-webkit-text-size-adjust:100%;scroll-behavior:auto}
        body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden;line-height:1.5;letter-spacing:-.01em}
        .serif{font-family:'Fraunces',Georgia,serif;font-weight:300;letter-spacing:-.02em}
        ::selection{background:var(--gold);color:#000}
        button{font-family:inherit;color:inherit}
        a{color:inherit;text-decoration:none}
        img{display:block}
        ::-webkit-scrollbar{width:0;height:0}
        .reveal{opacity:0;transform:translateY(22px);transition:opacity .9s var(--spring),transform .9s var(--spring)}
        .reveal.in{opacity:1;transform:none}
        @media (prefers-reduced-motion:reduce){.reveal{opacity:1!important;transform:none!important;transition:none!important}*{animation:none!important}}

        /* ── Cinematic film-grain (subtle, global, behind UI chrome) ── */
        .grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.035;mix-blend-mode:soft-light;
            background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
            background-size:160px;animation:grain 6s steps(5) infinite}
        @keyframes grain{0%{transform:translate(0,0)}20%{transform:translate(-4%,2%)}40%{transform:translate(3%,-3%)}60%{transform:translate(-2%,4%)}80%{transform:translate(4%,-2%)}100%{transform:translate(0,0)}}
        @media (prefers-reduced-motion:reduce){.grain{animation:none;opacity:.025}}

        /* ── Loading (title sequence) ── */
        .loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:26px;z-index:9999;transition:opacity .7s var(--ease)}
        .loading::before{content:'';position:absolute;inset:0;background:radial-gradient(110% 70% at 50% 18%,rgba(212,175,55,.14),transparent 58%);pointer-events:none}
        .loading.hidden{opacity:0;pointer-events:none}
        .l-mark{font-family:'Fraunces',serif;font-weight:300;font-size:30px;letter-spacing:.32em;color:var(--ink);text-indent:.32em;animation:lin 1.5s var(--spring) infinite alternate}
        @keyframes lin{from{opacity:.3;letter-spacing:.32em}to{opacity:.95;letter-spacing:.4em}}
        .l-bar{width:120px;height:1px;background:var(--line-2);overflow:hidden;position:relative}
        .l-bar::after{content:'';position:absolute;inset:0;width:40%;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:lbar 1.3s var(--ease) infinite}
        @keyframes lbar{from{left:-40%}to{left:100%}}

        /* ── Auth ── */
        .auth{position:relative;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:30px}
        .auth::before{content:'';position:fixed;inset:0;background:radial-gradient(120% 80% at 50% -8%,rgba(212,175,55,.13),transparent 56%);pointer-events:none}
        .auth.hidden{display:none}
        .auth-box{position:relative;width:100%;max-width:360px;text-align:center}
        .auth-mark{font-family:'Fraunces',serif;font-weight:300;font-size:15px;letter-spacing:.5em;color:var(--gold);text-indent:.5em;margin-bottom:18px}
        .auth-kick{font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-3);margin-bottom:26px}
        .auth-h{font-size:33px;line-height:1.1;margin-bottom:10px}
        .auth-p{font-size:15px;color:var(--ink-2);margin-bottom:36px}
        .auth-input{width:100%;padding:19px;background:var(--surface);border:1px solid var(--line);border-radius:16px;color:var(--ink);font-size:18px;text-align:center;letter-spacing:.18em;font-weight:500;transition:border-color .3s,box-shadow .3s;text-transform:uppercase}
        .auth-input::placeholder{letter-spacing:.02em;font-weight:400;text-transform:none;color:var(--ink-3)}
        .auth-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 4px rgba(212,175,55,.12)}
        .auth-btn{width:100%;margin-top:12px;padding:18px;background:var(--ink);border:none;border-radius:16px;color:#000;font-size:15px;font-weight:600;cursor:pointer;transition:transform .25s var(--spring),opacity .2s}
        .auth-btn:hover{transform:translateY(-1px)}
        .auth-btn:active{transform:scale(.985)}
        .auth-btn[disabled]{opacity:.5}
        .auth-err{margin-top:16px;padding:13px;background:var(--red-soft);border-radius:12px;color:var(--red);font-size:13.5px;display:none}
        .auth-err.show{display:block;animation:shake .45s var(--ease)}
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
        .auth-help{margin-top:28px;font-size:13px;color:var(--ink-3)}
        .auth-help a{color:var(--gold)}
        .auth-lang{margin-top:24px;display:inline-flex;gap:4px;border:1px solid var(--line);border-radius:100px;padding:4px}
        .auth-lang button{padding:7px 16px;background:transparent;border:none;border-radius:100px;color:var(--ink-3);font-size:12px;font-weight:600;cursor:pointer;transition:all .25s var(--spring)}
        .auth-lang button.on{background:var(--surface-2);color:var(--ink)}

        /* ── Shell ── */
        .app{display:none}
        .app.active{display:block}
        .topbar{position:fixed;top:0;left:0;right:0;height:calc(56px + var(--safe-t));padding-top:var(--safe-t);background:rgba(0,0,0,.55);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding-left:20px;padding-right:16px;z-index:100}
        .topbar .brand{font-family:'Fraunces',serif;font-weight:300;font-size:15px;letter-spacing:.36em;text-indent:.36em;color:var(--ink)}
        .topbar-r{display:flex;align-items:center;gap:10px}
        .lang-t{padding:6px 12px;background:var(--surface-2);border:1px solid var(--line);border-radius:100px;color:var(--ink-2);font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.04em;transition:all .25s var(--spring)}
        .lang-t:active{transform:scale(.94)}
        .ava{width:33px;height:33px;border-radius:50%;background:linear-gradient(140deg,var(--surface-3),var(--surface));border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;color:var(--gold)}

        .main{max-width:600px;margin:0 auto;padding:calc(56px + var(--safe-t)) 20px calc(96px + var(--safe-b));}
        .view{animation:viewIn .55s var(--spring)}
        @keyframes viewIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

        /* ── Scene / golden-hour hero ── */
        .scene{position:relative;padding:40px 4px 6px;text-align:center;overflow:visible}
        .scene>.scene-sky{position:absolute;left:-30%;right:-30%;top:-90px;height:320px;z-index:0;pointer-events:none;
            background:radial-gradient(60% 80% at 50% 30%,rgba(212,175,55,.20),rgba(212,175,55,.05) 42%,transparent 66%),
                       radial-gradient(40% 50% at 66% 18%,rgba(230,200,104,.12),transparent 60%);
            filter:blur(6px);animation:sky 22s var(--ease) infinite alternate}
        @keyframes sky{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-14px) scale(1.08)}}
        .scene>*{position:relative;z-index:1}
        .kicker{display:inline-flex;align-items:center;gap:8px;padding:6px 13px;border:1px solid var(--line-2);border-radius:100px;font-size:11px;color:var(--ink-2);letter-spacing:.04em;margin-bottom:22px;background:rgba(0,0,0,.25);backdrop-filter:blur(8px)}
        .kicker i{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pp 2.4s var(--ease) infinite}
        @keyframes pp{0%{box-shadow:0 0 0 0 rgba(48,209,88,.45)}70%,100%{box-shadow:0 0 0 7px rgba(48,209,88,0)}}
        .scene-h{font-size:36px;line-height:1.06;margin-bottom:11px;letter-spacing:-.03em}
        .scene-h em{font-style:normal;color:var(--gold)}
        .scene-p{font-size:15px;color:var(--ink-2);max-width:340px;margin:0 auto;line-height:1.55}

        /* ── Live engine (Homie) ── */
        .engine{position:relative;display:flex;align-items:center;gap:16px;padding:18px;margin:30px 0;background:linear-gradient(135deg,var(--surface),var(--bg-1));border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow)}
        .engine::before{content:'';position:absolute;inset:0;background:radial-gradient(120% 120% at 0% 0%,rgba(212,175,55,.10),transparent 52%);pointer-events:none}
        .radar{position:relative;width:72px;height:72px;flex-shrink:0;border-radius:50%;border:1px solid var(--line-2);background:radial-gradient(circle,var(--surface-2),var(--bg-1));overflow:hidden}
        .radar::before{content:'';position:absolute;inset:-2px;border-radius:50%;background:conic-gradient(from 0deg,transparent 0deg,transparent 250deg,rgba(212,175,55,.5) 358deg,transparent 360deg);animation:sweep 2.6s linear infinite}
        @keyframes sweep{to{transform:rotate(360deg)}}
        .radar i{position:absolute;border-radius:50%;border:1px solid var(--line);left:50%;top:50%;transform:translate(-50%,-50%)}
        .radar i.r1{width:26px;height:26px}.radar i.r2{width:48px;height:48px}
        .radar .core{width:8px;height:8px;border:none;background:var(--gold);box-shadow:0 0 12px var(--gold);animation:pp 2.4s var(--ease) infinite}
        .engine-main{flex:1;min-width:0;position:relative}
        .engine-h{display:flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2)}
        .engine-h .live{display:inline-flex;align-items:center;gap:6px;color:var(--green);font-weight:600}
        .engine-h .live b{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pp 2.4s var(--ease) infinite}
        .engine-stats{display:flex;gap:20px;margin-top:11px}
        .es b{font-size:21px;font-weight:300;letter-spacing:-.02em;font-variant-numeric:tabular-nums;display:block}
        .es.gold b{color:var(--gold)}
        .es span{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);margin-top:3px;display:block}
        .engine-note{font-size:11px;color:var(--ink-3);margin-top:11px;letter-spacing:.01em}

        /* ── Section heads ── */
        .sec{margin-bottom:32px}
        .sec-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;padding:0 2px}
        .sec-t{font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-2)}
        .sec-sub{font-size:13px;color:var(--ink-3);margin-top:3px;padding:0 2px;letter-spacing:-.01em}
        .sec-link{font-size:13px;color:var(--gold);cursor:pointer;background:none;border:none}
        .count{font-size:12px;color:var(--ink-3);font-variant-numeric:tabular-nums}

        /* ── The relocation film (timeline of 5 acts) ── */
        .film{position:relative;margin:6px 2px 0}
        .film-rail{position:absolute;left:15px;top:6px;bottom:14px;width:2px;background:var(--line-2);border-radius:2px;overflow:hidden}
        .film-rail i{position:absolute;top:0;left:0;width:100%;height:0;background:linear-gradient(var(--gold-deep),var(--gold-2));border-radius:2px;transition:height 1.4s var(--spring)}
        .act{position:relative;padding:0 0 26px 46px}
        .act:last-child{padding-bottom:4px}
        .act-dot{position:absolute;left:6px;top:0;width:20px;height:20px;border-radius:50%;background:var(--bg-1);border:2px solid var(--line-2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ink-3);transition:all .5s var(--spring);z-index:1}
        .act.done .act-dot{background:var(--gold-deep);border-color:var(--gold-deep);color:#000}
        .act.now .act-dot{background:var(--gold);border-color:var(--gold);color:#000;animation:actpulse 2.8s var(--ease) infinite}
        @keyframes actpulse{0%,100%{box-shadow:0 0 0 4px rgba(212,175,55,.16)}50%{box-shadow:0 0 0 8px rgba(212,175,55,.04)}}
        .act-no{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3)}
        .act.now .act-no{color:var(--gold)}
        .act-here{margin-left:9px;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
        .act-t{font-size:19px;margin:4px 0 5px;color:var(--ink-3);transition:color .5s}
        .act.done .act-t,.act.now .act-t{color:var(--ink)}
        .act-s{font-size:13px;color:var(--ink-3);line-height:1.5;max-width:400px;transition:color .5s}
        .act.now .act-s,.act.done .act-s{color:var(--ink-2)}
        .act-chip{display:inline-flex;align-items:center;gap:6px;margin-top:11px;padding:5px 11px;border:1px solid var(--line);border-radius:100px;font-size:10.5px;color:var(--ink-3);letter-spacing:.04em}
        .act.done .act-chip{color:var(--ink-2);border-color:var(--line-2)}
        .act.now .act-chip{color:var(--gold);border-color:rgba(212,175,55,.32)}
        .act-chip i{width:5px;height:5px;border-radius:50%;background:currentColor}

        /* ── All-inclusive grid ── */
        .incl{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
        .inc{background:var(--bg-1);padding:15px 14px;display:flex;align-items:center;gap:11px}
        .inc-ic{width:30px;height:30px;border-radius:9px;background:var(--gold-soft);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
        .inc-t{font-size:13px;font-weight:500;line-height:1.2}
        .inc-s{font-size:11px;color:var(--ink-3);margin-top:2px}

        /* ── Property cards (film stills) ── */
        .prop{position:relative;border-radius:var(--r-lg);overflow:hidden;margin-bottom:26px;background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow)}
        .prop-media{position:relative;aspect-ratio:4/3;overflow:hidden;background:var(--surface-2)}
        .prop-media .px{position:absolute;inset:-8%;width:116%;height:116%;object-fit:cover;will-change:transform}
        .ken .px{animation:ken 26s var(--ease) infinite alternate}
        @keyframes ken{0%{transform:scale(1.04) translate(0,0)}100%{transform:scale(1.13) translate(-1.5%,-1%)}}
        @media (prefers-reduced-motion:reduce){.ken .px{animation:none}}
        .prop-media.ph{display:flex;align-items:center;justify-content:center;font-size:54px;color:var(--ink-3)}
        .media-veil{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8) 0%,rgba(0,0,0,.12) 44%,transparent 72%)}
        .media-top{position:absolute;top:14px;left:14px;right:14px;display:flex;align-items:flex-start;justify-content:space-between;z-index:3}
        .chiprow{display:flex;gap:7px;flex-wrap:wrap}
        .gchip{padding:6px 11px;background:rgba(0,0,0,.42);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.14);border-radius:100px;font-size:11px;font-weight:500;letter-spacing:.02em}
        .gchip.new{background:var(--gold);color:#000;border-color:var(--gold)}
        .gchip.incl{color:var(--gold-2);border-color:rgba(212,175,55,.3)}
        .gchip.count{padding:5px 9px;font-variant-numeric:tabular-nums}
        .heart{width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,.42);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.16);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .4s var(--spring),background .3s,color .3s;flex-shrink:0}
        .heart:active{transform:scale(.84)}
        .heart.on{background:#fff;color:var(--red);border-color:#fff;animation:heartpop .5s var(--spring)}
        @keyframes heartpop{0%{transform:scale(1)}40%{transform:scale(1.28)}100%{transform:scale(1)}}
        .media-foot{position:absolute;left:18px;right:18px;bottom:16px;z-index:3}
        .p-match{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--gold);letter-spacing:.04em;margin-bottom:8px}
        .p-match i{width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold)}
        .p-price{font-size:30px;line-height:1;letter-spacing:-.02em}
        .p-price small{font-size:14px;color:var(--ink-2);font-weight:400}
        .p-addr{font-size:13.5px;color:#E4E4E7;margin-top:5px}
        .prop-body{padding:16px 18px 18px}
        .specs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
        .spec{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;font-size:12.5px;color:var(--ink-2)}
        .prop-acts{display:flex;gap:9px;align-items:center}
        .btn-1{flex:1;padding:14px;background:var(--ink);color:#000;border:none;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .25s var(--spring)}
        .btn-1:active{transform:scale(.97)}
        .btn-2{padding:14px 16px;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;font-size:14px;font-weight:500;color:var(--ink);cursor:pointer;transition:transform .25s var(--spring),border-color .3s}
        .btn-2:active{transform:scale(.97)}
        .btn-x{padding:14px 8px;background:none;border:none;color:var(--ink-3);font-size:13px;cursor:pointer;white-space:nowrap}
        .btn-x:hover{color:var(--ink-2)}

        /* feature (home highlight) */
        .feat{position:relative;border-radius:var(--r-lg);overflow:hidden;aspect-ratio:16/12;box-shadow:var(--shadow);cursor:pointer;border:1px solid var(--line)}
        .feat .px{position:absolute;inset:-8%;width:116%;height:116%;object-fit:cover}
        .feat-tag{position:absolute;top:16px;left:16px;z-index:3;padding:6px 12px;background:rgba(0,0,0,.42);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.14);border-radius:100px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold)}

        /* saved row */
        .srow{display:flex;gap:14px;align-items:center;padding:14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin-bottom:12px;cursor:pointer;transition:transform .3s var(--spring),border-color .3s}
        .srow:active{transform:scale(.99)}
        .sthumb{width:78px;height:78px;border-radius:14px;object-fit:cover;flex-shrink:0;background:var(--surface-2)}
        .sthumb.ph{display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--ink-3)}
        .smain{flex:1;min-width:0}
        .sprice{font-size:17px;font-weight:500}
        .saddr{font-size:12.5px;color:var(--ink-2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .stag{display:inline-flex;align-items:center;gap:5px;margin-top:7px;font-size:11px;color:var(--gold)}

        /* concierge / agent */

        /* criteria / feed */

          '<div class="media-veil"></div>'+
          '<div class="media-top"><div class="chiprow">'+(p.isNew?'<span class="gchip new">'+t('a_homie_match')+'</span>':'')+(p.furnished?'<span class="gchip incl">'+t('furnished')+'</span>':'')+(imgs>1?'<span class="gchip count">1 / '+imgs+'</span>':'')+'</div>'+
            '<button class="heart '+(p.clientLiked?'on':'')+'" onclick="event.stopPropagation();toggleSave(\''+p.id+'\',this)">'+(p.clientLiked?'♥':'♡')+'</button></div>'+
          '<div class="media-foot">'+(p.match?'<div class="p-match"><i></i>'+p.match+'% '+t('affinity')+'</div>':'')+'<div class="p-price serif">€'+fmt(p.price)+' <small>/'+t('perMonth')+'</small></div><div class="p-addr">'+esc(p.address)+'</div></div>'+
        '</div>'+
        '<div class="prop-body">'+
          '<div class="specs">'+spec('◳',(p.rooms||1)+' '+t('bedShort'))+(p.sqm?spec('▭',p.sqm+' '+t('sqm')):'')+(p.floor?spec('⌂',p.floor+' '+t('floorL')):'')+(p.furnished?spec('✦',t('allIncl')):'')+'</div>'+
          '<div class="prop-acts">'+
            (p.viewingRequested?'<button class="btn-1" style="background:var(--green-soft);color:var(--green)" onclick="onCancelViewing(\''+p.id+'\')">✓ '+t('viewingReq')+'</button>':'<button class="btn-1" onclick="openViewing(\''+p.id+'\')">'+t('requestViewing')+'</button>')+
            '<button class="btn-2" onclick="openDetail(\''+p.id+'\')">'+t('details')+'</button>'+
            '<button class="btn-x" onclick="openReject(\''+p.id+'\')">'+t('notForMe')+'</button>'+
          '</div></div></article>';
    }
    function spec(ic,tx){ return '<span class="spec">'+ic+' '+tx+'</span>'; }

    /* ── SAVED ── */
    function renderSaved(){
      var lk=saved();
      if(!lk.length) return '<div class="empty reveal"><div class="empty-ic">♡</div><div class="empty-t serif">'+t('saved_empty_t')+'</div><div class="empty-s">'+t('saved_empty_s')+'</div></div>';
      return '<div class="sec-h" style="margin:6px 2px 18px"><div class="sec-t">'+t('saved_t')+'</div><div class="count">'+lk.length+'</div></div>'+
        lk.map(function(p){ var im=img1(p);
          return '<div class="srow reveal" onclick="openDetail(\''+p.id+'\')">'+(im?'<img class="sthumb" src="'+esc(im)+'" alt="" loading="lazy">':'<div class="sthumb ph">⌂</div>')+
            '<div class="smain"><div class="sprice serif">€'+fmt(p.price)+'</div><div class="saddr">'+esc(p.address)+'</div>'+(p.viewingRequested?'<div class="stag">✓ '+t('viewingReq')+'</div>':(p.match?'<div class="stag">'+p.match+'% '+t('affinity')+'</div>':''))+'</div>'+
            '<div style="display:flex;flex-direction:column;gap:8px" onclick="event.stopPropagation()">'+
              (p.viewingRequested?'<button class="btn-2" onclick="onCancelViewing(\''+p.id+'\')">✕</button>':'<button class="btn-2" style="background:var(--ink);color:#000;border:none" onclick="openViewing(\''+p.id+'\')">'+t('requestViewing')+'</button>')+
            '</div></div>'; }).join('');
    }

    /* ── PROFILE ── */
    function renderProfile(){
      var c=client.criteria, money=function(a,b){ if(!a&&!b)return t('notset'); if(a&&b)return '€'+fmt(a)+' – €'+fmt(b); return '€'+fmt(b||a); };
      var rows=[[t('c_budget'),money(c.minBudget,c.budget)],[t('c_zone'),c.zone||t('notset')],[t('c_moveIn'),c.moveIn||t('notset')],[t('c_bedrooms'),c.bedrooms?c.bedrooms+'+':t('notset')],[t('c_must'),c.mustHaves||t('notset')],[t('c_deal'),c.dealBreakers||t('notset')]];
      var acts=client.activity||[];
      return '<div class="scene" style="padding:30px 4px 6px"><div class="scene-sky" style="height:240px;top:-70px"></div><div class="agent-ava reveal" style="margin:0 auto 14px;width:66px;height:66px;font-size:26px">'+esc((client.name||'·').charAt(0).toUpperCase())+'</div><h1 class="scene-h serif reveal" style="font-size:27px">'+esc(client.name)+'</h1><p class="scene-p reveal">'+t('active')+' · '+client.stats.days+' '+(lang==='it'?'giorni con noi':'days with us')+'</p></div>'+
        '<div class="sec" style="margin-top:30px"><div class="sec-h"><div class="sec-t">'+t('criteria')+'</div><button class="sec-link" onclick="openCriteria()">'+t('edit')+'</button></div>'+
          '<div class="panel reveal">'+rows.map(function(r){return '<div class="crow"><span class="k">'+r[0]+'</span><span class="v">'+esc(r[1])+'</span></div>';}).join('')+'</div></div>'+
        (acts.length?'<div class="sec"><div class="sec-h"><div class="sec-t">'+t('activity')+'</div></div><div class="panel reveal"><div class="feed">'+acts.slice(0,8).map(function(a){return '<div class="fi"><div class="fi-ic">'+actIc(a.type)+'</div><div><div class="fi-t">'+t('a_'+a.type)+(a.reason?' · '+esc(a.reason):'')+'</div><div class="fi-d">'+ago(a.timestamp)+'</div></div></div>';}).join('')+'</div></div></div>':'')+
        '<div class="sec"><div class="sec-h"><div class="sec-t">'+t('agent')+'</div></div><div class="agent reveal"><div class="agent-ava">'+esc((client.agent.name||'V').charAt(0))+'</div><div class="agent-i"><div class="agent-n">'+esc(client.agent.name)+'</div><div class="agent-r">'+t('agent_s')+'</div></div><button class="agent-b" onclick="openConcierge()">'+t('chat')+'</button></div></div>'+
        '<div class="sec"><div class="panel reveal" style="display:flex;align-items:center;justify-content:space-between;padding:18px"><div><div style="font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px">'+t('code')+'</div><code style="font-size:17px;color:var(--gold);letter-spacing:.12em">'+esc(code)+'</code></div><button class="agent-b ghost" onclick="logout()">'+t('logout')+'</button></div></div>';
    }
    function actIc(ty){ return {homie_match:'✦',like:'♥',reject:'·',undo:'↺',requestViewing:'❖',cancelViewing:'✕',criteria_updated:'◍',message:'✉'}[ty]||'·'; }
    function ago(ts){ if(!ts)return''; var d=new Date(ts),s=(Date.now()-d.getTime())/1000; if(s<60)return lang==='it'?'adesso':'now'; if(s<3600)return ~~(s/60)+'m'; if(s<86400)return ~~(s/3600)+'h'; var dd=~~(s/86400); if(dd<7)return dd+(lang==='it'?'g':'d'); return d.toLocaleDateString(lang==='it'?'it-IT':'en-GB',{day:'numeric',month:'short'}); }

    /* ───────── Actions ───────── */
    function setP(id,patch){ (client.properties||[]).forEach(function(p){ if(p.id===id)Object.assign(p,patch); }); client.stats.options=(client.properties||[]).length; client.stats.liked=saved().length; }
    function toggleSave(id,el){ var p=(client.properties||[]).find(function(x){return x.id===id;}); if(!p)return; var on=!p.clientLiked; setP(id,{clientLiked:on,clientRejected:false}); haptic(on?12:6);
      if(el){ el.classList.toggle('on',on); el.textContent=on?'♥':'♡'; } else render();
      toast(on?t('t_saved'):t('t_unsaved'), on?'ok':''); act({action:on?'like':'undo',propertyId:id}); }
    function doReject(id,reason){ closeSheet(); var card=document.getElementById('prop-'+id); if(card){ card.style.transition='opacity .45s var(--ease),transform .45s var(--ease),max-height .5s var(--ease),margin .5s,padding .5s'; card.style.maxHeight=card.offsetHeight+'px'; void card.offsetWidth; card.style.opacity='0'; card.style.transform='scale(.96)'; card.style.maxHeight='0'; card.style.margin='0'; card.style.padding='0'; }
      setP(id,{clientRejected:true,clientLiked:false,rejectReason:reason||''}); haptic(); toast(t('t_passed')); act({action:'reject',propertyId:id,reason:reason||''}); setTimeout(function(){ if(tab==='explore'||tab==='saved')render(); else renderNav(); },500); }
    function onRestore(id){ setP(id,{clientRejected:false}); haptic(); render(); act({action:'undo',propertyId:id}); toast(t('t_restored')); }
    function onCancelViewing(id){ setP(id,{viewingRequested:false}); haptic(); if(document.getElementById('detOv').classList.contains('show'))openDetail(id); else render(); act({action:'cancelViewing',propertyId:id}); toast(t('t_viewCancel')); }
    function chatAgent(){ var u='https://wa.me/'+(client.agent.whatsapp||'393313251961')+'?text='+encodeURIComponent((lang==='it'?'Ciao! Una domanda sulla mia ricerca (':'Hi! A question about my search (')+code+')'); window.open(u,'_blank'); }

    /* ───────── Detail (immersive) ───────── */
    function openDetail(id){
      var p=(client.properties||[]).find(function(x){return x.id===id;}); if(!p)return; haptic();
      var imgs=(p.images&&p.images.length)?p.images:[];
      var reasons=(p.matchReasons||[]).filter(function(r){return /[✓≈]/.test(r);}).slice(0,5);
      var gal=imgs.length?'<div class="gallery"><div class="gtrack" id="gtrack" onscroll="galScroll(this,'+imgs.length+')">'+imgs.map(function(im){return '<img src="'+esc(im)+'" alt="" loading="eager">';}).join('')+'</div>'+(imgs.length>1?'<div class="gdots" id="gdots">'+imgs.map(function(_,i){return '<div class="gdot '+(i===0?'on':'')+'"></div>';}).join('')+'</div>':'')+'</div>':'<div class="gallery ph">⌂</div>';
      document.getElementById('detScroll').innerHTML=gal+
        '<div class="det-body">'+
          (p.match?'<div class="p-match" style="margin-bottom:10px"><i></i>'+p.match+'% '+t('affinity')+'</div>':'')+
          '<div class="det-price serif">€'+fmt(p.price)+' <small>/'+t('perMonth')+'</small></div>'+
          '<div class="det-addr">'+esc(p.address)+(p.zone?' · '+esc(p.zone):'')+'</div>'+
          '<div class="det-specs">'+spec('◳',(p.rooms||1)+' '+t('bedShort'))+(p.sqm?spec('▭',p.sqm+' '+t('sqm')):'')+(p.floor?spec('⌂',p.floor+' '+t('floorL')):'')+(p.furnished?spec('✦',t('furnished')):'')+'</div>'+
          (p.description?'<div class="det-desc">'+esc(p.description)+'</div>':'')+
          (reasons.length?'<div class="why"><div class="why-h">'+t('why')+'</div>'+reasons.map(function(r){var ok=r.indexOf('✓')>=0; return '<div class="why-r"><b>'+(ok?'✓':'≈')+'</b><span>'+esc(r.replace(/[✓≈]\s?/,''))+'</span></div>';}).join('')+'</div>':'')+
        '</div>'+
        '<div class="det-bar"><button class="btn-2" style="flex:0 0 auto;width:56px;font-size:18px" onclick="toggleSave(\''+p.id+'\');dRefresh(\''+p.id+'\')">'+(p.clientLiked?'♥':'♡')+'</button>'+
          (p.viewingRequested?'<button class="btn-1" style="background:var(--green-soft);color:var(--green)" onclick="onCancelViewing(\''+p.id+'\')">✓ '+t('viewingReq')+'</button>':'<button class="btn-1" onclick="openViewing(\''+p.id+'\')">'+t('requestViewing')+'</button>')+'</div>';
      document.getElementById('detOv').classList.add('show'); document.body.style.overflow='hidden';
    }
    function dRefresh(id){ if(document.getElementById('detOv').classList.contains('show')) openDetail(id); }
    function closeDetail(){ document.getElementById('detOv').classList.remove('show'); document.body.style.overflow=''; render(); }
    function galScroll(el,n){ var i=Math.round(el.scrollLeft/el.clientWidth); var d=document.getElementById('gdots'); if(d)[].forEach.call(d.children,function(x,k){x.classList.toggle('on',k===i);}); }

    /* ───────── Sheets ───────── */
    function openSheet(html){ document.getElementById('sheet').innerHTML='<div class="grab"></div>'+html; document.getElementById('ov').classList.add('show'); document.body.style.overflow='hidden'; }
    function closeSheet(){ chatOpen=false; document.getElementById('ov').classList.remove('show'); if(!document.getElementById('detOv').classList.contains('show'))document.body.style.overflow=''; }

    function openReject(id){
      var rs=[['price','€',t('r_price')],['zone','◍',t('r_zone')],['size','▭',t('r_size')],['condition','✎',t('r_condition')],['floor','⌂',t('r_floor')],['furnish','◳',t('r_furnish')],['photos','▣',t('r_photos')],['other','·',t('r_other')]];
      openSheet('<div class="sh-h serif">'+t('reject_t')+'</div><div class="sh-p">'+t('reject_s')+'</div><div class="rg">'+rs.map(function(r){return '<div class="reason" onclick="doReject(\''+id+'\',\''+r[2]+'\')"><span style="opacity:.7">'+r[1]+'</span>'+r[2]+'</div>';}).join('')+'</div><button class="ghost" onclick="doReject(\''+id+'\',\'\')">'+t('skip')+'</button>');
    }
    var _slot='';
    function openViewing(id){ _slot='';
      var sl=[['asap',t('slot_asap')],['morning',t('slot_morning')],['afternoon',t('slot_afternoon')],['evening',t('slot_evening')],['weekend',t('slot_weekend')]];
      openSheet('<div class="sh-h serif">'+t('view_t')+'</div><div class="sh-p">'+t('view_s')+'</div><div class="fld"><label>'+t('view_when')+'</label><div class="slots" id="slots">'+sl.map(function(s){return '<div class="slot" data-s="'+s[1]+'" onclick="pickSlot(this)">'+s[1]+'</div>';}).join('')+'</div></div><div class="fld"><label>'+t('view_note')+'</label><textarea id="vnote" placeholder="'+t('view_notePh')+'"></textarea></div><button class="full" onclick="sendViewing(\''+id+'\')">'+t('view_send')+'</button>');
    }
    function pickSlot(el){ document.querySelectorAll('#slots .slot').forEach(function(s){s.classList.remove('on');}); el.classList.add('on'); _slot=el.dataset.s; haptic(); }
    function sendViewing(id){ var note=(document.getElementById('vnote')||{}).value||''; var pref=[_slot,note].filter(Boolean).join(' — '); closeSheet(); setP(id,{viewingRequested:true,viewingPreference:pref,clientLiked:true}); haptic([8,30,8]); confetti(40); toast(t('t_viewing'),'ok'); if(document.getElementById('detOv').classList.contains('show'))openDetail(id); else render(); act({action:'requestViewing',propertyId:id,preference:pref}); }

    function openCriteria(){ var c=client.criteria;
      openSheet('<div class="sh-h serif">'+t('edit_t')+'</div><div class="sh-p">'+t('edit_s')+'</div>'+
        '<div style="display:flex;gap:10px"><div class="fld" style="flex:1"><label>'+t('c_budget')+' min</label><input id="cMin" type="number" inputmode="numeric" value="'+(c.minBudget||'')+'" placeholder="700"></div><div class="fld" style="flex:1"><label>'+t('c_budget')+' max</label><input id="cMax" type="number" inputmode="numeric" value="'+(c.budget||'')+'" placeholder="1100"></div></div>'+
        '<div class="fld"><label>'+t('c_zone')+'</label><input id="cZone" value="'+esc(c.zone||'')+'" placeholder="Trastevere, Centro…"></div>'+
        '<div style="display:flex;gap:10px"><div class="fld" style="flex:1"><label>'+t('c_moveIn')+'</label><input id="cMove" type="date" value="'+esc((c.moveIn||'').slice(0,10))+'"></div><div class="fld" style="flex:1"><label>'+t('c_bedrooms')+'</label><select id="cBed"><option value="">—</option>'+[1,2,3,4].map(function(n){return '<option value="'+n+'" '+(String(c.bedrooms)===String(n)?'selected':'')+'>'+n+'+</option>';}).join('')+'</select></div></div>'+
        '<div class="fld"><label>'+t('c_must')+'</label><input id="cMust" value="'+esc(c.mustHaves||'')+'" placeholder="'+(lang==='it'?'Balcone, luminoso…':'Balcony, bright…')+'"></div>'+
        '<div class="fld"><label>'+t('c_deal')+'</label><input id="cDeal" value="'+esc(c.dealBreakers||'')+'"></div>'+
        '<button class="full" onclick="saveCriteria()">'+t('save_btn')+'</button><button class="ghost" onclick="closeSheet()">'+t('cancel')+'</button>');
    }
    function saveCriteria(){ var g=function(id){return (document.getElementById(id)||{}).value;};
      var cr={minBudget:g('cMin'),budget:g('cMax'),zone:g('cZone'),moveIn:g('cMove'),bedrooms:g('cBed'),mustHaves:g('cMust'),dealBreakers:g('cDeal')};
      Object.assign(client.criteria,{minBudget:parseInt(cr.minBudget)||null,budget:parseInt(cr.budget)||null,zone:cr.zone,moveIn:cr.moveIn,bedrooms:cr.bedrooms,mustHaves:cr.mustHaves,dealBreakers:cr.dealBreakers});
      closeSheet(); haptic(); render(); toast(t('t_critSaved'),'ok'); act({action:'updateCriteria',criteria:cr}); }

    /* ───────── Concierge chat (real, wired to portalMessages) ───────── */
    function openConcierge(){ chatOpen=true; haptic();
      openSheet('<div class="sh-h serif">'+t('chat_t')+'</div><div class="sh-p">'+esc(client.agent.name)+' · BOOM</div>'+
        '<div class="chat-feed" id="chatFeed">'+chatBodyHTML()+'</div>'+
        '<div class="chat-bar"><textarea id="chatIn" rows="1" placeholder="'+t('chat_ph')+'" oninput="growChat(this)" onkeydown="chatKey(event)"></textarea><button class="chat-send" onclick="sendConciergeMsg()">↑</button></div>'+
        '<div class="chat-wa">'+t('chat_wa')+' <a onclick="chatAgent()">WhatsApp →</a></div>');
      scrollChat();
    }
    function chatBodyHTML(){
      var ms=client.messages||[];
      if(!ms.length) return '<div class="chat-empty">'+t('chat_empty')+'</div>';
      return ms.map(function(m){ var me=m.from==='client'; return '<div class="msg '+(me?'me':'them')+'">'+esc(m.text)+'</div><div class="msg-meta'+(me?' me':'')+'">'+(me?t('chat_you'):t('chat_team'))+' · '+ago(m.timestamp)+'</div>'; }).join('');
    }
    function refreshChat(){ var f=document.getElementById('chatFeed'); if(f){ f.innerHTML=chatBodyHTML(); scrollChat(); } }
    function scrollChat(){ var f=document.getElementById('chatFeed'); if(f) requestAnimationFrame(function(){ f.scrollTop=f.scrollHeight; }); }
    function growChat(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
    function chatKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendConciergeMsg(); } }
    function sendConciergeMsg(){
      var inp=document.getElementById('chatIn'); if(!inp)return; var text=(inp.value||'').trim(); if(!text)return;
      inp.value=''; inp.style.height='auto'; haptic();
      client.messages=(client.messages||[]).concat([{from:'client',text:text,timestamp:new Date().toISOString()}]);
      refreshChat();
      if(demoMode){ setTimeout(function(){ client.messages.push({from:'agent',text:(lang==='it'?'Ricevuto! Ti rispondo a breve. (anteprima demo)':'Got it! I\'ll get back to you shortly. (demo preview)'),timestamp:new Date().toISOString()}); refreshChat(); },1200); return; }
      act({action:'message',text:text}).then(function(r){ if(r&&r.ok){ refreshChat(); toast(t('t_msg'),'ok'); } });
    }
    </script>
</body>
</html>
