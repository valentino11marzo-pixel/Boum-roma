    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Self-contained: this portal defines its own tokens + base inline (mirroring
         the BOOM design system 1:1). We intentionally do NOT link boom-core.css here —
         its full-viewport noise texture (body::before, z-index:9999) sat on top of
         every element and softened all the section text. Crisp text > shared sheet. -->
    <style>
        /* ─────────── client-portal · scoped on the real BOOM design system ───────────
           tokens, type and components mirror apartments.html / apartment-detail.html /
           tenant.html: Helvetica Neue display, Inter body, #FFD700 gold, #08080A base,
           20px cards, hairline borders, pill badges. All classes are cp-* prefixed and
           every token is defined here, so the page is fully self-contained. */
        :root{
            --gold:#FFD700; --gold-light:#FFE55C; --gold-dark:#E5C200; --gold-tint:rgba(255,215,0,.08);
            --cyan:#00CED1; --green:#00FF88; --red:#FF3B3B;
            --pure-black:#08080A; --void:#0A0A0A; --surface:#0E0E10; --surface-2:#151518; --elev:#1C1C20;
            --ink:#FAFAFA; --ink-2:rgba(255,255,255,.74); --ink-3:rgba(255,255,255,.52); --ink-4:rgba(255,255,255,.34);
            --line:rgba(255,255,255,.06); --line-2:rgba(255,255,255,.11); --line-gold:rgba(255,215,0,.20);
            --font-display:'Helvetica Neue',Helvetica,Arial,sans-serif;
            --font-sans:'Inter','Helvetica Neue',-apple-system,BlinkMacSystemFont,sans-serif;
            --ease:cubic-bezier(.16,1,.3,1);
            --r-lg:20px; --r-md:12px; --r-sm:8px;
            --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
            --side-w:264px;
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html{-webkit-text-size-adjust:100%;scroll-behavior:auto}
        body{font-family:var(--font-sans);background:var(--pure-black);color:var(--ink);font-weight:400;line-height:1.6;letter-spacing:.01em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;overflow-x:hidden}
        button{font-family:inherit;color:inherit;cursor:pointer}
        a{color:inherit;text-decoration:none}
        img{display:block}
        ::selection{background:var(--gold);color:#000}
        ::-webkit-scrollbar{width:0;height:0}
        .cp-disp{font-family:var(--font-display);font-weight:200;letter-spacing:-.01em}
        .cp-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:3px;color:var(--gold);font-weight:500}
        .cp-mono-n{font-variant-numeric:tabular-nums}
        .reveal{opacity:0;transform:translateY(20px);transition:opacity .9s var(--ease),transform .9s var(--ease)}
        .reveal.in{opacity:1;transform:none}
        @media (prefers-reduced-motion:reduce){.reveal{opacity:1!important;transform:none!important;transition:none}*{animation:none!important}}

        /* ── Loading ── */
        .cp-loading{position:fixed;inset:0;background:var(--pure-black);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:28px;z-index:9000;transition:opacity .6s var(--ease)}
        .cp-loading.hidden{opacity:0;pointer-events:none}
        .cp-loading-mark{font-family:var(--font-display);font-weight:300;font-size:30px;letter-spacing:10px;text-indent:10px;color:var(--ink);animation:lin 1.5s var(--ease) infinite alternate}
        @keyframes lin{from{opacity:.35}to{opacity:1}}
        .cp-loading-bar{width:130px;height:1px;background:var(--line-2);overflow:hidden;position:relative}
        .cp-loading-bar::after{content:'';position:absolute;inset:0;width:40%;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:lbar 1.3s var(--ease) infinite}
        @keyframes lbar{from{left:-40%}to{left:100%}}

        /* ── Logo ── */
        .cp-logo{display:flex;align-items:center;gap:12px}
        .cp-logo svg{width:38px;height:38px;filter:drop-shadow(0 0 14px rgba(255,215,0,.4))}
        .cp-logo-txt{font-family:var(--font-display);font-weight:300;font-size:21px;letter-spacing:5px;text-indent:5px;text-transform:uppercase}

        /* ── Auth ── */
        .cp-auth{position:relative;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:32px}
        .cp-auth::before{content:'';position:fixed;inset:0;background:radial-gradient(120% 80% at 50% -10%,rgba(255,215,0,.10),transparent 56%);pointer-events:none}
        .cp-auth.hidden{display:none}
        .cp-auth-box{position:relative;width:100%;max-width:380px;text-align:center}
        .cp-auth .cp-logo{justify-content:center;margin-bottom:34px}
        .cp-auth-kick{margin-bottom:18px}
        .cp-auth-h{font-size:34px;line-height:1.12;margin-bottom:14px}
        .cp-auth-h b{color:var(--gold);font-weight:200}
        .cp-auth-p{font-size:15px;color:var(--ink-2);margin-bottom:34px}
        .cp-input{width:100%;padding:18px 20px;background:var(--void);border:1px solid var(--line-2);color:var(--ink);font-family:inherit;font-size:17px;text-align:center;letter-spacing:4px;font-weight:400;text-transform:uppercase;transition:border-color .3s,box-shadow .3s}
        .cp-input::placeholder{letter-spacing:1px;font-weight:300;text-transform:none;color:var(--ink-4)}
        .cp-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,215,0,.10)}
        .cp-auth-btn{width:100%;margin-top:14px;padding:17px;background:var(--gold);border:1px solid var(--gold);color:#000;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;transition:transform .25s var(--ease),background .3s,opacity .2s}
        .cp-auth-btn:hover{background:var(--gold-light)}
        .cp-auth-btn:active{transform:scale(.99)}
        .cp-auth-btn[disabled]{opacity:.5}
        .cp-auth-err{margin-top:16px;padding:13px;border:1px solid rgba(255,59,59,.4);background:rgba(255,59,59,.08);color:var(--red);font-size:13px;display:none}
        .cp-auth-err.show{display:block;animation:shake .45s var(--ease)}
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
        .cp-auth-help{margin-top:28px;font-size:13px;color:var(--ink-3)}
        .cp-auth-help a{color:var(--gold)}
        .cp-langseg{margin-top:26px;display:inline-flex;border:1px solid var(--line-2)}
        .cp-langseg button{padding:8px 18px;background:transparent;border:none;color:var(--ink-3);font-size:11px;font-weight:600;letter-spacing:1px;transition:all .25s var(--ease)}
        .cp-langseg button.on{background:var(--gold);color:#000}

        /* ── App shell ── */
        .cp-app{display:none}
        .cp-app.active{display:block}

        /* Sidebar (desktop) */
        .cp-side{display:none}
        @media (min-width:1024px){
            .cp-app.active{display:grid;grid-template-columns:var(--side-w) minmax(0,1fr);min-height:100vh}
            .cp-side{display:flex;flex-direction:column;position:sticky;top:0;height:100vh;padding:30px 22px;background:var(--void);border-right:1px solid var(--line);z-index:20}
            .cp-topbar{display:none!important}
            .cp-tabbar{display:none!important}
        }
        .cp-side-id{margin:30px 0 26px;padding:18px;border:1px solid var(--line);background:var(--surface)}
        .cp-side-ava{width:46px;height:46px;border-radius:50%;background:linear-gradient(140deg,var(--gold-light),var(--gold-dark));display:flex;align-items:center;justify-content:center;color:#000;font-size:18px;font-weight:600;margin-bottom:12px;text-transform:uppercase}
        .cp-side-name{font-size:15px;font-weight:500}
        .cp-side-stage{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin-top:4px}
        .cp-side-nav{display:flex;flex-direction:column;gap:2px}
        .cp-side-nav .cp-navi{display:flex;align-items:center;gap:13px;padding:13px 15px;color:var(--ink-3);font-size:13px;letter-spacing:.04em;border-left:2px solid transparent;transition:all .3s var(--ease)}
        .cp-side-nav .cp-navi:hover{color:var(--ink);background:rgba(255,255,255,.02)}
        .cp-side-nav .cp-navi.on{color:var(--gold);background:var(--gold-tint);border-left-color:var(--gold)}
        .cp-side-nav .cp-navi .ic{font-size:16px;width:18px;text-align:center}
        .cp-side-nav .cp-navi .b{margin-left:auto;min-width:18px;height:18px;padding:0 5px;background:var(--gold);color:#000;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
        .cp-side-foot{margin-top:auto;padding-top:22px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:14px}
        .cp-logout{width:100%;padding:12px;background:transparent;border:1px solid var(--line-2);color:var(--ink-3);font-size:11px;text-transform:uppercase;letter-spacing:2px;transition:all .3s}
        .cp-logout:hover{border-color:var(--red);color:var(--red)}

        /* Mobile top bar + bottom tabs */
        .cp-topbar{position:fixed;top:0;left:0;right:0;height:calc(54px + var(--safe-t));padding-top:var(--safe-t);background:rgba(8,8,10,.97);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding-left:20px;padding-right:14px;z-index:60}
        .cp-topbar .cp-logo svg{width:30px;height:30px}
        .cp-topbar .cp-logo-txt{font-size:17px;letter-spacing:4px}
        .cp-lang-t{padding:7px 13px;background:transparent;border:1px solid var(--line-2);color:var(--ink-2);font-size:11px;font-weight:600;letter-spacing:1px;transition:all .25s var(--ease)}
        .cp-lang-t:active{transform:scale(.95)}
        .cp-tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,10,.97);border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:center;padding:8px 4px calc(8px + var(--safe-b));z-index:60}
        .cp-tabbar .cp-navi{position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--ink-4);padding:5px 16px;transition:color .3s var(--ease)}
        .cp-tabbar .cp-navi.on{color:var(--gold)}
        .cp-tabbar .cp-navi .ic{font-size:19px}
        .cp-tabbar .cp-navi .lb{font-size:9px;text-transform:uppercase;letter-spacing:1px}
        .cp-tabbar .cp-navi .b{position:absolute;top:-1px;right:8px;min-width:16px;height:16px;padding:0 4px;background:var(--gold);color:#000;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}

        /* Main */
        .cp-main{max-width:1080px;margin:0 auto;padding:calc(54px + var(--safe-t)) 20px calc(92px + var(--safe-b))}
        @media (min-width:1024px){.cp-main{padding:46px 56px 64px;max-width:1080px}}
        .cp-view{animation:viewIn .5s var(--ease)}
        @keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

        /* ── Hero ── */
        .cp-hero{padding:14px 0 8px}
        @media (min-width:1024px){.cp-hero{padding:6px 0 8px}}
        .cp-hero-h{font-size:38px;line-height:1.05;margin:14px 0 12px}
        @media (min-width:1024px){.cp-hero-h{font-size:46px}}
        .cp-hero-h b{color:var(--gold);font-weight:200}
        .cp-hero-p{font-size:16px;color:var(--ink-2);max-width:520px}
        .cp-hero-insight{margin-top:16px;font-size:14px;color:var(--ink-3)}
        .cp-hero-insight b{color:var(--gold);font-weight:400}
        .cp-hero-insight .sep{margin:0 10px;color:var(--ink-4)}
        .cp-livechip{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border:1px solid var(--line-2);font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-2)}
        .cp-livechip i{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pp 2.4s var(--ease) infinite}
        @keyframes pp{0%{box-shadow:0 0 0 0 rgba(0,255,136,.45)}70%,100%{box-shadow:0 0 0 7px rgba(0,255,136,0)}}

        /* ── Engine (Homie live) ── */
        .cp-engine{position:relative;display:flex;align-items:center;gap:20px;padding:22px;margin:30px 0;background:var(--void);border:1px solid var(--line);border-top:1px solid var(--line-gold)}
        .cp-radar{position:relative;width:78px;height:78px;flex-shrink:0;border-radius:50%;border:1px solid var(--line-2);background:radial-gradient(circle,var(--surface-2),var(--void));overflow:hidden}
        .cp-radar::before{content:'';position:absolute;inset:-2px;border-radius:50%;background:conic-gradient(from 0deg,transparent 0deg,transparent 248deg,rgba(255,215,0,.55) 358deg,transparent 360deg);animation:sweep 2.6s linear infinite}
        @keyframes sweep{to{transform:rotate(360deg)}}
        .cp-radar i{position:absolute;border-radius:50%;border:1px solid var(--line);left:50%;top:50%;transform:translate(-50%,-50%)}
        .cp-radar i.r1{width:28px;height:28px}.cp-radar i.r2{width:52px;height:52px}
        .cp-radar .core{width:8px;height:8px;border:none;background:var(--gold);box-shadow:0 0 12px var(--gold);animation:pp 2.4s var(--ease) infinite}
        .cp-engine-main{flex:1;min-width:0;position:relative}
        .cp-engine-h{display:flex;align-items:center;gap:9px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-2);font-weight:500}
        .cp-engine-h .live{display:inline-flex;align-items:center;gap:6px;color:var(--green)}
        .cp-engine-h .live b{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pp 2.4s var(--ease) infinite}
        .cp-engine-stats{display:flex;gap:26px;margin-top:13px}
        .cp-es b{font-family:var(--font-display);font-size:26px;font-weight:200;color:var(--ink);display:block;font-variant-numeric:tabular-nums}
        .cp-es.gold b{color:var(--gold)}
        .cp-es span{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-4);margin-top:4px;display:block}
        .cp-engine-note{font-size:12px;color:var(--ink-3);margin-top:13px;line-height:1.5}
        .cp-engine-src{margin-top:13px;display:flex;flex-wrap:wrap;gap:7px;align-items:center}
        .cp-engine-src span{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid var(--line);font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-3)}
        .cp-engine-src span::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green)}

        /* ── Home grid (desktop 2-col) ── */
        .cp-home2{display:grid;gap:30px;grid-template-columns:1fr}
        @media (min-width:1080px){.cp-home2{grid-template-columns:minmax(0,1fr) 330px;align-items:start}}
        .cp-rail{display:flex;flex-direction:column;gap:30px}
        @media (min-width:1080px){.cp-rail{position:sticky;top:46px}}

        /* ── Sections ── */
        .cp-sec{margin-bottom:34px}
        .cp-sec-h{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:18px}
        .cp-sec-t{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-2)}
        .cp-sec-sub{font-size:13px;color:var(--ink-3);margin:-10px 0 18px}
        .cp-sec-link{font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;background:none;border:none}
        .cp-count{font-size:12px;color:var(--ink-3);font-variant-numeric:tabular-nums}

        /* ── Film timeline ── */
        .cp-film{position:relative}
        .cp-film-rail{position:absolute;left:9px;top:6px;bottom:14px;width:1px;background:var(--line-2);overflow:hidden}
        .cp-film-rail i{position:absolute;top:0;left:0;width:100%;height:0;background:linear-gradient(var(--gold-dark),var(--gold));transition:height 1.4s var(--ease)}
        .cp-act{position:relative;padding:0 0 28px 36px}
        .cp-act:last-child{padding-bottom:2px}
        .cp-act-dot{position:absolute;left:3px;top:1px;width:15px;height:15px;border:1px solid var(--line-2);background:var(--void);transform:rotate(45deg);display:flex;align-items:center;justify-content:center;transition:all .5s var(--ease)}
        .cp-act-dot span{transform:rotate(-45deg);font-size:8px;color:#000;line-height:1}
        .cp-act.done .cp-act-dot{background:var(--gold-dark);border-color:var(--gold-dark)}
        .cp-act.now .cp-act-dot{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 4px rgba(255,215,0,.14);animation:actpulse 2.8s var(--ease) infinite}
        @keyframes actpulse{0%,100%{box-shadow:0 0 0 4px rgba(255,215,0,.14)}50%{box-shadow:0 0 0 7px rgba(255,215,0,.04)}}
        .cp-act-no{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-4)}
        .cp-act.now .cp-act-no{color:var(--gold)}
        .cp-act-here{margin-left:8px;color:var(--gold)}
        .cp-act-t{font-family:var(--font-display);font-weight:300;font-size:19px;margin:5px 0 6px;color:var(--ink-3);transition:color .5s}
        .cp-act.done .cp-act-t,.cp-act.now .cp-act-t{color:var(--ink)}
        .cp-act-s{font-size:13px;color:var(--ink-3);line-height:1.5;max-width:440px}
        .cp-act.now .cp-act-s,.cp-act.done .cp-act-s{color:var(--ink-2)}
        .cp-act-chip{display:inline-block;margin-top:11px;padding:5px 12px;border:1px solid var(--line);border-radius:100px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-3)}
        .cp-act.now .cp-act-chip{color:var(--gold);border-color:var(--line-gold)}

        /* ── All-inclusive ── */
        .cp-incl{border:1px solid var(--line);background:var(--void)}
        .cp-inc{display:flex;align-items:center;gap:13px;padding:15px 16px;border-bottom:1px solid var(--line)}
        .cp-inc:last-child{border-bottom:none}
        .cp-inc-ic{width:32px;height:32px;background:var(--gold-tint);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
        .cp-inc-t{font-size:13px;font-weight:500}
        .cp-inc-s{font-size:11px;color:var(--ink-3);margin-top:1px}

        /* ── Concierge ── */
        .cp-agent{position:relative;display:flex;align-items:center;gap:14px;padding:20px;background:var(--void);border:1px solid var(--line);border-top:1px solid var(--line-gold)}
        .cp-agent-ava{position:relative;width:48px;height:48px;border-radius:50%;background:linear-gradient(140deg,var(--gold-light),var(--gold-dark));display:flex;align-items:center;justify-content:center;color:#000;font-size:19px;font-weight:600;flex-shrink:0;text-transform:uppercase}
        .cp-agent-i{flex:1;position:relative;min-width:0}
        .cp-agent-n{font-size:15px;font-weight:500}
        .cp-agent-r{font-size:12px;color:var(--ink-3);margin-top:2px}

        /* ── Buttons / chips ── */
        .cp-btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:13px 18px;background:var(--gold);border:1px solid var(--gold);color:#000;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:transform .2s var(--ease),background .3s,border-color .3s,color .3s}
        .cp-btn:active{transform:scale(.98)}
        .cp-btn.ghost{background:rgba(255,255,255,.05);border-color:var(--line-2);color:var(--ink)}
        .cp-btn.ghost:hover{border-color:var(--gold);color:var(--gold)}
        .cp-btn.line{background:transparent;border-color:var(--gold);color:var(--gold)}
        .cp-btn.line:hover{background:var(--gold);color:#000}
        .cp-btn.ok{background:rgba(0,255,136,.12);border-color:rgba(0,255,136,.4);color:var(--green)}
        .cp-btn.sm{padding:9px 14px;font-size:11px}
        .cp-btn-text{background:none;border:none;color:var(--ink-3);font-size:12px;letter-spacing:.04em;padding:13px 6px;white-space:nowrap}
        .cp-btn-text:hover{color:var(--ink-2)}
        .cp-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:100px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.14);color:#fff}
        .cp-chip.gold{background:var(--gold);color:#000;border-color:var(--gold)}

    function openReject(id){
      var rs=[['€',t('r_price')],['◍',t('r_zone')],['▭',t('r_size')],['✎',t('r_condition')],['⌂',t('r_floor')],['◳',t('r_furnish')],['▣',t('r_photos')],['·',t('r_other')]];
      openSheet('<div class="cp-sh-h">'+t('reject_t')+'</div><div class="cp-sh-p">'+t('reject_s')+'</div><div class="cp-rg">'+rs.map(function(r){return '<div class="cp-reason" onclick="doReject(\''+id+'\',\''+r[1]+'\')"><span style="color:var(--ink-3)">'+r[0]+'</span>'+r[1]+'</div>';}).join('')+'</div><button class="cp-ghost-full" onclick="doReject(\''+id+'\',\'\')">'+t('skip')+'</button>');
    }
    var _slot='';
    function openViewing(id){ _slot='';
      var sl=[t('slot_asap'),t('slot_morning'),t('slot_afternoon'),t('slot_evening'),t('slot_weekend')];
      openSheet('<div class="cp-sh-h">'+t('view_t')+'</div><div class="cp-sh-p">'+t('view_s')+'</div><div class="cp-fld"><label>'+t('view_when')+'</label><div class="cp-slots" id="slots">'+sl.map(function(s){return '<div class="cp-slot" data-s="'+s+'" onclick="pickSlot(this)">'+s+'</div>';}).join('')+'</div></div><div class="cp-fld"><label>'+t('view_note')+'</label><textarea id="vnote" placeholder="'+t('view_notePh')+'"></textarea></div><button class="cp-btn cp-full" onclick="sendViewing(\''+id+'\')">'+t('view_send')+'</button>');
    }
    function pickSlot(el){ document.querySelectorAll('#slots .cp-slot').forEach(function(s){s.classList.remove('on');}); el.classList.add('on'); _slot=el.dataset.s; haptic(); }
    function sendViewing(id){ var note=(document.getElementById('vnote')||{}).value||''; var pref=[_slot,note].filter(Boolean).join(' — '); closeSheet(); setP(id,{viewingRequested:true,viewingPreference:pref,clientLiked:true}); haptic([8,30,8]); confetti(40); toast(t('t_viewing'),'ok'); if(document.getElementById('cpDet').classList.contains('show'))openDetail(id); else render(); act({action:'requestViewing',propertyId:id,preference:pref}); }

    function openCriteria(){ var c=client.criteria;
      openSheet('<div class="cp-sh-h">'+t('edit_t')+'</div><div class="cp-sh-p">'+t('edit_s')+'</div>'+
        '<div style="display:flex;gap:10px"><div class="cp-fld" style="flex:1"><label>'+t('c_budget')+' min</label><input id="cMin" type="number" inputmode="numeric" value="'+(c.minBudget||'')+'" placeholder="700"></div><div class="cp-fld" style="flex:1"><label>'+t('c_budget')+' max</label><input id="cMax" type="number" inputmode="numeric" value="'+(c.budget||'')+'" placeholder="1100"></div></div>'+
        '<div class="cp-fld"><label>'+t('c_zone')+'</label><input id="cZone" value="'+esc(c.zone||'')+'" placeholder="Trastevere, Centro…"></div>'+
        '<div style="display:flex;gap:10px"><div class="cp-fld" style="flex:1"><label>'+t('c_moveIn')+'</label><input id="cMove" type="date" value="'+esc((c.moveIn||'').slice(0,10))+'"></div><div class="cp-fld" style="flex:1"><label>'+t('c_bedrooms')+'</label><select id="cBed"><option value="">—</option>'+[1,2,3,4].map(function(n){return '<option value="'+n+'" '+(String(c.bedrooms)===String(n)?'selected':'')+'>'+n+'+</option>';}).join('')+'</select></div></div>'+
        '<div class="cp-fld"><label>'+t('c_must')+'</label><input id="cMust" value="'+esc(c.mustHaves||'')+'" placeholder="'+(lang==='it'?'Balcone, luminoso…':'Balcony, bright…')+'"></div>'+
        '<div class="cp-fld"><label>'+t('c_deal')+'</label><input id="cDeal" value="'+esc(c.dealBreakers||'')+'"></div>'+
        '<button class="cp-btn cp-full" onclick="saveCriteria()">'+t('save_btn')+'</button><button class="cp-ghost-full" onclick="closeSheet()">'+t('cancel')+'</button>');
    }
    function saveCriteria(){ var g=function(id){return (document.getElementById(id)||{}).value;};
      var cr={minBudget:g('cMin'),budget:g('cMax'),zone:g('cZone'),moveIn:g('cMove'),bedrooms:g('cBed'),mustHaves:g('cMust'),dealBreakers:g('cDeal')};
      Object.assign(client.criteria,{minBudget:parseInt(cr.minBudget)||null,budget:parseInt(cr.budget)||null,zone:cr.zone,moveIn:cr.moveIn,bedrooms:cr.bedrooms,mustHaves:cr.mustHaves,dealBreakers:cr.dealBreakers});
      closeSheet(); haptic(); render(); toast(t('t_critSaved'),'ok'); act({action:'updateCriteria',criteria:cr}); }

    /* ───────── Concierge chat ───────── */
    function openConcierge(){ chatOpen=true; haptic();
      openSheet('<div class="cp-sh-h">'+t('chat_t')+'</div><div class="cp-sh-p">'+esc(client.agent.name)+' · BOOM</div>'+
        '<div class="cp-chat" id="chatFeed">'+chatBodyHTML()+'</div>'+
        '<div class="cp-chat-bar"><textarea id="chatIn" rows="1" placeholder="'+t('chat_ph')+'" oninput="growChat(this)" onkeydown="chatKey(event)"></textarea><button class="cp-chat-send" onclick="sendConciergeMsg()">↑</button></div>'+
        '<div class="cp-chat-wa">'+t('chat_wa')+' <a onclick="chatAgent()">WhatsApp →</a></div>');
      scrollChat();
    }
    function chatBodyHTML(){
      var ms=client.messages||[];
      if(!ms.length) return '<div class="cp-chat-empty">'+t('chat_empty')+'</div>';
      return ms.map(function(m){ var me=m.from==='client'; return '<div class="cp-msg '+(me?'me':'them')+'">'+esc(m.text)+'</div><div class="cp-msg-meta'+(me?' me':'')+'">'+(me?t('chat_you'):t('chat_team'))+' · '+ago(m.timestamp)+'</div>'; }).join('');
    }
    function refreshChat(){ var f=document.getElementById('chatFeed'); if(f){ f.innerHTML=chatBodyHTML(); scrollChat(); } }
    function scrollChat(){ var f=document.getElementById('chatFeed'); if(f) requestAnimationFrame(function(){ f.scrollTop=f.scrollHeight; }); }
    function growChat(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
    function chatKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendConciergeMsg(); } }
    function sendConciergeMsg(){
      var inp=document.getElementById('chatIn'); if(!inp)return; var text=(inp.value||'').trim(); if(!text)return;
      inp.value=''; inp.style.height='auto'; haptic();
      client.messages=(client.messages||[]).concat([{from:'client',text:text,timestamp:new Date().toISOString()}]);
      refreshChat();
      if(demoMode){ setTimeout(function(){ client.messages.push({from:'agent',text:(lang==='it'?'Ricevuto! Ti rispondo a breve. (anteprima demo)':'Got it! I\'ll get back to you shortly. (demo preview)'),timestamp:new Date().toISOString()}); refreshChat(); },1200); return; }
      act({action:'message',text:text}).then(function(r){ if(r&&r.ok){ refreshChat(); toast(t('t_msg'),'ok'); } });
    }
    </script>
</body>
</html>
