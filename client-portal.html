    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --gold:#D4AF37; --gold-2:#E8C766; --gold-dark:#B8960C;
            --gold-light:rgba(212,175,55,.14); --gold-glow:rgba(212,175,55,.45);
            --bg:#000; --bg-1:#08080A; --bg-card:#0C0C0E; --bg-2:#141416; --bg-3:#1B1B1E;
            --border:rgba(255,255,255,.08); --border-2:rgba(255,255,255,.14);
            --text:#FFF; --text-2:#9A9A9E; --text-3:#5E5E63;
            --green:#34C759; --green-light:rgba(52,199,89,.14);
            --red:#FF453A; --red-light:rgba(255,69,58,.14);
            --blue:#0A84FF; --radius:20px;
            --ease:cubic-bezier(.2,.8,.2,1);
            --safe-b:env(safe-area-inset-bottom,0px);
        }
        html,body{height:100%}
        body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.45}
        /* ambient luxe glow */
        body::before{content:'';position:fixed;top:-30%;left:50%;transform:translateX(-50%);width:140vw;height:60vh;background:radial-gradient(ellipse at center,rgba(212,175,55,.10),transparent 62%);pointer-events:none;z-index:0}
        ::selection{background:var(--gold);color:#000}
        a{color:inherit}
        button{font-family:inherit}
        ::-webkit-scrollbar{width:0;height:0}

        .loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:22px;z-index:9999;transition:opacity .5s}
        .loading.hidden{opacity:0;pointer-events:none}
        .loading-ring{width:54px;height:54px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .wordmark{font-size:14px;letter-spacing:8px;font-weight:300;color:var(--gold);text-indent:8px}

        /* ── AUTH ── */
        .auth{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}
        .auth.hidden{display:none}
        .auth-box{width:100%;max-width:380px;text-align:center;animation:rise .6s var(--ease)}
        @keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
        .auth-mark{width:88px;height:88px;border-radius:50%;margin:0 auto 30px;background:radial-gradient(circle at 30% 25%,var(--gold-2),var(--gold-dark));box-shadow:0 0 50px var(--gold-glow),inset 0 -8px 20px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;color:#000;position:relative}
        .auth-mark::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid var(--gold-light)}
        .auth-kicker{font-size:11px;letter-spacing:6px;color:var(--gold);margin-bottom:14px}
        .auth-title{font-size:30px;font-weight:300;line-height:1.2;margin-bottom:34px;letter-spacing:-.5px}
        .auth-input{width:100%;padding:18px;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;color:var(--text);font-size:19px;text-align:center;letter-spacing:5px;text-transform:uppercase;font-weight:600;transition:all .2s}
        .auth-input::placeholder{letter-spacing:2px;font-weight:400;text-transform:none;color:var(--text-3)}
        .auth-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-light)}
        .auth-btn{width:100%;margin-top:14px;padding:18px;background:linear-gradient(135deg,var(--gold-2),var(--gold-dark));border:none;border-radius:16px;color:#000;font-size:15px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .2s}
        .auth-btn:hover{box-shadow:0 12px 34px var(--gold-glow);transform:translateY(-1px)}
        .auth-btn:active{transform:scale(.98)}
        .auth-err{margin-top:16px;padding:13px;background:var(--red-light);border-radius:12px;color:var(--red);font-size:13.5px;display:none}
        .auth-err.show{display:block;animation:shake .4s}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
        .auth-help{margin-top:30px;font-size:13px;color:var(--text-3)}
        .auth-help a{color:var(--gold);text-decoration:none}
        .auth-lang{margin-top:24px;display:flex;gap:6px;justify-content:center}
        .auth-lang button{padding:7px 14px;background:transparent;border:1px solid var(--border);border-radius:100px;color:var(--text-3);font-size:12px;cursor:pointer}
        .auth-lang button.on{border-color:var(--gold);color:var(--gold);background:var(--gold-light)}

        /* ── APP SHELL ── */
        .app{display:none;position:relative;z-index:1}
        .app.active{display:block}
        .topbar{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(0,0,0,.72);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 18px;padding-top:env(safe-area-inset-top,0);z-index:100}
        .topbar .brand{display:flex;align-items:center;gap:9px;font-size:12px;letter-spacing:4px;font-weight:300;color:var(--gold)}
        .brand-dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,var(--gold-2),var(--gold-dark));box-shadow:0 0 10px var(--gold-glow)}
        .topbar-right{display:flex;align-items:center;gap:10px}
        .lang-toggle{padding:6px 11px;background:var(--bg-2);border:1px solid var(--border);border-radius:100px;color:var(--text-2);font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.5px}
        .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold-2),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:14px}

        .main{padding:calc(60px + env(safe-area-inset-top,0) + 16px) 18px calc(96px + var(--safe-b));max-width:560px;margin:0 auto;animation:fade .35s var(--ease)}
        @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

        /* ── HERO / STATUS ── */
        .hero{text-align:center;padding:26px 18px 8px}
        .hero-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;background:var(--green-light);border:1px solid rgba(52,199,89,.25);border-radius:100px;font-size:11px;color:var(--green);letter-spacing:.5px;margin-bottom:18px}
        .hero-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(52,199,89,.5)}50%{opacity:.6;box-shadow:0 0 0 6px rgba(52,199,89,0)}}
        .hero-icon{font-size:54px;margin-bottom:12px;filter:drop-shadow(0 6px 18px rgba(212,175,55,.25))}
        .hero-title{font-size:26px;font-weight:600;letter-spacing:-.5px;margin-bottom:6px}
        .hero-sub{font-size:13.5px;color:var(--text-2);max-width:320px;margin:0 auto}

        /* ── JOURNEY STEPPER ── */
        .journey{position:relative;display:flex;justify-content:space-between;margin:26px 4px 30px}
        .journey::before{content:'';position:absolute;top:17px;left:24px;right:24px;height:2px;background:var(--border)}
        .journey-fill{position:absolute;top:17px;left:24px;height:2px;background:linear-gradient(90deg,var(--gold-dark),var(--gold-2));transition:width .6s var(--ease);box-shadow:0 0 10px var(--gold-glow)}
        .jstep{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:8px;flex:1}
        .jdot{width:34px;height:34px;border-radius:50%;background:var(--bg-card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text-3);transition:all .3s}
        .jstep.done .jdot{background:var(--gold-dark);border-color:var(--gold-dark);color:#000}
        .jstep.active .jdot{background:linear-gradient(135deg,var(--gold-2),var(--gold-dark));border-color:var(--gold);color:#000;box-shadow:0 0 0 4px var(--gold-light),0 0 22px var(--gold-glow);transform:scale(1.08)}
        .jlabel{font-size:8.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--text-3);text-align:center}
        .jstep.active .jlabel,.jstep.done .jlabel{color:var(--text-2)}

        /* ── STATS ── */
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:22px}
        .stat{background:linear-gradient(160deg,var(--bg-2),var(--bg-card));border:1px solid var(--border);border-radius:16px;padding:16px 10px;text-align:center}
        .stat-v{font-size:26px;font-weight:300;letter-spacing:-1px}
        .stat-v.gold{color:var(--gold)}
        .stat-l{font-size:9.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin-top:5px}

        /* ── SECTIONS / CARDS ── */
        .sec{margin-bottom:24px}
        .sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;padding:0 2px}
        .sec-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--text-2)}
        .sec-link{font-size:12px;color:var(--gold);cursor:pointer;background:none;border:none}
        .pill{padding:4px 11px;background:var(--gold-light);color:var(--gold);border-radius:100px;font-size:11px;font-weight:600}
        .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
        .card.glow{background:linear-gradient(150deg,var(--gold-light),transparent 60%);border-color:rgba(212,175,55,.22)}

        .row-card{display:flex;gap:13px;align-items:center;cursor:pointer;transition:transform .15s}
        .row-card:active{transform:scale(.99)}
        .row-thumb{width:62px;height:62px;border-radius:13px;object-fit:cover;flex-shrink:0;background:var(--bg-3)}
        .row-thumb.ph{display:flex;align-items:center;justify-content:center;font-size:24px}
        .row-main{flex:1;min-width:0}
        .row-price{font-weight:600;font-size:15px}
        .row-addr{font-size:12px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
        .row-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
        .mini-tag{font-size:10px;color:var(--text-3);background:var(--bg-2);padding:2px 8px;border-radius:6px}
        .row-arrow{color:var(--text-3);font-size:18px}

        /* ── AGENT ── */
        .agent{display:flex;align-items:center;gap:14px}
        .agent-ava{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--gold-2),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;color:#000}
        .agent-info{flex:1}
        .agent-name{font-weight:600;font-size:15px}
        .agent-role{font-size:12px;color:var(--text-2)}
        .agent-btn{padding:11px 20px;background:#25D366;color:#000;border:none;border-radius:12px;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px}

        /* ── SWIPE DECK ── */
        .deck{position:relative;height:min(64vh,520px);margin-bottom:18px}
        .pcard{position:absolute;inset:0;background:var(--bg-card);border:1px solid var(--border);border-radius:24px;overflow:hidden;cursor:grab;box-shadow:0 24px 60px rgba(0,0,0,.55);display:flex;flex-direction:column;will-change:transform}
        .pcard:active{cursor:grabbing}
        .pcard.liked{transform:translateX(160%) rotate(18deg)!important;opacity:0;transition:all .45s var(--ease)}
        .pcard.rejected{transform:translateX(-160%) rotate(-18deg)!important;opacity:0;transition:all .45s var(--ease)}
        .pimg{position:relative;flex:1;min-height:0;background:linear-gradient(135deg,#191919,#0a0a0a);overflow:hidden}
        .carousel{position:absolute;inset:0;display:flex;transition:transform .4s var(--ease)}
        .carousel img{flex:0 0 100%;width:100%;height:100%;object-fit:cover}
        .pimg-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:56px;opacity:.4}
        .pimg-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.86) 2%,transparent 46%);pointer-events:none}
        .pdots{position:absolute;bottom:108px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:6}
        .pdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.4);transition:all .3s}
        .pdot.on{width:18px;border-radius:3px;background:var(--gold)}
        .pnav{position:absolute;top:38%;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);border:none;color:#fff;font-size:16px;cursor:pointer;z-index:6;opacity:.85}
        .pnav.prev{left:10px}.pnav.next{right:10px}
        .pbadges{position:absolute;top:14px;left:14px;display:flex;gap:6px;z-index:6}
        .pbadge{padding:6px 11px;background:rgba(0,0,0,.55);backdrop-filter:blur(10px);border-radius:100px;font-size:11px;font-weight:600}
        .pbadge.new{background:var(--gold);color:#000}
        .pmatch{position:absolute;top:14px;right:14px;z-index:6;width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:center;border:1.5px solid var(--gold)}
        .pmatch b{font-size:13px;color:var(--gold);line-height:1}
        .pmatch span{font-size:7px;color:var(--text-2);letter-spacing:.5px}
        .stamp{position:absolute;top:42px;padding:8px 18px;border-radius:10px;font-size:26px;font-weight:800;letter-spacing:1px;opacity:0;transition:opacity .12s;z-index:7}
        .stamp.like{right:22px;border:3px solid var(--green);color:var(--green);transform:rotate(14deg)}
        .stamp.nope{left:22px;border:3px solid var(--red);color:var(--red);transform:rotate(-14deg)}
        .pcard.s-right .stamp.like{opacity:1}
        .pcard.s-left .stamp.nope{opacity:1}
        .pinfo{position:absolute;left:0;right:0;bottom:0;padding:18px;z-index:5}
        .pprice{font-size:27px;font-weight:700;letter-spacing:-.5px}
        .pprice span{font-size:14px;color:var(--text-2);font-weight:400}
        .paddr{font-size:13px;color:#ddd;margin-top:3px}
        .pfeat{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
        .pfeat span{padding:5px 11px;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);border-radius:8px;font-size:12px}

        .swipe-actions{display:flex;justify-content:center;align-items:center;gap:18px}
        .sbtn{width:58px;height:58px;border-radius:50%;border:1.5px solid;background:var(--bg-card);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:transform .15s}
        .sbtn:active{transform:scale(.88)}
        .sbtn.no{border-color:var(--red);color:var(--red)}
        .sbtn.info{width:48px;height:48px;font-size:19px;border-color:var(--border-2);color:var(--text-2)}
        .sbtn.yes{width:68px;height:68px;font-size:30px;border-color:var(--green);color:var(--green)}
        .sbtn.yes:active{background:var(--green);color:#000}

        /* ── BOTTOM NAV ── */
        .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.82);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:8px 4px calc(8px + var(--safe-b));z-index:100}
        .nav-i{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text-3);cursor:pointer;padding:6px 14px;border-radius:14px;transition:color .2s;min-width:60px}
        .nav-i.on{color:var(--gold)}
        .nav-ic{font-size:20px}
        .nav-l{font-size:9px;text-transform:uppercase;letter-spacing:.8px}
        .nav-badge{position:absolute;top:2px;right:12px;min-width:16px;height:16px;padding:0 4px;background:var(--gold);color:#000;border-radius:100px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}

        /* ── SHEET (bottom modal) ── */
        .sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:1500;display:none;align-items:flex-end;justify-content:center}
        .sheet-ov.show{display:flex;animation:fade .25s}
        .sheet{width:100%;max-width:560px;max-height:90vh;overflow-y:auto;background:var(--bg-1);border:1px solid var(--border);border-radius:26px 26px 0 0;padding:8px 20px calc(26px + var(--safe-b));animation:slideup .35s var(--ease)}
        @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
        .sheet-grab{width:40px;height:4px;border-radius:3px;background:var(--border-2);margin:8px auto 18px}
        .sheet-title{font-size:19px;font-weight:600;margin-bottom:5px}
        .sheet-sub{font-size:13px;color:var(--text-2);margin-bottom:18px}
        .reason-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
        .reason{padding:15px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;font-size:13.5px;cursor:pointer;display:flex;align-items:center;gap:9px;transition:all .15s}
        .reason:active{transform:scale(.97)}
        .reason:hover{border-color:var(--gold)}
        .field{margin-bottom:14px}
        .field label{display:block;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--text-3);margin-bottom:7px}
        .field input,.field textarea,.field select{width:100%;padding:13px 15px;background:var(--bg-card);border:1px solid var(--border);border-radius:13px;color:var(--text);font-size:15px;font-family:inherit}
        .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--gold)}
        .field textarea{resize:vertical;min-height:74px}
        .slot-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
        .slot{padding:9px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:100px;font-size:13px;cursor:pointer}
        .slot.on{border-color:var(--gold);background:var(--gold-light);color:var(--gold)}
        .btn-full{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold-2),var(--gold-dark));border:none;border-radius:14px;color:#000;font-weight:700;font-size:14.5px;cursor:pointer;margin-top:8px}
        .btn-full:active{transform:scale(.99)}
        .btn-ghost{width:100%;padding:14px;background:transparent;border:1px solid var(--border);border-radius:14px;color:var(--text-2);font-weight:500;font-size:14px;cursor:pointer;margin-top:10px}

        /* detail sheet */
        .det-img{width:100%;height:230px;object-fit:cover;border-radius:16px;background:var(--bg-3);margin-bottom:16px}
        .det-img.ph{display:flex;align-items:center;justify-content:center;font-size:52px}
        .det-feats{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
        .det-feats span{padding:8px 13px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;font-size:13px}
        .why{margin-top:8px;padding:14px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px}
        .why-h{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-3);margin-bottom:9px}
        .why-r{font-size:13px;margin-bottom:5px;display:flex;gap:7px}

        /* activity feed */
        .feed-i{display:flex;gap:13px;padding:13px 0;border-bottom:1px solid var(--border)}
        .feed-i:last-child{border:none}
        .feed-ic{width:34px;height:34px;border-radius:10px;background:var(--bg-2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
        .feed-t{font-size:13.5px}

    function api(path, body){

    function sound(type){ try{ if(!actx){var A=window.AudioContext||window.webkitAudioContext; if(A)actx=new A();} if(!actx)return; if(actx.state==='suspended')actx.resume();
      var o=actx.createOscillator(),g=actx.createGain(); o.connect(g); g.connect(actx.destination);
      if(type==='like'){o.frequency.setValueAtTime(523,actx.currentTime);o.frequency.setValueAtTime(659,actx.currentTime+.09);o.frequency.setValueAtTime(784,actx.currentTime+.18);}
      else{o.frequency.setValueAtTime(300,actx.currentTime);o.frequency.setValueAtTime(200,actx.currentTime+.1);}
      g.gain.setValueAtTime(.16,actx.currentTime); g.gain.exponentialRampToValueAtTime(.01,actx.currentTime+.3); o.start(); o.stop(actx.currentTime+.3);
    }catch(e){} }
    function haptic(ms){ try{ if('vibrate' in navigator) navigator.vibrate(ms||10); }catch(e){} }
    var cv=document.getElementById('confetti'), cx=cv.getContext('2d'), parts=[];
    function fitCanvas(){ cv.width=innerWidth; cv.height=innerHeight; } fitCanvas(); addEventListener('resize',fitCanvas);
    function confetti(x,y,n){ var cols=['#D4AF37','#E8C766','#34C759','#fff']; n=n||40;
      for(var i=0;i<n;i++)parts.push({x:x,y:y,vx:(Math.random()-.5)*15,vy:Math.random()*-12-3,c:cols[~~(Math.random()*cols.length)],s:Math.random()*6+3,l:1,r:Math.random()*6});
      animConf(); }
    function animConf(){ if(!parts.length)return; cx.clearRect(0,0,cv.width,cv.height);
      parts=parts.filter(function(p){p.vy+=.2;p.x+=p.vx;p.y+=p.vy;p.l-=.015;p.r+=.2;if(p.l<=0)return false;cx.globalAlpha=Math.max(p.l,0);cx.fillStyle=p.c;cx.save();cx.translate(p.x,p.y);cx.rotate(p.r);cx.fillRect(-p.s/2,-p.s/2,p.s,p.s);cx.restore();return true;});
      if(parts.length)requestAnimationFrame(animConf); }

    function toast(msg, kind){ var el=document.getElementById('toast'); document.getElementById('toastIc').textContent= kind==='err'?'⚠️':'✓'; document.getElementById('toastTx').textContent=msg; el.className='toast show'+(kind?(' '+kind):''); clearTimeout(el._t); el._t=setTimeout(function(){el.className='toast';},2600); }

        if(urlCode){ try{ history.replaceState(null,'',location.pathname); }catch(e){} }

          lastOptionCount = client.stats.options;
          showApp();
          startPolling();

          client = JSON.parse(JSON.stringify(DEMO)); code=c; try{localStorage.setItem('boom_pfs_code',c);}catch(e){}
          lastOptionCount = client.stats.options; showApp();

    function initSwipe(){
      var deck=document.getElementById('deck'); if(!deck)return;
      var cards=deck.querySelectorAll('.pcard'); if(!cards.length)return;
      var card=cards[cards.length-1]; var sx=0,cxp=0,drag=false;
      function start(e){ drag=true; sx=(e.touches?e.touches[0].clientX:e.clientX); card.style.transition='none'; }
      function move(e){ if(!drag)return; cxp=(e.touches?e.touches[0].clientX:e.clientX)-sx; card.style.transform='translateX('+cxp+'px) rotate('+(cxp*0.05)+'deg)'; card.classList.toggle('s-right',cxp>40); card.classList.toggle('s-left',cxp<-40); }
      function end(){ if(!drag)return; drag=false; card.style.transition=''; var id=card.dataset.id; if(cxp>90){onLike(id);} else if(cxp<-90){onReject(id);} else {card.style.transform='';card.classList.remove('s-right','s-left');} cxp=0; }
      card.addEventListener('mousedown',start); card.addEventListener('touchstart',start,{passive:true});
      document.addEventListener('mousemove',move); document.addEventListener('touchmove',move,{passive:true});
      document.addEventListener('mouseup',end); document.addEventListener('touchend',end);
    }
    var cTimers={};
    function cNav(id,dir){ var card=document.querySelector('.pcard[data-id="'+id+'"]'); if(!card)return; var car=card.querySelector('.carousel'); if(!car)return; var imgs=JSON.parse(card.dataset.imgs||'[]'); var i=(parseInt(car.dataset.idx)||0); i=(i+dir+imgs.length)%imgs.length; cGo(id,i); }
    function cGo(id,i){ var card=document.querySelector('.pcard[data-id="'+id+'"]'); if(!card)return; var car=card.querySelector('.carousel'); if(!car)return; car.dataset.idx=i; car.style.transform='translateX(-'+(i*100)+'%)'; card.querySelectorAll('.pdot').forEach(function(d,k){d.classList.toggle('on',k===i);}); haptic(); resetAuto(id); }
    function startCarousels(){ stopCarousels(); setTimeout(function(){ document.querySelectorAll('.pcard').forEach(function(c){ var id=c.dataset.id, imgs=JSON.parse(c.dataset.imgs||'[]'); if(imgs.length>1)cTimers[id]=setInterval(function(){cNav(id,1);},4500); }); },400); }
    function resetAuto(id){ if(cTimers[id])clearInterval(cTimers[id]); var card=document.querySelector('.pcard[data-id="'+id+'"]'); if(!card)return; var imgs=JSON.parse(card.dataset.imgs||'[]'); if(imgs.length>1)cTimers[id]=setInterval(function(){cNav(id,1);},4500); }
    function stopCarousels(){ Object.keys(cTimers).forEach(function(k){clearInterval(cTimers[k]);}); cTimers={}; }

    document.addEventListener('visibilitychange',function(){
      if(document.hidden || !client || !code) return;
      api('lookup',{code:code}).then(function(res){ if(res&&res.ok&&res.client){ var prev=lastOptionCount; client=res.client; if(client.stats.options>prev){lastOptionCount=client.stats.options;showNewAlert();} else {lastOptionCount=client.stats.options; if(tab!=='explore')render();} } });
    });
    </script>
</body>
</html>
