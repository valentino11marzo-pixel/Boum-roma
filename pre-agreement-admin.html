<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Pre-Agreement Generator — BOOM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#FFD700;--gold-light:#FFE5A0;--void:#060607;--card:#0C0C0E;--surface:#111114;--input:#17171B;
  --line:rgba(255,255,255,.09);--line-soft:rgba(255,255,255,.05);--line-gold:rgba(255,215,0,.28);
  --gold-muted:rgba(255,215,0,.12);--gold-faint:rgba(255,215,0,.06);
  --t1:#FFF;--t2:rgba(255,255,255,.72);--t3:rgba(255,255,255,.46);--t4:rgba(255,255,255,.26);
  --green:#3ddc97;--green-muted:rgba(61,220,151,.14);
  --sans:'Helvetica Neue',Helvetica,'Inter',-apple-system,sans-serif;--ease:cubic-bezier(.16,1,.3,1);--safe:env(safe-area-inset-bottom,0px)}
body{font-family:var(--sans);background:var(--void);color:var(--t1);font-weight:300;line-height:1.55;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
nav{position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:rgba(6,6,7,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft)}
.brand{display:flex;align-items:center;gap:10px;color:inherit;text-decoration:none}
.ring{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--gold)}
.brand b{font-weight:300;letter-spacing:4px;font-size:15px}
.tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--t4)}
main{max-width:640px;margin:0 auto;padding:22px 16px calc(60px + var(--safe))}
h1{font-weight:200;font-size:24px;margin-bottom:4px}
.sub{color:var(--t3);font-size:13px;margin-bottom:20px}
.card{border:1px solid var(--line);border-radius:16px;background:var(--card);padding:18px;margin-bottom:14px}
.card h2{font-size:10.5px;letter-spacing:2.2px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:13px}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
@media(max-width:480px){.g3{grid-template-columns:repeat(2,minmax(0,1fr))}}
.fld{display:block;margin-bottom:10px}
.fld span{display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.fld input,.fld select{width:100%;background:var(--input);border:1px solid var(--line);border-radius:10px;color:var(--t1);font-family:inherit;font-size:14.5px;padding:11px 12px;transition:border-color .25s}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--gold)}
.fld.req span::after{content:" *";color:var(--gold)}
.hintline{font-size:11.5px;color:var(--t3);margin-top:-4px;margin-bottom:8px}
.hintline b{color:var(--gold);font-weight:500}
.gbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:linear-gradient(180deg,var(--gold-light),var(--gold));color:#1a1407;font-weight:600;border-radius:100px;padding:15px;font-size:14.5px;margin-top:6px;transition:.25s var(--ease)}
.gbtn:disabled{opacity:.5}
.err{display:none;color:var(--gold-light);font-size:12.5px;margin:10px 0 0;text-align:center}
.result{display:none;border:1px solid var(--line-gold);border-radius:16px;background:linear-gradient(180deg,var(--gold-faint),var(--card));padding:18px;margin-top:14px;text-align:center}
.result .lnk{word-break:break-all;font-size:13px;color:var(--gold);margin:10px 0 14px;display:block}
.rbtns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.obtn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:100px;padding:11px 18px;font-size:13px;background:var(--card);transition:.25s;color:var(--t1);text-decoration:none}
.obtn:hover{border-color:var(--line-gold);color:var(--gold)}
.obtn.wa{border-color:rgba(37,211,102,.4);color:#25D366}
.load{text-align:center;padding:80px 20px;color:var(--t3)}
@media(prefers-reduced-motion:no-preference){.gbtn:active,.obtn:active{transform:scale(.98)}}
</style>
</head>
<body>
<nav><a class="brand" href="/portal"><span class="ring"></span><b>BOOM</b></a><span class="tag">Pre-Agreement Generator</span></nav>

<main>
  <div class="load" id="load">Checking access…</div>
  <div id="app" style="display:none">
    <h1>New pre-agreement</h1>
    <p class="sub">Fill the deal — the client self-completes their identity and signs from the link. Your work ends here.</p>

    <div class="card"><h2>Property &amp; landlord</h2>
      <label class="fld"><span>Prefill from listing</span><select id="fList"><option value="">— manual —</option></select></label>
      <label class="fld req"><span>Address</span><input id="fAddress" placeholder="Via di Sant'Anna 16, Roma"></label>
      <div class="g3">
        <label class="fld"><span>Floor</span><input id="fFloor" placeholder="2nd Floor"></label>
        <label class="fld"><span>Unit</span><input id="fUnit" placeholder=""></label>
        <label class="fld"><span>Condition</span><input id="fCondition" value="Furnished"></label>
      </div>
      <label class="fld req"><span>Landlord name</span><input id="fLandlord" placeholder="Mario Di Capua"></label>
    </div>

    <div class="card"><h2>Lease</h2>
      <div class="g3">
        <label class="fld req"><span>Start date</span><input id="fStart" type="date"></label>
        <label class="fld"><span>Months</span><input id="fMonths" type="number" value="12" min="1" max="48"></label>
        <label class="fld"><span>Type</span><select id="fType"><option>Transitional Lease</option><option>4+4 Residential</option><option>3+2 Concordato</option></select></label>
      </div>
      <label class="fld"><span>Transitional need (5.5)</span><input id="fReason" placeholder="e.g. corso di studi SIOI"></label>
    </div>

    <div class="card"><h2>Money</h2>
      <div class="g3">
        <label class="fld req"><span>Monthly rent €</span><input id="fRent" type="number" inputmode="numeric" placeholder="1200"></label>
        <label class="fld"><span>Deposit (months)</span><input id="fDepM" type="number" value="1" min="0" max="6" step="0.5"></label>
        <label class="fld"><span>Fee % of annual</span><input id="fFeePct" type="number" value="12" min="0" max="30" step="0.5"></label>
      </div>
      <div class="g2">
        <label class="fld"><span>VAT % on fee</span><input id="fVatPct" type="number" value="22" min="0" max="30"></label>
        <label class="fld"><span>Due at signing €</span><input id="fDue" type="number" inputmode="numeric" placeholder="auto = deposit"></label>
      </div>
      <p class="hintline" id="mathLine">—</p>
      <label class="fld"><span>Note on the document (optional)</span><input id="fNote" placeholder="e.g. deposito già versato il 06/07 · IBAN …"></label>
    </div>

    <div class="card"><h2>Client (optional prefill)</h2>
      <div class="g3">
        <label class="fld"><span>Name</span><input id="fTName" placeholder="They can fill it"></label>
        <label class="fld"><span>Email</span><input id="fTEmail" type="email"></label>
        <label class="fld"><span>Phone</span><input id="fTPhone" type="tel"></label>
      </div>
    </div>

    <button class="gbtn" id="goBtn" onclick="createPA()">Create pre-agreement link →</button>
    <p class="err" id="fErr"></p>

    <div class="result" id="result">
      <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)">Link ready</div>
      <a class="lnk" id="rLink" target="_blank" rel="noopener"></a>
      <div class="rbtns">
        <button class="obtn" onclick="copyLink()">Copy link</button>
        <a class="obtn wa" id="rWa" target="_blank" rel="noopener">Send on WhatsApp →</a>
        <a class="obtn" id="rOpen" target="_blank" rel="noopener">Open preview →</a>
      </div>
    </div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="/js/firebase-config.js"></script>
<script src="/js/boom-portal.js"></script>
<script>
(function(){
'use strict';
var USER=null,LISTINGS=[];
var $=function(id){return document.getElementById(id)};
var eur=function(n){var f=Math.round(n*100)%100!==0;return '€'+Number(n).toLocaleString('en-US',{minimumFractionDigits:f?2:0,maximumFractionDigits:2})};

function mathLine(){
  var rent=+$('fRent').value||0,dm=+$('fDepM').value||0,fp=+$('fFeePct').value||0,vp=+$('fVatPct').value||0;
  if(!rent){$('mathLine').textContent='—';return;}
  var dep=Math.round(rent*dm*100)/100,fee=Math.round(rent*12*fp)/100,vat=Math.round(fee*vp)/100;
  $('mathLine').innerHTML='Deposit <b>'+eur(dep)+'</b> · fee <b>'+eur(fee)+'</b> + VAT '+eur(vat)+' = <b>'+eur(fee+vat)+'</b> (due separately) · due at signing default <b>'+eur(+$('fDue').value||dep)+'</b>';
}
['fRent','fDepM','fFeePct','fVatPct','fDue'].forEach(function(id){document.addEventListener('input',function(e){if(e.target.id===id)mathLine();});});

window.createPA=async function(){
  var err=$('fErr');err.style.display='none';
  var address=$('fAddress').value.trim(),landlord=$('fLandlord').value.trim(),start=$('fStart').value,rent=+$('fRent').value||0;
  if(!address||!landlord||!start||rent<=0){err.textContent='Address, landlord, start date and rent are required.';err.style.display='block';return;}
  var btn=$('goBtn');btn.disabled=true;btn.textContent='Creating…';
  try{
    var tok=await USER.getIdToken();
    var sel=$('fList').value;
    var body={
      listingId:sel||null,
      property:{address:address,floor:$('fFloor').value.trim()||null,unit:$('fUnit').value.trim()||null,condition:$('fCondition').value.trim()||'Furnished'},
      landlord:{name:landlord},
      tenant:{fullName:$('fTName').value.trim()||null,email:$('fTEmail').value.trim()||null,phone:$('fTPhone').value.trim()||null},
      lease:{startDate:start,months:+$('fMonths').value||12,type:$('fType').value,reason:$('fReason').value.trim()||null},
      money:{rent:rent,depositMonths:+$('fDepM').value||0,feePct:+$('fFeePct').value||0,feeVatPct:+$('fVatPct').value||0,
        dueAtSigning:$('fDue').value!==''?+$('fDue').value:null},
      note:$('fNote').value.trim()||null
    };
    if(body.money.dueAtSigning==null)delete body.money.dueAtSigning;
    var r=await fetch('/api/preagreement/create',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},body:JSON.stringify(body)});
    var j=await r.json();
    if(!j||!j.ok)throw new Error((j&&j.error)||'failed');
    var url=location.origin+j.url;
    $('rLink').textContent=url;$('rLink').href=url;$('rOpen').href=url;
    var msg='Ciao'+(body.tenant.fullName?' '+body.tenant.fullName.split(' ')[0]:'')+'! Ecco il tuo pre-agreement BOOM per '+address+'. Leggilo e firmalo qui: '+url;
    $('rWa').href='https://wa.me/'+(body.tenant.phone?body.tenant.phone.replace(/[^\d]/g,''):'')+'?text='+encodeURIComponent(msg);
    $('result').style.display='block';$('result').scrollIntoView({behavior:'smooth',block:'center'});
  }catch(e){err.textContent='Could not create the link — '+(e.message||'try again')+'.';err.style.display='block';}
  btn.disabled=false;btn.textContent='Create pre-agreement link →';
};
window.copyLink=function(){try{navigator.clipboard.writeText($('rLink').textContent);}catch(e){}};

function fillFromListing(id){
  var l=LISTINGS.find(function(x){return x.id===id});if(!l)return;
  if(l.address)$('fAddress').value=l.address; else if(l.zone)$('fAddress').value=(l.name?l.name+', ':'')+l.zone+', Roma';
  if(l.price)$('fRent').value=l.price;
  if(l.floor)$('fFloor').value=l.floor;
  if(l.ownerName)$('fLandlord').value=l.ownerName;
  mathLine();
}

BoomPortal.requireAuth(['admin','owner','landlord'],{loginUrl:'/login.html?next=%2Fpre-agreement-admin'}).then(function(res){
  USER=res.user;
  $('load').style.display='none';$('app').style.display='';
  var d=new Date();d.setDate(d.getDate()+14);$('fStart').value=d.toISOString().slice(0,10);
  try{
    firebase.firestore().collection('listings').limit(100).get().then(function(snap){
      snap.forEach(function(doc){var v=doc.data();LISTINGS.push({id:doc.id,name:v.name||v.title,zone:v.zone,price:v.price,address:v.address,floor:v.floor,ownerName:v.ownerName});});
      LISTINGS.sort(function(a,b){return String(a.name).localeCompare(String(b.name))});
      $('fList').innerHTML='<option value="">— manual —</option>'+LISTINGS.map(function(l){return '<option value="'+l.id+'">'+(l.name||l.id)+(l.zone?' · '+l.zone:'')+(l.price?' · €'+l.price:'')+'</option>'}).join('');
      $('fList').addEventListener('change',function(){fillFromListing(this.value)});
    }).catch(function(){});
  }catch(e){}
}).catch(function(){/* requireAuth already redirects to login with ?next= */});
})();
</script>
</body>
</html>
