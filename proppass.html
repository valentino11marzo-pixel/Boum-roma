<style>
:root{--gold:#D4AF37;--gold-dim:#C9A96E;--black:#08080A;--surface:#0D0D0F;--elevated:#141416;--border:rgba(255,255,255,0.06);--text:#FAFAFA;--text-70:rgba(255,255,255,0.7);--text-30:rgba(255,255,255,0.30);--text-15:rgba(255,255,255,0.15);--ease:cubic-bezier(0.22,1,0.36,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Helvetica Neue',-apple-system,sans-serif;background:var(--black);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;font-weight:300}
.shell{max-width:1120px;margin:0 auto;padding:0 2.5rem}
.header{padding:2.5rem 0 0;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:1.2rem}
.brand h1{font-weight:300;font-size:1.1rem;letter-spacing:0.35em;color:var(--gold)}
.brand-sub{font-weight:300;font-size:0.72rem;letter-spacing:0.08em;color:var(--text-30)}
.header-link{font-size:0.68rem;color:var(--text-30);text-decoration:none;letter-spacing:0.06em;font-weight:300}
.header-link:hover{color:var(--gold)}
.tabs{margin:2rem 0 0;display:flex;gap:2px;background:var(--surface);border-radius:14px;padding:4px;border:1px solid var(--border)}
.tab{flex:1;padding:0.85rem 1rem;border:none;background:transparent;color:var(--text-30);border-radius:11px;cursor:pointer;transition:all .35s var(--ease);display:flex;align-items:center;justify-content:center;gap:.6rem;font-family:inherit;font-weight:300;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase}
.tab.active{background:rgba(212,175,55,0.12);color:var(--gold);box-shadow:0 0 0 1px rgba(212,175,55,0.25)}
.workspace{margin:2rem 0 4rem;display:grid;grid-template-columns:1fr 320px;gap:2.5rem;align-items:start}
.form-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.form-header{padding:1.4rem 1.8rem;border-bottom:1px solid var(--border)}
.form-header h2{font-size:.62rem;font-weight:400;letter-spacing:.16em;text-transform:uppercase;color:var(--text-30)}
.form-body{padding:1.8rem}
.fg{margin-bottom:1.2rem}
.fg label{display:block;font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:.4rem;font-weight:400}
.fg input,.fg select,.fg textarea{width:100%;padding:.7rem .85rem;background:var(--black);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.82rem;font-family:inherit;font-weight:300;outline:none;transition:border-color .3s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:rgba(212,175,55,0.4)}
.fg input::placeholder,.fg textarea::placeholder{color:var(--text-15)}
.fg select{appearance:none}
.fg textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.85rem}
.sec{display:none}.sec.active{display:block}
.form-footer{padding:0 1.8rem 1.8rem}
.gen-btn{width:100%;padding:.95rem;background:var(--gold);color:var(--black);border:none;border-radius:12px;font-size:.72rem;font-weight:500;letter-spacing:.14em;cursor:pointer;transition:all .3s var(--ease);text-transform:uppercase;font-family:inherit}
.gen-btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(212,175,55,0.25)}
.gen-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.status-bar{text-align:center;margin-top:.75rem;font-size:.65rem;font-weight:300;color:var(--text-30);min-height:1.1rem}
.status-bar.error{color:#FF4444}.status-bar.ok{color:var(--gold)}
/* Delivery */
.delivery{display:none;margin-top:1.2rem;background:var(--elevated);border:1px solid var(--border);border-radius:14px;padding:1.4rem;text-align:center}
.delivery.show{display:block}
.delivery h3{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:1rem}
.dl-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.2rem;border-radius:10px;font-size:.72rem;font-family:inherit;font-weight:400;cursor:pointer;border:none;transition:all .2s}
.dl-btn.apple{background:#000;color:#fff;border:1px solid rgba(255,255,255,.2)}
.dl-btn.wa{background:#25D366;color:#fff;margin-left:.5rem}
.dl-btn:hover{transform:translateY(-1px)}
/* Preview */
.preview-col{position:sticky;top:2rem}
.preview-label{font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-15);margin-bottom:.8rem}
/* Wallet card */
.wc{border-radius:14px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.5);transition:transform .5s var(--ease)}
.wc:hover{transform:scale(1.02)}
.wc-head{padding:12px 16px 6px;display:flex;justify-content:space-between;align-items:center}
.wc-logo{display:flex;align-items:center;gap:7px}
.wc-logo-dot{width:20px;height:20px;border-radius:5px;background:linear-gradient(135deg,#D4AF37,#B8960C);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#08080A}
.wc-logo-txt{font-size:9px;font-weight:300;letter-spacing:2px;color:var(--gold)}
.wc-type{font-size:7px;letter-spacing:1.5px;color:var(--text-30);text-transform:uppercase}
.wc-strip{padding:10px 16px;background:linear-gradient(135deg,var(--surface),#131315);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.wc-lbl{font-size:5.5px;letter-spacing:1px;color:var(--gold-dim);text-transform:uppercase;opacity:.7}
.wc-val{font-size:13px;color:var(--text);font-weight:300;margin-top:2px}
.wc-val-lg{font-size:16px}
.wc-grid{padding:8px 16px;display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
.wc-grid3{grid-template-columns:1fr 1fr 1fr}
.wc-f .wc-val{font-size:10px;color:var(--text-70)}
.wc-qr{padding:8px 16px;display:flex;justify-content:center;align-items:center;gap:6px;border-top:1px solid var(--border)}
.wc-qr svg{opacity:.25}
.wc-qr span{font-size:6px;color:var(--text-15)}
/* Landlord gold */
.wc-gold{background:linear-gradient(135deg,#1A1508,#2C2210 30%,#1A1508 60%,#0F0D06);border:1px solid rgba(212,175,55,.12)}
.wc-gold .wc-logo-dot{background:linear-gradient(135deg,#D4AF37,#F5D77A)}
.wc-gold .wc-type{color:rgba(212,175,55,.4)}
.wc-gold .wc-lbl{color:rgba(212,175,55,.4)}
.wc-gold .wc-val{color:#E8D5A3}
.wc-gold .wc-qr svg{stroke:rgba(212,175,55,.3)}
.wc-gold .wc-qr span{color:rgba(212,175,55,.2)}
.wc-gold .wc-strip{border-color:rgba(212,175,55,.06);background:linear-gradient(135deg,rgba(212,175,55,.06),transparent)}
/* Dark */
.wc-dark{background:#0A0A0A;border:1px solid var(--border)}
@media(max-width:860px){.workspace{grid-template-columns:1fr}.preview-col{position:static;order:-1;max-width:340px;margin:0 auto}}
@media(max-width:520px){.shell{padding:0 1.2rem}.row2,.row3{grid-template-columns:1fr}}
</style>

<script>
let activeType='viewing',lastBlob=null,lastData={};
const TITLES={viewing:'Viewing Pass',tenant:'Tenant Card',landlord:'Landlord Card',referral:'Referral Pass'};
const g=id=>document.getElementById(id)?.value||'';

// Tabs
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');
  activeType=b.dataset.t;
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+activeType).classList.add('active');
  document.getElementById('formTitle').textContent=TITLES[activeType];
  g('delivery')&&(document.getElementById('delivery').classList.remove('show'));
  render();
}));

// Live preview
document.querySelectorAll('.form-body input,.form-body select,.form-body textarea').forEach(e=>{e.addEventListener('input',render);e.addEventListener('change',render)});

function render(){
  const p=document.getElementById('preview');
  if(activeType==='viewing') p.innerHTML=viewingCard();
  else if(activeType==='tenant') p.innerHTML=tenantCard();
  else if(activeType==='landlord') p.innerHTML=landlordCard();
  else p.innerHTML=referralCard();
}

function viewingCard(){
  return `<div class="wc wc-dark">
    <div class="wc-head"><div class="wc-logo"><div class="wc-logo-dot">B</div><span class="wc-logo-txt">BOOM Rome</span></div><span class="wc-type">Viewing</span></div>
    <div class="wc-strip"><div class="wc-lbl">PROPERTY</div><div class="wc-val wc-val-lg">${esc(g('v-address'))||'Via dei Coronari 42'}</div></div>
    <div class="wc-grid">
      <div class="wc-f"><div class="wc-lbl">DATE</div><div class="wc-val">${fmtD(g('v-date'))||'TBC'}</div></div>
      <div class="wc-f"><div class="wc-lbl">TIME</div><div class="wc-val">${g('v-time')||'14:30'}</div></div>
      <div class="wc-f"><div class="wc-lbl">CLIENT</div><div class="wc-val">${esc(g('v-name'))||'—'}</div></div>
      <div class="wc-f"><div class="wc-lbl">AGENT</div><div class="wc-val">${esc(g('v-agent'))||'Valentino'}</div></div>
      ${g('v-rent')?`<div class="wc-f"><div class="wc-lbl">RENT</div><div class="wc-val" style="color:var(--gold)">€${g('v-rent')}/mo</div></div>`:''}
      ${g('v-rooms')?`<div class="wc-f"><div class="wc-lbl">ROOMS</div><div class="wc-val">${g('v-rooms')}</div></div>`:''}
    </div>
    ${qrSvg()}</div>`;
}

function tenantCard(){
  return `<div class="wc wc-dark">
    <div class="wc-head"><div class="wc-logo"><div class="wc-logo-dot">B</div><span class="wc-logo-txt">BOOM Rome</span></div><span class="wc-type">Tenant</span></div>
    <div style="padding:12px 16px 4px"><div class="wc-lbl">TENANT</div><div class="wc-val" style="font-size:17px;letter-spacing:.5px">${esc(g('t-name'))||'Your Name'}</div></div>
    <div style="padding:4px 16px 8px"><div class="wc-lbl">PROPERTY</div><div class="wc-val" style="font-size:11px">${esc(g('t-address'))||'Property address'}</div></div>
    <div class="wc-grid wc-grid3" style="border-top:1px solid var(--border);padding-top:8px">
      <div class="wc-f"><div class="wc-lbl">FROM</div><div class="wc-val">${fmtD(g('t-start'))||'—'}</div></div>
      <div class="wc-f"><div class="wc-lbl">TO</div><div class="wc-val">${fmtD(g('t-end'))||'—'}</div></div>
      <div class="wc-f"><div class="wc-lbl">RENT</div><div class="wc-val" style="color:var(--gold);font-weight:400">€${g('t-rent')||'—'}</div></div>
    </div>
    ${qrSvg()}</div>`;
}

function landlordCard(){
  return `<div class="wc wc-gold">
    <div class="wc-head"><div class="wc-logo"><div class="wc-logo-dot">B</div><span class="wc-logo-txt">BOOM Rome</span></div><span class="wc-type">Premium Partner</span></div>
    <div style="flex:1;padding:14px 16px 8px">
      <div style="font-size:20px;font-weight:300;color:#E8D5A3;letter-spacing:1px;font-family:Georgia,serif">${esc(g('l-name'))||'Landlord Name'}</div>
      <div style="font-size:7px;letter-spacing:3px;color:rgba(212,175,55,.35);text-transform:uppercase;margin-top:6px">Property Owner</div>
      <div style="display:flex;gap:20px;margin-top:10px">
        <div><div class="wc-lbl">PROPERTIES</div><div class="wc-val" style="font-size:14px;color:var(--gold)">${g('l-count')||'1'}</div></div>
        <div><div class="wc-lbl">SINCE</div><div class="wc-val" style="font-size:14px">${g('l-since')||new Date().getFullYear()}</div></div>
        ${g('l-rent')?`<div><div class="wc-lbl">RENT</div><div class="wc-val" style="font-size:14px;color:var(--gold)">€${g('l-rent')}</div></div>`:''}
      </div>
    </div>
    ${qrSvg('rgba(212,175,55,.3)')}</div>`;
}

function referralCard(){
  return `<div class="wc wc-dark">
    <div class="wc-head"><div class="wc-logo"><div class="wc-logo-dot">B</div><span class="wc-logo-txt">BOOM Rome</span></div><span class="wc-type">Coupon</span></div>
    <div style="padding:8px 16px;background:linear-gradient(135deg,rgba(212,175,55,.1),rgba(212,175,55,.02));border-top:1px solid rgba(212,175,55,.08);border-bottom:1px solid rgba(212,175,55,.08);text-align:center">
      <div style="font-size:8px;letter-spacing:2px;color:rgba(212,175,55,.5);text-transform:uppercase;margin-bottom:3px">Refer a Friend</div>
      <div style="font-size:12px;color:var(--text-70);font-weight:300">Share BOOM. Both get rewarded.</div>
    </div>
    <div style="padding:10px 16px;text-align:center">
      <div class="wc-lbl" style="margin-bottom:4px">YOUR CODE</div>
      <div style="font-size:18px;font-weight:400;color:var(--gold);letter-spacing:4px;font-family:'Courier New',monospace">${esc(g('r-code'))||'BOOM-XXXXXX'}</div>
      <div style="display:flex;justify-content:center;gap:16px;margin-top:8px">
        <div><div class="wc-lbl">REWARD</div><div class="wc-val">${esc(g('r-discount'))||'€100 off'}</div></div>
        <div><div class="wc-lbl">EXPIRES</div><div class="wc-val">${fmtD(g('r-expiry'))||'No expiry'}</div></div>
      </div>
    </div>
    ${qrSvg()}</div>`;
}

function qrSvg(c='rgba(255,255,255,.25)'){return `<div class="wc-qr"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>boomrome.com</span></div>`}
function esc(s){return s?String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';}
function fmtD(s){if(!s)return '';try{return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}catch(e){return s}}

// Collect data per type
function collectData(){
  if(activeType==='viewing') return {clientName:g('v-name'),propertyAddress:g('v-address'),zone:g('v-zone'),rent:g('v-rent'),date:g('v-date'),time:g('v-time'),rooms:g('v-rooms'),agentName:g('v-agent'),listingUrl:g('v-url'),latitude:g('v-lat'),longitude:g('v-lng')};
  if(activeType==='tenant') return {tenantName:g('t-name'),propertyAddress:g('t-address'),startDate:g('t-start'),endDate:g('t-end'),rent:g('t-rent'),contractType:g('t-contract'),deposit:g('t-deposit'),landlordName:g('t-landlord'),iban:g('t-iban'),emergencyPhone:g('t-phone'),latitude:g('t-lat'),longitude:g('t-lng')};
  if(activeType==='landlord') return {landlordName:g('l-name'),propertyAddress:g('l-address'),propertyCount:g('l-count'),since:g('l-since'),rentAmount:g('l-rent'),currentTenant:g('l-tenant'),contractDates:g('l-dates'),cadastral:g('l-cad'),nextPayment:g('l-next')};
  return {referrerName:g('r-name'),referralCode:g('r-code'),discount:g('r-discount'),expirationDate:g('r-expiry'),usesLeft:g('r-uses')?g('r-uses')+' remaining':'Unlimited'};
}

// WhatsApp messages per type
function waMsg(){
  const d=lastData;
  if(activeType==='viewing') return `Hey ${d.clientName||''}! Here's your viewing pass for ${d.propertyAddress||''} on ${fmtD(d.date)||''} at ${d.time||''} 🔑 Add it to your Apple Wallet and you'll get a reminder 30 min before. See you there!`;
  if(activeType==='tenant') return `Welcome home ${d.tenantName||''}! 🏠 Here's your BOOM Tenant Card — add it to your Wallet for easy access to your contract details, IBAN for payments, and emergency contacts.`;
  if(activeType==='landlord') return `Hi ${d.landlordName||''}, here's your BOOM Premium Partner Card ✨ Your property portfolio at a glance, right in your Apple Wallet.`;
  return `Hey ${d.referrerName||''}! Share this referral code with friends looking for an apartment in Rome. You both get €100 credit! 🎁`;
}

function waPhone(){
  if(activeType==='viewing') return g('v-phone');
  if(activeType==='tenant') return g('t-wa');
  if(activeType==='landlord') return g('l-phone');
  return g('r-phone');
}

// Generate
document.getElementById('genBtn').addEventListener('click',async()=>{
  const btn=document.getElementById('genBtn'),st=document.getElementById('status'),del=document.getElementById('delivery');
  btn.disabled=true;btn.textContent='Generating...';st.textContent='';st.className='status-bar';del.classList.remove('show');
  lastData=collectData();
  try{
    const res=await fetch('/api/generate-pass',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:activeType,data:lastData})});
    if(!res.ok){const e=await res.json();throw new Error(e.error||'Generation failed')}
    lastBlob=await res.blob();
    st.textContent='Pass generated successfully';st.className='status-bar ok';
    del.classList.add('show');
  }catch(e){st.textContent=e.message;st.className='status-bar error'}
  finally{btn.disabled=false;btn.textContent=' Generate Pass'}
});

// Download
document.getElementById('dlBtn').addEventListener('click',()=>{
  if(!lastBlob)return;
  const url=URL.createObjectURL(lastBlob),a=document.createElement('a');
  a.href=url;a.download='boom-'+activeType+'-pass.pkpass';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
});

// WhatsApp
document.getElementById('waBtn').addEventListener('click',()=>{
  const phone=waPhone().replace(/[^0-9+]/g,'');
  const msg=encodeURIComponent(waMsg());
  const url=phone?'https://wa.me/'+phone+'?text='+msg:'https://wa.me/?text='+msg;
  window.open(url,'_blank');
});

// Init
const tmrw=new Date();tmrw.setDate(tmrw.getDate()+1);document.getElementById('v-date').value=tmrw.toISOString().split('T')[0];
render();
</script></body></html>
