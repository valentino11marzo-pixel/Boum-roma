<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<meta name="theme-color" content="#08080A">
<meta name="color-scheme" content="dark">
<title>BOOM Cockpit · Preview</title>

<link rel="icon" type="image/png" href="https://www.boomrome.com/BOOMlogogoldicon512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/js/firebase-config.js"></script>

<style>
  /* ═════════════════════════════════════════════════════════════
     DESIGN TOKENS
     ═════════════════════════════════════════════════════════════ */
  :root {
    /* Brand */
    --gold: #D4AF37;
    --gold-bright: #E8C863;
    --gold-dark: #B8960C;
    --gold-soft: rgba(212, 175, 55, 0.12);
    --gold-glow: rgba(212, 175, 55, 0.35);

    /* Surfaces */
    --bg: #08080A;
    --bg-card: #0E0E11;
    --bg-elevated: #16161A;
    --bg-input: #1C1C21;
    --bg-hover: rgba(255, 255, 255, 0.035);
    --bg-active: rgba(255, 255, 255, 0.06);
    --bg-overlay: rgba(0, 0, 0, 0.72);

    /* Borders */
    --border: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.14);
    --border-gold: rgba(212, 175, 55, 0.30);

    /* Text */
    --text: #FAFAFB;
    --text-secondary: #A0A0A8;
    --text-muted: #5A5A66;
    --text-disabled: #3A3A44;

    /* States */
    --success: #2FD37A;
    --success-soft: rgba(47, 211, 122, 0.14);
    --warning: #F5A524;
    --warning-soft: rgba(245, 165, 36, 0.14);
    --danger: #F03B3B;
    --danger-soft: rgba(240, 59, 59, 0.14);
    --info: #4D9BFF;
    --info-soft: rgba(77, 155, 255, 0.14);

    /* Radii */
    --r-xs: 4px;
    --r-sm: 6px;
    --r-md: 8px;
    --r-lg: 12px;
    --r-xl: 16px;
    --r-pill: 100px;

    /* Shadows */
    --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.4);
    --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.4), 0 1px 2px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.5), 0 2px 6px rgba(0, 0, 0, 0.35);
    --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.6), 0 6px 12px rgba(0, 0, 0, 0.4);
    --shadow-gold: 0 0 0 1px var(--border-gold), 0 8px 24px var(--gold-glow);

    /* Easings */
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

    /* Layout */
    --topbar-h: 56px;
    --sidebar-w: 240px;
    --sidebar-w-collapsed: 64px;

    /* Typography */
    --font-sans: 'HelveticaNeue', 'Helvetica Neue', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  }

  /* ═════════════════════════════════════════════════════════════
     RESET & BASE
     ═════════════════════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    font-weight: 300;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }
  ::selection { background: var(--gold); color: #000; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  input, textarea { font: inherit; color: inherit; }
  kbd {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 2px 6px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-xs);
    color: var(--text-secondary);
    box-shadow: 0 1px 0 var(--border);
  }

  /* ═════════════════════════════════════════════════════════════
     AUTH SHIELD (pre-auth + access denied states)
     ═════════════════════════════════════════════════════════════ */
  #auth-shield {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
    flex-direction: column;
    gap: 24px;
    padding: 24px;
  }
  #auth-shield .shield-logo {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold-dark));
    border-radius: 50%;
    box-shadow: 0 0 32px var(--gold-glow);
    animation: pulse-glow 2.4s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 32px var(--gold-glow); }
    50% { box-shadow: 0 0 56px var(--gold-glow); }
  }
  #auth-shield .shield-title {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text);
  }
  #auth-shield .shield-subtitle {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-top: -16px;
  }
  #auth-shield .shield-msg {
    font-size: 14px;
    color: var(--text-secondary);
    text-align: center;
    max-width: 360px;
    line-height: 1.6;
  }
  #auth-shield .shield-cta {
    margin-top: 8px;
    padding: 12px 28px;
    background: var(--gold);
    color: #000;
    border-radius: var(--r-md);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: transform 0.18s var(--ease-spring), box-shadow 0.18s var(--ease-out);
  }
  #auth-shield .shield-cta:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px var(--gold-glow);
  }

  /* ═════════════════════════════════════════════════════════════
     APP LAYOUT
     ═════════════════════════════════════════════════════════════ */
  .app {
    display: grid;
    grid-template-rows: var(--topbar-h) 1fr;
    height: 100vh;
  }
  .app[hidden] { display: none; }
  .app-body {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    overflow: hidden;
    transition: grid-template-columns 0.28s var(--ease-out);
  }
  .app.sidebar-collapsed .app-body {
    grid-template-columns: var(--sidebar-w-collapsed) 1fr;
  }

  /* ═════════════════════════════════════════════════════════════
     TOP BAR
     ═════════════════════════════════════════════════════════════ */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    background: rgba(8, 8, 10, 0.85);
    backdrop-filter: saturate(180%) blur(16px);
    -webkit-backdrop-filter: saturate(180%) blur(16px);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 50;
  }
  .top-bar-left, .top-bar-right {
    display: flex; align-items: center; gap: 16px;
  }
  .top-bar-center {
    display: flex; align-items: center; gap: 12px;
  }
  .sidebar-toggle {
    width: 32px; height: 32px;
    border-radius: var(--r-md);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    transition: background 0.16s, color 0.16s;
  }
  .sidebar-toggle:hover { background: var(--bg-hover); color: var(--text); }
  .sidebar-toggle svg { width: 16px; height: 16px; }

  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-circle {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold-dark));
    border-radius: 50%;
    box-shadow: 0 0 14px var(--gold-glow);
  }
  .logo-text {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .logo-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--gold);
    padding: 3px 7px;
    background: var(--gold-soft);
    border-radius: var(--r-xs);
    margin-left: 4px;
    vertical-align: middle;
  }

  /* Heartbeat badge */
  .heartbeat-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-pill);
    font-size: 12px;
    transition: border-color 0.2s, background 0.2s;
  }
  .heartbeat-badge .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    box-shadow: 0 0 0 0 transparent;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .heartbeat-badge .label {
    color: var(--text-secondary);
    font-weight: 500;
    letter-spacing: 0.4px;
  }
  .heartbeat-badge .time {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .heartbeat-badge.is-live { border-color: rgba(47, 211, 122, 0.22); background: rgba(47, 211, 122, 0.04); }
  .heartbeat-badge.is-live .dot { background: var(--success); box-shadow: 0 0 0 4px rgba(47, 211, 122, 0.18); animation: pulse-dot 1.6s ease-in-out infinite; }
  .heartbeat-badge.is-live .time { color: var(--success); }
  .heartbeat-badge.is-warning { border-color: rgba(245, 165, 36, 0.30); background: rgba(245, 165, 36, 0.04); }
  .heartbeat-badge.is-warning .dot { background: var(--warning); box-shadow: 0 0 0 4px rgba(245, 165, 36, 0.20); }
  .heartbeat-badge.is-warning .time { color: var(--warning); }
  .heartbeat-badge.is-critical { border-color: rgba(240, 59, 59, 0.35); background: rgba(240, 59, 59, 0.05); }
  .heartbeat-badge.is-critical .dot { background: var(--danger); box-shadow: 0 0 0 4px rgba(240, 59, 59, 0.22); animation: pulse-dot 1s ease-in-out infinite; }
  .heartbeat-badge.is-critical .time { color: var(--danger); }
  .heartbeat-badge.is-offline { opacity: 0.6; }
  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.4); }
  }

  /* CmdK trigger */
  .cmdk-trigger {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 12px 6px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    font-size: 12px;
    color: var(--text-secondary);
    min-width: 180px;
    transition: border-color 0.18s, background 0.18s;
  }
  .cmdk-trigger:hover { border-color: var(--border-strong); background: var(--bg-elevated); }
  .cmdk-trigger svg { width: 13px; height: 13px; opacity: 0.7; }
  .cmdk-trigger span:first-of-type { flex: 1; text-align: left; }

  /* User chip */
  .user-chip {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 10px 4px 4px;
    border-radius: var(--r-pill);
    background: var(--bg-card);
    border: 1px solid var(--border);
  }
  .user-avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold-dark));
    color: #000;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .user-email {
    font-size: 12px;
    color: var(--text-secondary);
    max-width: 200px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ═════════════════════════════════════════════════════════════
     SIDEBAR
     ═════════════════════════════════════════════════════════════ */
  .sidebar {
    background: var(--bg);
    border-right: 1px solid var(--border);
    padding: 16px 12px;
    display: flex; flex-direction: column;
    gap: 24px;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .nav-section { display: flex; flex-direction: column; gap: 2px; }
  .nav-section-bottom { margin-top: auto; }
  .nav-section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 8px 12px 4px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border-radius: var(--r-md);
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.14s, color 0.14s;
    position: relative;
    white-space: nowrap;
  }
  .nav-item:hover { background: var(--bg-hover); color: var(--text); }
  .nav-item.is-active {
    background: var(--gold-soft);
    color: var(--gold);
  }
  .nav-item.is-active::before {
    content: '';
    position: absolute; left: 0; top: 8px; bottom: 8px;
    width: 2px;
    background: var(--gold);
    border-radius: 0 2px 2px 0;
    margin-left: -12px;
  }
  .nav-icon {
    font-size: 16px;
    width: 20px; text-align: center;
    flex-shrink: 0;
  }
  .nav-label {
    flex: 1;
    transition: opacity 0.2s;
  }
  .nav-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 7px;
    background: var(--bg-elevated);
    border-radius: var(--r-pill);
    color: var(--text-muted);
    font-weight: 500;
  }
  .nav-item.is-active .nav-badge { background: var(--gold); color: #000; }
  .nav-item.has-urgent .nav-badge { background: var(--danger); color: #fff; animation: pulse-dot 1.8s ease-in-out infinite; }

  /* Collapsed sidebar */
  .app.sidebar-collapsed .nav-label,
  .app.sidebar-collapsed .nav-badge,
  .app.sidebar-collapsed .nav-section-title {
    opacity: 0;
    pointer-events: none;
  }
  .app.sidebar-collapsed .nav-item {
    padding: 10px;
    justify-content: center;
  }
  .app.sidebar-collapsed .nav-item.is-active::before { margin-left: -10px; }

  /* ═════════════════════════════════════════════════════════════
     MAIN PANE
     ═════════════════════════════════════════════════════════════ */
  .main-pane {
    background: var(--bg-card);
    overflow-y: auto;
    padding: 24px 32px;
  }
  .page-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 16px;
    padding-bottom: 20px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .page-title {
    font-size: 24px;
    font-weight: 400;
    letter-spacing: 0.3px;
    color: var(--text);
    display: flex; align-items: center; gap: 12px;
  }
  .page-title-icon {
    font-size: 22px;
    opacity: 0.85;
  }
  .page-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .page-actions { display: flex; gap: 8px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 16px;
    border-radius: var(--r-md);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.4px;
    transition: all 0.16s var(--ease-out);
    border: 1px solid transparent;
  }
  .btn-primary { background: var(--gold); color: #000; font-weight: 600; }
  .btn-primary:hover { background: var(--gold-bright); transform: translateY(-1px); box-shadow: 0 8px 20px var(--gold-glow); }
  .btn-secondary { background: var(--bg-elevated); color: var(--text); border-color: var(--border); }
  .btn-secondary:hover { background: var(--bg-input); border-color: var(--border-strong); }
  .btn-ghost { background: transparent; color: var(--text-secondary); }
  .btn-ghost:hover { background: var(--bg-hover); color: var(--text); }
  .btn-sm { padding: 6px 12px; font-size: 11px; }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 24px;
    text-align: center;
    gap: 16px;
  }
  .empty-icon {
    width: 72px; height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--bg-elevated), var(--bg-card));
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: var(--shadow-md);
  }
  .empty-title {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    margin-top: 8px;
  }
  .empty-desc {
    font-size: 13px;
    color: var(--text-secondary);
    max-width: 440px;
    line-height: 1.7;
  }
  .empty-hint {
    margin-top: 16px;
    padding: 10px 16px;
    background: var(--bg-elevated);
    border: 1px dashed var(--border-strong);
    border-radius: var(--r-md);
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.4px;
    max-width: 480px;
  }

  /* Coming-soon banner inside empty pane */
  .soon-banner {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: var(--gold-soft);
    border: 1px solid var(--border-gold);
    border-radius: var(--r-pill);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
  }

  /* ═════════════════════════════════════════════════════════════
     CMDK PALETTE
     ═════════════════════════════════════════════════════════════ */
  #cmdk-overlay {
    position: fixed; inset: 0;
    background: var(--bg-overlay);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 12vh;
    z-index: 1000;
    animation: fade-in 0.16s var(--ease-out);
  }
  #cmdk-overlay[hidden] { display: none; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  .cmdk-modal {
    width: min(640px, 90vw);
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: slide-down 0.22s var(--ease-out);
  }
  @keyframes slide-down {
    from { transform: translateY(-12px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .cmdk-input {
    width: 100%;
    padding: 18px 20px;
    background: transparent;
    border: none;
    outline: none;
    font-size: 16px;
    font-weight: 300;
    color: var(--text);
    border-bottom: 1px solid var(--border);
  }
  .cmdk-input::placeholder { color: var(--text-muted); font-weight: 300; }
  .cmdk-results {
    max-height: 50vh;
    overflow-y: auto;
    padding: 8px 0;
  }
  .cmdk-group-label {
    padding: 10px 20px 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .cmdk-item {
    display: flex; align-items: center; gap: 14px;
    padding: 11px 20px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .cmdk-item:hover, .cmdk-item.is-selected {
    background: var(--bg-hover);
  }
  .cmdk-item.is-selected {
    background: var(--gold-soft);
  }
  .cmdk-item-icon {
    font-size: 16px;
    width: 22px; text-align: center;
    flex-shrink: 0;
    opacity: 0.85;
  }
  .cmdk-item-label {
    flex: 1;
    font-size: 13px;
    color: var(--text);
  }
  .cmdk-item-hint {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.4px;
  }
  .cmdk-item mark {
    background: transparent;
    color: var(--gold);
    font-weight: 500;
  }
  .cmdk-empty {
    padding: 32px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }
  .cmdk-footer {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    display: flex; gap: 16px; align-items: center;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.4px;
  }
  .cmdk-footer kbd { margin: 0 2px; }

  /* ═════════════════════════════════════════════════════════════
     TOASTS
     ═════════════════════════════════════════════════════════════ */
  #toast-stack {
    position: fixed; top: 72px; right: 20px;
    display: flex; flex-direction: column; gap: 10px;
    z-index: 2000;
    max-width: 360px;
    pointer-events: none;
  }
  .toast {
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-left: 3px solid var(--gold);
    border-radius: var(--r-md);
    padding: 12px 16px;
    box-shadow: var(--shadow-md);
    display: flex; align-items: flex-start; gap: 12px;
    pointer-events: auto;
    animation: slide-in-right 0.28s var(--ease-out);
  }
  .toast.toast-success { border-left-color: var(--success); }
  .toast.toast-warning { border-left-color: var(--warning); }
  .toast.toast-danger { border-left-color: var(--danger); }
  .toast.toast-info { border-left-color: var(--info); }
  .toast-icon { font-size: 16px; flex-shrink: 0; }
  .toast-body { flex: 1; }
  .toast-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .toast-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; line-height: 1.5; }
  .toast-close {
    color: var(--text-muted);
    font-size: 14px; line-height: 1;
    padding: 0;
    transition: color 0.12s;
  }
  .toast-close:hover { color: var(--text); }
  @keyframes slide-in-right {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ═════════════════════════════════════════════════════════════
     MOBILE / RESPONSIVE
     ═════════════════════════════════════════════════════════════ */
  @media (max-width: 880px) {
    .top-bar-center { display: none; }
    .cmdk-trigger { min-width: auto; }
    .cmdk-trigger span:first-of-type { display: none; }
    .user-email { display: none; }
    .user-chip { padding: 4px; }
    .main-pane { padding: 20px 16px; }
    .page-header { flex-direction: column; align-items: flex-start; }
  }
  @media (max-width: 720px) {
    .app-body { grid-template-columns: 0 1fr; }
    .sidebar {
      position: fixed; left: 0; top: var(--topbar-h); bottom: 0;
      width: var(--sidebar-w);
      z-index: 60;
      transform: translateX(-100%);
      transition: transform 0.28s var(--ease-out);
    }
    .app.sidebar-mobile-open .sidebar { transform: translateX(0); }
    .app.sidebar-mobile-open::after {
      content: '';
      position: fixed; inset: var(--topbar-h) 0 0 0;
      background: var(--bg-overlay);
      z-index: 55;
    }
  }

  /* ═════════════════════════════════════════════════════════════
     UTILITIES
     ═════════════════════════════════════════════════════════════ */
  .mono { font-family: var(--font-mono); }
  .text-secondary { color: var(--text-secondary); }
  .text-muted { color: var(--text-muted); }
  .gold { color: var(--gold); }
  [hidden] { display: none !important; }
</style>
</head>

     ═════════════════════════════════════════════════════════════ -->
<div id="toast-stack" aria-live="polite"></div>

<!-- ═════════════════════════════════════════════════════════════
     SCRIPTS
     ═════════════════════════════════════════════════════════════ -->
<script>
(function(){
  'use strict';

  // ───────────────────────────────────────────────────────────
  // CONFIG
  // ───────────────────────────────────────────────────────────
  const COCKPIT = {
    whitelist: ['valentino11marzo@gmail.com'],
    heartbeat: {
      doc: 'heartbeat/mac',          // Firestore path
      warningMs: 2 * 60 * 1000,      // > 2min → yellow
      criticalMs: 5 * 60 * 1000,     // > 5min → red
      offlineMs: 15 * 60 * 1000      // > 15min → offline
    },
    routes: {
      'lead-inbox':    { title: 'Lead Inbox',     icon: '📨', subtitle: 'Live ingestion da Homie · grade A/B/C cadenza differenziata' },
      'action-queue':  { title: 'Action Queue',   icon: '⚡', subtitle: 'Decisioni umane in coda · 1-tap approve / reject / edit' },
      'risk-radar':    { title: 'Risk Radar',     icon: '🎯', subtitle: 'RLI · contratti silenti · documenti mancanti · scadenze 7gg' },
      'contracts':     { title: 'Contracts',      icon: '📝', subtitle: 'Magic link signing · status real-time · audit log immutabile' },
      'deal-composer': { title: 'Deal Composer',  icon: '📊', subtitle: 'Canone OMI · scheda CAF Allegato B · scadenzario fiscale' },
      'settings':      { title: 'Settings',       icon: '⚙️', subtitle: 'Bridge config · LLM tiers · notifiche EmailJS · whitelist' }
    },
    defaultRoute: 'lead-inbox'
  };

  // ───────────────────────────────────────────────────────────
  // STATE
  // ───────────────────────────────────────────────────────────
  const STATE = {
    user: null,
    route: null,
    sidebarCollapsed: false,
    heartbeatLast: null,
    heartbeatUnsub: null,
    cmdkOpen: false,
    cmdkSelected: 0,
    cmdkFiltered: []
  };

  // ───────────────────────────────────────────────────────────
  // DOM HELPERS
  // ───────────────────────────────────────────────────────────
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmt = {
    relTime(ts) {
      if (!ts) return '—';
      const diff = Date.now() - ts;
      if (diff < 1000) return 'now';
      if (diff < 60_000) return Math.floor(diff/1000) + 's ago';
      if (diff < 3_600_000) return Math.floor(diff/60_000) + 'm ago';
      if (diff < 86_400_000) return Math.floor(diff/3_600_000) + 'h ago';
      return Math.floor(diff/86_400_000) + 'd ago';
    }
  };

  // ───────────────────────────────────────────────────────────
  // TOAST
  // ───────────────────────────────────────────────────────────
  const Toast = {
    show({ type = 'info', title, desc, duration = 4000 } = {}) {
      const icons = { success: '✓', warning: '⚠', danger: '✕', info: 'ℹ' };
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.innerHTML = `
        <div class="toast-icon">${icons[type] || icons.info}</div>
        <div class="toast-body">
          <div class="toast-title">${esc(title || '')}</div>
          ${desc ? `<div class="toast-desc">${esc(desc)}</div>` : ''}
        </div>
        <button class="toast-close" aria-label="Close">×</button>
      `;
      el.querySelector('.toast-close').onclick = () => el.remove();
      $('#toast-stack').appendChild(el);
      if (duration) setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; el.style.transition = 'all .24s'; setTimeout(() => el.remove(), 240); }, duration);
    }
  };
  window.Toast = Toast;

  // ───────────────────────────────────────────────────────────
  // AUTH GATE
  // ───────────────────────────────────────────────────────────
  function bootAuth() {
    const shield = $('#auth-shield');
    const msg = $('#auth-msg');
    const cta = $('#auth-cta');

    auth.onAuthStateChanged((user) => {
      if (!user) {
        msg.textContent = 'Devi essere autenticato per accedere al cockpit.';
        cta.hidden = false;
        cta.textContent = 'Accedi al Portal';
        return;
      }
      const email = (user.email || '').toLowerCase().trim();
      if (!COCKPIT.whitelist.includes(email)) {
        msg.innerHTML = `Accesso non autorizzato per <strong style="color:var(--text)">${esc(email)}</strong>.<br>Questa preview è ristretta.`;
        cta.hidden = false;
        cta.textContent = 'Disconnetti';
        cta.onclick = (e) => { e.preventDefault(); auth.signOut(); };
        return;
      }
      STATE.user = user;
      shield.style.transition = 'opacity .3s';
      shield.style.opacity = '0';
      setTimeout(() => { shield.remove(); $('#app').hidden = false; bootApp(); }, 280);
    });
  }

  // ───────────────────────────────────────────────────────────
  // APP BOOT
  // ───────────────────────────────────────────────────────────
  function bootApp() {
    // User chip
    const email = STATE.user.email || '';
    $('#user-email').textContent = email;
    $('#user-avatar').textContent = (email[0] || '?').toUpperCase();

    // Detect platform for ⌘ / Ctrl
    const isMac = navigator.platform.toLowerCase().includes('mac');
    $('#cmdk-kbd').textContent = isMac ? '⌘K' : 'Ctrl+K';

    // Sidebar toggle
    $('#sidebar-toggle').onclick = () => {
      const app = $('#app');
      const isMobile = window.innerWidth <= 720;
      if (isMobile) {
        app.classList.toggle('sidebar-mobile-open');
      } else {
        app.classList.toggle('sidebar-collapsed');
        STATE.sidebarCollapsed = app.classList.contains('sidebar-collapsed');
        try { localStorage.setItem('cockpit.sidebar.collapsed', STATE.sidebarCollapsed ? '1' : '0'); } catch {}
      }
    };
    // Restore sidebar
    try {
      if (localStorage.getItem('cockpit.sidebar.collapsed') === '1') {
        $('#app').classList.add('sidebar-collapsed');
        STATE.sidebarCollapsed = true;
      }
    } catch {}

    // Nav items
    $$('.nav-item[data-route]').forEach(el => {
      el.onclick = (e) => { e.preventDefault(); Router.go(el.dataset.route); };
    });

    // Router
    Router.init();

    // Heartbeat
    Heartbeat.start();

    // CmdK
    CmdK.init();

    // Greeting toast
    Toast.show({
      type: 'success',
      title: 'Cockpit pronto',
      desc: `Benvenuto ${(email.split('@')[0] || '')}. Mac Mini bridge non ancora attivo: heartbeat in attesa.`,
      duration: 5000
    });
  }

  // ───────────────────────────────────────────────────────────
  // ROUTER (hash-based)
  // ───────────────────────────────────────────────────────────
  const Router = {
    init() {
      window.addEventListener('hashchange', () => this.render());
      const initial = location.hash.slice(1) || COCKPIT.defaultRoute;
      this.go(initial);
    },
    go(route) {
      if (!COCKPIT.routes[route]) route = COCKPIT.defaultRoute;
      if (location.hash !== '#' + route) {
        location.hash = route;
        return; // hashchange will trigger render
      }
      this.render();
    },
    render() {
      const route = location.hash.slice(1) || COCKPIT.defaultRoute;
      STATE.route = route;
      const meta = COCKPIT.routes[route];

      // Update nav active
      $$('.nav-item').forEach(el => el.classList.toggle('is-active', el.dataset.route === route));

      // Render main
      const main = $('#main-pane');
      main.innerHTML = `
        <div class="page-header">
          <div>
            <h1 class="page-title">
              <span class="page-title-icon">${meta.icon}</span>
              ${esc(meta.title)}
            </h1>
            <p class="page-subtitle">${esc(meta.subtitle)}</p>
          </div>
          <div class="page-actions">
            <span class="soon-banner">Preview · shell</span>
          </div>
        </div>
        ${Panels[route] ? Panels[route]() : Panels.placeholder(meta)}
      `;

      // Close mobile drawer
      $('#app').classList.remove('sidebar-mobile-open');
    }
  };

  // ───────────────────────────────────────────────────────────
  // PANELS (empty states for now)
  // ───────────────────────────────────────────────────────────
  const Panels = {
    placeholder(meta) {
      return `
        <div class="empty-state">
          <div class="empty-icon">${meta.icon}</div>
          <div class="empty-title">${esc(meta.title)} pannello in arrivo</div>
          <div class="empty-desc">${esc(meta.subtitle)}<br><br>Questo riquadro sarà popolato in un turno successivo, dopo che lo shell è stato approvato. La struttura, il routing e il design system sono pronti — manca solo il contenuto live.</div>
          <div class="empty-hint">route: <span class="gold">#${esc(STATE.route)}</span> · status: shell-only</div>
        </div>
      `;
    },
    'lead-inbox': () => `
      <div class="empty-state">
        <div class="empty-icon">📨</div>
        <div class="empty-title">In attesa di lead da Homie</div>
        <div class="empty-desc">Quando Homie filtra un nuovo lead (Immobiliare, Idealista, WhatsApp), comparirà qui in tempo reale.<br>Grade A → 5 min · B → 30 min · C → 2h · dead → trigger-only · notte 23-07 → queue.</div>
        <div class="empty-hint">listener: onSnapshot('leads').orderBy('createdAt','desc').limit(50) — non ancora attivato</div>
      </div>
    `,
    'action-queue': () => `
      <div class="empty-state">
        <div class="empty-icon">⚡</div>
        <div class="empty-title">Nessuna decisione in coda</div>
        <div class="empty-desc">Le azioni che richiedono il tuo OK arriveranno qui da Tier 2 (Sonnet/Opus quando un lead è A o Homie segnala un caso flagged).<br>1-tap: <span class="gold">Approve</span> · <span class="gold">Reject</span> · <span class="gold">Edit & approve</span>.</div>
        <div class="empty-hint">listener: onSnapshot('action_queue').where('status','==','pending') — non ancora attivato</div>
      </div>
    `,
    'risk-radar': () => `
      <div class="empty-state">
        <div class="empty-icon">🎯</div>
        <div class="empty-title">Nessun rischio aperto</div>
        <div class="empty-desc">RLI in scadenza, contratti silenziosi, asseverazioni mancanti, lead grade A senza follow-up &gt; 24h.<br>Quando un deadline è &lt; 7gg, l'item compare qui con priorità rossa.</div>
        <div class="empty-hint">query: deadlines.where('dueAt','&lt;=', now+7d).where('status','==','open') — non ancora attivata</div>
      </div>
    `,
    'contracts': () => `
      <div class="empty-state">
        <div class="empty-icon">📝</div>
        <div class="empty-title">Magic-link signing</div>
        <div class="empty-desc">Sezione contratti: lista contracts esistenti + bottone per generare 2 magic link (tenant + landlord) copia-incolla.<br>Status real-time, audit log immutabile, pre-arrival pack auto (contratto firmato + RLI + welcome + Apple Wallet pass) al completamento.</div>
        <div class="empty-hint">extend collection: contracts (32 refs) + magicLinks (3 refs) — già esistenti, UI da costruire</div>
      </div>
    `,
    'deal-composer': () => `
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <div class="empty-title">Deal Composer · canone concordato Roma</div>
        <div class="empty-desc">Calcolatore canone con zone OMI complete, fascia A/B/C, requisiti, modificatori (+15% ammobiliato, +10% attico…), scheda CAF Allegato B stampabile, scadenzario fiscale (RLI D+30, cedolare nov/giugno).<br>Output: PDF + JSON salvato in contracts.</div>
        <div class="empty-hint">net new module — nessun calcolo canone OMI in api/ oggi</div>
      </div>
    `,
    'settings': () => `
      <div class="empty-state">
        <div class="empty-icon">⚙️</div>
        <div class="empty-title">Configurazione cockpit</div>
        <div class="empty-desc">Whitelist email · soglie heartbeat · cadenza grade A/B/C/dead · LLM tiers e budget mensile · template notifiche EmailJS · scadenzario fiscale defaults.</div>
        <div class="empty-hint">whitelist attiva: ${esc(COCKPIT.whitelist.join(', '))}</div>
      </div>
    `
  };

  // ───────────────────────────────────────────────────────────
  // HEARTBEAT
  // ───────────────────────────────────────────────────────────
  const Heartbeat = {
    timer: null,
    start() {
      // Listen to heartbeat doc
      try {
        STATE.heartbeatUnsub = db.doc(COCKPIT.heartbeat.doc).onSnapshot(snap => {
          if (snap.exists) {
            const data = snap.data() || {};
            const ts = data.lastPingAt && data.lastPingAt.toMillis ? data.lastPingAt.toMillis() : (data.lastPingAt || null);
            STATE.heartbeatLast = ts;
            this.updateBadge();
          } else {
            STATE.heartbeatLast = null;
            this.updateBadge();
          }
        }, err => {
          console.warn('Heartbeat listener error:', err);
          STATE.heartbeatLast = null;
          this.updateBadge();
        });
      } catch (err) {
        console.warn('Heartbeat init error:', err);
      }
      // Re-render label every 15s
      this.timer = setInterval(() => this.updateBadge(), 15000);
      this.updateBadge();
    },
    updateBadge() {
      const badge = $('#heartbeat-badge');
      const timeEl = $('#heartbeat-time');
      if (!badge || !timeEl) return;

      badge.classList.remove('is-live', 'is-warning', 'is-critical', 'is-offline');
      if (!STATE.heartbeatLast) {
        badge.classList.add('is-offline');
        timeEl.textContent = 'offline';
        return;
      }
      const diff = Date.now() - STATE.heartbeatLast;
      timeEl.textContent = fmt.relTime(STATE.heartbeatLast);
      if (diff > COCKPIT.heartbeat.offlineMs) badge.classList.add('is-offline');
      else if (diff > COCKPIT.heartbeat.criticalMs) badge.classList.add('is-critical');
      else if (diff > COCKPIT.heartbeat.warningMs) badge.classList.add('is-warning');
      else badge.classList.add('is-live');
    }
  };

  // ───────────────────────────────────────────────────────────
  // CMDK PALETTE
  // ───────────────────────────────────────────────────────────
  const CmdK = {
    items: [
      // Navigation
      { group: 'Navigate', icon: '📨', label: 'Lead Inbox',     hint: 'View leads', action: () => Router.go('lead-inbox') },
      { group: 'Navigate', icon: '⚡', label: 'Action Queue',   hint: 'Pending decisions', action: () => Router.go('action-queue') },
      { group: 'Navigate', icon: '🎯', label: 'Risk Radar',     hint: 'Deadlines & risks', action: () => Router.go('risk-radar') },
      { group: 'Navigate', icon: '📝', label: 'Contracts',      hint: 'Magic link signing', action: () => Router.go('contracts') },
      { group: 'Navigate', icon: '📊', label: 'Deal Composer',  hint: 'Canone OMI', action: () => Router.go('deal-composer') },
      { group: 'Navigate', icon: '⚙️', label: 'Settings',       hint: 'Cockpit config', action: () => Router.go('settings') },
      // Actions
      { group: 'Actions', icon: '➕', label: 'New contract',    hint: 'Generate magic links', action: () => { Router.go('contracts'); Toast.show({ type: 'info', title: 'Coming soon', desc: 'UI Contract magic link in arrivo nel prossimo turno.' }); } },
      { group: 'Actions', icon: '💰', label: 'New deal',        hint: 'Compose canone', action: () => { Router.go('deal-composer'); Toast.show({ type: 'info', title: 'Coming soon', desc: 'Deal Composer in arrivo nel prossimo turno.' }); } },
      { group: 'Actions', icon: '🔄', label: 'Reload cockpit',  hint: 'Hard refresh', action: () => location.reload() },
      { group: 'Actions', icon: '🚪', label: 'Sign out',        hint: 'Disconnetti', action: () => auth.signOut() },
      // External
      { group: 'External', icon: '🏠', label: 'Open Portal',    hint: '/portal', action: () => window.open('/portal', '_blank') },
      { group: 'External', icon: '🌐', label: 'Open boomrome.com', hint: 'Public site', action: () => window.open('/', '_blank') },
      { group: 'External', icon: '📊', label: 'Stripe Dashboard',  hint: 'Payments', action: () => window.open('https://dashboard.stripe.com', '_blank') },
      { group: 'External', icon: '🔥', label: 'Firebase Console',  hint: 'Firestore', action: () => window.open('https://console.firebase.google.com/project/boom-property-dashboards', '_blank') }
    ],
    init() {
      // Trigger
      $('#cmdk-trigger').onclick = () => this.open();
      // Keyboard
      document.addEventListener('keydown', (e) => {
        const isCmd = (e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k';
        if (isCmd) { e.preventDefault(); this.toggle(); return; }
        if (!STATE.cmdkOpen) return;
        if (e.key === 'Escape') { this.close(); return; }
        if (e.key === 'ArrowDown') { e.preventDefault(); this.select(STATE.cmdkSelected + 1); return; }
        if (e.key === 'ArrowUp') { e.preventDefault(); this.select(STATE.cmdkSelected - 1); return; }
        if (e.key === 'Enter') {
          e.preventDefault();
          const item = STATE.cmdkFiltered[STATE.cmdkSelected];
          if (item) { this.close(); setTimeout(() => item.action(), 50); }
        }
      });
      // Overlay click to close
      $('#cmdk-overlay').addEventListener('click', (e) => {
        if (e.target.id === 'cmdk-overlay') this.close();
      });
      // Input
      $('#cmdk-input').addEventListener('input', (e) => this.filter(e.target.value));
    },
    open() {
      STATE.cmdkOpen = true;
      $('#cmdk-overlay').hidden = false;
      $('#cmdk-input').value = '';
      this.filter('');
      setTimeout(() => $('#cmdk-input').focus(), 30);
    },
    close() {
      STATE.cmdkOpen = false;
      $('#cmdk-overlay').hidden = true;
    },
    toggle() { STATE.cmdkOpen ? this.close() : this.open(); },
    fuzzy(query, label) {
      query = (query || '').toLowerCase().trim();
      label = label.toLowerCase();
      if (!query) return { match: true, parts: [{ text: label, hit: false }] };
      let qi = 0, parts = [], buf = '', bufHit = false;
      for (let i = 0; i < label.length; i++) {
        const c = label[i];
        const isHit = qi < query.length && c === query[qi];
        if (isHit !== bufHit) {
          if (buf) parts.push({ text: buf, hit: bufHit });
          buf = ''; bufHit = isHit;
        }
        buf += c;
        if (isHit) qi++;
      }
      if (buf) parts.push({ text: buf, hit: bufHit });
      return qi === query.length ? { match: true, parts } : { match: false };
    },
    filter(query) {
      const results = [];
      this.items.forEach(item => {
        const r = this.fuzzy(query, item.label);
        if (r.match) results.push({ ...item, parts: r.parts });
      });
      STATE.cmdkFiltered = results;
      STATE.cmdkSelected = 0;
      this.render();
    },
    render() {
      const out = $('#cmdk-results');
      if (!STATE.cmdkFiltered.length) {
        out.innerHTML = `<div class="cmdk-empty">Nessun risultato</div>`;
        return;
      }
      // Group by group
      const grouped = {};
      STATE.cmdkFiltered.forEach((it, idx) => {
        (grouped[it.group] = grouped[it.group] || []).push({ ...it, _idx: idx });
      });
      let html = '';
      Object.keys(grouped).forEach(group => {
        html += `<div class="cmdk-group-label">${esc(group)}</div>`;
        grouped[group].forEach(it => {
          const labelHtml = (it.parts || [{ text: it.label, hit: false }])
            .map(p => p.hit ? `<mark>${esc(p.text)}</mark>` : esc(p.text)).join('');
          const sel = it._idx === STATE.cmdkSelected ? ' is-selected' : '';
          html += `
            <div class="cmdk-item${sel}" data-idx="${it._idx}">
              <div class="cmdk-item-icon">${it.icon || '·'}</div>
              <div class="cmdk-item-label">${labelHtml}</div>
              <div class="cmdk-item-hint">${esc(it.hint || '')}</div>
            </div>
          `;
        });
      });
      out.innerHTML = html;
      // Click handlers
      out.querySelectorAll('.cmdk-item').forEach(el => {
        el.onclick = () => {
          const idx = parseInt(el.dataset.idx, 10);
          const item = STATE.cmdkFiltered[idx];
          if (item) { this.close(); setTimeout(() => item.action(), 50); }
        };
        el.onmouseenter = () => this.select(parseInt(el.dataset.idx, 10));
      });
    },
    select(idx) {
      const n = STATE.cmdkFiltered.length;
      if (!n) return;
      STATE.cmdkSelected = ((idx % n) + n) % n;
      this.render();
      // Scroll selected into view
      const el = $('#cmdk-results .cmdk-item.is-selected');
      if (el) el.scrollIntoView({ block: 'nearest' });
    }
  };

  // ───────────────────────────────────────────────────────────
  // BOOT
  // ───────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', bootAuth);

})();
</script>
