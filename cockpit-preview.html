<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<meta name="theme-color" content="#08080A">
<meta name="color-scheme" content="dark">
<title>BOOM Cockpit · Preview</title>

<link rel="icon" type="image/png" href="https://www.boomrome.com/BOOMlogogoldicon512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/js/firebase-config.js"></script>

<style>
  /* ═════════════════════════════════════════════════════════════
     DESIGN TOKENS
     ═════════════════════════════════════════════════════════════ */
  :root {
    /* Brand */
    --gold: #D4AF37;
    --gold-bright: #E8C863;
    --gold-dark: #B8960C;
    --gold-soft: rgba(212, 175, 55, 0.12);
    --gold-glow: rgba(212, 175, 55, 0.35);

    /* Surfaces */
    --bg: #08080A;
    --bg-card: #0E0E11;
    --bg-elevated: #16161A;
    --bg-input: #1C1C21;
    --bg-hover: rgba(255, 255, 255, 0.035);
    --bg-active: rgba(255, 255, 255, 0.06);
    --bg-overlay: rgba(0, 0, 0, 0.72);

    /* Borders */
    --border: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.14);
    --border-gold: rgba(212, 175, 55, 0.30);

    /* Text */
    --text: #FAFAFB;
    --text-secondary: #A0A0A8;
    --text-muted: #5A5A66;
    --text-disabled: #3A3A44;

    /* States */
    --success: #2FD37A;
    --success-soft: rgba(47, 211, 122, 0.14);
    --warning: #F5A524;
    --warning-soft: rgba(245, 165, 36, 0.14);
    --danger: #F03B3B;
    --danger-soft: rgba(240, 59, 59, 0.14);
    --info: #4D9BFF;
    --info-soft: rgba(77, 155, 255, 0.14);

    /* Radii */
    --r-xs: 4px;
    --r-sm: 6px;
    --r-md: 8px;
    --r-lg: 12px;
    --r-xl: 16px;
    --r-pill: 100px;

    /* Shadows */
    --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.4);
    --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.4), 0 1px 2px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.5), 0 2px 6px rgba(0, 0, 0, 0.35);
    --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.6), 0 6px 12px rgba(0, 0, 0, 0.4);
    --shadow-gold: 0 0 0 1px var(--border-gold), 0 8px 24px var(--gold-glow);

    /* Easings */
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

    /* Layout */
    --topbar-h: 56px;
    --sidebar-w: 240px;
    --sidebar-w-collapsed: 64px;

    /* Typography */
    --font-sans: 'HelveticaNeue', 'Helvetica Neue', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  }

  /* ═════════════════════════════════════════════════════════════
     RESET & BASE
     ═════════════════════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    font-weight: 300;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }
  ::selection { background: var(--gold); color: #000; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  input, textarea { font: inherit; color: inherit; }
  kbd {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 2px 6px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-xs);
    color: var(--text-secondary);
    box-shadow: 0 1px 0 var(--border);
  }

  /* ═════════════════════════════════════════════════════════════
     AUTH SHIELD (pre-auth + access denied states)
     ═════════════════════════════════════════════════════════════ */
  #auth-shield {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
    flex-direction: column;
    gap: 24px;
    padding: 24px;
  }
  #auth-shield .shield-logo {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold-dark));
    border-radius: 50%;
    box-shadow: 0 0 32px var(--gold-glow);
    animation: pulse-glow 2.4s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 32px var(--gold-glow); }
    50% { box-shadow: 0 0 56px var(--gold-glow); }
  }
  #auth-shield .shield-title {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text);
  }
  #auth-shield .shield-subtitle {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-top: -16px;
  }
  #auth-shield .shield-msg {
    font-size: 14px;
    color: var(--text-secondary);
    text-align: center;
    max-width: 360px;
    line-height: 1.6;
  }
  #auth-shield .shield-cta {
    margin-top: 8px;
    padding: 12px 28px;
    background: var(--gold);
    color: #000;
    border-radius: var(--r-md);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: transform 0.18s var(--ease-spring), box-shadow 0.18s var(--ease-out);
  }
  #auth-shield .shield-cta:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px var(--gold-glow);
  }

  /* ═════════════════════════════════════════════════════════════
     APP LAYOUT
     ═════════════════════════════════════════════════════════════ */
  .app {
    display: grid;
    grid-template-rows: var(--topbar-h) 1fr;
    height: 100vh;
  }
  .app[hidden] { display: none; }
  .app-body {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    overflow: hidden;
    transition: grid-template-columns 0.28s var(--ease-out);
  }
  .app.sidebar-collapsed .app-body {
    grid-template-columns: var(--sidebar-w-collapsed) 1fr;
  }

  /* ═════════════════════════════════════════════════════════════
     TOP BAR
     ═════════════════════════════════════════════════════════════ */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    background: rgba(8, 8, 10, 0.85);
    backdrop-filter: saturate(180%) blur(16px);
    -webkit-backdrop-filter: saturate(180%) blur(16px);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 50;
  }
  .top-bar-left, .top-bar-right {
    display: flex; align-items: center; gap: 16px;
  }
  .top-bar-center {
    display: flex; align-items: center; gap: 12px;
  }
  .sidebar-toggle {
    width: 32px; height: 32px;
    border-radius: var(--r-md);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    transition: background 0.16s, color 0.16s;
  }
  .sidebar-toggle:hover { background: var(--bg-hover); color: var(--text); }
  .sidebar-toggle svg { width: 16px; height: 16px; }

  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-circle {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold-dark));
    border-radius: 50%;
    box-shadow: 0 0 14px var(--gold-glow);
  }
  .logo-text {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .logo-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--gold);
    padding: 3px 7px;
    background: var(--gold-soft);
    border-radius: var(--r-xs);
    margin-left: 4px;
    vertical-align: middle;
  }

  /* Heartbeat badge */
  .heartbeat-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-pill);
    font-size: 12px;
    transition: border-color 0.2s, background 0.2s;
  }
  .heartbeat-badge .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    box-shadow: 0 0 0 0 transparent;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .heartbeat-badge .label {
    color: var(--text-secondary);
    font-weight: 500;
    letter-spacing: 0.4px;
  }
  .heartbeat-badge .time {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .heartbeat-badge.is-live { border-color: rgba(47, 211, 122, 0.22); background: rgba(47, 211, 122, 0.04); }
  .heartbeat-badge.is-live .dot { background: var(--success); box-shadow: 0 0 0 4px rgba(47, 211, 122, 0.18); animation: pulse-dot 1.6s ease-in-out infinite; }
  .heartbeat-badge.is-live .time { color: var(--success); }
  .heartbeat-badge.is-warning { border-color: rgba(245, 165, 36, 0.30); background: rgba(245, 165, 36, 0.04); }
  .heartbeat-badge.is-warning .dot { background: var(--warning); box-shadow: 0 0 0 4px rgba(245, 165, 36, 0.20); }
  .heartbeat-badge.is-warning .time { color: var(--warning); }
  .heartbeat-badge.is-critical { border-color: rgba(240, 59, 59, 0.35); background: rgba(240, 59, 59, 0.05); }
  .heartbeat-badge.is-critical .dot { background: var(--danger); box-shadow: 0 0 0 4px rgba(240, 59, 59, 0.22); animation: pulse-dot 1s ease-in-out infinite; }
  .heartbeat-badge.is-critical .time { color: var(--danger); }
  .heartbeat-badge.is-offline { opacity: 0.6; }
  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.4); }
  }

  /* CmdK trigger */
  .cmdk-trigger {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 12px 6px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    font-size: 12px;
    color: var(--text-secondary);
    min-width: 180px;
    transition: border-color 0.18s, background 0.18s;
  }
  .cmdk-trigger:hover { border-color: var(--border-strong); background: var(--bg-elevated); }
  .cmdk-trigger svg { width: 13px; height: 13px; opacity: 0.7; }
  .cmdk-trigger span:first-of-type { flex: 1; text-align: left; }

  /* User chip */
  .user-chip {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 10px 4px 4px;
    border-radius: var(--r-pill);
    background: var(--bg-card);
    border: 1px solid var(--border);
  }
  .user-avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold-dark));
    color: #000;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .user-email {
    font-size: 12px;
    color: var(--text-secondary);
    max-width: 200px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ═════════════════════════════════════════════════════════════
     SIDEBAR
     ═════════════════════════════════════════════════════════════ */
  .sidebar {
    background: var(--bg);
    border-right: 1px solid var(--border);
    padding: 16px 12px;
    display: flex; flex-direction: column;
    gap: 24px;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .nav-section { display: flex; flex-direction: column; gap: 2px; }
  .nav-section-bottom { margin-top: auto; }
  .nav-section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 8px 12px 4px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border-radius: var(--r-md);
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.14s, color 0.14s;
    position: relative;
    white-space: nowrap;
  }
  .nav-item:hover { background: var(--bg-hover); color: var(--text); }
  .nav-item.is-active {
    background: var(--gold-soft);
    color: var(--gold);
  }
  .nav-item.is-active::before {
    content: '';
    position: absolute; left: 0; top: 8px; bottom: 8px;
    width: 2px;
    background: var(--gold);
    border-radius: 0 2px 2px 0;
    margin-left: -12px;
  }
  .nav-icon {
    font-size: 16px;
    width: 20px; text-align: center;
    flex-shrink: 0;
  }
  .nav-label {
    flex: 1;
    transition: opacity 0.2s;
  }
  .nav-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 7px;
    background: var(--bg-elevated);
    border-radius: var(--r-pill);
    color: var(--text-muted);
    font-weight: 500;
  }
  .nav-item.is-active .nav-badge { background: var(--gold); color: #000; }
  .nav-item.has-urgent .nav-badge { background: var(--danger); color: #fff; animation: pulse-dot 1.8s ease-in-out infinite; }

  /* Collapsed sidebar */
  .app.sidebar-collapsed .nav-label,
  .app.sidebar-collapsed .nav-badge,
  .app.sidebar-collapsed .nav-section-title {
    opacity: 0;
    pointer-events: none;
  }
  .app.sidebar-collapsed .nav-item {
    padding: 10px;
    justify-content: center;
  }
  .app.sidebar-collapsed .nav-item.is-active::before { margin-left: -10px; }

  /* ═════════════════════════════════════════════════════════════
     MAIN PANE
     ═════════════════════════════════════════════════════════════ */
  .main-pane {
    background: var(--bg-card);
    overflow-y: auto;
    padding: 24px 32px;
  }
  .page-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 16px;
    padding-bottom: 20px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .page-title {
    font-size: 24px;
    font-weight: 400;
    letter-spacing: 0.3px;
    color: var(--text);
    display: flex; align-items: center; gap: 12px;
  }
  .page-title-icon {
    font-size: 22px;
    opacity: 0.85;
  }
  .page-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .page-actions { display: flex; gap: 8px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 16px;
    border-radius: var(--r-md);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.4px;
    transition: all 0.16s var(--ease-out);
    border: 1px solid transparent;
  }
  .btn-primary { background: var(--gold); color: #000; font-weight: 600; }
  .btn-primary:hover { background: var(--gold-bright); transform: translateY(-1px); box-shadow: 0 8px 20px var(--gold-glow); }
  .btn-secondary { background: var(--bg-elevated); color: var(--text); border-color: var(--border); }
  .btn-secondary:hover { background: var(--bg-input); border-color: var(--border-strong); }
  .btn-ghost { background: transparent; color: var(--text-secondary); }
  .btn-ghost:hover { background: var(--bg-hover); color: var(--text); }
  .btn-sm { padding: 6px 12px; font-size: 11px; }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 24px;
    text-align: center;
    gap: 16px;
  }
  .empty-icon {
    width: 72px; height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--bg-elevated), var(--bg-card));
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: var(--shadow-md);
  }
  .empty-title {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    margin-top: 8px;
  }
  .empty-desc {
    font-size: 13px;
    color: var(--text-secondary);
    max-width: 440px;
    line-height: 1.7;
  }
  .empty-hint {
    margin-top: 16px;
    padding: 10px 16px;
    background: var(--bg-elevated);
    border: 1px dashed var(--border-strong);
    border-radius: var(--r-md);
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.4px;
    max-width: 480px;
  }

  /* Coming-soon banner inside empty pane */
  .soon-banner {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: var(--gold-soft);
    border: 1px solid var(--border-gold);
    border-radius: var(--r-pill);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
  }

  /* ═════════════════════════════════════════════════════════════
     CMDK PALETTE
     ═════════════════════════════════════════════════════════════ */
  #cmdk-overlay {
    position: fixed; inset: 0;
    background: var(--bg-overlay);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 12vh;
    z-index: 1000;
    animation: fade-in 0.16s var(--ease-out);
  }
  #cmdk-overlay[hidden] { display: none; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  .cmdk-modal {
    width: min(640px, 90vw);
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: slide-down 0.22s var(--ease-out);
  }
  @keyframes slide-down {
    from { transform: translateY(-12px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .cmdk-input {
    width: 100%;
    padding: 18px 20px;
    background: transparent;
    border: none;
    outline: none;
    font-size: 16px;
    font-weight: 300;
    color: var(--text);
    border-bottom: 1px solid var(--border);
  }
  .cmdk-input::placeholder { color: var(--text-muted); font-weight: 300; }
  .cmdk-results {
    max-height: 50vh;
    overflow-y: auto;
    padding: 8px 0;
  }
  .cmdk-group-label {
    padding: 10px 20px 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .cmdk-item {
    display: flex; align-items: center; gap: 14px;
    padding: 11px 20px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .cmdk-item:hover, .cmdk-item.is-selected {
    background: var(--bg-hover);
  }
  .cmdk-item.is-selected {
    background: var(--gold-soft);
  }
  .cmdk-item-icon {
    font-size: 16px;
    width: 22px; text-align: center;
    flex-shrink: 0;
    opacity: 0.85;
  }
  .cmdk-item-label {
    flex: 1;
    font-size: 13px;
    color: var(--text);
  }
  .cmdk-item-hint {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.4px;
  }
  .cmdk-item mark {
    background: transparent;
    color: var(--gold);
    font-weight: 500;
  }
  .cmdk-empty {
    padding: 32px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }
  .cmdk-footer {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    display: flex; gap: 16px; align-items: center;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.4px;
  }
  .cmdk-footer kbd { margin: 0 2px; }

  /* ═════════════════════════════════════════════════════════════
     TOASTS
     ═════════════════════════════════════════════════════════════ */
  #toast-stack {
    position: fixed; top: 72px; right: 20px;
    display: flex; flex-direction: column; gap: 10px;
    z-index: 2000;
    max-width: 360px;
    pointer-events: none;
  }
  .toast {
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-left: 3px solid var(--gold);
    border-radius: var(--r-md);
    padding: 12px 16px;
    box-shadow: var(--shadow-md);
    display: flex; align-items: flex-start; gap: 12px;
    pointer-events: auto;
    animation: slide-in-right 0.28s var(--ease-out);
  }
  .toast.toast-success { border-left-color: var(--success); }
  .toast.toast-warning { border-left-color: var(--warning); }
  .toast.toast-danger { border-left-color: var(--danger); }
  .toast.toast-info { border-left-color: var(--info); }
  .toast-icon { font-size: 16px; flex-shrink: 0; }
  .toast-body { flex: 1; }
  .toast-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .toast-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; line-height: 1.5; }
  .toast-close {
    color: var(--text-muted);
    font-size: 14px; line-height: 1;
    padding: 0;
    transition: color 0.12s;
  }
  .toast-close:hover { color: var(--text); }
  @keyframes slide-in-right {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ═════════════════════════════════════════════════════════════
     LEAD INBOX
     ═════════════════════════════════════════════════════════════ */
  .lead-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .lead-filters {
    display: inline-flex; gap: 4px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-pill);
    padding: 4px;
  }
  .lead-filter-btn {
    padding: 6px 14px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.4px;
    border-radius: var(--r-pill);
    cursor: pointer;
    transition: all 0.16s var(--ease-out);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .lead-filter-btn:hover { color: var(--text); }
  .lead-filter-btn.is-active {
    background: var(--gold-soft);
    color: var(--gold);
  }
  .lead-filter-count {
    font-size: 10px;
    padding: 1px 6px;
    background: var(--bg-card);
    border-radius: 10px;
    color: var(--text-muted);
  }
  .lead-filter-btn.is-active .lead-filter-count {
    background: rgba(212,175,55,0.2);
    color: var(--gold);
  }

  .lead-summary {
    display: flex; align-items: center; gap: 12px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.6px;
    text-transform: uppercase;
  }
  .lead-summary strong { color: var(--text); font-weight: 500; }

  .lead-list {
    display: flex; flex-direction: column;
    gap: 10px;
  }

  .lead-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 16px 18px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: flex-start;
    transition: border-color 0.16s, transform 0.16s;
    position: relative;
    overflow: hidden;
  }
  .lead-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--border);
    transition: background 0.16s;
  }
  .lead-card:hover { border-color: var(--border-strong); }
  .lead-card.is-fresh::before { background: var(--gold); }
  .lead-card.is-warning::before { background: var(--warning); }
  .lead-card.is-late::before { background: var(--danger); }
  .lead-card.is-discarded { opacity: 0.45; }
  .lead-card.is-converted::before { background: var(--success); }

  .lead-grade {
    width: 38px; height: 38px;
    border-radius: var(--r-md);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0;
    border: 1px solid var(--border-strong);
    flex-shrink: 0;
  }
  .lead-grade.grade-A { background: rgba(212,175,55,0.14); color: var(--gold); border-color: rgba(212,175,55,0.4); }
  .lead-grade.grade-B { background: rgba(46,143,255,0.12); color: #6FB1FF; border-color: rgba(46,143,255,0.35); }
  .lead-grade.grade-C { background: rgba(255,255,255,0.05); color: var(--text-secondary); }
  .lead-grade.grade-dead { background: rgba(255,255,255,0.03); color: var(--text-muted); font-size: 12px; }

  .lead-body { min-width: 0; }
  .lead-row-1 {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .lead-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.2px;
  }
  .lead-flag { font-size: 12px; }

  .lead-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-pill);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .lead-pill.is-new { background: var(--gold-soft); color: var(--gold); border-color: var(--border-gold); }
  .lead-pill.is-responded { background: rgba(46,143,255,0.1); color: #6FB1FF; border-color: rgba(46,143,255,0.3); }
  .lead-pill.is-converted { background: rgba(34,197,94,0.1); color: var(--success); border-color: rgba(34,197,94,0.3); }
  .lead-pill.is-discarded { background: rgba(255,255,255,0.03); color: var(--text-muted); }
  .lead-pill.is-source { background: transparent; }

  .lead-row-2 {
    font-size: 12.5px;
    color: var(--text-secondary);
    line-height: 1.55;
    display: flex; flex-wrap: wrap; gap: 4px 14px;
  }
  .lead-row-2 .data { display: inline-flex; align-items: center; gap: 4px; }
  .lead-row-2 .data .gold { color: var(--gold); font-weight: 500; }

  .lead-note {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    font-style: italic;
    border-left: 2px solid var(--border);
    padding-left: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .lead-actions {
    margin-top: 10px;
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .lead-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.3px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.14s var(--ease-out);
  }
  .lead-btn:hover {
    background: var(--bg-hover);
    color: var(--text);
    border-color: var(--border-strong);
  }
  .lead-btn.primary {
    background: var(--gold-soft);
    color: var(--gold);
    border-color: var(--border-gold);
  }
  .lead-btn.primary:hover { background: rgba(212,175,55,0.22); color: var(--gold); }
  .lead-btn.success { color: var(--success); border-color: rgba(34,197,94,0.3); }
  .lead-btn.success:hover { background: rgba(34,197,94,0.1); }
  .lead-btn.muted { color: var(--text-muted); }
  .lead-btn.danger { color: var(--text-muted); }
  .lead-btn.danger:hover { color: var(--danger); border-color: rgba(255,59,48,0.3); }

  .lead-meta {
    text-align: right;
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
    flex-shrink: 0;
  }
  .lead-time { font-family: var(--font-mono); }
  .lead-sla {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px;
    border-radius: var(--r-pill);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.4px;
    font-family: var(--font-mono);
  }
  .lead-sla.is-fresh { background: var(--gold-soft); color: var(--gold); }
  .lead-sla.is-warning { background: rgba(247,159,31,0.1); color: var(--warning); }
  .lead-sla.is-late { background: rgba(255,59,48,0.1); color: var(--danger); }
  .lead-sla.is-night { background: rgba(255,255,255,0.04); color: var(--text-muted); }
  .lead-sla.is-done { background: rgba(34,197,94,0.1); color: var(--success); }

  @media (max-width: 720px) {
    .lead-card { grid-template-columns: auto 1fr; }
    .lead-meta { grid-column: 2; text-align: left; align-items: flex-start; margin-top: 4px; }
    .lead-toolbar { flex-direction: column; align-items: stretch; }
  }

  /* ═════════════════════════════════════════════════════════════
     MOBILE / RESPONSIVE
     ═════════════════════════════════════════════════════════════ */
  @media (max-width: 880px) {
    .top-bar-center { display: none; }
    .cmdk-trigger { min-width: auto; }
    .cmdk-trigger span:first-of-type { display: none; }
    .user-email { display: none; }
    .user-chip { padding: 4px; }
    .main-pane { padding: 20px 16px; }
    .page-header { flex-direction: column; align-items: flex-start; }
  }
  @media (max-width: 720px) {
    .app-body { grid-template-columns: 0 1fr; }
    .sidebar {
      position: fixed; left: 0; top: var(--topbar-h); bottom: 0;
      width: var(--sidebar-w);
      z-index: 60;
      transform: translateX(-100%);
      transition: transform 0.28s var(--ease-out);
    }
    .app.sidebar-mobile-open .sidebar { transform: translateX(0); }
    .app.sidebar-mobile-open::after {
      content: '';
      position: fixed; inset: var(--topbar-h) 0 0 0;
      background: var(--bg-overlay);
      z-index: 55;
    }
  }

  /* ═════════════════════════════════════════════════════════════
     UTILITIES
     ═════════════════════════════════════════════════════════════ */
  .mono { font-family: var(--font-mono); }
  .text-secondary { color: var(--text-secondary); }
  .text-muted { color: var(--text-muted); }
  .gold { color: var(--gold); }
  [hidden] { display: none !important; }
</style>
</head>

<body>

<!-- ═════════════════════════════════════════════════════════════
     AUTH SHIELD
     ═════════════════════════════════════════════════════════════ -->
<div id="auth-shield">
  <div class="shield-logo"></div>
  <div class="shield-title">BOOM</div>
  <div class="shield-subtitle">Cockpit · Preview</div>
  <div class="shield-msg" id="auth-msg">Verifico autenticazione...</div>
  <a href="/login" class="shield-cta" id="auth-cta" hidden>Accedi</a>
</div>

<!-- ═════════════════════════════════════════════════════════════
     APP

      </button>

<!-- ═════════════════════════════════════════════════════════════
     TOAST STACK
     ═════════════════════════════════════════════════════════════ -->
<div id="toast-stack" aria-live="polite"></div>

<!-- ═════════════════════════════════════════════════════════════
     SCRIPTS
     ═════════════════════════════════════════════════════════════ -->
<script>
(function(){
  'use strict';

  // ───────────────────────────────────────────────────────────
  // CONFIG
  // ───────────────────────────────────────────────────────────
  const COCKPIT = {
    whitelist: ['valentino11marzo@gmail.com', 'valentino@boom-rome.com'],
    heartbeat: {
      doc: 'heartbeat/mac',          // Firestore path
      warningMs: 2 * 60 * 1000,      // > 2min → yellow
      criticalMs: 5 * 60 * 1000,     // > 5min → red
      offlineMs: 15 * 60 * 1000      // > 15min → offline
    },
    routes: {
      'lead-inbox':    { title: 'Lead Inbox',     icon: '📨', subtitle: 'Live ingestion da Homie · grade A/B/C cadenza differenziata' },
      'action-queue':  { title: 'Action Queue',   icon: '⚡', subtitle: 'Decisioni umane in coda · 1-tap approve / reject / edit' },
      'risk-radar':    { title: 'Risk Radar',     icon: '🎯', subtitle: 'RLI · contratti silenti · documenti mancanti · scadenze 7gg' },
      'contracts':     { title: 'Contracts',      icon: '📝', subtitle: 'Magic link signing · status real-time · audit log immutabile' },
      'deal-composer': { title: 'Deal Composer',  icon: '📊', subtitle: 'Canone OMI · scheda CAF Allegato B · scadenzario fiscale' },
      'settings':      { title: 'Settings',       icon: '⚙️', subtitle: 'Bridge config · LLM tiers · notifiche EmailJS · whitelist' }
    },
    defaultRoute: 'lead-inbox'
  };

  // ───────────────────────────────────────────────────────────
  // STATE
  // ───────────────────────────────────────────────────────────
  const STATE = {
    user: null,
    route: null,
    sidebarCollapsed: false,
    heartbeatLast: null,
    heartbeatUnsub: null,
    cmdkOpen: false,
    cmdkSelected: 0,
    cmdkFiltered: [],
    // Lead inbox
    leads: [],
    leadsUnsub: null,
    leadsFilter: 'new',
    leadsTimerId: null
  };

  // ───────────────────────────────────────────────────────────
  // DOM HELPERS
  // ───────────────────────────────────────────────────────────
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmt = {
    relTime(ts) {
      if (!ts) return '—';
      const diff = Date.now() - ts;
      if (diff < 1000) return 'now';
      if (diff < 60_000) return Math.floor(diff/1000) + 's ago';
      if (diff < 3_600_000) return Math.floor(diff/60_000) + 'm ago';
      if (diff < 86_400_000) return Math.floor(diff/3_600_000) + 'h ago';
      return Math.floor(diff/86_400_000) + 'd ago';
    }
  };

  // ───────────────────────────────────────────────────────────
  // TOAST
  // ───────────────────────────────────────────────────────────
  const Toast = {
    show({ type = 'info', title, desc, duration = 4000 } = {}) {
      const icons = { success: '✓', warning: '⚠', danger: '✕', info: 'ℹ' };
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.innerHTML = `
        <div class="toast-icon">${icons[type] || icons.info}</div>
        <div class="toast-body">
          <div class="toast-title">${esc(title || '')}</div>
          ${desc ? `<div class="toast-desc">${esc(desc)}</div>` : ''}
        </div>
        <button class="toast-close" aria-label="Close">×</button>
      `;
      el.querySelector('.toast-close').onclick = () => el.remove();
      $('#toast-stack').appendChild(el);
      if (duration) setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; el.style.transition = 'all .24s'; setTimeout(() => el.remove(), 240); }, duration);
    }
  };
  window.Toast = Toast;

  // ───────────────────────────────────────────────────────────
  // AUTH GATE
  // ───────────────────────────────────────────────────────────
  function bootAuth() {
    const shield = $('#auth-shield');
    const msg = $('#auth-msg');
    const cta = $('#auth-cta');

    auth.onAuthStateChanged((user) => {
      if (!user) {
        msg.textContent = 'Devi essere autenticato per accedere al cockpit.';
        cta.hidden = false;
        cta.textContent = 'Accedi al Portal';
        return;
      }
      const email = (user.email || '').toLowerCase().trim();
      if (!COCKPIT.whitelist.includes(email)) {
        msg.innerHTML = `Accesso non autorizzato per <strong style="color:var(--text)">${esc(email)}</strong>.<br>Questa preview è ristretta.`;
        cta.hidden = false;
        cta.textContent = 'Disconnetti';
        cta.onclick = (e) => { e.preventDefault(); auth.signOut(); };
        return;
      }
      STATE.user = user;
      shield.style.transition = 'opacity .3s';
      shield.style.opacity = '0';
      setTimeout(() => { shield.remove(); $('#app').hidden = false; bootApp(); }, 280);
    });
  }

  // ───────────────────────────────────────────────────────────
  // APP BOOT
  // ───────────────────────────────────────────────────────────
  function bootApp() {
    // User chip
    const email = STATE.user.email || '';
    $('#user-email').textContent = email;
    $('#user-avatar').textContent = (email[0] || '?').toUpperCase();

    // Detect platform for ⌘ / Ctrl
    const isMac = navigator.platform.toLowerCase().includes('mac');
    $('#cmdk-kbd').textContent = isMac ? '⌘K' : 'Ctrl+K';

    // Sidebar toggle
    $('#sidebar-toggle').onclick = () => {
      const app = $('#app');
      const isMobile = window.innerWidth <= 720;
      if (isMobile) {
        app.classList.toggle('sidebar-mobile-open');
      } else {
        app.classList.toggle('sidebar-collapsed');
        STATE.sidebarCollapsed = app.classList.contains('sidebar-collapsed');
        try { localStorage.setItem('cockpit.sidebar.collapsed', STATE.sidebarCollapsed ? '1' : '0'); } catch {}
      }
    };
    // Restore sidebar
    try {
      if (localStorage.getItem('cockpit.sidebar.collapsed') === '1') {
        $('#app').classList.add('sidebar-collapsed');
        STATE.sidebarCollapsed = true;
      }
    } catch {}

    // Nav items
    $$('.nav-item[data-route]').forEach(el => {
      el.onclick = (e) => { e.preventDefault(); Router.go(el.dataset.route); };
    });

    // Router
    Router.init();

    // Heartbeat
    Heartbeat.start();

    // Lead inbox listener (always-on so the sidebar badge stays live)
    LeadStore.start();

    // CmdK
    CmdK.init();

    // Greeting toast
    Toast.show({
      type: 'success',
      title: 'Cockpit pronto',
      desc: `Benvenuto ${(email.split('@')[0] || '')}. Mac Mini bridge non ancora attivo: heartbeat in attesa.`,
      duration: 5000
    });
  }

  // ───────────────────────────────────────────────────────────
  // ROUTER (hash-based)
  // ───────────────────────────────────────────────────────────
  const Router = {
    init() {
      window.addEventListener('hashchange', () => this.render());
      const initial = location.hash.slice(1) || COCKPIT.defaultRoute;
      this.go(initial);
    },
    go(route) {
      if (!COCKPIT.routes[route]) route = COCKPIT.defaultRoute;
      if (location.hash !== '#' + route) {
        location.hash = route;
        return; // hashchange will trigger render
      }
      this.render();
    },
    render() {
      const route = location.hash.slice(1) || COCKPIT.defaultRoute;
      STATE.route = route;

  // ───────────────────────────────────────────────────────────
  // LEAD STORE — Firestore listener + grade/SLA logic + actions
  // ───────────────────────────────────────────────────────────
  const LeadStore = {
    /** Start the global listener. Always-on after bootApp(): updates the
     *  sidebar badge in real time even when you're not on this panel. */
    start() {
      try {
        STATE.leadsUnsub = db.collection('leads')
          .orderBy('createdAt', 'desc')
          .limit(50)
          .onSnapshot(snap => {
            STATE.leads = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            this.updateBadge();
            if (STATE.route === 'lead-inbox') this.renderPanel();
          }, err => {
            console.warn('[LeadStore]', err);
            const panel = $('#lead-panel');
            if (panel) panel.innerHTML = `
              <div class="empty-state">
                <div class="empty-icon">⚠</div>
                <div class="empty-title">Errore di accesso a Firestore</div>
                <div class="empty-desc">${esc(err.message || err)}</div>
                <div class="empty-hint">collection: leads · verifica regole sicurezza</div>
              </div>`;
          });

        // SLA countdown re-render every 30s (no re-fetch)
        STATE.leadsTimerId = setInterval(() => {
          if (STATE.route === 'lead-inbox') this.renderPanel();
        }, 30000);
      } catch (e) {
        console.error('[LeadStore.start]', e);
      }
    },

    /** Heuristic grade: A/B/C/dead, calculated client-side.
     *  Real Homie pipeline will eventually write this server-side. */
    gradeOf(l) {
      if (l.grade) return l.grade; // honor server-set value when present
      if (l.status === 'discarded') return 'dead';
      const hasContact = !!(l.email || l.leadEmail || l.phone || l.leadPhone);
      if (!hasContact) return 'dead';
      const budget = Number(l.budget) || 0;
      const hasDetail = !!(l.intakeForm || l.zone || l.situation || l.notes || l.propertyTitle);
      // Worker + high budget + filled intake → A
      if (budget >= 1500 && hasDetail) return 'A';
      if (l.situation === 'worker' && budget >= 1000 && hasDetail) return 'A';
      if (budget >= 1000 || (hasDetail && budget >= 700)) return 'B';
      return 'C';
    },

    /** SLA target by grade (minutes). dead → no target. */
    slaTarget(grade) {
      return ({ A: 5, B: 30, C: 120, dead: null })[grade];
    },

    /** Compute SLA state for a lead. Returns { state, label } where state ∈
     *  fresh|warning|late|night|done. Respects the 23:00–07:00 night queue
     *  rule: late leads received at night are treated as 'night' not 'late'. */
    slaInfo(l, grade) {
      if (l.status === 'responded' || l.status === 'converted') return { state: 'done', label: 'risposto' };
      if (l.status === 'discarded') return { state: 'night', label: 'scartato' };
      const target = this.slaTarget(grade);
      if (target == null) return { state: 'night', label: 'no SLA' };
      const created = l.createdAt?.toDate ? l.createdAt.toDate() : (l.createdAt ? new Date(l.createdAt) : null);
      if (!created) return { state: 'night', label: '—' };
      const now = new Date();
      const elapsedMs = now - created;
      const elapsedMin = elapsedMs / 60000;
      const hourReceived = created.getHours();
      const isNight = hourReceived >= 23 || hourReceived < 7;
      const remainingMin = target - elapsedMin;
      if (remainingMin >= 0) {
        const m = Math.ceil(remainingMin);
        return { state: m <= Math.max(1, target * 0.3) ? 'warning' : 'fresh', label: `${m}m left` };
      }
      // Past SLA
      if (isNight) return { state: 'night', label: 'night queue' };
      const lateMin = Math.floor(-remainingMin);
      return { state: 'late', label: lateMin < 60 ? `+${lateMin}m late` : `+${Math.floor(lateMin / 60)}h late` };
    },

    /** Phone number normalization for WhatsApp deep-link. */
    waLink(phone) {
      if (!phone) return null;
      const clean = String(phone).replace(/[^0-9+]/g, '').replace(/^\+/, '');
      return clean ? `https://wa.me/${clean}` : null;
    },

    /** Friendly relative time: "5m fa", "2h fa", "ieri". */
    timeAgo(ts) {
      if (!ts) return '';
      const d = ts?.toDate ? ts.toDate() : new Date(ts);
      const diff = Date.now() - d.getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1) return 'adesso';
      if (m < 60) return `${m}m fa`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h fa`;
      const days = Math.floor(h / 24);
      if (days === 1) return 'ieri';
      if (days < 7) return `${days}g fa`;
      return d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
    },

    /** Update sidebar badge with count of NEW leads (status='new' or undefined). */
    updateBadge() {
      const el = $('#badge-leads');
      if (!el) return;
      const count = STATE.leads.filter(l => !l.status || l.status === 'new').length;
      el.textContent = count;
      el.style.display = count > 0 ? '' : 'none';
    },

    /** Counts per status, for the filter pills. */
    counts() {
      const c = { all: STATE.leads.length, new: 0, responded: 0, converted: 0, discarded: 0 };
      for (const l of STATE.leads) {
        const s = l.status || 'new';
        if (c[s] != null) c[s]++;
      }
      return c;
    },

    /** Filter the current leads list according to STATE.leadsFilter. */
    filtered() {
      const f = STATE.leadsFilter;
      if (f === 'all') return STATE.leads;
      return STATE.leads.filter(l => (l.status || 'new') === f);
    },

    /** Detect source: Homie / Immobiliare / Idealista / Intake Form / Web. */
    sourceOf(l) {
      const s = (l.source || l.service || '').toLowerCase();
      if (l.intakeForm) return 'Intake';
      if (s.includes('homie')) return 'Homie';
      if (s.includes('immobiliare')) return 'Immobiliare';
      if (s.includes('idealista')) return 'Idealista';
      if (s.includes('whats')) return 'WhatsApp';
      if (l.propertyTitle) return 'Property';
      return l.source || 'Web';
    },

    /** Render one lead card. */
    renderCard(l) {
      const status = l.status || 'new';
      const grade = this.gradeOf(l);
      const sla = this.slaInfo(l, grade);
      const cardClass = ['lead-card'];
      if (status === 'discarded') cardClass.push('is-discarded');
      else if (status === 'converted') cardClass.push('is-converted');
      else if (sla.state === 'late') cardClass.push('is-late');
      else if (sla.state === 'warning') cardClass.push('is-warning');
      else if (sla.state === 'fresh') cardClass.push('is-fresh');

      const name = l.name || l.leadName || 'Sconosciuto';
      const flag = (l.language === 'en' || l.language === 'EN') ? '🇬🇧' : '🇮🇹';
      const source = this.sourceOf(l);

      const budget = Number(l.budget) || null;
      const zone = l.zone;
      const situation = l.situation;
      const sitIcon = situation === 'worker' ? '💼' : situation === 'student' ? '🎓' : situation === 'visitor' || situation === 'tourist' ? '✈️' : '';

      const propTitle = l.propertyTitle;
      const propPrice = l.propertyPrice ? Number(l.propertyPrice) : null;

      const note = l.notes || l.message || l.leadMessage;
      const phone = l.phone || l.leadPhone;
      const email = l.email || l.leadEmail;
      const wa = this.waLink(phone);

      return `
        <div class="${cardClass.join(' ')}" data-lead-id="${esc(l.id)}">
          <div class="lead-grade grade-${grade}" title="Grade ${grade} · SLA ${this.slaTarget(grade) ?? '∞'}min">
            ${grade === 'dead' ? '·' : grade}
          </div>
          <div class="lead-body">
            <div class="lead-row-1">
              <span class="lead-flag">${flag}</span>
              <span class="lead-name">${esc(name)}</span>
              <span class="lead-pill is-${status}">${status}</span>
              <span class="lead-pill is-source">${esc(source)}</span>
              ${l.linkedViewingId ? '<span class="lead-pill" style="color:var(--gold)">📅 viewing</span>' : ''}
            </div>
            <div class="lead-row-2">
              ${budget ? `<span class="data"><span class="gold">€${budget}</span>/mo</span>` : ''}
              ${zone ? `<span class="data">📍 ${esc(zone)}</span>` : ''}
              ${sitIcon ? `<span class="data">${sitIcon} ${esc(situation)}</span>` : ''}
              ${propTitle ? `<span class="data">🏠 ${esc(propTitle)}${propPrice ? ` · €${propPrice.toLocaleString('it-IT')}` : ''}</span>` : ''}
              ${!budget && !zone && !situation && !propTitle ? `<span class="data" style="color:var(--text-muted)">— nessun dettaglio</span>` : ''}
            </div>
            ${note ? `<div class="lead-note">"${esc(String(note).slice(0, 180))}${String(note).length > 180 ? '…' : ''}"</div>` : ''}
            <div class="lead-actions">
              ${wa ? `<a href="${wa}" target="_blank" rel="noopener" class="lead-btn primary" onclick="event.stopPropagation()">💬 WhatsApp</a>` : ''}
              ${email ? `<a href="mailto:${esc(email)}" class="lead-btn" onclick="event.stopPropagation()">📧 Email</a>` : ''}
              ${status === 'new' ? `<button class="lead-btn success" onclick="LeadActions.markResponded('${esc(l.id)}')">✓ Risposto</button>` : ''}
              ${status === 'new' || status === 'responded' ? `<button class="lead-btn danger" onclick="LeadActions.discard('${esc(l.id)}')">✕ Scarta</button>` : ''}
              ${status === 'discarded' ? `<button class="lead-btn muted" onclick="LeadActions.reopen('${esc(l.id)}')">↺ Riapri</button>` : ''}
              <a class="lead-btn muted" href="/portal#leads" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 Portal</a>
            </div>
          </div>
          <div class="lead-meta">
            <span class="lead-time">${esc(this.timeAgo(l.createdAt))}</span>
            <span class="lead-sla is-${sla.state}">${esc(sla.label)}</span>
          </div>
        </div>
      `;
    },

    /** Full panel render: toolbar + list. */
    renderPanel() {
      const panel = $('#lead-panel');
      if (!panel) return;
      const c = this.counts();
      const filter = STATE.leadsFilter;
      const items = this.filtered();
      const stats = {
        graded: { A: 0, B: 0, C: 0, dead: 0 },
        breached: 0
      };
      for (const l of STATE.leads) {
        if (l.status === 'discarded') continue;
        const g = this.gradeOf(l);
        stats.graded[g]++;
        if (!l.status || l.status === 'new') {
          const sla = this.slaInfo(l, g);
          if (sla.state === 'late') stats.breached++;
        }
      }

      const filterBtn = (key, label) => `
        <button class="lead-filter-btn ${filter === key ? 'is-active' : ''}" onclick="LeadActions.setFilter('${key}')">
          ${label}
          <span class="lead-filter-count">${c[key]}</span>
        </button>
      `;

      panel.innerHTML = `
        <div class="lead-toolbar">
          <div class="lead-filters">
            ${filterBtn('new', 'Nuovi')}
            ${filterBtn('responded', 'Risposti')}
            ${filterBtn('converted', 'Convertiti')}
            ${filterBtn('discarded', 'Scartati')}
            ${filterBtn('all', 'Tutti')}
          </div>
          <div class="lead-summary">
            <span><strong style="color:var(--gold)">${stats.graded.A}</strong> A</span>
            <span><strong>${stats.graded.B}</strong> B</span>
            <span><strong>${stats.graded.C}</strong> C</span>
            ${stats.breached > 0 ? `<span style="color:var(--danger)"><strong>${stats.breached}</strong> SLA scaduti</span>` : '<span style="color:var(--success)">SLA ok</span>'}
          </div>
        </div>
        ${items.length === 0 ? `
          <div class="empty-state">
            <div class="empty-icon">📨</div>
            <div class="empty-title">${filter === 'new' ? 'Nessun nuovo lead' : 'Nessun lead in questo filtro'}</div>
            <div class="empty-desc">${filter === 'new'
              ? 'Quando Homie filtra un lead da Immobiliare, Idealista o WhatsApp comparirà qui in tempo reale.<br>Grade A → 5 min · B → 30 min · C → 2h · dead → trigger-only · notte 23-07 → queue.'
              : 'Cambia filtro per vedere altri lead.'}</div>
            <div class="empty-hint">listener live · ${STATE.leads.length} lead totali in cache</div>
          </div>
        ` : `
          <div class="lead-list">
            ${items.map(l => this.renderCard(l)).join('')}
          </div>
        `}
      `;
    }
  };
  window.LeadStore = LeadStore;

  // Global handlers used by inline onclick attributes in lead cards.
  window.LeadActions = {
    setFilter(f) {
      STATE.leadsFilter = f;

  // ───────────────────────────────────────────────────────────
  // HEARTBEAT
  // ───────────────────────────────────────────────────────────
  const Heartbeat = {
    timer: null,
    start() {
      // Listen to heartbeat doc
      try {
        STATE.heartbeatUnsub = db.doc(COCKPIT.heartbeat.doc).onSnapshot(snap => {
          if (snap.exists) {
            const data = snap.data() || {};
            const ts = data.lastPingAt && data.lastPingAt.toMillis ? data.lastPingAt.toMillis() : (data.lastPingAt || null);
            STATE.heartbeatLast = ts;
            this.updateBadge();
          } else {
            STATE.heartbeatLast = null;
            this.updateBadge();
          }
        }, err => {
          console.warn('Heartbeat listener error:', err);
          STATE.heartbeatLast = null;
          this.updateBadge();
        });
      } catch (err) {
        console.warn('Heartbeat init error:', err);
      }
      // Re-render label every 15s
      this.timer = setInterval(() => this.updateBadge(), 15000);
      this.updateBadge();
    },
    updateBadge() {
      const badge = $('#heartbeat-badge');
      const timeEl = $('#heartbeat-time');
      if (!badge || !timeEl) return;

      badge.classList.remove('is-live', 'is-warning', 'is-critical', 'is-offline');
      if (!STATE.heartbeatLast) {
        badge.classList.add('is-offline');
        timeEl.textContent = 'offline';
        return;
      }
      const diff = Date.now() - STATE.heartbeatLast;
      timeEl.textContent = fmt.relTime(STATE.heartbeatLast);
      if (diff > COCKPIT.heartbeat.offlineMs) badge.classList.add('is-offline');
      else if (diff > COCKPIT.heartbeat.criticalMs) badge.classList.add('is-critical');
      else if (diff > COCKPIT.heartbeat.warningMs) badge.classList.add('is-warning');
      else badge.classList.add('is-live');
    }
  };

      // Overlay click to close
      $('#cmdk-overlay').addEventListener('click', (e) => {
        if (e.target.id === 'cmdk-overlay') this.close();
      });
      // Input
      $('#cmdk-input').addEventListener('input', (e) => this.filter(e.target.value));
    },
    open() {
      STATE.cmdkOpen = true;
      $('#cmdk-overlay').hidden = false;
      $('#cmdk-input').value = '';
      this.filter('');
      setTimeout(() => $('#cmdk-input').focus(), 30);
    },
    close() {
      STATE.cmdkOpen = false;
      $('#cmdk-overlay').hidden = true;
    },
    toggle() { STATE.cmdkOpen ? this.close() : this.open(); },
    fuzzy(query, label) {
      query = (query || '').toLowerCase().trim();
      label = label.toLowerCase();
      if (!query) return { match: true, parts: [{ text: label, hit: false }] };
      let qi = 0, parts = [], buf = '', bufHit = false;
      for (let i = 0; i < label.length; i++) {
        const c = label[i];
        const isHit = qi < query.length && c === query[qi];
        if (isHit !== bufHit) {
          if (buf) parts.push({ text: buf, hit: bufHit });
          buf = ''; bufHit = isHit;
        }
        buf += c;
        if (isHit) qi++;
      }
      if (buf) parts.push({ text: buf, hit: bufHit });
      return qi === query.length ? { match: true, parts } : { match: false };
    },
    filter(query) {
      const results = [];
      this.items.forEach(item => {
        const r = this.fuzzy(query, item.label);
        if (r.match) results.push({ ...item, parts: r.parts });
      });
      STATE.cmdkFiltered = results;
      STATE.cmdkSelected = 0;
      this.render();
    },
    render() {
      const out = $('#cmdk-results');
      if (!STATE.cmdkFiltered.length) {
        out.innerHTML = `<div class="cmdk-empty">Nessun risultato</div>`;
        return;
      }
      // Group by group
      const grouped = {};
      STATE.cmdkFiltered.forEach((it, idx) => {
        (grouped[it.group] = grouped[it.group] || []).push({ ...it, _idx: idx });
      });
      let html = '';
      Object.keys(grouped).forEach(group => {
        html += `<div class="cmdk-group-label">${esc(group)}</div>`;
        grouped[group].forEach(it => {
          const labelHtml = (it.parts || [{ text: it.label, hit: false }])
            .map(p => p.hit ? `<mark>${esc(p.text)}</mark>` : esc(p.text)).join('');
          const sel = it._idx === STATE.cmdkSelected ? ' is-selected' : '';
          html += `
            <div class="cmdk-item${sel}" data-idx="${it._idx}">
              <div class="cmdk-item-icon">${it.icon || '·'}</div>
              <div class="cmdk-item-label">${labelHtml}</div>
              <div class="cmdk-item-hint">${esc(it.hint || '')}</div>
            </div>
          `;
        });
      });
      out.innerHTML = html;
      // Click handlers
      out.querySelectorAll('.cmdk-item').forEach(el => {
        el.onclick = () => {
          const idx = parseInt(el.dataset.idx, 10);
          const item = STATE.cmdkFiltered[idx];
          if (item) { this.close(); setTimeout(() => item.action(), 50); }
        };
        el.onmouseenter = () => this.select(parseInt(el.dataset.idx, 10));
      });
    },
    select(idx) {
      const n = STATE.cmdkFiltered.length;
      if (!n) return;
      STATE.cmdkSelected = ((idx % n) + n) % n;
      this.render();
      // Scroll selected into view
      const el = $('#cmdk-results .cmdk-item.is-selected');
      if (el) el.scrollIntoView({ block: 'nearest' });
    }
  };

  // ───────────────────────────────────────────────────────────
  // BOOT
  // ───────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', bootAuth);

})();
</script>
