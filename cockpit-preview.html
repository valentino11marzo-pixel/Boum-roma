  // CONTRACT STORE — list + magic-link reveal
  // ───────────────────────────────────────────────────────────
  const ContractStore = {
    /** Called on route entry: lazy-load context (users, properties),
     *  then start the contracts listener if not already running. */
    async enter() {
      if (!STATE.ctxLoaded) await this.loadContext();
      this.startListener();
      this.renderPanel();
    },

    /** One-shot load of users + properties for name lookup. Re-entering
     *  the panel won't refetch unless STATE.ctxLoaded is reset. */
    async loadContext() {
      try {
        const [us, ps] = await Promise.all([
          db.collection('users').get(),
          db.collection('properties').get()
        ]);
        STATE.usersById = {};
        us.docs.forEach(d => { STATE.usersById[d.id] = { id: d.id, ...d.data() }; });
        STATE.propertiesById = {};
        ps.docs.forEach(d => { STATE.propertiesById[d.id] = { id: d.id, ...d.data() }; });
        STATE.ctxLoaded = true;
      } catch (e) {
        console.warn('[ContractStore.loadContext]', e);
      }
    },

    /** Start the contracts listener. Idempotent — no-op if already running. */
    startListener() {
      if (STATE.contractsUnsub) return;
      try {
        STATE.contractsUnsub = db.collection('contracts')
          .orderBy('endDate', 'asc')
          .limit(100)
          .onSnapshot(snap => {
            STATE.contracts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            this.updateBadge();
            if (STATE.route === 'contracts') this.renderPanel();
          }, err => {
            // orderBy on endDate may fail if some docs miss the field; fallback
            console.warn('[ContractStore] ordered query failed, fallback:', err);
            db.collection('contracts').limit(100).onSnapshot(s => {
              STATE.contracts = s.docs.map(d => ({ id: d.id, ...d.data() }));
              this.updateBadge();
              if (STATE.route === 'contracts') this.renderPanel();
            });
          });
      } catch (e) {
        console.error('[ContractStore.startListener]', e);
      }
    },

    /** Days until endDate. Positive = future, negative = expired. */
    daysUntil(c) {
      if (!c.endDate) return null;
      const end = new Date(c.endDate);
      if (isNaN(end)) return null;
      const ms = end - new Date();
      return Math.ceil(ms / (1000 * 60 * 60 * 24));
    },

    /** Urgency band based on days-until-end. */
    bandOf(c) {
      const status = c.status;
      const days = this.daysUntil(c);
      if (status && status !== 'active') return 'expired';
      if (days == null) return 'active';
      if (days < 0) return 'expired';
      if (days <= 30) return 'urgent';
      if (days <= 60) return 'soon';
      return 'active';
    },

    /** Property name resolver — falls back to address, then propertyId. */
    propertyLabel(c) {
      const p = STATE.propertiesById[c.propertyId];
      if (!p) return c.propertyId ? `[${String(c.propertyId).slice(0,8)}…]` : 'Immobile non collegato';
      return p.name || p.address || p.title || `Property ${p.id?.slice(0,6)}`;
    },

    /** User name resolver. */
    userLabel(uid) {
      if (!uid) return '—';
      const u = STATE.usersById[uid];
      if (!u) return `[${String(uid).slice(0,8)}…]`;
      return u.name || u.fullName || u.displayName || u.email || `User ${u.id?.slice(0,6)}`;
    },

    /** Landlord resolution via property.ownerId (not stored on contract). */
    landlordLabel(c) {
      const p = STATE.propertiesById[c.propertyId];
      if (!p?.ownerId) return c.landlordName || '—';
      return this.userLabel(p.ownerId);
    },

    /** Format ISO date as "12 Mar 2025" */
    fmtDate(iso) {
      if (!iso) return '—';
      try {
        const d = new Date(iso);
        if (isNaN(d)) return iso;
        return d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short', year: 'numeric' });
      } catch { return iso; }
    },

    /** Sidebar badge = contracts expiring in <30 days OR with partial signature. */
    updateBadge() {
      const el = $('#badge-contracts');
      if (!el) return;
      let count = 0;
      for (const c of STATE.contracts) {
        if (c.status !== 'active' && c.status) continue;
        const d = this.daysUntil(c);
        if (d != null && d <= 30) count++;
        else if (c.signatureStatus === 'partial' || c.signatureStatus === 'none') {
          // Only counts as "attention needed" if missing signatures AND active
          if (c.tenantSignToken || c.landlordSignToken) count++;
        }
      }
      el.textContent = count;
      el.style.display = count > 0 ? '' : 'none';
    },

    /** Counts for filter pills. */
    counts() {
      const c = { all: STATE.contracts.length, active: 0, urgent: 0, soon: 0, expired: 0, unsigned: 0 };
      for (const x of STATE.contracts) {
        const band = this.bandOf(x);
        if (band === 'active') c.active++;
        else if (band === 'urgent') c.urgent++;
        else if (band === 'soon') c.soon++;
        else if (band === 'expired') c.expired++;
        if (x.signatureStatus !== 'complete' && (x.tenantSignToken || x.landlordSignToken)) c.unsigned++;
      }
      return c;
    },

    /** Apply filter. */
    filtered() {
      const f = STATE.contractsFilter;
      if (f === 'all') return STATE.contracts;
      if (f === 'unsigned') {
        return STATE.contracts.filter(c =>
          c.signatureStatus !== 'complete' && (c.tenantSignToken || c.landlordSignToken)
        );
      }
      return STATE.contracts.filter(c => this.bandOf(c) === f);
    },

    /** Build the magic-link URL for a role (tenant|landlord). */
    magicUrl(c, role) {
      const token = role === 'tenant' ? c.tenantSignToken : c.landlordSignToken;
      if (!token) return null;
      const origin = window.location.origin || 'https://boomrome.com';
      return `${origin}/portal.html?sign=${token}`;
    },

    /** Render one contract card. */
    renderCard(c) {
      const band = this.bandOf(c);
      const days = this.daysUntil(c);
      const sig = c.signatureStatus || 'none';
      const cardClass = ['ct-card', `is-${band}`];

      const tenant = this.userLabel(c.tenantId);
      const landlord = this.landlordLabel(c);
      const property = this.propertyLabel(c);
      const type = c.type ? c.type[0].toUpperCase() + c.type.slice(1) : '';

      const tenantLink = this.magicUrl(c, 'tenant');
      const landlordLink = this.magicUrl(c, 'landlord');
      const showTenantLink = STATE.revealedLinks[`${c.id}|tenant`];
      const showLandlordLink = STATE.revealedLinks[`${c.id}|landlord`];

      const sigSummary = sig === 'complete'
        ? '✓ entrambe firmate'
        : sig === 'partial'
          ? (c.tenantSignature ? 'tenant ok · landlord pendente' : 'landlord ok · tenant pendente')
          : 'firma da raccogliere';

      let daysLabel = '—';
      let daysBand = band;
      if (days == null) daysLabel = c.endDate || 'no end date';
      else if (days < 0) { daysLabel = `scaduto ${-days}g`; daysBand = 'expired'; }
      else if (days === 0) { daysLabel = 'scade oggi'; daysBand = 'urgent'; }
      else { daysLabel = `${days}g residui`; }

      return `
        <div class="${cardClass.join(' ')}" data-contract-id="${esc(c.id)}">
          <div class="ct-body">
            <div class="ct-head">
              <span class="ct-title">${esc(property)}</span>
              ${type ? `<span class="ct-type">${esc(type)}</span>` : ''}
              <span class="ct-sig is-${sig}">${sigSummary}</span>
            </div>
            <div class="ct-meta">
              <span class="data">👤 <span class="gold">${esc(tenant)}</span></span>
              <span class="data">🏠 ${esc(landlord)}</span>
              <span class="data">📅 ${esc(this.fmtDate(c.startDate))} → ${esc(this.fmtDate(c.endDate))}</span>
              ${c.deposit ? `<span class="data">💼 dep €${Number(c.deposit).toLocaleString('it-IT')}</span>` : ''}
              ${c.linkedLeadId ? `<span class="data" style="color:var(--gold)">↗ da lead</span>` : ''}
            </div>
            ${showTenantLink && tenantLink ? `
              <div class="ct-mlink">
                <span class="ct-mlink-label">tenant link</span>
                <span class="ct-mlink-url">${esc(tenantLink)}</span>
                <button class="lead-btn primary" onclick="ContractActions.copyLink('${esc(c.id)}','tenant')">📋 Copia</button>
              </div>` : ''}
            ${showLandlordLink && landlordLink ? `
              <div class="ct-mlink">
                <span class="ct-mlink-label">landlord link</span>
                <span class="ct-mlink-url">${esc(landlordLink)}</span>
                <button class="lead-btn primary" onclick="ContractActions.copyLink('${esc(c.id)}','landlord')">📋 Copia</button>
              </div>` : ''}
            <div class="ct-actions">
              ${tenantLink
                ? `<button class="lead-btn ${showTenantLink ? '' : 'primary'}" onclick="ContractActions.toggleLink('${esc(c.id)}','tenant')">${showTenantLink ? '× Nascondi tenant' : '🔗 Magic-link tenant'}</button>`
                : `<button class="lead-btn muted" onclick="ContractActions.regenerate('${esc(c.id)}','tenant')">↻ Genera link tenant</button>`}
              ${landlordLink
                ? `<button class="lead-btn ${showLandlordLink ? '' : 'primary'}" onclick="ContractActions.toggleLink('${esc(c.id)}','landlord')">${showLandlordLink ? '× Nascondi landlord' : '🔗 Magic-link landlord'}</button>`
                : `<button class="lead-btn muted" onclick="ContractActions.regenerate('${esc(c.id)}','landlord')">↻ Genera link landlord</button>`}
              <a class="lead-btn muted" href="/portal#contracts" target="_blank" rel="noopener">📂 Portal</a>
            </div>
          </div>
          <div class="ct-rent">
            <div class="ct-rent-amount">€${Number(c.rent || 0).toLocaleString('it-IT')}</div>
            <div class="ct-rent-sub">/mese</div>
            <div class="ct-rent-days is-${daysBand}">${daysLabel}</div>
          </div>
        </div>
      `;
    },

    /** Full panel render: filters + stat cards + list. */
    renderPanel() {
      const panel = $('#contracts-panel');
      if (!panel) return;
      const c = this.counts();
      const filter = STATE.contractsFilter;
      const items = this.filtered();
      const totalMRR = STATE.contracts
        .filter(x => this.bandOf(x) === 'active' || this.bandOf(x) === 'soon' || this.bandOf(x) === 'urgent')
        .reduce((sum, x) => sum + (Number(x.rent) || 0), 0);

      const stat = (key, label, value, sub, cls) => `
        <div class="ct-stat ${cls || ''} ${filter === key ? 'is-active' : ''}" onclick="ContractActions.setFilter('${key}')">
          <div class="ct-stat-label">${label}</div>
          <div class="ct-stat-value">${value}</div>
          ${sub ? `<div class="ct-stat-sub">${sub}</div>` : ''}
        </div>
      `;

      panel.innerHTML = `
        <div class="ct-stat-row">
          ${stat('all', 'Tutti', c.all, `€${totalMRR.toLocaleString('it-IT')} / mese attivi`)}
          ${stat('active', 'Attivi', c.active, '>60g residui')}
          ${stat('soon', 'In scadenza', c.soon, '30–60g', c.soon > 0 ? 'is-warn' : '')}
          ${stat('urgent', 'Urgenti', c.urgent, '<30g residui', c.urgent > 0 ? 'is-danger' : '')}
          ${stat('unsigned', 'Firme pendenti', c.unsigned, 'token ancora attivo', c.unsigned > 0 ? 'is-warn' : '')}
          ${stat('expired', 'Scaduti', c.expired, 'archivio')}
        </div>
        ${items.length === 0 ? `
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <div class="empty-title">Nessun contratto in questo filtro</div>
            <div class="empty-desc">${filter === 'all'
              ? 'Quando creerai un contratto dal portal apparirà qui in tempo reale, con magic-link tenant + landlord copia-incolla.'
              : 'Prova un altro filtro.'}</div>
            <div class="empty-hint">collection: contracts · ${STATE.contracts.length} totali in cache</div>
          </div>
        ` : `
          <div class="lead-list">
            ${items.map(x => this.renderCard(x)).join('')}
          </div>
        `}
      `;
    }
  };
  window.ContractStore = ContractStore;

  window.ContractActions = {
    setFilter(f) {
      STATE.contractsFilter = f;
      ContractStore.renderPanel();
    },
    toggleLink(contractId, role) {
      const key = `${contractId}|${role}`;
      STATE.revealedLinks[key] = !STATE.revealedLinks[key];
      ContractStore.renderPanel();
    },
    async copyLink(contractId, role) {
      const c = STATE.contracts.find(x => x.id === contractId);
      if (!c) return;
      const url = ContractStore.magicUrl(c, role);
      if (!url) return Toast.show({ type: 'warning', title: 'Nessun token attivo' });
      try {
        await navigator.clipboard.writeText(url);
        Toast.show({ type: 'success', title: 'Link copiato', desc: `Magic-link ${role} pronto per il share.` });
      } catch {
        // Fallback: select + execCommand
        const ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); Toast.show({ type: 'success', title: 'Link copiato' }); }
        catch { Toast.show({ type: 'danger', title: 'Copia manuale', desc: url }); }
        finally { ta.remove(); }
      }
    },
    async regenerate(contractId, role) {
      try {
        const token = (crypto.randomUUID && crypto.randomUUID()) ||
          (Date.now().toString(36) + Math.random().toString(36).slice(2, 10));
        const field = role === 'tenant' ? 'tenantSignToken' : 'landlordSignToken';
        await db.collection('contracts').doc(contractId).update({
          [field]: token,
          [`${field}RegeneratedAt`]: firebase.firestore.FieldValue.serverTimestamp(),
          [`${field}RegeneratedBy`]: STATE.user?.email || null
        });
        STATE.revealedLinks[`${contractId}|${role}`] = true;
        Toast.show({ type: 'success', title: `Nuovo token ${role}`, desc: 'Click su Copia per condividerlo.' });
      } catch (e) {
        Toast.show({ type: 'danger', title: 'Errore', desc: e.message });
      }
    }
  };

  // ───────────────────────────────────────────────────────────
  // HEARTBEAT
  // ───────────────────────────────────────────────────────────
  const Heartbeat = {
    timer: null,
    start() {
      // Listen to heartbeat doc
      try {
        STATE.heartbeatUnsub = db.doc(COCKPIT.heartbeat.doc).onSnapshot(snap => {
          if (snap.exists) {
            const data = snap.data() || {};
            // Accept either field name — the agent layer writes lastSeenAt +
            // lastPingAt; older Mac bridge builds may write only lastPingAt.
            const raw = data.lastSeenAt || data.lastPingAt || null;
            const ts = raw && raw.toMillis ? raw.toMillis() : (typeof raw === 'string' ? Date.parse(raw) : raw);
            STATE.heartbeatLast = ts || null;
            STATE.heartbeatMeta = { status: data.status, activeTool: data.activeTool, model: data.model, queueLen: data.queueLen, lastEvent: data.lastEvent };
            this.updateBadge();
          } else {
            STATE.heartbeatLast = null;
            this.updateBadge();
          }
        }, err => {
          console.warn('Heartbeat listener error:', err);
          STATE.heartbeatLast = null;
          this.updateBadge();
        });
      } catch (err) {
        console.warn('Heartbeat init error:', err);
      }
      // Re-render label every 15s
      this.timer = setInterval(() => this.updateBadge(), 15000);
      this.updateBadge();
    },
    updateBadge() {
      const badge = $('#heartbeat-badge');
      const timeEl = $('#heartbeat-time');
      if (!badge || !timeEl) return;

      badge.classList.remove('is-live', 'is-warning', 'is-critical', 'is-offline');
      if (!STATE.heartbeatLast) {
        badge.classList.add('is-offline');
        timeEl.textContent = 'offline';
        return;
      }
      const diff = Date.now() - STATE.heartbeatLast;
      timeEl.textContent = fmt.relTime(STATE.heartbeatLast);
      if (diff > COCKPIT.heartbeat.offlineMs) badge.classList.add('is-offline');
      else if (diff > COCKPIT.heartbeat.criticalMs) badge.classList.add('is-critical');
      else if (diff > COCKPIT.heartbeat.warningMs) badge.classList.add('is-warning');
      else badge.classList.add('is-live');
      // Enrich the tooltip with what the Mac bridge is doing right now.
      const m = STATE.heartbeatMeta || {};
      const parts = [`Mac bridge · ${fmt.relTime(STATE.heartbeatLast)}`];
      if (m.status) parts.push('status: ' + m.status);
      if (m.activeTool) parts.push('tool: ' + m.activeTool);
      if (m.model) parts.push('model: ' + m.model);
      if (typeof m.queueLen === 'number') parts.push('queue: ' + m.queueLen);
      if (m.lastEvent) parts.push(m.lastEvent);
      badge.title = parts.join(' · ');
    }
  };

      // External
      { group: 'External', icon: '🏠', label: 'Open Portal',    hint: '/portal', action: () => window.open('/portal', '_blank') },
      { group: 'External', icon: '🌐', label: 'Open boomrome.com', hint: 'Public site', action: () => window.open('/', '_blank') },
      { group: 'External', icon: '📊', label: 'Stripe Dashboard',  hint: 'Payments', action: () => window.open('https://dashboard.stripe.com', '_blank') },
      { group: 'External', icon: '🔥', label: 'Firebase Console',  hint: 'Firestore', action: () => window.open('https://console.firebase.google.com/project/boom-property-dashboards', '_blank') }
    ],
    init() {
      // Trigger
      $('#cmdk-trigger').onclick = () => this.open();
      // Keyboard
      document.addEventListener('keydown', (e) => {
        const isCmd = (e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k';
        if (isCmd) { e.preventDefault(); this.toggle(); return; }
        if (!STATE.cmdkOpen) return;
        if (e.key === 'Escape') { this.close(); return; }
        if (e.key === 'ArrowDown') { e.preventDefault(); this.select(STATE.cmdkSelected + 1); return; }
        if (e.key === 'ArrowUp') { e.preventDefault(); this.select(STATE.cmdkSelected - 1); return; }
        if (e.key === 'Enter') {
          e.preventDefault();
          const item = STATE.cmdkFiltered[STATE.cmdkSelected];
          if (item) { this.close(); setTimeout(() => item.action(), 50); }
        }
      });
      // Overlay click to close
      $('#cmdk-overlay').addEventListener('click', (e) => {
        if (e.target.id === 'cmdk-overlay') this.close();
      });
      // Input
      $('#cmdk-input').addEventListener('input', (e) => this.filter(e.target.value));
    },
    open() {
      STATE.cmdkOpen = true;
      $('#cmdk-overlay').hidden = false;
      $('#cmdk-input').value = '';
      this.filter('');
      setTimeout(() => $('#cmdk-input').focus(), 30);
    },
    close() {
      STATE.cmdkOpen = false;
      $('#cmdk-overlay').hidden = true;
    },
    toggle() { STATE.cmdkOpen ? this.close() : this.open(); },
    fuzzy(query, label) {
      query = (query || '').toLowerCase().trim();
      label = label.toLowerCase();
      if (!query) return { match: true, parts: [{ text: label, hit: false }] };
      let qi = 0, parts = [], buf = '', bufHit = false;
      for (let i = 0; i < label.length; i++) {
        const c = label[i];
        const isHit = qi < query.length && c === query[qi];
        if (isHit !== bufHit) {
          if (buf) parts.push({ text: buf, hit: bufHit });
          buf = ''; bufHit = isHit;
        }
        buf += c;
        if (isHit) qi++;
      }
      if (buf) parts.push({ text: buf, hit: bufHit });
      return qi === query.length ? { match: true, parts } : { match: false };
    },
    filter(query) {
      const results = [];
      this.items.forEach(item => {
        const r = this.fuzzy(query, item.label);
        if (r.match) results.push({ ...item, parts: r.parts });
      });
      STATE.cmdkFiltered = results;
      STATE.cmdkSelected = 0;
      this.render();
    },
    render() {
      const out = $('#cmdk-results');
      if (!STATE.cmdkFiltered.length) {
        out.innerHTML = `<div class="cmdk-empty">Nessun risultato</div>`;
        return;
      }
      // Group by group
      const grouped = {};
      STATE.cmdkFiltered.forEach((it, idx) => {
        (grouped[it.group] = grouped[it.group] || []).push({ ...it, _idx: idx });
      });
      let html = '';
      Object.keys(grouped).forEach(group => {
        html += `<div class="cmdk-group-label">${esc(group)}</div>`;
        grouped[group].forEach(it => {
          const labelHtml = (it.parts || [{ text: it.label, hit: false }])
            .map(p => p.hit ? `<mark>${esc(p.text)}</mark>` : esc(p.text)).join('');
          const sel = it._idx === STATE.cmdkSelected ? ' is-selected' : '';
          html += `
            <div class="cmdk-item${sel}" data-idx="${it._idx}">
              <div class="cmdk-item-icon">${it.icon || '·'}</div>
              <div class="cmdk-item-label">${labelHtml}</div>
              <div class="cmdk-item-hint">${esc(it.hint || '')}</div>
            </div>
          `;
        });
      });
      out.innerHTML = html;
      // Click handlers
      out.querySelectorAll('.cmdk-item').forEach(el => {
        el.onclick = () => {
          const idx = parseInt(el.dataset.idx, 10);
          const item = STATE.cmdkFiltered[idx];
          if (item) { this.close(); setTimeout(() => item.action(), 50); }
        };
        el.onmouseenter = () => this.select(parseInt(el.dataset.idx, 10));
      });
    },
    select(idx) {
      const n = STATE.cmdkFiltered.length;
      if (!n) return;
      STATE.cmdkSelected = ((idx % n) + n) % n;
      this.render();
      // Scroll selected into view
      const el = $('#cmdk-results .cmdk-item.is-selected');
      if (el) el.scrollIntoView({ block: 'nearest' });
    }
  };

  // ───────────────────────────────────────────────────────────
  // BOOT
  // ───────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', bootAuth);

})();
</script>
