<!-- ═════════════════════════════════════════════════════════════
     SCRIPTS
     ═════════════════════════════════════════════════════════════ -->
<script>
(function(){
  'use strict';

  // ───────────────────────────────────────────────────────────
  // CONFIG
  // ───────────────────────────────────────────────────────────
  const COCKPIT = {
    whitelist: ['valentino11marzo@gmail.com', 'valentino@boom-rome.com'],
    heartbeat: {
      doc: 'heartbeat/mac',          // Firestore path
      warningMs: 2 * 60 * 1000,      // > 2min → yellow
      criticalMs: 5 * 60 * 1000,     // > 5min → red
      offlineMs: 15 * 60 * 1000      // > 15min → offline
    },
    routes: {
      'lead-inbox':    { title: 'Lead Inbox',     icon: '📨', subtitle: 'Live ingestion da Homie · grade A/B/C cadenza differenziata' },
      'action-queue':  { title: 'Action Queue',   icon: '⚡', subtitle: 'Decisioni umane in coda · 1-tap approve / reject / edit' },
      'risk-radar':    { title: 'Risk Radar',     icon: '🎯', subtitle: 'RLI · contratti silenti · documenti mancanti · scadenze 7gg' },
      'contracts':     { title: 'Contracts',      icon: '📝', subtitle: 'Magic link signing · status real-time · audit log immutabile' },
      'deal-composer': { title: 'Deal Composer',  icon: '📊', subtitle: 'Canone OMI · scheda CAF Allegato B · scadenzario fiscale' },
      'settings':      { title: 'Settings',       icon: '⚙️', subtitle: 'Bridge config · LLM tiers · notifiche EmailJS · whitelist' }
    },
    defaultRoute: 'lead-inbox'
  };

  // ───────────────────────────────────────────────────────────
  // STATE
  // ───────────────────────────────────────────────────────────
  const STATE = {
    user: null,
    route: null,
    sidebarCollapsed: false,
    heartbeatLast: null,
    heartbeatMeta: null,
    heartbeatUnsub: null,
    // Action queue
    actions: [],
    actionsUnsub: null,
    actionsFilter: 'pending',
    actionsBusy: {},      // actionId -> true while executor runs
    // Risk radar
    riskItems: [],
    riskSnoozedCount: 0,
    showSnoozed: false,
    cmdkOpen: false,
    cmdkSelected: 0,
    cmdkFiltered: [],
    // Lead inbox
    leads: [],
    leadsUnsub: null,
    leadsFilter: 'new',
    leadsSearch: '',
    leadsTimerId: null,
    // Contracts
    contracts: [],
    contractsUnsub: null,
    contractsFilter: 'all',
    usersById: {},      // lazy populated when entering contracts panel
    propertiesById: {}, // lazy populated when entering contracts panel
    ctxLoaded: false,
    revealedLinks: {}   // contractId+role -> visible flag
  };

  // ───────────────────────────────────────────────────────────
  // DOM HELPERS
  // ───────────────────────────────────────────────────────────
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmt = {
    relTime(ts) {
      if (!ts) return '—';
      const diff = Date.now() - ts;
      if (diff < 1000) return 'now';
      if (diff < 60_000) return Math.floor(diff/1000) + 's ago';
      if (diff < 3_600_000) return Math.floor(diff/60_000) + 'm ago';
      if (diff < 86_400_000) return Math.floor(diff/3_600_000) + 'h ago';
      return Math.floor(diff/86_400_000) + 'd ago';
    }
  };

  // Lazy-load jsPDF from CDN (only when the Deal Composer exports a PDF).
  let _jspdfPromise = null;
  function loadJsPDF() {
    if (window.jspdf) return Promise.resolve();
    if (_jspdfPromise) return _jspdfPromise;
    _jspdfPromise = new Promise((resolve, reject) => {
      const sc = document.createElement('script');
      sc.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      sc.onload = () => resolve();
      sc.onerror = () => reject(new Error('jsPDF non caricato'));
      document.head.appendChild(sc);
    });
    return _jspdfPromise;
  }

  // ───────────────────────────────────────────────────────────
  // TOAST
  // ───────────────────────────────────────────────────────────
  const Toast = {
    show({ type = 'info', title, desc, duration = 4000 } = {}) {
      const icons = { success: '✓', warning: '⚠', danger: '✕', info: 'ℹ' };
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.innerHTML = `
        <div class="toast-icon">${icons[type] || icons.info}</div>
        <div class="toast-body">
          <div class="toast-title">${esc(title || '')}</div>
          ${desc ? `<div class="toast-desc">${esc(desc)}</div>` : ''}
        </div>
        <button class="toast-close" aria-label="Close">×</button>
      `;
      el.querySelector('.toast-close').onclick = () => el.remove();
      $('#toast-stack').appendChild(el);
      if (duration) setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; el.style.transition = 'all .24s'; setTimeout(() => el.remove(), 240); }, duration);
    }
  };
  window.Toast = Toast;

  // ───────────────────────────────────────────────────────────
  // AUTH GATE
  // ───────────────────────────────────────────────────────────
  function bootAuth() {
    const shield = $('#auth-shield');
    const msg = $('#auth-msg');
    const cta = $('#auth-cta');

    auth.onAuthStateChanged((user) => {
      if (!user) {
        msg.textContent = 'Devi essere autenticato per accedere al cockpit.';
        cta.hidden = false;
        cta.textContent = 'Accedi al Portal';
        return;
      }
      const email = (user.email || '').toLowerCase().trim();
      if (!COCKPIT.whitelist.includes(email)) {
        msg.innerHTML = `Accesso non autorizzato per <strong style="color:var(--text)">${esc(email)}</strong>.<br>Questa preview è ristretta.`;
        cta.hidden = false;
        cta.textContent = 'Disconnetti';
        cta.onclick = (e) => { e.preventDefault(); auth.signOut(); };
        return;
      }
      STATE.user = user;
      shield.style.transition = 'opacity .3s';
      shield.style.opacity = '0';
      setTimeout(() => { shield.remove(); $('#app').hidden = false; bootApp(); }, 280);
    });
  }

  // ───────────────────────────────────────────────────────────
  // APP BOOT
  // ───────────────────────────────────────────────────────────
  function bootApp() {
    // User chip
    const email = STATE.user.email || '';
    $('#user-email').textContent = email;
    $('#user-avatar').textContent = (email[0] || '?').toUpperCase();

    // Detect platform for ⌘ / Ctrl
    const isMac = navigator.platform.toLowerCase().includes('mac');
    $('#cmdk-kbd').textContent = isMac ? '⌘K' : 'Ctrl+K';

    // Sidebar toggle
    $('#sidebar-toggle').onclick = () => {
      const app = $('#app');
      const isMobile = window.innerWidth <= 720;
      if (isMobile) {
        app.classList.toggle('sidebar-mobile-open');
      } else {
        app.classList.toggle('sidebar-collapsed');
        STATE.sidebarCollapsed = app.classList.contains('sidebar-collapsed');
        try { localStorage.setItem('cockpit.sidebar.collapsed', STATE.sidebarCollapsed ? '1' : '0'); } catch {}
      }
    };
    // Restore sidebar
    try {
      if (localStorage.getItem('cockpit.sidebar.collapsed') === '1') {
        $('#app').classList.add('sidebar-collapsed');
        STATE.sidebarCollapsed = true;
      }
    } catch {}

    // Nav items
    $$('.nav-item[data-route]').forEach(el => {
      el.onclick = (e) => { e.preventDefault(); Router.go(el.dataset.route); };
    });

    // Router
    Router.init();

    // Heartbeat
    Heartbeat.start();

    // Lead inbox listener (always-on so the sidebar badge stays live)
    LeadStore.start();

    // Action queue listener (always-on so the sidebar badge counts pending
    // decisions even when you're on another panel)
    ActionStore.start();

    // Contracts listener (always-on for sidebar badge; context users+properties
    // loaded lazily on first panel entry)
    ContractStore.startListener();

    // CmdK
    CmdK.init();

    // Greeting toast
    Toast.show({
      type: 'success',
      title: 'Cockpit pronto',
      desc: `Benvenuto ${(email.split('@')[0] || '')}. Mac Mini bridge non ancora attivo: heartbeat in attesa.`,
      duration: 5000
    });
  }

  // ───────────────────────────────────────────────────────────
  // ROUTER (hash-based)
  // ───────────────────────────────────────────────────────────
  const Router = {
    init() {
      window.addEventListener('hashchange', () => this.render());
      const initial = location.hash.slice(1) || COCKPIT.defaultRoute;
      this.go(initial);
    },
    go(route) {
      if (!COCKPIT.routes[route]) route = COCKPIT.defaultRoute;
      if (location.hash !== '#' + route) {
        location.hash = route;
        return; // hashchange will trigger render
      }
      this.render();
    },
    render() {
      const route = location.hash.slice(1) || COCKPIT.defaultRoute;
      STATE.route = route;
      const meta = COCKPIT.routes[route];

      // Update nav active
      $$('.nav-item').forEach(el => el.classList.toggle('is-active', el.dataset.route === route));

      // Render main
      const main = $('#main-pane');
      main.innerHTML = `
        <div class="page-header">
          <div>
            <h1 class="page-title">
              <span class="page-title-icon">${meta.icon}</span>
              ${esc(meta.title)}
            </h1>
            <p class="page-subtitle">${esc(meta.subtitle)}</p>
          </div>
          <div class="page-actions">
            <span class="soon-banner" style="background:rgba(47,211,122,0.08);border-color:rgba(47,211,122,0.3);color:var(--success)">● Live</span>
          </div>
        </div>
        ${Panels[route] ? Panels[route]() : Panels.placeholder(meta)}
      `;

      // Close mobile drawer
      $('#app').classList.remove('sidebar-mobile-open');
    }
  };

  // ───────────────────────────────────────────────────────────
  // PANELS (empty states for now)
  // ───────────────────────────────────────────────────────────
  const Panels = {
    placeholder(meta) {
      return `
        <div class="empty-state">
          <div class="empty-icon">${meta.icon}</div>
          <div class="empty-title">${esc(meta.title)} pannello in arrivo</div>
          <div class="empty-desc">${esc(meta.subtitle)}<br><br>Questo riquadro sarà popolato in un turno successivo, dopo che lo shell è stato approvato. La struttura, il routing e il design system sono pronti — manca solo il contenuto live.</div>
          <div class="empty-hint">route: <span class="gold">#${esc(STATE.route)}</span> · status: shell-only</div>
        </div>
      `;
    },
    'lead-inbox': () => {
      // Defer the actual rendering: container is filled by LeadStore.renderPanel()
      // (runs on snapshot updates + SLA tick). On route entry, force a paint
      // with whatever is in cache so the user sees something immediately.
      setTimeout(() => LeadStore.renderPanel(), 0);
      return `<div id="lead-panel"><div class="empty-state"><div class="empty-icon">📨</div><div class="empty-title">Connessione live…</div><div class="empty-desc">Sto caricando i lead da Firestore.</div></div></div>`;
    },
    'action-queue': () => {
      setTimeout(() => ActionStore.renderPanel(), 0);
      return `<div id="action-panel"><div class="empty-state"><div class="empty-icon">⚡</div><div class="empty-title">Connessione live…</div><div class="empty-desc">Carico la coda azioni da Firestore.</div></div></div>`;
    },
    'risk-radar': () => {
      setTimeout(() => RiskStore.renderPanel(), 0);
      return `<div id="risk-panel"><div class="empty-state"><div class="empty-icon">🎯</div><div class="empty-title">Calcolo rischi…</div><div class="empty-desc">Analizzo contratti, pagamenti e lead.</div></div></div>`;
    },
    'contracts': () => {
      setTimeout(() => ContractStore.enter(), 0);
      return `<div id="contracts-panel"><div class="empty-state"><div class="empty-icon">📝</div><div class="empty-title">Connessione live…</div><div class="empty-desc">Carico contratti, properties, utenti.</div></div></div>`;
    },
    'deal-composer': () => {
      setTimeout(() => DealComposer.renderPanel(), 0);
      return `<div id="deal-panel"></div>`;
    },
    'settings': () => {
      setTimeout(() => SettingsPanel.renderPanel(), 0);
      return `<div id="settings-panel"></div>`;
    }
  };

  // ───────────────────────────────────────────────────────────
  // LEAD STORE — Firestore listener + grade/SLA logic + actions
  // ───────────────────────────────────────────────────────────
  const LeadStore = {
    /** Start the global listener. Always-on after bootApp(): updates the
     *  sidebar badge in real time even when you're not on this panel. */
    start() {
      try {
        STATE.leadsUnsub = db.collection('leads')
          .orderBy('createdAt', 'desc')
          .limit(50)
          .onSnapshot(snap => {
            STATE.leads = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            this.updateBadge();
            if (STATE.route === 'lead-inbox') this.renderPanel();
          }, err => {
            console.warn('[LeadStore]', err);
            const panel = $('#lead-panel');
            if (panel) panel.innerHTML = `
              <div class="empty-state">
                <div class="empty-icon">⚠</div>
                <div class="empty-title">Errore di accesso a Firestore</div>
                <div class="empty-desc">${esc(err.message || err)}</div>
                <div class="empty-hint">collection: leads · verifica regole sicurezza</div>
              </div>`;
          });

        // SLA countdown re-render every 30s (no re-fetch)
        STATE.leadsTimerId = setInterval(() => {
          if (STATE.route === 'lead-inbox') this.renderPanel();
        }, 30000);
      } catch (e) {
        console.error('[LeadStore.start]', e);
      }
    },

    /** Heuristic grade: A/B/C/dead, calculated client-side.
     *  Real Homie pipeline will eventually write this server-side. */
    gradeOf(l) {
      if (l.grade) return l.grade; // honor server-set value when present
      if (l.status === 'discarded') return 'dead';
      const hasContact = !!(l.email || l.leadEmail || l.phone || l.leadPhone);
      if (!hasContact) return 'dead';
      const budget = Number(l.budget) || 0;
      const hasDetail = !!(l.intakeForm || l.zone || l.situation || l.notes || l.propertyTitle);
      // Worker + high budget + filled intake → A
      if (budget >= 1500 && hasDetail) return 'A';
      if (l.situation === 'worker' && budget >= 1000 && hasDetail) return 'A';
      if (budget >= 1000 || (hasDetail && budget >= 700)) return 'B';
      return 'C';
    },

    /** SLA target by grade (minutes). dead → no target. */
    slaTarget(grade) {
      return ({ A: 5, B: 30, C: 120, dead: null })[grade];
    },

    /** Compute SLA state for a lead. Returns { state, label } where state ∈
     *  fresh|warning|late|night|done. Respects the 23:00–07:00 night queue
     *  rule: late leads received at night are treated as 'night' not 'late'. */
    slaInfo(l, grade) {
      if (l.status === 'responded' || l.status === 'converted') return { state: 'done', label: 'risposto' };
      if (l.status === 'discarded') return { state: 'night', label: 'scartato' };
      const target = this.slaTarget(grade);
      if (target == null) return { state: 'night', label: 'no SLA' };
      const created = l.createdAt?.toDate ? l.createdAt.toDate() : (l.createdAt ? new Date(l.createdAt) : null);
      if (!created) return { state: 'night', label: '—' };
      const now = new Date();
      const elapsedMs = now - created;
      const elapsedMin = elapsedMs / 60000;
      const hourReceived = created.getHours();
      const isNight = hourReceived >= 23 || hourReceived < 7;
      const remainingMin = target - elapsedMin;
      if (remainingMin >= 0) {
        const m = Math.ceil(remainingMin);
        return { state: m <= Math.max(1, target * 0.3) ? 'warning' : 'fresh', label: `${m}m left` };
      }
      // Past SLA
      if (isNight) return { state: 'night', label: 'night queue' };
      const lateMin = Math.floor(-remainingMin);
      return { state: 'late', label: lateMin < 60 ? `+${lateMin}m late` : `+${Math.floor(lateMin / 60)}h late` };
    },

    /** Phone number normalization for WhatsApp deep-link. */
    waLink(phone) {
      if (!phone) return null;
      const clean = String(phone).replace(/[^0-9+]/g, '').replace(/^\+/, '');
      return clean ? `https://wa.me/${clean}` : null;
    },

    /** Friendly relative time: "5m fa", "2h fa", "ieri". */
    timeAgo(ts) {
      if (!ts) return '';
      const d = ts?.toDate ? ts.toDate() : new Date(ts);
      const diff = Date.now() - d.getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1) return 'adesso';
      if (m < 60) return `${m}m fa`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h fa`;
      const days = Math.floor(h / 24);
      if (days === 1) return 'ieri';
      if (days < 7) return `${days}g fa`;
      return d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
    },

    /** Update sidebar badge with count of NEW leads (status='new' or undefined). */
    updateBadge() {
      const el = $('#badge-leads');
      if (!el) return;
      const count = STATE.leads.filter(l => !l.status || l.status === 'new').length;
      el.textContent = count;
      el.style.display = count > 0 ? '' : 'none';
    },

    /** Counts per status, for the filter pills. */
    counts() {
      const c = { all: STATE.leads.length, new: 0, responded: 0, converted: 0, discarded: 0 };
      for (const l of STATE.leads) {
        const s = l.status || 'new';
        if (c[s] != null) c[s]++;
      }
      return c;
    },

    /** Filter the current leads list according to STATE.leadsFilter + search. */
    filtered() {
      const f = STATE.leadsFilter;
      let list = f === 'all' ? STATE.leads : STATE.leads.filter(l => (l.status || 'new') === f);
      const q = (STATE.leadsSearch || '').trim().toLowerCase();
      if (q) {
        list = list.filter(l => [l.name, l.email, l.phone, l.zone, l.propertyTitle, l.notes, l.message]
          .filter(Boolean).join(' ').toLowerCase().includes(q));
      }
      return list;
    },

    /** Detect source: Homie / Immobiliare / Idealista / Intake Form / Web. */
    sourceOf(l) {
      const s = (l.source || l.service || '').toLowerCase();
      if (l.intakeForm) return 'Intake';
      if (s.includes('homie')) return 'Homie';
      if (s.includes('immobiliare')) return 'Immobiliare';
      if (s.includes('idealista')) return 'Idealista';
      if (s.includes('whats')) return 'WhatsApp';
      if (l.propertyTitle) return 'Property';
      return l.source || 'Web';
    },

    /** Render one lead card. */
    renderCard(l) {
      const status = l.status || 'new';
      const grade = this.gradeOf(l);
      const sla = this.slaInfo(l, grade);
      const cardClass = ['lead-card'];
      if (status === 'discarded') cardClass.push('is-discarded');
      else if (status === 'converted') cardClass.push('is-converted');
      else if (sla.state === 'late') cardClass.push('is-late');
      else if (sla.state === 'warning') cardClass.push('is-warning');
      else if (sla.state === 'fresh') cardClass.push('is-fresh');

      const name = l.name || l.leadName || 'Sconosciuto';
      const flag = (l.language === 'en' || l.language === 'EN') ? '🇬🇧' : '🇮🇹';
      const source = this.sourceOf(l);

      const budget = Number(l.budget) || null;
      const zone = l.zone;
      const situation = l.situation;
      const sitIcon = situation === 'worker' ? '💼' : situation === 'student' ? '🎓' : situation === 'visitor' || situation === 'tourist' ? '✈️' : '';

      const propTitle = l.propertyTitle;
      const propPrice = l.propertyPrice ? Number(l.propertyPrice) : null;

      const note = l.notes || l.message || l.leadMessage;
      const phone = l.phone || l.leadPhone;
      const email = l.email || l.leadEmail;
      const wa = this.waLink(phone);

      return `
        <div class="${cardClass.join(' ')}" data-lead-id="${esc(l.id)}">
          <div class="lead-grade grade-${grade}" title="Grade ${grade} · SLA ${this.slaTarget(grade) ?? '∞'}min">
            ${grade === 'dead' ? '·' : grade}
          </div>
          <div class="lead-body">
            <div class="lead-row-1">
              <span class="lead-flag">${flag}</span>
              <span class="lead-name">${esc(name)}</span>
              <span class="lead-pill is-${status}">${status}</span>
              <span class="lead-pill is-source">${esc(source)}</span>
              ${l.linkedViewingId ? '<span class="lead-pill" style="color:var(--gold)">📅 viewing</span>' : ''}
            </div>
            <div class="lead-row-2">
              ${budget ? `<span class="data"><span class="gold">€${budget}</span>/mo</span>` : ''}
              ${zone ? `<span class="data">📍 ${esc(zone)}</span>` : ''}
              ${sitIcon ? `<span class="data">${sitIcon} ${esc(situation)}</span>` : ''}
              ${propTitle ? `<span class="data">🏠 ${esc(propTitle)}${propPrice ? ` · €${propPrice.toLocaleString('it-IT')}` : ''}</span>` : ''}
              ${!budget && !zone && !situation && !propTitle ? `<span class="data" style="color:var(--text-muted)">— nessun dettaglio</span>` : ''}
            </div>
            ${note ? `<div class="lead-note">"${esc(String(note).slice(0, 180))}${String(note).length > 180 ? '…' : ''}"</div>` : ''}
            <div class="lead-actions">
              <button class="lead-btn" onclick="LeadActions.detail('${esc(l.id)}')">👁 Dettaglio</button>
              ${wa ? `<a href="${wa}" target="_blank" rel="noopener" class="lead-btn primary" onclick="event.stopPropagation()">💬 WhatsApp</a>` : ''}
              ${email ? `<a href="mailto:${esc(email)}" class="lead-btn" onclick="event.stopPropagation()">📧 Email</a>` : ''}
              ${status === 'new' ? `<button class="lead-btn success" onclick="LeadActions.markResponded('${esc(l.id)}')">✓ Risposto</button>` : ''}
              ${status === 'new' || status === 'responded' ? `<button class="lead-btn danger" onclick="LeadActions.discard('${esc(l.id)}')">✕ Scarta</button>` : ''}
              ${status === 'discarded' ? `<button class="lead-btn muted" onclick="LeadActions.reopen('${esc(l.id)}')">↺ Riapri</button>` : ''}
              <a class="lead-btn muted" href="/portal#leads" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 Portal</a>
            </div>
          </div>
          <div class="lead-meta">
            <span class="lead-time">${esc(this.timeAgo(l.createdAt))}</span>
            <span class="lead-sla is-${sla.state}">${esc(sla.label)}</span>
          </div>
        </div>
      `;
    },

    /** Full panel render: toolbar + list. */
    renderPanel() {
      const panel = $('#lead-panel');
      if (!panel) return;
      const c = this.counts();
      const filter = STATE.leadsFilter;
      const items = this.filtered();
      const stats = {
        graded: { A: 0, B: 0, C: 0, dead: 0 },
        breached: 0
      };
      for (const l of STATE.leads) {
        if (l.status === 'discarded') continue;
        const g = this.gradeOf(l);
        stats.graded[g]++;
        if (!l.status || l.status === 'new') {
          const sla = this.slaInfo(l, g);
          if (sla.state === 'late') stats.breached++;
        }
      }

      const filterBtn = (key, label) => `
        <button class="lead-filter-btn ${filter === key ? 'is-active' : ''}" onclick="LeadActions.setFilter('${key}')">
          ${label}
          <span class="lead-filter-count">${c[key]}</span>
        </button>
      `;

      panel.innerHTML = `
        <div class="lead-toolbar">
          <div class="lead-filters">
            ${filterBtn('new', 'Nuovi')}
            ${filterBtn('responded', 'Risposti')}
            ${filterBtn('converted', 'Convertiti')}
            ${filterBtn('discarded', 'Scartati')}
            ${filterBtn('all', 'Tutti')}
          </div>
          <div class="lead-summary">
            <input type="search" id="lead-search" class="lead-search" placeholder="🔎 cerca nome, zona, email…" value="${esc(STATE.leadsSearch || '')}">
            <span><strong style="color:var(--gold)">${stats.graded.A}</strong> A</span>
            <span><strong>${stats.graded.B}</strong> B</span>
            <span><strong>${stats.graded.C}</strong> C</span>
            ${stats.breached > 0 ? `<span style="color:var(--danger)"><strong>${stats.breached}</strong> SLA scaduti</span>` : '<span style="color:var(--success)">SLA ok</span>'}
          </div>
        </div>
        ${items.length === 0 ? `
          <div class="empty-state">
            <div class="empty-icon">📨</div>
            <div class="empty-title">${filter === 'new' ? 'Nessun nuovo lead' : 'Nessun lead in questo filtro'}</div>
            <div class="empty-desc">${filter === 'new'
              ? 'Quando Homie filtra un lead da Immobiliare, Idealista o WhatsApp comparirà qui in tempo reale.<br>Grade A → 5 min · B → 30 min · C → 2h · dead → trigger-only · notte 23-07 → queue.'
              : 'Cambia filtro per vedere altri lead.'}</div>
            <div class="empty-hint">listener live · ${STATE.leads.length} lead totali in cache</div>
          </div>
        ` : `
          <div class="lead-list">
            ${items.map(l => this.renderCard(l)).join('')}
          </div>
        `}
      `;
      // Wire the search box (debounced, focus + caret preserved across re-render).
      const search = $('#lead-search');
      if (search) {
        search.oninput = (e) => {
          STATE.leadsSearch = e.target.value;
          clearTimeout(this._searchTimer);
          this._searchTimer = setTimeout(() => {
            this.renderPanel();
            const s2 = $('#lead-search');
            if (s2) { s2.focus(); const v = s2.value; s2.setSelectionRange(v.length, v.length); }
          }, 180);
        };
      }
    }
  };
  window.LeadStore = LeadStore;

  // Slide-in detail drawer (shared element, reused for every lead).
  function openDrawer(title, bodyHtml) {
    let bd = $('#cockpit-drawer-backdrop');
    if (!bd) {
      bd = document.createElement('div');
      bd.id = 'cockpit-drawer-backdrop';
      bd.className = 'drawer-backdrop';
      bd.innerHTML = `<div class="drawer" onclick="event.stopPropagation()"><div class="drawer-head"><h3 id="drawer-title"></h3><button class="drawer-close" onclick="closeDrawer()">×</button></div><div class="drawer-body" id="drawer-body"></div></div>`;
      bd.onclick = (e) => { if (e.target === bd) closeDrawer(); };
      document.body.appendChild(bd);
    }
    $('#drawer-title').textContent = title;
    $('#drawer-body').innerHTML = bodyHtml;
    requestAnimationFrame(() => bd.classList.add('is-open'));
  }
  window.closeDrawer = function () { const bd = $('#cockpit-drawer-backdrop'); if (bd) bd.classList.remove('is-open'); };
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });

  // Global handlers used by inline onclick attributes in lead cards.
  window.LeadActions = {
    detail(id) {
      const l = STATE.leads.find(x => x.id === id);
      if (!l) return;
      const grade = LeadStore.gradeOf(l);
      const wa = LeadStore.waLink(l.phone);
      const row = (k, v) => v ? `<div class="drawer-row"><span>${esc(k)}</span><strong>${esc(String(v))}</strong></div>` : '';
      const acts = (l.activity || l.timeline || []);
      const body = `
        <div class="drawer-badges">
          <span class="lead-grade grade-${grade}">${grade === 'dead' ? '·' : grade}</span>
          <span class="lead-pill is-${l.status || 'new'}">${esc(l.status || 'new')}</span>
          <span class="lead-pill is-source">${esc(LeadStore.sourceOf(l))}</span>
        </div>
        ${row('Nome', l.name)}
        ${row('Email', l.email)}
        ${row('Telefono', l.phone)}
        ${row('Budget', l.budget ? '€' + Number(l.budget).toLocaleString('it-IT') + '/mese' : '')}
        ${row('Zona', l.zone)}
        ${row('Situazione', l.situation)}
        ${row('Lingua', l.language)}
        ${row('Immobile', l.propertyTitle)}
        ${row('Prezzo immobile', l.propertyPrice ? '€' + Number(l.propertyPrice).toLocaleString('it-IT') : '')}
        ${row('Intent', l.intent)}
        ${row('Confidence', typeof l.confidence === 'number' ? Math.round(l.confidence * 100) + '%' : '')}
        ${row('Fonte tecnica', l.source)}
        ${row('Creato', l.createdAt ? (l.createdAt.toDate ? l.createdAt.toDate() : new Date(l.createdAt)).toLocaleString('it-IT') : '')}
        ${(l.notes || l.message) ? `<div class="drawer-note">"${esc(l.notes || l.message)}"</div>` : ''}
        <div class="drawer-actions">
          ${wa ? `<a class="lead-btn primary" href="${wa}" target="_blank" rel="noopener">💬 WhatsApp</a>` : ''}
          ${l.email ? `<a class="lead-btn" href="mailto:${esc(l.email)}">📧 Email</a>` : ''}
          ${(l.status || 'new') === 'new' ? `<button class="lead-btn success" onclick="LeadActions.markResponded('${esc(l.id)}');closeDrawer()">✓ Risposto</button>` : ''}
          ${((l.status || 'new') === 'new' || l.status === 'responded') ? `<button class="lead-btn danger" onclick="LeadActions.discard('${esc(l.id)}');closeDrawer()">✕ Scarta</button>` : ''}
          <a class="lead-btn muted" href="/portal#leads" target="_blank" rel="noopener">🔗 Apri nel Portal</a>
        </div>
      `;
      openDrawer(l.name || 'Lead', body);
    },
    setFilter(f) {
      STATE.leadsFilter = f;
      LeadStore.renderPanel();
    },
    async markResponded(id) {
      try {
        await db.collection('leads').doc(id).update({
          status: 'responded',
          respondedAt: firebase.firestore.FieldValue.serverTimestamp(),
          respondedBy: STATE.user?.email || null
        });
        Toast.show({ type: 'success', title: 'Lead segnato come risposto' });
      } catch (e) {
        Toast.show({ type: 'danger', title: 'Errore', desc: e.message });
      }
    },
    async discard(id) {
      try {
        await db.collection('leads').doc(id).update({
          status: 'discarded',
          discardedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        Toast.show({ type: 'info', title: 'Lead scartato' });
      } catch (e) {
        Toast.show({ type: 'danger', title: 'Errore', desc: e.message });
      }
    },
    async reopen(id) {
      try {
        await db.collection('leads').doc(id).update({
          status: 'new',
          discardedAt: null
        });
        Toast.show({ type: 'success', title: 'Lead riaperto' });
      } catch (e) {
        Toast.show({ type: 'danger', title: 'Errore', desc: e.message });
      }
    }
  };

  // ───────────────────────────────────────────────────────────
  // ACTION STORE — action_queue listener + approve/reject/execute
  // Mirrors portal.html's Command Center: approving calls the server-side
  // executor at /api/agent/execute (authenticated with the admin's Firebase
  // ID token), which dispatches the action to its tool and flips the status.
  // ───────────────────────────────────────────────────────────
  const ActionStore = {
    start() {
      if (STATE.actionsUnsub) return;
      try {
        STATE.actionsUnsub = db.collection('action_queue')
          .orderBy('createdAt', 'desc')
          .limit(80)
          .onSnapshot(snap => {
            STATE.actions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            updateActionBadge();
            if (STATE.route === 'action-queue') this.renderPanel();
          }, err => {
            // orderBy may fail if createdAt missing on old docs — fallback.
            console.warn('[ActionStore] ordered listener failed, fallback:', err.message);
            STATE.actionsUnsub = db.collection('action_queue').limit(80).onSnapshot(s2 => {
              STATE.actions = s2.docs.map(d => ({ id: d.id, ...d.data() }));
              updateActionBadge();
              if (STATE.route === 'action-queue') this.renderPanel();
            });
          });
      } catch (e) { console.warn('[ActionStore.start]', e); }
    },

    ts(v) { return v && v.toMillis ? v.toMillis() : (typeof v === 'string' ? Date.parse(v) : v) || null; },

    kindMeta(kind) {
      return ({
        reply:            { icon: '✉️', label: 'Risposta',  verb: 'Invia risposta' },
        schedule_viewing: { icon: '📅', label: 'Viewing',   verb: 'Conferma viewing' },
        qualify:          { icon: '❓', label: 'Qualifica', verb: 'Invia domande' },
        archive:          { icon: '🗄️', label: 'Archivia',  verb: 'Archivia lead' },
        note:             { icon: '📝', label: 'Nota',      verb: 'Salva nota' },
        other:            { icon: '•',  label: 'Azione',    verb: 'Applica' },
      })[kind] || { icon: '•', label: kind || 'azione', verb: 'Applica' };
    },

    filtered() {
      const f = STATE.actionsFilter;
      if (f === 'all') return STATE.actions;
      if (f === 'pending') return STATE.actions.filter(a => a.status === 'pending' || a.status === 'approved');
      if (f === 'done') return STATE.actions.filter(a => ['executed', 'auto-applied'].includes(a.status));
      if (f === 'failed') return STATE.actions.filter(a => ['failed', 'rejected'].includes(a.status));
      return STATE.actions.filter(a => a.status === f);
    },

    counts() {
      const c = { pending: 0, done: 0, failed: 0, all: STATE.actions.length };
      for (const a of STATE.actions) {
        if (a.status === 'pending' || a.status === 'approved') c.pending++;
        else if (['executed', 'auto-applied'].includes(a.status)) c.done++;
        else if (['failed', 'rejected'].includes(a.status)) c.failed++;
      }
      return c;
    },

    leadName(a) {
      const l = STATE.leads.find(x => x.id === a.leadId);
      return l ? (l.name || l.leadName || a.leadId) : (a.leadId || '—');
    },

    statusPill(a) {
      const map = {
        pending:        ['is-warning', 'in attesa'],
        approved:       ['is-source', 'in esecuzione…'],
        executed:       ['is-converted', '✓ eseguita'],
        'auto-applied': ['is-source', 'auto'],
        failed:         ['is-discarded', '✕ errore'],
        rejected:       ['is-discarded', 'rifiutata'],
      };
      const [cls, lbl] = map[a.status] || ['', a.status || '—'];
      return `<span class="lead-pill ${cls}">${esc(lbl)}</span>`;
    },

    renderCard(a) {
      const km = this.kindMeta(a.kind);
      const busy = !!STATE.actionsBusy[a.id];
      const conf = typeof a.confidence === 'number' ? Math.round(a.confidence * 100) + '%' : null;
      const p = a.payload || {};
      const preview = p.draft || p.body || (p.questions && [].concat(p.questions).join(' · ')) || p.reason || a.summary || '';
      const slots = p.proposedSlots || p.slots;
      const canDecide = a.status === 'pending';
      const cardClass = ['lead-card'];
      if (a.status === 'failed' || a.status === 'rejected') cardClass.push('is-discarded');
      else if (a.status === 'executed' || a.status === 'auto-applied') cardClass.push('is-converted');
      else if (a.status === 'pending') cardClass.push('is-warning');

      return `
        <div class="${cardClass.join(' ')}" data-action-id="${esc(a.id)}">
          <div class="lead-grade" style="background:var(--bg-elevated);font-size:18px">${km.icon}</div>
          <div class="lead-body">
            <div class="lead-row-1">
              <span class="lead-name">${esc(km.label)} · ${esc(this.leadName(a))}</span>
              ${this.statusPill(a)}
              <span class="lead-pill is-source">${esc(a.proposedBy || 'homie')}</span>
              ${a.tier ? `<span class="lead-pill">T${esc(a.tier)}</span>` : ''}
              ${conf ? `<span class="lead-pill" style="color:var(--gold)">${conf}</span>` : ''}
            </div>
            ${a.summary ? `<div class="lead-row-2"><span class="data">${esc(a.summary)}</span></div>` : ''}
            ${preview ? `<div class="lead-note" id="action-preview-${esc(a.id)}">"${esc(String(preview).slice(0, 300))}${String(preview).length > 300 ? '…' : ''}"</div>` : ''}
            ${slots && slots.length ? `<div class="lead-row-2">${slots.map(s => `<span class="data">📅 ${esc(new Date(s).toLocaleString('it-IT', {weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}))}</span>`).join('')}</div>` : ''}
            ${a.executionError ? `<div class="lead-note" style="color:var(--danger)">⚠ ${esc(a.executionError)}</div>` : ''}
            <div class="lead-actions">
              ${canDecide ? `<button class="lead-btn success" ${busy ? 'disabled' : ''} onclick="ActionActions.approve('${esc(a.id)}')">${busy ? '⏳ eseguo…' : '✓ ' + esc(km.verb)}</button>` : ''}
              ${canDecide && (a.kind === 'reply' || a.kind === 'note') ? `<button class="lead-btn" ${busy ? 'disabled' : ''} onclick="ActionActions.editApprove('${esc(a.id)}')">✎ Modifica & approva</button>` : ''}
              ${canDecide ? `<button class="lead-btn danger" ${busy ? 'disabled' : ''} onclick="ActionActions.reject('${esc(a.id)}')">✕ Rifiuta</button>` : ''}
              ${a.status === 'failed' ? `<button class="lead-btn" onclick="ActionActions.retry('${esc(a.id)}')">↻ Riprova</button>` : ''}
              ${a.leadId ? `<a class="lead-btn muted" href="/portal#leads" target="_blank" rel="noopener">🔗 Portal</a>` : ''}
            </div>
          </div>
          <div class="lead-meta">
            <span class="lead-time">${esc(fmt.relTime(this.ts(a.createdAt)))}</span>
          </div>
        </div>
      `;
    },

    renderPanel() {
      const panel = $('#action-panel');
      if (!panel) return;
      this.start();
      const c = this.counts();
      const filter = STATE.actionsFilter;
      const items = this.filtered();
      const fb = (key, label) => `<button class="lead-filter-btn ${filter === key ? 'is-active' : ''}" onclick="ActionActions.setFilter('${key}')">${label}<span class="lead-filter-count">${c[key] ?? 0}</span></button>`;

      panel.innerHTML = `
        <div class="lead-toolbar">
          <div class="lead-filters">
            ${fb('pending', 'Da decidere')}
            ${fb('done', 'Fatte')}
            ${fb('failed', 'Errori')}
            ${fb('all', 'Tutte')}
          </div>
          <div class="lead-summary">
            ${c.pending > 0 ? `<span style="color:var(--warning)"><strong>${c.pending}</strong> in attesa</span>` : '<span style="color:var(--success)">coda pulita</span>'}
            <span><strong>${c.done}</strong> eseguite</span>
            ${c.failed > 0 ? `<span style="color:var(--danger)"><strong>${c.failed}</strong> errori</span>` : ''}
            ${c.pending > 1 ? `<button class="lead-btn success" style="margin-left:10px" onclick="ActionActions.bulkApprove()">✓✓ Approva tutte (${c.pending})</button>` : ''}
          </div>
        </div>
        ${items.length === 0 ? `
          <div class="empty-state">
            <div class="empty-icon">⚡</div>
            <div class="empty-title">${filter === 'pending' ? 'Nessuna decisione in coda' : 'Niente in questo filtro'}</div>
            <div class="empty-desc">${filter === 'pending'
              ? 'Quando Homie propone un\'azione Tier 2 (rispondere a un lead A, confermare un viewing, archiviare) compare qui.<br>Approvi con 1 tap → l\'executor la esegue davvero e ti mostra l\'esito.'
              : 'Cambia filtro per vedere altre azioni.'}</div>
            <div class="empty-hint">listener live · ${STATE.actions.length} azioni in cache</div>
          </div>
        ` : `<div class="lead-list">${items.map(a => this.renderCard(a)).join('')}</div>`}
      `;
    }
  };
  window.ActionStore = ActionStore;

  window.ActionActions = {
    setFilter(f) { STATE.actionsFilter = f; ActionStore.renderPanel(); },

    async _execute(id, override) {
      const action = STATE.actions.find(a => a.id === id);
      if (!action) return;
      STATE.actionsBusy[id] = true;
      ActionStore.renderPanel();
      try {
        // 1) mark approved for snappy feedback
        await db.collection('action_queue').doc(id).update({
          status: 'approved',
          approvedAt: firebase.firestore.FieldValue.serverTimestamp(),
          approvedBy: STATE.user?.email || 'cockpit'
        });
        // 2) trigger the server-side executor with the admin's ID token
        const idToken = await auth.currentUser.getIdToken();
        const r = await fetch('/api/agent/execute', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Firebase-Token': idToken },
          body: JSON.stringify(override ? { id, override } : { id })
        });
        const data = await r.json().catch(() => ({}));
        if (data?.ok && data.status === 'executed') {
          Toast.show({ type: 'success', title: 'Eseguita', desc: action.kind === 'reply' ? 'Messaggio inviato' : 'Azione applicata' });
        } else if (typeof data?.error === 'string' && data.error.startsWith('no_executor_for_kind')) {
          Toast.show({ type: 'info', title: 'Approvata', desc: 'Azione manuale — segnala come fatta a mano' });
        } else if (data?.ok === false) {
          Toast.show({ type: 'danger', title: 'Executor', desc: data.error || 'Esecuzione fallita' });
        } else {
          Toast.show({ type: 'info', title: 'In coda', desc: 'Sarà eseguita a breve' });
        }
      } catch (e) {
        Toast.show({ type: 'warning', title: 'Approvata', desc: 'Executor non raggiungibile, ritenterà' });
      } finally {
        STATE.actionsBusy[id] = false;
        ActionStore.renderPanel();
      }
    },

    approve(id) {
      const a = STATE.actions.find(x => x.id === id);
      const km = ActionStore.kindMeta(a?.kind);
      if (!confirm(`${km.verb}?`)) return;
      this._execute(id);
    },

    // Edit-before-approve, tailored per action kind.
    editApprove(id) {
      const a = STATE.actions.find(x => x.id === id);
      if (!a) return;
      const p = a.payload || {};
      let override = null;
      if (a.kind === 'reply') {
        const edited = prompt('Modifica il messaggio prima di inviarlo:', p.draft || p.body || '');
        if (edited === null) return;
        override = { body: edited, draft: edited };
      } else if (a.kind === 'note') {
        const edited = prompt('Modifica la nota:', p.text || p.note || a.summary || '');
        if (edited === null) return;
        override = { text: edited, note: edited };
      } else if (a.kind === 'schedule_viewing') {
        const cur = (p.proposedSlots || p.slots || []).join(', ');
        const edited = prompt('Slot proposti (date ISO separate da virgola):', cur);
        if (edited === null) return;
        const slots = edited.split(',').map(s => s.trim()).filter(Boolean);
        override = { proposedSlots: slots, slots };
      } else if (a.kind === 'archive') {
        const edited = prompt('Motivo archiviazione:', p.reason || '');
        if (edited === null) return;
        override = { reason: edited };
      } else if (a.kind === 'qualify') {
        const cur = [].concat(p.questions || []).join(' | ');
        const edited = prompt('Domande di qualifica (separate da |):', cur);
        if (edited === null) return;
        override = { questions: edited.split('|').map(s => s.trim()).filter(Boolean) };
      } else {
        const edited = prompt('Modifica:', p.text || a.summary || '');
        if (edited === null) return;
        override = { text: edited };
      }
      this._execute(id, override);
    },

    // Approve every pending action in one go (sequential to respect rate
    // limits and keep the toast feedback readable).
    async bulkApprove() {
      const pending = STATE.actions.filter(a => a.status === 'pending');
      if (!pending.length) return;
      if (!confirm(`Approvare ed eseguire ${pending.length} azioni in attesa?`)) return;
      let ok = 0, fail = 0;
      for (const a of pending) {
        try { await this._execute(a.id); ok++; } catch { fail++; }
      }
      Toast.show({ type: fail ? 'warning' : 'success', title: 'Coda processata', desc: `${ok} eseguite${fail ? `, ${fail} con problemi` : ''}` });
    },

    retry(id) { this._execute(id); },

    async reject(id) {
      if (!confirm('Rifiutare questa azione?')) return;
      try {
        await db.collection('action_queue').doc(id).update({
          status: 'rejected',
          rejectedAt: firebase.firestore.FieldValue.serverTimestamp(),
          rejectedBy: STATE.user?.email || 'cockpit'
        });
        Toast.show({ type: 'info', title: 'Rifiutata' });
      } catch (e) { Toast.show({ type: 'danger', title: 'Errore', desc: e.message }); }
    }
  };

  function updateActionBadge() {
    const c = ActionStore.counts();
    const el = $('#badge-actions');
    if (el) {
      el.textContent = c.pending;
      el.style.display = c.pending > 0 ? '' : 'none';
      const nav = el.closest('.nav-item');
      if (nav) nav.classList.toggle('has-urgent', c.pending > 0);
    }
  }

  // ───────────────────────────────────────────────────────────
  // RISK STORE — derives an at-risk list from contracts + payments + leads
  // already loaded in cache. No new collection: pure client-side scoring so
  // the panel is instant. /api/agent/risk.scan exposes the same logic to
  // Homie/Telegram server-side.
  // ───────────────────────────────────────────────────────────
  const RiskStore = {
    ts(v) { return v && v.toMillis ? v.toMillis() : (typeof v === 'string' ? Date.parse(v) : v) || null; },
    daysUntil(d) { if (!d) return null; const t = this.ts(d) || Date.parse(d); return isNaN(t) ? null : Math.round((t - Date.now()) / 86400000); },

    async compute() {
      // Ensure we have contracts + context loaded (reuse ContractStore cache).
      if (!STATE.ctxLoaded) await ContractStore.loadContext().catch(() => {});
      let contracts = STATE.contracts;
      if (!contracts || !contracts.length) {
        try { const s = await db.collection('contracts').limit(200).get(); contracts = s.docs.map(d => ({ id: d.id, ...d.data() })); STATE.contracts = contracts; } catch { contracts = []; }
      }
      let payments = [];
      try { const s = await db.collection('payments').limit(300).get(); payments = s.docs.map(d => ({ id: d.id, ...d.data() })); } catch {}

      const items = [];
      const propLabel = (c) => {
        const p = STATE.propertiesById[c.propertyId];
        return (p && (p.title || p.name || p.nickname)) || c.propertyName || c.propertyTitle || c.propertyId || 'Contratto';
      };

      // 1) Expiring contracts (renewal / RLI window)
      for (const c of contracts) {
        if (c.status === 'expired' || c.status === 'terminated' || c.status === 'draft') continue;
        const d = this.daysUntil(c.endDate);
        if (d == null) continue;
        if (d < 0) items.push({ sev: 'high', cat: 'Contratto scaduto', title: propLabel(c), detail: `Scaduto da ${Math.abs(d)} giorni — rinnovo o disdetta non registrati`, days: d, link: '/portal#contracts' });
        else if (d <= 30) items.push({ sev: 'high', cat: 'Scadenza contratto', title: propLabel(c), detail: `Scade tra ${d} giorni — preavviso/rinnovo`, days: d, link: '/portal#contracts' });
        else if (d <= 60) items.push({ sev: 'med', cat: 'Scadenza vicina', title: propLabel(c), detail: `Scade tra ${d} giorni`, days: d, link: '/portal#contracts' });
      }

      // 2) Unsigned active contracts
      for (const c of contracts) {
        if (c.status === 'draft' || c.status === 'expired') continue;
        const missing = [];
        if (!c.tenantSignature) missing.push('inquilino');
        if (!c.landlordSignature) missing.push('locatore');
        if (missing.length) items.push({ sev: c.status === 'active' ? 'high' : 'med', cat: 'Firma mancante', title: propLabel(c), detail: `Manca firma: ${missing.join(' + ')}`, days: 0, link: '/portal#contracts' });
      }

      // 3) Overdue payments
      const now = Date.now();
      for (const p of payments) {
        if (p.status === 'paid' || p.status === 'cancelled') continue;
        const due = this.ts(p.dueDate);
        if (due && due < now) {
          const late = Math.round((now - due) / 86400000);
          items.push({ sev: late > 7 ? 'high' : 'med', cat: 'Pagamento in ritardo', title: p.tenantName || p.description || 'Pagamento', detail: `€${(p.amount || 0).toLocaleString('it-IT')} · ${late}gg di ritardo`, days: -late, link: '/portal#payments' });
        }
      }

      // 4) Grade-A leads without follow-up > 24h
      for (const l of STATE.leads) {
        if ((l.status && l.status !== 'new')) continue;
        const grade = LeadStore.gradeOf ? LeadStore.gradeOf(l) : l.grade;
        if (grade !== 'A') continue;
        const age = now - (this.ts(l.createdAt) || now);
        if (age > 24 * 3600 * 1000) items.push({ sev: 'med', cat: 'Lead A senza follow-up', title: l.name || 'Lead', detail: `Grade A in attesa da ${Math.round(age / 3600000)}h`, days: 0, link: '/cockpit-preview#lead-inbox' });
      }

      const sevRank = { high: 0, med: 1, low: 2 };
      items.sort((a, b) => (sevRank[a.sev] - sevRank[b.sev]) || (a.days - b.days));
      // Stable key per risk (for snooze) + drop snoozed (unless showing them).
      const snz = this.snoozeMap();
      const nowMs = Date.now();
      items.forEach(i => { i.key = `${i.cat}|${i.title}`; });
      const active = items.filter(i => !(snz[i.key] && snz[i.key] > nowMs));
      STATE.riskSnoozedCount = items.length - active.length;
      const visible = STATE.showSnoozed ? items : active;
      STATE.riskItems = visible;
      // Sidebar badge reflects urgent count among the *active* (non-snoozed) ones.
      const high = active.filter(i => i.sev === 'high').length;
      const el = $('#badge-risks');
      if (el) {
        el.textContent = high;
        el.style.display = high > 0 ? '' : 'none';
        const nav = el.closest('.nav-item');
        if (nav) nav.classList.toggle('has-urgent', high > 0);
      }
      return visible;
    },

    // ── Snooze (local to this browser; 7-day default) ──
    snoozeMap() { try { return JSON.parse(localStorage.getItem('cockpit.risk.snooze') || '{}'); } catch { return {}; } },
    snooze(key, days = 7) {
      const m = this.snoozeMap();
      m[key] = Date.now() + days * 86400000;
      try { localStorage.setItem('cockpit.risk.snooze', JSON.stringify(m)); } catch {}
      Toast.show({ type: 'info', title: 'Rinviato', desc: `Nascosto per ${days} giorni` });
      this.renderPanel();
    },
    clearSnoozes() {
      try { localStorage.removeItem('cockpit.risk.snooze'); } catch {}
      STATE.showSnoozed = false;
      Toast.show({ type: 'info', title: 'Rinvii azzerati' });
      this.renderPanel();
    },
    toggleSnoozed() { STATE.showSnoozed = !STATE.showSnoozed; this.renderPanel(); },
    snoozeByIndex(idx) { const i = (STATE.riskItems || [])[idx]; if (i) this.snooze(i.key); },

    // Resolution actions per category → exact portal tool deep-links.
    actionsFor(i) {
      const a = [];
      if (/scadenz|scaduto/i.test(i.cat)) {
        a.push({ label: '🔄 Proponi rinnovo', href: '/portal#contracts' });
        a.push({ label: '📋 Genera RLI', href: '/portal#burocrazia' });
      } else if (/firma/i.test(i.cat)) {
        a.push({ label: '✍️ Apri firma', href: '/portal#contracts' });
      } else if (/pagamento/i.test(i.cat)) {
        a.push({ label: '💸 Sollecita', href: '/portal#payments' });
      } else if (/lead/i.test(i.cat)) {
        a.push({ label: '📨 Vai al lead', href: '#lead-inbox', internal: true });
      }
      return a;
    },

    async renderPanel() {
      const panel = $('#risk-panel');
      if (!panel) return;
      const items = await this.compute();
      const high = items.filter(i => i.sev === 'high').length;
      const med = items.filter(i => i.sev === 'med').length;
      const snoozed = STATE.riskSnoozedCount || 0;
      const sevMeta = { high: ['is-late', '🔴'], med: ['is-warning', '🟠'], low: ['is-fresh', '🟡'] };

      panel.innerHTML = `
        <div class="lead-toolbar">
          <div class="lead-summary">
            ${high > 0 ? `<span style="color:var(--danger)"><strong>${high}</strong> urgenti</span>` : '<span style="color:var(--success)">nessuna urgenza</span>'}
            ${med > 0 ? `<span style="color:var(--warning)"><strong>${med}</strong> da seguire</span>` : ''}
            <span><strong>${items.length}</strong> visibili</span>
          </div>
          <div class="page-actions">
            ${snoozed > 0 ? `<button class="lead-btn muted" onclick="RiskStore.toggleSnoozed()">${STATE.showSnoozed ? '🙈 Nascondi rinviati' : `👁 Mostra rinviati (${snoozed})`}</button>` : ''}
            ${STATE.showSnoozed && snoozed > 0 ? `<button class="lead-btn muted" onclick="RiskStore.clearSnoozes()">♻ Azzera rinvii</button>` : ''}
            <button class="lead-btn muted" onclick="RiskStore.renderPanel()">↻ Ricalcola</button>
          </div>
        </div>
        ${items.length === 0 ? `
          <div class="empty-state">
            <div class="empty-icon">✅</div>
            <div class="empty-title">Tutto sotto controllo</div>
            <div class="empty-desc">Nessun contratto in scadenza, nessuna firma mancante, nessun pagamento in ritardo, nessun lead A trascurato.${snoozed > 0 ? `<br><br>${snoozed} rischi rinviati.` : ''}</div>
          </div>
        ` : `<div class="lead-list">${items.map((i, idx) => {
          const [cls, dot] = sevMeta[i.sev] || sevMeta.low;
          const acts = this.actionsFor(i);
          const isSnoozed = STATE.showSnoozed && (this.snoozeMap()[i.key] || 0) > Date.now();
          return `
            <div class="lead-card ${cls}" ${isSnoozed ? 'style="opacity:.5"' : ''}>
              <div class="lead-grade" style="background:transparent;font-size:18px">${dot}</div>
              <div class="lead-body">
                <div class="lead-row-1">
                  <span class="lead-name">${esc(i.title)}</span>
                  <span class="lead-pill is-source">${esc(i.cat)}</span>
                  ${isSnoozed ? '<span class="lead-pill">rinviato</span>' : ''}
                </div>
                <div class="lead-row-2"><span class="data">${esc(i.detail)}</span></div>
                <div class="lead-actions">
                  ${acts.map(act => act.internal
                    ? `<a class="lead-btn primary" href="${esc(act.href)}">${act.label}</a>`
                    : `<a class="lead-btn primary" href="${esc(act.href)}" target="_blank" rel="noopener">${act.label}</a>`).join('')}
                  <button class="lead-btn muted" onclick="RiskStore.snoozeByIndex(${idx})">⏰ Rinvia 7g</button>
                </div>
              </div>
            </div>`;
        }).join('')}</div>`}
      `;
    }
  };
  window.RiskStore = RiskStore;

  // ───────────────────────────────────────────────────────────
  // DEAL COMPOSER — canone concordato Roma calculator
  // OMI zone bands (Roma "Accordo Territoriale" indicative €/m²/month ranges).
  // Values are advisory midpoints for a quick estimate, not legal certification.
  // ───────────────────────────────────────────────────────────
  const DealComposer = {
    // Indicative concordato €/m²/month midpoints by macro-zona.
    zones: {
      'Centro Storico':        { min: 14, max: 22 },
      'Prati / Borgo':         { min: 12, max: 19 },
      'Parioli / Pinciano':    { min: 12, max: 18 },
      'Trastevere / Testaccio':{ min: 13, max: 20 },
      'Esquilino / San Lorenzo':{ min: 10, max: 16 },
      'Nomentano / Salario':   { min: 10, max: 15 },
      'Ostiense / Garbatella': { min: 9,  max: 14 },
      'Aurelio / Gianicolense':{ min: 9,  max: 13 },
      'Tuscolano / Appio':     { min: 8,  max: 13 },
      'EUR / Marconi':         { min: 9,  max: 14 },
      'Pigneto / Prenestino':  { min: 9,  max: 14 },
      'Periferia':             { min: 6,  max: 10 },
    },
    state: { zone: 'Centro Storico', sqm: 50, band: 'mid', furnished: true, topFloor: false, renovated: false, cedolare: true, propertyId: '', tenantId: '', startDate: '', type: 'transitorio' },

    calc() {
      const s = this.state;
      const z = this.zones[s.zone] || { min: 8, max: 14 };
      let base = s.band === 'low' ? z.min : s.band === 'high' ? z.max : (z.min + z.max) / 2;
      let perSqm = base;
      const mods = [];
      if (s.furnished) { perSqm *= 1.15; mods.push(['Ammobiliato', '+15%']); }
      if (s.topFloor)  { perSqm *= 1.08; mods.push(['Attico/ultimo piano', '+8%']); }
      if (s.renovated) { perSqm *= 1.10; mods.push(['Ristrutturato', '+10%']); }
      const monthly = Math.round(perSqm * s.sqm);
      const yearly = monthly * 12;
      // Cedolare secca canone concordato = 10% (vs IRPEF ordinario ~ uses ~23%+ marginal)
      const cedolareTax = Math.round(yearly * 0.10);
      const deposit = monthly * 2;
      return { perSqm: perSqm.toFixed(1), monthly, yearly, cedolareTax, deposit, mods, base };
    },

    async renderPanel() {
      const panel = $('#deal-panel');
      if (!panel) return;
      // Lazy-load properties + tenants for the "save as draft" pickers.
      if (!STATE.ctxLoaded) await ContractStore.loadContext().catch(() => {});
      const s = this.state;
      const r = this.calc();
      const today = new Date();
      const rliDeadline = new Date(today.getTime() + 30 * 86400000);
      const zoneOpts = Object.keys(this.zones).map(z => `<option value="${esc(z)}" ${z === s.zone ? 'selected' : ''}>${esc(z)}</option>`).join('');
      const propOpts = ['<option value="">— scegli immobile —</option>'].concat(
        Object.values(STATE.propertiesById || {}).map(p => `<option value="${esc(p.id)}" ${p.id === s.propertyId ? 'selected' : ''}>${esc(p.title || p.name || p.nickname || p.address || p.id)}</option>`)
      ).join('');
      const tenantOpts = ['<option value="">— scegli inquilino —</option>'].concat(
        Object.values(STATE.usersById || {}).filter(u => !u.role || u.role === 'tenant' || u.role === 'user').map(u => `<option value="${esc(u.id)}" ${u.id === s.tenantId ? 'selected' : ''}>${esc(u.name || u.displayName || u.email || u.id)}</option>`)
      ).join('');
      if (!s.startDate) s.startDate = today.toISOString().slice(0, 10);

      panel.innerHTML = `
        <div class="deal-grid">
          <div class="deal-card">
            <div class="deal-card-title">Parametri immobile</div>
            <label class="deal-field"><span>Zona OMI</span>
              <select id="deal-zone">${zoneOpts}</select>
            </label>
            <label class="deal-field"><span>Superficie (m²)</span>
              <input type="number" id="deal-sqm" value="${s.sqm}" min="10" max="500">
            </label>
            <label class="deal-field"><span>Fascia canone</span>
              <select id="deal-band">
                <option value="low" ${s.band==='low'?'selected':''}>Minima</option>
                <option value="mid" ${s.band==='mid'?'selected':''}>Media</option>
                <option value="high" ${s.band==='high'?'selected':''}>Massima</option>
              </select>
            </label>
            <div class="deal-toggles">
              <label><input type="checkbox" id="deal-furnished" ${s.furnished?'checked':''}> Ammobiliato (+15%)</label>
              <label><input type="checkbox" id="deal-topfloor" ${s.topFloor?'checked':''}> Attico/ultimo piano (+8%)</label>
              <label><input type="checkbox" id="deal-renovated" ${s.renovated?'checked':''}> Ristrutturato (+10%)</label>
              <label><input type="checkbox" id="deal-cedolare" ${s.cedolare?'checked':''}> Cedolare secca 10%</label>
            </div>
          </div>
          <div class="deal-card deal-result">
            <div class="deal-card-title">Stima canone concordato</div>
            <div class="deal-big">€${r.monthly.toLocaleString('it-IT')}<span>/mese</span></div>
            <div class="deal-sub">${r.perSqm} €/m² · base ${r.base.toFixed(1)} €/m²</div>
            <div class="deal-lines">
              <div><span>Canone annuo</span><strong>€${r.yearly.toLocaleString('it-IT')}</strong></div>
              <div><span>Deposito (2 mensilità)</span><strong>€${r.deposit.toLocaleString('it-IT')}</strong></div>
              ${s.cedolare ? `<div><span>Imposta cedolare 10%/anno</span><strong>€${r.cedolareTax.toLocaleString('it-IT')}</strong></div>` : ''}
              ${r.mods.length ? `<div class="deal-mods">${r.mods.map(m => `<span class="lead-pill">${esc(m[0])} ${esc(m[1])}</span>`).join('')}</div>` : ''}
            </div>
            <div class="deal-deadline">📌 Registrazione RLI entro <strong>${rliDeadline.toLocaleDateString('it-IT')}</strong> (30gg da decorrenza). Cedolare: acconto novembre, saldo giugno.</div>
            <div class="deal-disclaimer">Stima indicativa su fasce concordato Roma. Per validità legale serve asseverazione di un'associazione firmataria dell'Accordo Territoriale.</div>
          </div>
          <div class="deal-card">
            <div class="deal-card-title">Genera contratto</div>
            <label class="deal-field"><span>Tipo</span>
              <select id="deal-type">
                <option value="transitorio" ${s.type==='transitorio'?'selected':''}>Transitorio</option>
                <option value="studenti" ${s.type==='studenti'?'selected':''}>Studenti</option>
              </select>
            </label>
            <label class="deal-field"><span>Immobile</span><select id="deal-prop">${propOpts}</select></label>
            <label class="deal-field"><span>Inquilino</span><select id="deal-tenant">${tenantOpts}</select></label>
            <label class="deal-field"><span>Decorrenza</span><input type="date" id="deal-start" value="${esc(s.startDate)}"></label>
            <div class="lead-actions" style="margin-top:6px">
              <button class="lead-btn primary" onclick="DealComposer.saveDraft()">📝 Salva come bozza</button>
              <button class="lead-btn" onclick="DealComposer.exportPDF()">📄 Esporta PDF</button>
            </div>
            <div class="deal-disclaimer">La bozza finisce in <code>contracts</code> (status draft); aprila nel Portal per generare l'Allegato e mandarla in firma.</div>
          </div>
        </div>
      `;
      // Bind
      const upd = () => { this.readForm(); this.renderPanel(); };
      $('#deal-zone').onchange = upd;
      $('#deal-band').onchange = upd;
      $('#deal-sqm').oninput = () => { this.readForm(); this.updateResultOnly(); };
      ['deal-furnished','deal-topfloor','deal-renovated','deal-cedolare'].forEach(id => { const el = $('#'+id); if (el) el.onchange = upd; });
      ['deal-type','deal-prop','deal-tenant','deal-start'].forEach(id => { const el = $('#'+id); if (el) el.onchange = () => this.readForm(); });
    },
    readForm() {
      this.state.zone = $('#deal-zone')?.value || this.state.zone;
      this.state.sqm = Math.max(5, parseInt($('#deal-sqm')?.value, 10) || this.state.sqm);
      this.state.band = $('#deal-band')?.value || this.state.band;
      this.state.furnished = !!$('#deal-furnished')?.checked;
      this.state.topFloor = !!$('#deal-topfloor')?.checked;
      this.state.renovated = !!$('#deal-renovated')?.checked;
      this.state.cedolare = !!$('#deal-cedolare')?.checked;
      if ($('#deal-type')) this.state.type = $('#deal-type').value;
      if ($('#deal-prop')) this.state.propertyId = $('#deal-prop').value;
      if ($('#deal-tenant')) this.state.tenantId = $('#deal-tenant').value;
      if ($('#deal-start')) this.state.startDate = $('#deal-start').value;
    },

    async saveDraft() {
      this.readForm();
      const s = this.state, r = this.calc();
      if (!s.propertyId) { Toast.show({ type: 'warning', title: 'Manca l\'immobile', desc: 'Scegli un immobile' }); return; }
      if (!s.tenantId)   { Toast.show({ type: 'warning', title: 'Manca l\'inquilino', desc: 'Scegli un inquilino' }); return; }
      try {
        const idToken = await auth.currentUser.getIdToken();
        const res = await fetch('/api/agent/contracts.draft', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Firebase-Token': idToken },
          body: JSON.stringify({
            type: s.type, propertyId: s.propertyId, tenantId: s.tenantId,
            startDate: s.startDate, rent: r.monthly, deposit: r.deposit,
            cedolareSecca: s.cedolare,
            notes: `Bozza da Deal Composer · ${s.zone} · ${s.sqm}m² · ${r.perSqm}€/m²`
          })
        });
        const data = await res.json().catch(() => ({}));
        if (data?.ok) Toast.show({ type: 'success', title: 'Bozza creata', desc: `Contratto ${s.type} · €${r.monthly}/mese · apri nel Portal` });
        else Toast.show({ type: 'danger', title: 'Errore', desc: data.error || 'Salvataggio fallito' });
      } catch (e) {
        Toast.show({ type: 'danger', title: 'Errore', desc: e.message });
      }
    },

    async exportPDF() {
      this.readForm();
      const s = this.state, r = this.calc();
      try {
        await loadJsPDF();
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const propName = (STATE.propertiesById[s.propertyId] || {});
        const gold = [184, 150, 12];
        doc.setFillColor(8, 8, 10); doc.rect(0, 0, 210, 32, 'F');
        doc.setTextColor(...gold); doc.setFontSize(20); doc.text('BOOM Roma', 14, 16);
        doc.setTextColor(255, 255, 255); doc.setFontSize(11); doc.text('Scheda canone concordato', 14, 24);
        let y = 46;
        doc.setTextColor(20, 20, 20); doc.setFontSize(12);
        const line = (k, v) => { doc.setFont(undefined, 'normal'); doc.setTextColor(110,110,110); doc.text(k, 14, y); doc.setTextColor(20,20,20); doc.setFont(undefined, 'bold'); doc.text(String(v), 120, y); y += 9; };
        line('Zona OMI', s.zone);
        line('Superficie', s.sqm + ' m²');
        line('Fascia', s.band === 'low' ? 'Minima' : s.band === 'high' ? 'Massima' : 'Media');
        line('Canone €/m²', r.perSqm + ' €/m²');
        if (r.mods.length) line('Modificatori', r.mods.map(m => m[0] + ' ' + m[1]).join(', '));
        y += 4; doc.setDrawColor(220,220,220); doc.line(14, y, 196, y); y += 12;
        doc.setFontSize(22); doc.setTextColor(...gold); doc.setFont(undefined, 'bold');
        doc.text('Euro ' + r.monthly.toLocaleString('it-IT') + ' / mese', 14, y); y += 14;
        doc.setFontSize(12);
