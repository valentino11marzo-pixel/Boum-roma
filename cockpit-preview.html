<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<meta name="theme-color" content="#08080A">
<meta name="color-scheme" content="dark">
<title>BOOM Cockpit · Preview</title>

<link rel="icon" type="image/png" href="https://www.boomrome.com/BOOMlogogoldicon512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/js/firebase-config.js"></script>

<style>
  /* ═════════════════════════════════════════════════════════════
     DESIGN TOKENS
     ═════════════════════════════════════════════════════════════ */
  :root {
    /* Brand */
    --gold: #D4AF37;
    --gold-bright: #E8C863;
    --gold-dark: #B8960C;
    --gold-soft: rgba(212, 175, 55, 0.12);
    --gold-glow: rgba(212, 175, 55, 0.35);

    /* Surfaces */
    --bg: #08080A;
    --bg-card: #0E0E11;
    --bg-elevated: #16161A;
    --bg-input: #1C1C21;
    --bg-hover: rgba(255, 255, 255, 0.035);
    --bg-active: rgba(255, 255, 255, 0.06);
    --bg-overlay: rgba(0, 0, 0, 0.72);

    /* Borders */
    --border: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.14);
    --border-gold: rgba(212, 175, 55, 0.30);

    /* Text */
    --text: #FAFAFB;
    --text-secondary: #A0A0A8;
    --text-muted: #5A5A66;
    --text-disabled: #3A3A44;

    /* States */
    --success: #2FD37A;
    --success-soft: rgba(47, 211, 122, 0.14);
    --warning: #F5A524;
    --warning-soft: rgba(245, 165, 36, 0.14);
    --danger: #F03B3B;
    --danger-soft: rgba(240, 59, 59, 0.14);
    --info: #4D9BFF;
    --info-soft: rgba(77, 155, 255, 0.14);

    /* Radii */
    --r-xs: 4px;
    --r-sm: 6px;
    --r-md: 8px;
    --r-lg: 12px;
    --r-xl: 16px;
    --r-pill: 100px;

    /* Shadows */
    --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.4);
    --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.4), 0 1px 2px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.5), 0 2px 6px rgba(0, 0, 0, 0.35);
    --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.6), 0 6px 12px rgba(0, 0, 0, 0.4);
    --shadow-gold: 0 0 0 1px var(--border-gold), 0 8px 24px var(--gold-glow);

    /* Easings */
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

    /* Layout */
    --topbar-h: 56px;
    --sidebar-w: 240px;
    --sidebar-w-collapsed: 64px;

    /* Typography */
    --font-sans: 'HelveticaNeue', 'Helvetica Neue', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  }

  /* ═════════════════════════════════════════════════════════════
     RESET & BASE
     ═════════════════════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    font-weight: 300;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }
  ::selection { background: var(--gold); color: #000; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  input, textarea { font: inherit; color: inherit; }
  kbd {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 2px 6px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-xs);
    color: var(--text-secondary);
    box-shadow: 0 1px 0 var(--border);
  }

  /* ═════════════════════════════════════════════════════════════
     AUTH SHIELD (pre-auth + access denied states)
     ═════════════════════════════════════════════════════════════ */
  #auth-shield {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
    flex-direction: column;
    gap: 24px;
    padding: 24px;
  }
  #auth-shield .shield-logo {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold-dark));
    border-radius: 50%;
    box-shadow: 0 0 32px var(--gold-glow);
    animation: pulse-glow 2.4s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 32px var(--gold-glow); }
    50% { box-shadow: 0 0 56px var(--gold-glow); }
  }
  #auth-shield .shield-title {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text);
  }
  #auth-shield .shield-subtitle {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-top: -16px;
  }
  #auth-shield .shield-msg {
    font-size: 14px;
    color: var(--text-secondary);
    text-align: center;
    max-width: 360px;
    line-height: 1.6;
  }
  #auth-shield .shield-cta {
    margin-top: 8px;
    padding: 12px 28px;
    background: var(--gold);
    color: #000;
    border-radius: var(--r-md);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: transform 0.18s var(--ease-spring), box-shadow 0.18s var(--ease-out);
  }
  #auth-shield .shield-cta:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px var(--gold-glow);
  }

  /* ═════════════════════════════════════════════════════════════
     APP LAYOUT
     ═════════════════════════════════════════════════════════════ */
  .app {
    display: grid;
    grid-template-rows: var(--topbar-h) 1fr;
    height: 100vh;
  }
  .app[hidden] { display: none; }
  .app-body {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    overflow: hidden;
    transition: grid-template-columns 0.28s var(--ease-out);
  }
  .app.sidebar-collapsed .app-body {
    grid-template-columns: var(--sidebar-w-collapsed) 1fr;
  }

  /* ═════════════════════════════════════════════════════════════
     TOP BAR
     ═════════════════════════════════════════════════════════════ */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    background: rgba(8, 8, 10, 0.85);
    backdrop-filter: saturate(180%) blur(16px);
    -webkit-backdrop-filter: saturate(180%) blur(16px);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 50;
  }
  .top-bar-left, .top-bar-right {
    display: flex; align-items: center; gap: 16px;
  }
  .top-bar-center {
    display: flex; align-items: center; gap: 12px;
  }
  .sidebar-toggle {
    width: 32px; height: 32px;
    border-radius: var(--r-md);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    transition: background 0.16s, color 0.16s;
  }
  .sidebar-toggle:hover { background: var(--bg-hover); color: var(--text); }
  .sidebar-toggle svg { width: 16px; height: 16px; }

  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-circle {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold-dark));
    border-radius: 50%;
    box-shadow: 0 0 14px var(--gold-glow);
  }
  .logo-text {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .logo-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--gold);
    padding: 3px 7px;
    background: var(--gold-soft);
    border-radius: var(--r-xs);
    margin-left: 4px;
    vertical-align: middle;
  }

  /* Heartbeat badge */
  .heartbeat-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-pill);
    font-size: 12px;
    transition: border-color 0.2s, background 0.2s;
  }
  .heartbeat-badge .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    box-shadow: 0 0 0 0 transparent;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .heartbeat-badge .label {
    color: var(--text-secondary);
    font-weight: 500;
    letter-spacing: 0.4px;
  }
  .heartbeat-badge .time {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .heartbeat-badge.is-live { border-color: rgba(47, 211, 122, 0.22); background: rgba(47, 211, 122, 0.04); }
  .heartbeat-badge.is-live .dot { background: var(--success); box-shadow: 0 0 0 4px rgba(47, 211, 122, 0.18); animation: pulse-dot 1.6s ease-in-out infinite; }
  .heartbeat-badge.is-live .time { color: var(--success); }
  .heartbeat-badge.is-warning { border-color: rgba(245, 165, 36, 0.30); background: rgba(245, 165, 36, 0.04); }
  .heartbeat-badge.is-warning .dot { background: var(--warning); box-shadow: 0 0 0 4px rgba(245, 165, 36, 0.20); }
  .heartbeat-badge.is-warning .time { color: var(--warning); }
  .heartbeat-badge.is-critical { border-color: rgba(240, 59, 59, 0.35); background: rgba(240, 59, 59, 0.05); }
  .heartbeat-badge.is-critical .dot { background: var(--danger); box-shadow: 0 0 0 4px rgba(240, 59, 59, 0.22); animation: pulse-dot 1s ease-in-out infinite; }
  .heartbeat-badge.is-critical .time { color: var(--danger); }
  .heartbeat-badge.is-offline { opacity: 0.6; }
  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.4); }
  }

  /* CmdK trigger */
  .cmdk-trigger {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 12px 6px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    font-size: 12px;
    color: var(--text-secondary);
    min-width: 180px;
    transition: border-color 0.18s, background 0.18s;
  }
  .cmdk-trigger:hover { border-color: var(--border-strong); background: var(--bg-elevated); }
  .cmdk-trigger svg { width: 13px; height: 13px; opacity: 0.7; }
  .cmdk-trigger span:first-of-type { flex: 1; text-align: left; }

  /* User chip */
  .user-chip {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 10px 4px 4px;
    border-radius: var(--r-pill);
    background: var(--bg-card);
    border: 1px solid var(--border);
  }
  .user-avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold-dark));
    color: #000;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .user-email {
    font-size: 12px;
    color: var(--text-secondary);
    max-width: 200px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ═════════════════════════════════════════════════════════════
     SIDEBAR
     ═════════════════════════════════════════════════════════════ */
  .sidebar {
    background: var(--bg);
    border-right: 1px solid var(--border);
    padding: 16px 12px;
    display: flex; flex-direction: column;
    gap: 24px;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .nav-section { display: flex; flex-direction: column; gap: 2px; }
  .nav-section-bottom { margin-top: auto; }
  .nav-section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 8px 12px 4px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border-radius: var(--r-md);
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.14s, color 0.14s;
    position: relative;
    white-space: nowrap;
  }
  .nav-item:hover { background: var(--bg-hover); color: var(--text); }
  .nav-item.is-active {
    background: var(--gold-soft);
    color: var(--gold);
  }
  .nav-item.is-active::before {
    content: '';
    position: absolute; left: 0; top: 8px; bottom: 8px;
    width: 2px;
    background: var(--gold);
    border-radius: 0 2px 2px 0;
    margin-left: -12px;
  }
  .nav-icon {
    font-size: 16px;
    width: 20px; text-align: center;
    flex-shrink: 0;
  }
  .nav-label {
    flex: 1;
    transition: opacity 0.2s;
  }
  .nav-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 7px;
    background: var(--bg-elevated);
    border-radius: var(--r-pill);
    color: var(--text-muted);
    font-weight: 500;
  }
  .nav-item.is-active .nav-badge { background: var(--gold); color: #000; }
  .nav-item.has-urgent .nav-badge { background: var(--danger); color: #fff; animation: pulse-dot 1.8s ease-in-out infinite; }

  /* Collapsed sidebar */
  .app.sidebar-collapsed .nav-label,
  .app.sidebar-collapsed .nav-badge,
  .app.sidebar-collapsed .nav-section-title {
    opacity: 0;
    pointer-events: none;
  }
  .app.sidebar-collapsed .nav-item {
    padding: 10px;
    justify-content: center;
  }
  .app.sidebar-collapsed .nav-item.is-active::before { margin-left: -10px; }

  /* ═════════════════════════════════════════════════════════════
     MAIN PANE
     ═════════════════════════════════════════════════════════════ */
  .main-pane {
    background: var(--bg-card);
    overflow-y: auto;
    padding: 24px 32px;
  }
  .page-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 16px;
    padding-bottom: 20px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .page-title {
    font-size: 24px;
    font-weight: 400;
    letter-spacing: 0.3px;
    color: var(--text);
    display: flex; align-items: center; gap: 12px;
  }
  .page-title-icon {
    font-size: 22px;
    opacity: 0.85;
  }
  .page-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .page-actions { display: flex; gap: 8px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 16px;
    border-radius: var(--r-md);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.4px;
    transition: all 0.16s var(--ease-out);
    border: 1px solid transparent;
  }
  .btn-primary { background: var(--gold); color: #000; font-weight: 600; }
  .btn-primary:hover { background: var(--gold-bright); transform: translateY(-1px); box-shadow: 0 8px 20px var(--gold-glow); }
  .btn-secondary { background: var(--bg-elevated); color: var(--text); border-color: var(--border); }
  .btn-secondary:hover { background: var(--bg-input); border-color: var(--border-strong); }
  .btn-ghost { background: transparent; color: var(--text-secondary); }
  .btn-ghost:hover { background: var(--bg-hover); color: var(--text); }
  .btn-sm { padding: 6px 12px; font-size: 11px; }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 24px;
    text-align: center;
    gap: 16px;
  }
  .empty-icon {
    width: 72px; height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--bg-elevated), var(--bg-card));
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: var(--shadow-md);
  }
  .empty-title {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    margin-top: 8px;
  }
  .empty-desc {
    font-size: 13px;
    color: var(--text-secondary);
    max-width: 440px;
    line-height: 1.7;
  }
  .empty-hint {
    margin-top: 16px;
    padding: 10px 16px;
    background: var(--bg-elevated);
    border: 1px dashed var(--border-strong);
    border-radius: var(--r-md);
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.4px;
    max-width: 480px;
  }

  /* Coming-soon banner inside empty pane */
  .soon-banner {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: var(--gold-soft);
    border: 1px solid var(--border-gold);
    border-radius: var(--r-pill);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
  }

  /* ── Deal Composer + Settings panels ── */
  .deal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .deal-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-lg, 14px); padding: 18px 20px; }
  .deal-card-title { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 14px; }
  .deal-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; font-size: 12px; color: var(--text-secondary); }
  .deal-field select, .deal-field input { background: var(--bg-input, #1A1A1A); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 11px; font-size: 14px; }
  .deal-field select:focus, .deal-field input:focus { outline: none; border-color: var(--gold); }
  .deal-toggles { display: flex; flex-direction: column; gap: 9px; margin-top: 6px; }
  .deal-toggles label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text); cursor: pointer; }
  .deal-toggles input { accent-color: var(--gold); width: 15px; height: 15px; }
  .deal-result { background: linear-gradient(160deg, var(--bg-elevated, #141414), var(--bg-card)); border-color: var(--border-gold, rgba(212,175,55,0.25)); }
  .deal-big { font-size: 40px; font-weight: 300; color: var(--gold); letter-spacing: -1px; line-height: 1.1; }
  .deal-big span { font-size: 16px; color: var(--text-secondary); margin-left: 4px; }
  .deal-sub { font-size: 12px; color: var(--text-secondary); margin: 4px 0 14px; }
  .deal-lines > div { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-secondary); }
  .deal-lines > div strong { color: var(--text); font-weight: 600; }
  .deal-lines .deal-mods { border: none; flex-wrap: wrap; gap: 6px; padding-top: 10px; }
  .deal-deadline { margin-top: 14px; padding: 10px 12px; background: var(--gold-soft, rgba(212,175,55,0.08)); border-radius: 8px; font-size: 12px; color: var(--text); line-height: 1.5; }
  .deal-disclaimer { margin-top: 10px; font-size: 11px; color: var(--text-muted, #777); line-height: 1.5; }
  .settings-tool { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; }
  .settings-tool code { color: var(--gold); font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
  .settings-pre { background: #0b0b0b; border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 11px; color: var(--text-secondary); overflow: auto; max-height: 320px; white-space: pre-wrap; word-break: break-word; }

  /* ── Lead search ── */
  .lead-search { background: var(--bg-input, #1A1A1A); border: 1px solid var(--border); border-radius: var(--r-pill, 999px); color: var(--text); padding: 7px 14px; font-size: 13px; min-width: 220px; }
  .lead-search:focus { outline: none; border-color: var(--gold); }

  /* ── Detail drawer ── */
  .drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); opacity: 0; pointer-events: none; transition: opacity .22s ease; z-index: 200; }
  .drawer-backdrop.is-open { opacity: 1; pointer-events: auto; }
  .drawer { position: absolute; top: 0; right: 0; height: 100%; width: min(440px, 92vw); background: var(--bg-card, #0A0A0A); border-left: 1px solid var(--border-gold, rgba(212,175,55,0.25)); box-shadow: -20px 0 60px rgba(0,0,0,0.5); transform: translateX(100%); transition: transform .26s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; }
  .drawer-backdrop.is-open .drawer { transform: translateX(0); }
  .drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); }
  .drawer-head h3 { margin: 0; font-size: 16px; font-weight: 500; color: var(--text); }
  .drawer-close { background: none; border: none; color: var(--text-secondary); font-size: 26px; line-height: 1; cursor: pointer; }
  .drawer-close:hover { color: var(--text); }
  .drawer-body { padding: 18px 20px; overflow-y: auto; }
  .drawer-badges { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; }
  .drawer-row { display: flex; justify-content: space-between; gap: 16px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-secondary); }
  .drawer-row strong { color: var(--text); font-weight: 600; text-align: right; }
  .drawer-note { margin: 14px 0; padding: 12px 14px; background: var(--bg-elevated, #141414); border-radius: 8px; font-style: italic; color: var(--text); font-size: 13px; line-height: 1.5; }
  .drawer-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }

  /* ═════════════════════════════════════════════════════════════
     CMDK PALETTE
     ═════════════════════════════════════════════════════════════ */
  #cmdk-overlay {
    position: fixed; inset: 0;
    background: var(--bg-overlay);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 12vh;
    z-index: 1000;
    animation: fade-in 0.16s var(--ease-out);
  }
  #cmdk-overlay[hidden] { display: none; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  .cmdk-modal {
    width: min(640px, 90vw);
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: slide-down 0.22s var(--ease-out);
  }
  @keyframes slide-down {
    from { transform: translateY(-12px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .cmdk-input {
    width: 100%;
    padding: 18px 20px;
    background: transparent;
    border: none;
    outline: none;
    font-size: 16px;
    font-weight: 300;
    color: var(--text);
    border-bottom: 1px solid var(--border);
  }
  .cmdk-input::placeholder { color: var(--text-muted); font-weight: 300; }
  .cmdk-results {
    max-height: 50vh;
    overflow-y: auto;
    padding: 8px 0;
  }
  .cmdk-group-label {
    padding: 10px 20px 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .cmdk-item {
    display: flex; align-items: center; gap: 14px;
    padding: 11px 20px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .cmdk-item:hover, .cmdk-item.is-selected {
    background: var(--bg-hover);
  }
  .cmdk-item.is-selected {
    background: var(--gold-soft);
  }
  .cmdk-item-icon {
    font-size: 16px;
    width: 22px; text-align: center;
    flex-shrink: 0;
    opacity: 0.85;
  }
  .cmdk-item-label {
    flex: 1;
    font-size: 13px;
    color: var(--text);
  }
  .cmdk-item-hint {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.4px;
  }
  .cmdk-item mark {
    background: transparent;
    color: var(--gold);
    font-weight: 500;
  }
  .cmdk-empty {
    padding: 32px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }
  .cmdk-footer {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    display: flex; gap: 16px; align-items: center;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.4px;
  }
  .cmdk-footer kbd { margin: 0 2px; }

  /* ═════════════════════════════════════════════════════════════
     TOASTS
     ═════════════════════════════════════════════════════════════ */
  #toast-stack {
    position: fixed; top: 72px; right: 20px;
    display: flex; flex-direction: column; gap: 10px;
    z-index: 2000;
    max-width: 360px;
    pointer-events: none;
  }
  .toast {
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-left: 3px solid var(--gold);
    border-radius: var(--r-md);
    padding: 12px 16px;
    box-shadow: var(--shadow-md);
    display: flex; align-items: flex-start; gap: 12px;
    pointer-events: auto;
    animation: slide-in-right 0.28s var(--ease-out);
  }
  .toast.toast-success { border-left-color: var(--success); }
  .toast.toast-warning { border-left-color: var(--warning); }
  .toast.toast-danger { border-left-color: var(--danger); }
  .toast.toast-info { border-left-color: var(--info); }
  .toast-icon { font-size: 16px; flex-shrink: 0; }
  .toast-body { flex: 1; }
  .toast-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .toast-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; line-height: 1.5; }
  .toast-close {
    color: var(--text-muted);
    font-size: 14px; line-height: 1;
    padding: 0;
    transition: color 0.12s;
  }
  .toast-close:hover { color: var(--text); }
  @keyframes slide-in-right {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ═════════════════════════════════════════════════════════════
     LEAD INBOX
     ═════════════════════════════════════════════════════════════ */
  .lead-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .lead-filters {
    display: inline-flex; gap: 4px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-pill);
    padding: 4px;
  }
  .lead-filter-btn {
    padding: 6px 14px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.4px;
    border-radius: var(--r-pill);
    cursor: pointer;
    transition: all 0.16s var(--ease-out);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .lead-filter-btn:hover { color: var(--text); }
  .lead-filter-btn.is-active {
    background: var(--gold-soft);
    color: var(--gold);
  }
  .lead-filter-count {
    font-size: 10px;
    padding: 1px 6px;
    background: var(--bg-card);
    border-radius: 10px;
    color: var(--text-muted);
  }
  .lead-filter-btn.is-active .lead-filter-count {
    background: rgba(212,175,55,0.2);
    color: var(--gold);
  }

  .lead-summary {
    display: flex; align-items: center; gap: 12px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.6px;
    text-transform: uppercase;
  }
  .lead-summary strong { color: var(--text); font-weight: 500; }

  .lead-list {
    display: flex; flex-direction: column;
    gap: 10px;
  }

  .lead-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 16px 18px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: flex-start;
    transition: border-color 0.16s, transform 0.16s;
    position: relative;
    overflow: hidden;
  }
  .lead-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--border);
    transition: background 0.16s;
  }
  .lead-card:hover { border-color: var(--border-strong); }
  .lead-card.is-fresh::before { background: var(--gold); }
  .lead-card.is-warning::before { background: var(--warning); }
  .lead-card.is-late::before { background: var(--danger); }
  .lead-card.is-discarded { opacity: 0.45; }
  .lead-card.is-converted::before { background: var(--success); }

  .lead-grade {
    width: 38px; height: 38px;
    border-radius: var(--r-md);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0;
    border: 1px solid var(--border-strong);
    flex-shrink: 0;
  }
  .lead-grade.grade-A { background: rgba(212,175,55,0.14); color: var(--gold); border-color: rgba(212,175,55,0.4); }
  .lead-grade.grade-B { background: rgba(46,143,255,0.12); color: #6FB1FF; border-color: rgba(46,143,255,0.35); }
  .lead-grade.grade-C { background: rgba(255,255,255,0.05); color: var(--text-secondary); }
  .lead-grade.grade-dead { background: rgba(255,255,255,0.03); color: var(--text-muted); font-size: 12px; }

  .lead-body { min-width: 0; }
  .lead-row-1 {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .lead-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.2px;
  }
  .lead-flag { font-size: 12px; }

  .lead-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-pill);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .lead-pill.is-new { background: var(--gold-soft); color: var(--gold); border-color: var(--border-gold); }
  .lead-pill.is-responded { background: rgba(46,143,255,0.1); color: #6FB1FF; border-color: rgba(46,143,255,0.3); }
  .lead-pill.is-converted { background: rgba(34,197,94,0.1); color: var(--success); border-color: rgba(34,197,94,0.3); }
  .lead-pill.is-discarded { background: rgba(255,255,255,0.03); color: var(--text-muted); }
  .lead-pill.is-source { background: transparent; }

  .lead-row-2 {
    font-size: 12.5px;
    color: var(--text-secondary);
    line-height: 1.55;
    display: flex; flex-wrap: wrap; gap: 4px 14px;
  }
  .lead-row-2 .data { display: inline-flex; align-items: center; gap: 4px; }
  .lead-row-2 .data .gold { color: var(--gold); font-weight: 500; }

  .lead-note {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    font-style: italic;
    border-left: 2px solid var(--border);
    padding-left: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .lead-actions {
    margin-top: 10px;
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .lead-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.3px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.14s var(--ease-out);
  }
  .lead-btn:hover {
    background: var(--bg-hover);
    color: var(--text);
    border-color: var(--border-strong);
  }
  .lead-btn.primary {
    background: var(--gold-soft);
    color: var(--gold);
    border-color: var(--border-gold);
  }
  .lead-btn.primary:hover { background: rgba(212,175,55,0.22); color: var(--gold); }
  .lead-btn.success { color: var(--success); border-color: rgba(34,197,94,0.3); }
  .lead-btn.success:hover { background: rgba(34,197,94,0.1); }
  .lead-btn.muted { color: var(--text-muted); }
  .lead-btn.danger { color: var(--text-muted); }
  .lead-btn.danger:hover { color: var(--danger); border-color: rgba(255,59,48,0.3); }

  .lead-meta {
    text-align: right;
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
    flex-shrink: 0;
  }
  .lead-time { font-family: var(--font-mono); }
  .lead-sla {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px;
    border-radius: var(--r-pill);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.4px;
    font-family: var(--font-mono);
  }
  .lead-sla.is-fresh { background: var(--gold-soft); color: var(--gold); }
  .lead-sla.is-warning { background: rgba(247,159,31,0.1); color: var(--warning); }
  .lead-sla.is-late { background: rgba(255,59,48,0.1); color: var(--danger); }
  .lead-sla.is-night { background: rgba(255,255,255,0.04); color: var(--text-muted); }
  .lead-sla.is-done { background: rgba(34,197,94,0.1); color: var(--success); }

  @media (max-width: 720px) {
    .lead-card { grid-template-columns: auto 1fr; }
    .lead-meta { grid-column: 2; text-align: left; align-items: flex-start; margin-top: 4px; }
    .lead-toolbar { flex-direction: column; align-items: stretch; }
  }

  /* ═════════════════════════════════════════════════════════════
     CONTRACTS
     ═════════════════════════════════════════════════════════════ */
  .ct-stat-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 18px;
  }
  .ct-stat {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px 16px;
    transition: border-color 0.16s, transform 0.12s;
    cursor: pointer;
  }
  .ct-stat:hover { border-color: var(--border-strong); transform: translateY(-1px); }
  .ct-stat.is-active { border-color: var(--border-gold); background: var(--gold-soft); }
  .ct-stat.is-warn { border-left: 3px solid var(--warning); }
  .ct-stat.is-danger { border-left: 3px solid var(--danger); }
  .ct-stat-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .ct-stat-value {
    margin-top: 4px;
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
    font-family: var(--font-mono);
  }
  .ct-stat-sub {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .ct-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 18px;
    align-items: flex-start;
    transition: border-color 0.16s;
    position: relative;
    overflow: hidden;
  }
  .ct-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--border);
  }
  .ct-card.is-active::before { background: var(--success); }
  .ct-card.is-soon::before { background: var(--warning); }
  .ct-card.is-urgent::before { background: var(--danger); }
  .ct-card.is-expired::before { background: var(--text-muted); }
  .ct-card.is-expired { opacity: 0.6; }
  .ct-card:hover { border-color: var(--border-strong); }

  .ct-head {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .ct-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }
  .ct-type {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gold);
    padding: 2px 8px;
    background: var(--gold-soft);
    border-radius: var(--r-pill);
  }
  .ct-sig {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: var(--r-pill);
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .ct-sig.is-complete { background: rgba(34,197,94,0.1); color: var(--success); border-color: rgba(34,197,94,0.3); }
  .ct-sig.is-partial { background: rgba(247,159,31,0.1); color: var(--warning); border-color: rgba(247,159,31,0.3); }
  .ct-sig.is-none { background: rgba(255,59,48,0.08); color: var(--danger); border-color: rgba(255,59,48,0.25); }

  .ct-meta {
    font-size: 12.5px;
    color: var(--text-secondary);
    line-height: 1.6;
    display: flex; flex-wrap: wrap; gap: 4px 16px;
  }
  .ct-meta .data { display: inline-flex; align-items: center; gap: 4px; }
  .ct-meta .gold { color: var(--gold); font-weight: 500; }

  .ct-actions {
    margin-top: 12px;
    display: flex; gap: 6px; flex-wrap: wrap;
  }

  .ct-rent {
    text-align: right;
    flex-shrink: 0;
    min-width: 100px;
  }
  .ct-rent-amount {
    font-size: 22px;
    font-weight: 300;
    color: var(--gold);
    font-family: var(--font-mono);
    letter-spacing: -0.5px;
  }
  .ct-rent-sub {
    font-size: 11px;
    color: var(--text-muted);
  }
  .ct-rent-days {
    margin-top: 8px;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: var(--r-pill);
    font-family: var(--font-mono);
    display: inline-block;
  }
  .ct-rent-days.is-soon { background: rgba(247,159,31,0.12); color: var(--warning); }
  .ct-rent-days.is-urgent { background: rgba(255,59,48,0.12); color: var(--danger); }
  .ct-rent-days.is-active { background: rgba(34,197,94,0.1); color: var(--success); }
  .ct-rent-days.is-expired { background: rgba(255,255,255,0.04); color: var(--text-muted); }

  /* Magic-link side drawer (revealed inline) */
  .ct-mlink {
    margin-top: 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    padding: 10px 12px;
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .ct-mlink-label {
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-size: 10px;
    font-family: var(--font-sans);
  }
  .ct-mlink-url {
    flex: 1;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    user-select: all;
  }

  @media (max-width: 720px) {
    .ct-card { grid-template-columns: 1fr; }
    .ct-rent { text-align: left; }
  }

  /* ═════════════════════════════════════════════════════════════
     MOBILE / RESPONSIVE
     ═════════════════════════════════════════════════════════════ */
  @media (max-width: 880px) {
    .top-bar-center { display: none; }
    .cmdk-trigger { min-width: auto; }
    .cmdk-trigger span:first-of-type { display: none; }
    .user-email { display: none; }
    .user-chip { padding: 4px; }
    .main-pane { padding: 20px 16px; }
    .page-header { flex-direction: column; align-items: flex-start; }
  }
  @media (max-width: 720px) {
    .app-body { grid-template-columns: 0 1fr; }
    .sidebar {
      position: fixed; left: 0; top: var(--topbar-h); bottom: 0;
      width: var(--sidebar-w);
      z-index: 60;
      transform: translateX(-100%);
      transition: transform 0.28s var(--ease-out);
    }
    .app.sidebar-mobile-open .sidebar { transform: translateX(0); }
    .app.sidebar-mobile-open::after {
      content: '';
      position: fixed; inset: var(--topbar-h) 0 0 0;
      background: var(--bg-overlay);
      z-index: 55;
    }
  }

  /* ═════════════════════════════════════════════════════════════
     UTILITIES
     ═════════════════════════════════════════════════════════════ */
  .mono { font-family: var(--font-mono); }
  .text-secondary { color: var(--text-secondary); }
  .text-muted { color: var(--text-muted); }
  .gold { color: var(--gold); }
  [hidden] { display: none !important; }
</style>
</head>

<body>

<!-- ═════════════════════════════════════════════════════════════
     AUTH SHIELD
     ═════════════════════════════════════════════════════════════ -->
<div id="auth-shield">
  <div class="shield-logo"></div>
  <div class="shield-title">BOOM</div>
  <div class="shield-subtitle">Cockpit · Preview</div>
  <div class="shield-msg" id="auth-msg">Verifico autenticazione...</div>
  <a href="/login?next=%2Fcockpit-preview" class="shield-cta" id="auth-cta" hidden>Accedi</a>
</div>

<!-- ═════════════════════════════════════════════════════════════
     APP
     ═════════════════════════════════════════════════════════════ -->
<div class="app" id="app" hidden>
