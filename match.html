<script>
(function(root){
  'use strict';
  // Compact Rome zone dataset (from neighborhoods-data.js)
  const ZONES = [
    {s:"trastevere",n:"Trastevere",lat:41.8896,lng:12.4695,rmin:1400,rmax:2200,walk:10,vibe:10,transit:8,vibeTxt:"Cobblestone bohemian. Postcard Rome."},
    {s:"centro-storico",n:"Centro Storico",lat:41.8989,lng:12.4769,rmin:1800,rmax:3500,walk:10,vibe:9,transit:8,vibeTxt:"UNESCO postcard. Vivi dentro la città antica."},
    {s:"monti",n:"Monti",lat:41.8946,lng:12.4926,rmin:1500,rmax:2400,walk:10,vibe:10,transit:9,vibeTxt:"Il quartiere cool originale. Colosseo dietro l'angolo."},
    {s:"prati",n:"Prati",lat:41.9080,lng:12.4602,rmin:1600,rmax:2600,walk:9,vibe:8,transit:9,vibeTxt:"Elegante, residenziale, ordinato. Vaticano oltre il fiume."},
    {s:"pigneto",n:"Pigneto",lat:41.8867,lng:12.5257,rmin:900,rmax:1500,walk:8,vibe:10,transit:8,vibeTxt:"La Brooklyn di Roma. Street art, cocktail bar."},
    {s:"testaccio",n:"Testaccio",lat:41.8782,lng:12.4753,rmin:1200,rmax:1900,walk:9,vibe:9,transit:9,vibeTxt:"Roma verace, capitale del cibo, zero turisti."},
    {s:"ostiense",n:"Ostiense",lat:41.8736,lng:12.4778,rmin:1000,rmax:1600,walk:8,vibe:8,transit:9,vibeTxt:"Industrial-cool. Capitale della street art."},
    {s:"trieste-coppede",n:"Trieste & Coppedè",lat:41.9239,lng:12.5075,rmin:1200,rmax:1800,walk:7,vibe:8,transit:7,vibeTxt:"Tranquillo, elegante, residenziale."},
    {s:"san-lorenzo",n:"San Lorenzo",lat:41.8993,lng:12.5147,rmin:800,rmax:1400,walk:9,vibe:8,transit:8,vibeTxt:"Universitario. Economico. Notti vive."},
    {s:"esquilino",n:"Esquilino",lat:41.8954,lng:12.5021,rmin:900,rmax:1500,walk:10,vibe:7,transit:10,vibeTxt:"Multiculturale, vivace. Il vero melting pot."}
  ];
  const UNIS = [
    {id:"sapienza",n:"Sapienza — Città Universitaria",lat:41.9036,lng:12.5145},
    {id:"luiss",n:"LUISS Guido Carli (Parioli)",lat:41.9244,lng:12.4965},
    {id:"romatre",n:"Roma Tre (Ostiense)",lat:41.8589,lng:12.4737},
    {id:"jcu",n:"John Cabot University (Trastevere)",lat:41.8902,lng:12.4663},
    {id:"aur",n:"The American University of Rome (Gianicolo)",lat:41.8861,lng:12.4565},
    {id:"lumsa",n:"LUMSA (Borgo / Vaticano)",lat:41.9039,lng:12.4615},
    {id:"cattolica",n:"Cattolica — Policlinico Gemelli",lat:41.9320,lng:12.4290},
    {id:"ied",n:"IED / NABA (Trastevere–Ostiense)",lat:41.8790,lng:12.4720},
    {id:"torvergata",n:"Tor Vergata",lat:41.8540,lng:12.6266},
    {id:"biomedico",n:"Campus Bio-Medico (Trigoria)",lat:41.7838,lng:12.4216}
  ];

  function haversine(a, b){
    const R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
    const s=Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.min(1,Math.sqrt(s)));
  }
  // Rome door-to-door estimates (no external API): walk 5km/h; transit 18km/h + 12min overhead.
  function commute(zone, uni){
    const km = haversine(zone, uni);
    const walk = Math.round(km/5*60);
    const transit = Math.round(12 + km/18*60);
    return { km:Math.round(km*10)/10, walk, transit, reach: Math.min(walk, transit) };
  }

  // answers: { uni:id, maxMin, budget, vibe:'lively'|'quiet'|'balanced', prio:[], setup:'solo'|'shared' }
  function rankZones(answers){
    const uni = UNIS.find(u=>u.id===answers.uni); if(!uni) return [];
    const out = [];
    for(const z of ZONES){
      const c = commute(z, uni);
      const maxMin = answers.maxMin || 40;
      if(c.reach > maxMin + 12) continue; // hard-ish gate around the chosen threshold
      let score = 0; const why = [];
      // commute (dominant)
      const cs = Math.max(0, 52 - (c.reach/maxMin)*26);
      score += cs;
      why.push(`~${c.reach} min dall'università`);
      // budget
      const b = answers.budget;
      if(b){
        if(b >= z.rmin && b <= z.rmax){ score += 20; why.push('nel tuo budget'); }
        else if(b > z.rmax){ score += 16; }
        else if(b >= z.rmin*0.9){ score += 8; why.push('budget un po\' tirato'); }
        else { score -= 12; why.push('sopra il tuo budget'); }
      }
      // vibe preference
      if(answers.vibe==='lively'){ score += z.vibe*1.2; if(z.vibe>=9) why.push('super vivace'); }
      else if(answers.vibe==='quiet'){ score += (10-z.vibe)*1.2; if(z.vibe<=8) why.push('tranquilla e residenziale'); }
      else { score += 7; }
      // priorities (multi)
      const P = answers.prio||[];
      if(P.includes('nightlife')) score += z.vibe*0.8;
      if(P.includes('quiet'))     score += (10-z.vibe)*0.9;
      if(P.includes('food'))      score += (['testaccio','trastevere','monti','san-lorenzo'].includes(z.s)?10:3);
      if(P.includes('green'))     score += (['trastevere','prati','trieste-coppede'].includes(z.s)?10:3);
      if(P.includes('value'))     score += (z.rmin<=1000?12:z.rmin<=1300?7:2);
      if(P.includes('transit'))   score += z.transit;
      if(P.includes('safety'))    score += (['prati','trieste-coppede','centro-storico'].includes(z.s)?9:5);
      // student setup → reward cheaper zones for shared/budget
      if(answers.setup==='shared' && z.rmin<=1200) score += 6;
      out.push({ zone:z, commute:c, score:Math.round(score), why });
    }
    out.sort((a,b)=>b.score-a.score);
    // normalise a 0-100 "fit" for display
    const max = out.length ? out[0].score : 1;
    out.forEach(o=>{ o.fit = Math.max(40, Math.min(99, Math.round(o.score/max*99))); });
    return out;
  }

  const API = { ZONES, UNIS, haversine, commute, rankZones };
  if(typeof module!=='undefined'&&module.exports) module.exports = API;
  if(root) root.BOOM_MATCH = API;
})(typeof window!=='undefined'?window:null);
</script>

<!-- UI -->
<script>
const M = window.BOOM_MATCH;
const A = { uni:null, maxMin:40, budget:null, vibe:null, prio:[], setup:null };
let step = 0;
const STEPS = ['uni','commute','budget','vibe','prio','setup'];

const QUESTIONS = {
  uni: { label:'Domanda 1 / 6', title:'Dove studi (o studierai)?', render:()=>`
    <select id="i-uni" onchange="A.uni=this.value;validate()">
      <option value="">Scegli l'università…</option>
      ${M.UNIS.map(u=>`<option value="${u.id}" ${A.uni===u.id?'selected':''}>${u.n}</option>`).join('')}
    </select>`, valid:()=>!!A.uni },
  commute: { label:'Domanda 2 / 6', title:'Quanto tempo vuoi metterci, al massimo?', render:()=>`
    <div class="opts cols3">
      ${[['20','≤ 20 min','a piedi/mezzi'],['30','≤ 30 min','comodo'],['40','≤ 40 min','più scelta']].map(([v,t,s])=>
        `<div class="opt ${A.maxMin==+v?'on':''}" onclick="A.maxMin=${v};paint();validate()">${t}<small>${s}</small></div>`).join('')}
    </div>`, valid:()=>!!A.maxMin },
  budget: { label:'Domanda 3 / 6', title:'Budget per la stanza/casa (€/mese)?', render:()=>`
    <input type="number" id="i-budget" min="300" max="4000" step="50" placeholder="es. 800" value="${A.budget||''}" oninput="A.budget=+this.value||null;validate()">
    <div class="disclaim" style="text-align:left;margin-top:8px">Inserisci il tetto massimo. Per una stanza in condivisione di solito €450–€800; monolocale €700–€1200.</div>`,
    valid:()=>A.budget>0 },
  vibe: { label:'Domanda 4 / 6', title:'Che atmosfera cerchi?', render:()=>`
    <div class="opts cols3">
      ${[['lively','Vivace','locali, vita notturna'],['balanced','Equilibrata','un po\' e un po\''],['quiet','Tranquilla','residenziale, silenzio']].map(([v,t,s])=>
        `<div class="opt ${A.vibe===v?'on':''}" onclick="A.vibe='${v}';paint();validate()">${t}<small>${s}</small></div>`).join('')}
    </div>`, valid:()=>!!A.vibe },
  prio: { label:'Domanda 5 / 6', title:'Cosa conta di più? (max 3)', render:()=>`
    <div class="opts cols2">
      ${[['nightlife','🍸 Vita notturna'],['food','🍝 Cibo & mercati'],['green','🌳 Verde & parchi'],['value','💶 Prezzo basso'],['transit','🚇 Trasporti'],['safety','🛡️ Sicurezza/quiete']].map(([v,t])=>
        `<div class="opt ${A.prio.includes(v)?'on':''}" onclick="togglePrio('${v}')">${t}</div>`).join('')}
    </div>`, valid:()=>true },
  setup: { label:'Domanda 6 / 6', title:'Come vivrai?', render:()=>`
    <div class="opts cols2">
      ${[['solo','Da solo/a','monolocale o bilocale'],['shared','In condivisione','stanza in appartamento']].map(([v,t,s])=>
        `<div class="opt ${A.setup===v?'on':''}" onclick="A.setup='${v}';paint();validate()">${t}<small>${s}</small></div>`).join('')}
    </div>`, valid:()=>!!A.setup }
};

function paint(){
  const k = STEPS[step]; const q = QUESTIONS[k];
  document.getElementById('qBox').innerHTML = `<div class="q-label">${q.label}</div><div class="q-title">${q.title}</div>${q.render()}`;
  document.getElementById('prog').style.width = Math.round((step+1)/STEPS.length*100)+'%';
  document.getElementById('backBtn').style.display = step>0?'inline-block':'none';
  document.getElementById('nextBtn').textContent = step===STEPS.length-1?'Vedi i risultati ✨':'Avanti →';
  validate();
}
function validate(){ document.getElementById('nextBtn').disabled = !QUESTIONS[STEPS[step]].valid(); }
function togglePrio(v){ const i=A.prio.indexOf(v); if(i>=0)A.prio.splice(i,1); else if(A.prio.length<3)A.prio.push(v); paint(); }
function back(){ if(step>0){step--;paint();} }
function next(){ if(step<STEPS.length-1){step++;paint();} else showResults(); }

function showResults(){
  const ranked = M.rankZones(A).slice(0,4);
  document.getElementById('quizCard').style.display='none';
  const uni = M.UNIS.find(u=>u.id===A.uni);
  const box = document.getElementById('results');
  box.style.display='block';
  if(!ranked.length){
    box.innerHTML = `<div class="res-head"><h2>Le zone centrali sono <b>oltre i ${A.maxMin} min</b></h2></div>
      <div class="res-sub">Da ${uni.n} conviene cercare più vicino al campus. Lasciaci i tuoi dati: ti troviamo noi la soluzione giusta.</div>${leadHTML()}`;
    bindLead(); return;
  }
  box.innerHTML = `
    <div class="res-head"><h2>Le tue zone <b>ideali</b></h2></div>
    <div class="res-sub">A misura di ${uni.n}, nel tuo budget${A.budget?` di €${A.budget}`:''}.</div>
    ${ranked.map((r,i)=>zoneHTML(r,i)).join('')}
    ${leadHTML()}
    <div class="disclaim">I tempi sono stime porta-a-porta (a piedi 5 km/h · mezzi ~18 km/h, +12 min di attesa/accesso), non orari ufficiali ATAC.</div>`;
  bindLead();
}
function zoneHTML(r,i){
  const z=r.zone, c=r.commute;
  return `<div class="zone ${i===0?'top':''}">
    ${i===0?'<span class="zone-rank">★ MIGLIOR MATCH</span>':''}
    <div class="zone-h"><div class="zone-n">${i+1}. ${z.n}</div><div class="zone-fit">${r.fit}% match</div></div>
    <div class="zone-vibe">${z.vibeTxt}</div>
    <div class="zone-meta">
      <span class="pill">🚶 <b>~${c.walk} min</b> a piedi</span>
      <span class="pill">🚇 <b>~${c.transit} min</b> mezzi</span>
      <span class="pill">💶 <b>€${z.rmin}–${z.rmax}</b>/mese</span>
    </div>
    <div class="zone-why">${r.why.slice(0,4).join(' · ')}.</div>
    <div class="zone-acts">
      <a class="mini" href="/apartments-in/${z.s}" >Vedi case a ${z.n} →</a>
      <a class="mini gold" target="_blank" rel="noopener" href="https://wa.me/393313251961?text=${encodeURIComponent('Ciao BOOM! Dal quiz mi è uscito '+z.n+' vicino a '+(M.UNIS.find(u=>u.id===A.uni)||{}).n+'. Cerco casa, budget €'+(A.budget||'')+'. Mi aiutate?')}">Chiedi su WhatsApp</a>
    </div>
  </div>`;
}
function leadHTML(){
  return `<div class="lead" id="leadCard">
    <div id="leadForm">
      <h3>Vuoi che <b>te le troviamo noi</b>?</h3>
      <p>Ti mandiamo le case disponibili in queste zone, verificate e nel tuo budget. Gratis, nessun impegno.</p>
      <form class="lead-grid" onsubmit="return submitLead(event)">
        <input type="text" id="lf_company" class="hp" tabindex="-1" autocomplete="off" aria-hidden="true">
        <input type="text" id="lf_name" placeholder="Nome" required>
        <input type="tel" id="lf_phone" placeholder="Telefono / WhatsApp" required>
        <input type="email" class="full" id="lf_email" placeholder="Email" required>
        <button type="submit" class="btn btn-gold full" id="lf_btn">Trovami casa →</button>
      </form>
    </div>
    <div class="lead-ok" id="leadOk"><div class="ico">✓</div><h3>Ricevuto!</h3><p style="margin:8px 0 0">Ti scriviamo entro 24h con le case giuste. Per fare prima, scrivici su WhatsApp.</p></div>
  </div>`;
}
function bindLead(){ /* listeners are inline */ }
async function submitLead(e){
  e.preventDefault();
  if(document.getElementById('lf_company').value) return false;
  const btn=document.getElementById('lf_btn'); btn.disabled=true; btn.textContent='Invio…';
  const ranked = M.rankZones(A).slice(0,4).map(r=>r.zone.n);
  const uni=(M.UNIS.find(u=>u.id===A.uni)||{}).n;
  try{
    const r=await fetch('/api/canone-lead',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      channel:'match_quiz', leadType:'tenant',
      name:document.getElementById('lf_name').value.trim(),
      email:document.getElementById('lf_email').value.trim(),
      phone:document.getElementById('lf_phone').value.trim(),
      company:document.getElementById('lf_company').value,
      zone: ranked[0]||null, budget: A.budget||null,
      message:`Match Quiz — università ${uni}, budget €${A.budget||'?'}, zone ideali: ${ranked.join(', ')}.`,
      extra:{ university:uni, maxMin:A.maxMin, vibe:A.vibe, priorities:A.prio, setup:A.setup, zones:ranked }
    })});
    const d=await r.json().catch(()=>({})); if(!r.ok||!d.ok) throw new Error('fail');
    document.getElementById('leadForm').style.display='none';
    document.getElementById('leadOk').classList.add('show');
  }catch(err){ btn.disabled=false; btn.textContent='Riprova →'; }
  return false;
}

paint();
</script>
