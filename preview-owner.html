<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Preview — Portale Proprietario — BOOM Rome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* === PREVIEW DEMO — autonomo, dati finti, nessun Firebase ===
           Stessi design token BOOM del portale cliente. Lato proprietario ridisegnato. */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #D4AF37; --gold-light: rgba(212,175,55,0.15); --gold-glow: rgba(212,175,55,0.5); --gold-dark: #B8960C;
            --bg: #000; --bg-card: #0A0A0A; --bg-elevated: #141414; --bg-input: #1A1A1A;
            --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.14);
            --text: #FFF; --text-secondary: #999; --text-muted: #555;
            --green: #00D26A; --green-light: rgba(0,210,106,0.15);
            --red: #FF3B30; --red-light: rgba(255,59,48,0.12);
            --blue: #0A84FF; --blue-light: rgba(10,132,255,0.14);
            --amber: #FF9F0A; --amber-light: rgba(255,159,10,0.14);
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .muted { color: var(--text-muted); }
        .sec { color: var(--text-secondary); }

        .header { position: fixed; top: 0; left: 0; right: 0; height: 64px; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
        .header-logo { display: flex; align-items: center; gap: 10px; }
        .logo-mark { width: 32px; height: 32px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; box-shadow: 0 0 18px var(--gold-glow); }
        .header-logo-text { font-size: 13px; letter-spacing: 3px; }
        .header-role { font-size: 9px; letter-spacing: 2px; color: var(--gold); border: 1px solid rgba(212,175,55,0.3); border-radius: 100px; padding: 3px 10px; text-transform: uppercase; }
        .header-right { display: flex; align-items: center; gap: 14px; }
        .header-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #000; }

        .main { padding: 84px 18px 100px; max-width: 760px; margin: 0 auto; }

        .greeting { margin-bottom: 22px; }
        .greeting h1 { font-size: 26px; font-weight: 300; letter-spacing: 0.5px; }
        .greeting h1 b { font-weight: 700; }
        .greeting p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

        /* Interconnection banner — il pezzo forte */
        .pipe { background: linear-gradient(135deg, rgba(212,175,55,0.10), rgba(10,132,255,0.06)); border: 1px solid rgba(212,175,55,0.25); border-radius: 20px; padding: 18px; margin-bottom: 22px; position: relative; overflow: hidden; }
        .pipe::after { content: ''; position: absolute; top: -40%; right: -10%; width: 220px; height: 220px; background: radial-gradient(circle, var(--gold-light), transparent 70%); pointer-events: none; }
        .pipe-head { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .pipe-head .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
        .pipe-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
        .pipe-flow { display: flex; align-items: stretch; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
        .pipe-node { flex: 1 0 auto; min-width: 92px; background: rgba(0,0,0,0.35); border: 1px solid var(--border); border-radius: 14px; padding: 12px 10px; text-align: center; }
        .pipe-node .n { font-size: 22px; font-weight: 700; }
        .pipe-node .n.gold { color: var(--gold); } .pipe-node .n.green { color: var(--green); } .pipe-node .n.blue { color: var(--blue); }
        .pipe-node .l { font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-secondary); margin-top: 5px; line-height: 1.3; }
        .pipe-node .src { font-size: 8px; color: var(--text-muted); margin-top: 6px; font-family: ui-monospace, monospace; }
        .pipe-arrow { display: flex; align-items: center; color: var(--text-muted); font-size: 14px; flex: 0 0 auto; }

        .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
        .kpi { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
        .kpi .v { font-size: 22px; font-weight: 700; }
        .kpi .v.gold { color: var(--gold); } .kpi .v.green { color: var(--green); }
        .kpi .l { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-top: 5px; }
        .kpi .d { font-size: 10px; margin-top: 6px; color: var(--green); }
        .kpi .d.down { color: var(--red); }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 18px; margin-bottom: 16px; }
        .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .card-title { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-secondary); }
        .link { font-size: 12px; color: var(--gold); cursor: pointer; }

        .chart-wrap { position: relative; }
        .chart-legend { display: flex; gap: 16px; margin-top: 10px; font-size: 11px; color: var(--text-secondary); }
        .chart-legend i { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }

        /* Property rows */
        .prop { display: flex; gap: 14px; padding: 12px; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; align-items: center; }
        .prop:hover { border-color: var(--border-strong); }
        .prop-thumb { width: 64px; height: 64px; border-radius: 10px; object-fit: cover; flex: 0 0 auto; background: var(--bg-elevated); }
        .prop-main { flex: 1; min-width: 0; }
        .prop-name { font-weight: 600; font-size: 14px; }
        .prop-addr { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .prop-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .tag { font-size: 10px; padding: 3px 9px; border-radius: 100px; border: 1px solid var(--border); color: var(--text-secondary); }
        .tag.occ { background: var(--green-light); color: var(--green); border-color: transparent; }
        .tag.vac { background: var(--amber-light); color: var(--amber); border-color: transparent; }
        .tag.pfs { background: var(--blue-light); color: var(--blue); border-color: transparent; }
        .prop-right { text-align: right; flex: 0 0 auto; }
        .prop-rent { font-weight: 700; }
        .prop-rent span { font-size: 11px; color: var(--text-secondary); font-weight: 400; }
        .interest { display: inline-flex; gap: 8px; align-items: center; font-size: 11px; color: var(--text-secondary); margin-top: 6px; }
        .interest b { color: var(--text); }

        /* Interested clients (back-reference) */
        .client-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .client-row:last-child { border-bottom: none; }
        .client-av { width: 38px; height: 38px; border-radius: 50%; background: var(--bg-elevated); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--gold); flex: 0 0 auto; }
        .client-info { flex: 1; min-width: 0; }
        .client-name { font-size: 13px; font-weight: 600; }
        .client-sub { font-size: 11px; color: var(--text-secondary); }
        .pill { font-size: 10px; padding: 4px 10px; border-radius: 100px; font-weight: 600; }
        .pill.like { background: var(--green-light); color: var(--green); }
        .pill.view { background: var(--gold-light); color: var(--gold); }
        .pill.new { background: var(--blue-light); color: var(--blue); }

        /* Fiscal */
        .fisc { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .fisc:last-child { border-bottom: none; }
        .fisc-left { display: flex; align-items: center; gap: 12px; }
        .fisc-ico { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: var(--bg-elevated); }
        .fisc-name { font-size: 13px; font-weight: 600; }
        .fisc-date { font-size: 11px; color: var(--text-secondary); }
        .fisc-amt { text-align: right; font-weight: 700; }
        .fisc-due { font-size: 10px; margin-top: 2px; }
        .fisc-due.soon { color: var(--amber); } .fisc-due.ok { color: var(--text-muted); } .fisc-due.urgent { color: var(--red); }

        .tiles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .tile { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; cursor: pointer; }
        .tile:hover { border-color: var(--gold); }
        .tile .ico { font-size: 22px; } .tile .t { font-weight: 600; margin-top: 10px; font-size: 14px; } .tile .s { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 68px; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); cursor: pointer; padding: 8px 10px; position: relative; }
        .nav-item.active { color: var(--gold); }
        .nav-item-icon { font-size: 19px; }
        .nav-item-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
        .nav-dot { position: absolute; top: 2px; right: 4px; width: 7px; height: 7px; border-radius: 50%; background: var(--red); }

        .demo-flag { position: fixed; top: 72px; left: 50%; transform: translateX(-50%); z-index: 200; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); background: var(--bg-card); border: 1px solid var(--border); padding: 4px 12px; border-radius: 100px; }
        h2.view-title { font-size: 18px; font-weight: 300; margin: 6px 0 16px; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="demo-flag">Anteprima Demo · Lato Proprietario</div>
    <header class="header">
        <div class="header-logo"><div class="logo-mark"></div><div class="header-logo-text">BOOM</div><span class="header-role">Proprietario</span></div>
        <div class="header-right"><div class="header-avatar">V</div></div>
    </header>
    <main class="main" id="main"></main>
    <nav class="bottom-nav">
        <div class="nav-item active" data-tab="dashboard" onclick="showTab('dashboard')"><span class="nav-item-icon">📊</span><span class="nav-item-label">Dashboard</span></div>
        <div class="nav-item" data-tab="immobili" onclick="showTab('immobili')"><span class="nav-item-icon">🏢</span><span class="nav-item-label">Immobili</span></div>
        <div class="nav-item" data-tab="clienti" onclick="showTab('clienti')"><span class="nav-item-icon">👥</span><span class="nav-item-label">Interesse</span><span class="nav-dot"></span></div>
        <div class="nav-item" data-tab="fisco" onclick="showTab('fisco')"><span class="nav-item-icon">🧾</span><span class="nav-item-label">Fisco</span></div>
        <div class="nav-item" data-tab="docs" onclick="showTab('docs')"><span class="nav-item-icon">📁</span><span class="nav-item-label">Documenti</span></div>
    </nav>

    <script>
        const U = 'https://images.unsplash.com/';
        // ---- Demo data (nessun Firebase) ----
        const owner = { name: 'Valentino' };
        const properties = [
            { id: 'a1', name: 'Loft Trastevere', addr: 'Via della Scala 42', beds: 2, sqm: 85, rent: 1800, status: 'occupied', tenant: 'J. Smith', thumb: U+'photo-1502672260266-1c1ef2d93688?w=400', inPfs: true, pfsViews: 6, pfsLikes: 2 },
            { id: 'a2', name: 'Bilocale Centro', addr: 'Via dei Coronari 18', beds: 1, sqm: 55, rent: 1450, status: 'vacant', tenant: null, thumb: U+'photo-1493809842364-78817add7ffb?w=400', inPfs: true, pfsViews: 11, pfsLikes: 3 },
            { id: 'a3', name: 'Attico Nomentano', addr: 'Piazza Bologna 7', beds: 2, sqm: 70, rent: 1200, status: 'occupied', tenant: 'L. Bianchi', thumb: U+'photo-1560185007-cde436f6a4d0?w=400', inPfs: false, pfsViews: 0, pfsLikes: 0 },
            { id: 'a4', name: 'Studio Ostiense', addr: 'Via Ostiense 84', beds: 1, sqm: 42, rent: 850, status: 'vacant', tenant: null, thumb: U+'photo-1567496898669-ee935f5f647a?w=400', inPfs: true, pfsViews: 4, pfsLikes: 1 }
        ];
        const interested = [
            { name: 'Marco Rossi', prop: 'Bilocale Centro', action: 'like', when: '2 ore fa', match: 91 },
            { name: 'Sofia Greco', prop: 'Bilocale Centro', action: 'view', when: 'Visita Gio 18 giu, 17:30', match: 88 },
            { name: 'Daniel Klein', prop: 'Studio Ostiense', action: 'like', when: 'ieri', match: 82 },
            { name: 'Elena Costa', prop: 'Loft Trastevere', action: 'new', when: 'mostrato 1 ora fa', match: 79 }
        ];
        const revenue = [9.2, 9.2, 10.4, 10.4, 11.6, 11.6, 12.8]; // €k/mese (occupati)
        const months = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug'];
        const fiscal = [
            { ico: '🏛️', name: 'IMU — acconto', date: '16 giu 2026', amt: '€1.240', due: 'oggi', cls: 'urgent' },
            { ico: '📄', name: 'Cedolare secca — 2ª rata', date: '30 nov 2026', amt: '€2.880', due: 'tra 166 gg', cls: 'ok' },
            { ico: '✍️', name: 'RLI — proroga contratto a3', date: '12 lug 2026', amt: '€67', due: 'tra 25 gg', cls: 'soon' },
            { ico: '🧮', name: 'Egidi Srl — F24 IVA', date: '16 lug 2026', amt: '€3.410', due: 'tra 29 gg', cls: 'soon' }
        ];

        // ---- helpers ----
        const occ = properties.filter(p => p.status === 'occupied');
        const monthly = occ.reduce((s,p) => s+p.rent, 0);
        const occupancy = Math.round(occ.length / properties.length * 100);
        const pfsCount = properties.filter(p => p.inPfs).length;
        const totalViews = properties.reduce((s,p)=>s+p.pfsViews,0);
        const totalLikes = properties.reduce((s,p)=>s+p.pfsLikes,0);
        const viewings = interested.filter(i=>i.action==='view').length;
        const eur = n => '€' + n.toLocaleString('it-IT');

        function areaChart(data, w=680, h=120) {
            const max = Math.max(...data) * 1.15, min = 0;
            const stepX = w / (data.length - 1);
            const pts = data.map((v,i) => [i*stepX, h - ((v-min)/(max-min))*h]);
            const line = pts.map((p,i) => (i?'L':'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
            const area = line + ` L ${w} ${h} L 0 ${h} Z`;
            const dots = pts.map(p => `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="#D4AF37"/>`).join('');
            return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none" style="display:block">
                <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#D4AF37" stop-opacity="0.35"/><stop offset="1" stop-color="#D4AF37" stop-opacity="0"/></linearGradient></defs>
                <path d="${area}" fill="url(#g)"/><path d="${line}" fill="none" stroke="#D4AF37" stroke-width="2.5"/>${dots}
            </svg>`;
        }

        let tab = 'dashboard';
        function showTab(t) { tab = t; document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.tab === t)); render(); window.scrollTo(0,0); }

        function pipeBanner() {
            return `<div class="pipe">
                <div class="pipe-head"><span class="dot"></span><span class="pipe-title">I tuoi immobili nel motore BOOM</span></div>
                <div class="pipe-flow">
                    <div class="pipe-node"><div class="n gold">${pfsCount}</div><div class="l">Pubblicati nel radar</div><div class="src">listings</div></div>
                    <div class="pipe-arrow">→</div>
                    <div class="pipe-node"><div class="n">7</div><div class="l">Ricerche PFS attive</div><div class="src">radarSearches</div></div>
                    <div class="pipe-arrow">→</div>
                    <div class="pipe-node"><div class="n blue">${totalViews}</div><div class="l">Visti dai clienti</div><div class="src">portalProperties</div></div>
                    <div class="pipe-arrow">→</div>
                    <div class="pipe-node"><div class="n green">${totalLikes}</div><div class="l">Like questa sett.</div><div class="src">portalActivity</div></div>
                    <div class="pipe-arrow">→</div>
                    <div class="pipe-node"><div class="n gold">${viewings}</div><div class="l">Visite prenotate</div><div class="src">viewings</div></div>
                </div>
            </div>`;
        }

        function render() {
            const main = document.getElementById('main');
            if (tab === 'dashboard') {
                main.innerHTML = `
                <div class="greeting"><h1>Buongiorno, <b>${owner.name}</b></h1><p>Ecco il tuo portfolio, lunedì 17 giugno</p></div>
                ${pipeBanner()}
                <div class="kpis">
                    <div class="kpi"><div class="v gold">${eur(monthly)}</div><div class="l">Rendita / mese</div><div class="d">+11% vs mag</div></div>
                    <div class="kpi"><div class="v">${eur(monthly*12)}</div><div class="l">Rendita / anno</div><div class="d">proiezione</div></div>
                    <div class="kpi"><div class="v green">${occupancy}%</div><div class="l">Occupazione</div><div class="d">${occ.length}/${properties.length} immobili</div></div>
                    <div class="kpi"><div class="v">${properties.length}</div><div class="l">Immobili</div><div class="d down">2 sfitti</div></div>
                </div>
                <div class="card">
                    <div class="card-head"><span class="card-title">Rendita mensile</span><span class="sec" style="font-size:12px">€k</span></div>
                    <div class="chart-wrap">${areaChart(revenue)}</div>
                    <div class="chart-legend"><span><i style="background:#D4AF37"></i>Incasso da immobili occupati</span><span class="muted">Gen → Lug</span></div>
                </div>
                <div class="card">
                    <div class="card-head"><span class="card-title">Interesse dei clienti PFS</span><span class="link" onclick="showTab('clienti')">Vedi tutti →</span></div>
                    ${interested.slice(0,3).map(clientRow).join('')}
                </div>
                <div class="card">
                    <div class="card-head"><span class="card-title">Prossime scadenze fiscali</span><span class="link" onclick="showTab('fisco')">Apri fisco →</span></div>
                    ${fiscal.slice(0,2).map(fiscRow).join('')}
                </div>`;
            } else if (tab === 'immobili') {
                main.innerHTML = `
                <h2 class="view-title">I miei immobili <span class="sec" style="font-size:13px">· ${properties.length}</span></h2>
                ${pipeBanner()}
                <div class="card">${properties.map(propRow).join('')}</div>`;
            } else if (tab === 'clienti') {
                main.innerHTML = `
                <h2 class="view-title">Clienti interessati</h2>
                <p class="sec" style="font-size:12px;margin:-8px 0 16px">Ritorno dal portale cliente: chi scorre, mette like o prenota una visita sui tuoi immobili.</p>
                <div class="kpis" style="grid-template-columns:repeat(3,1fr)">
                    <div class="kpi"><div class="v blue" style="color:var(--blue)">${totalViews}</div><div class="l">Visualizzazioni</div></div>
                    <div class="kpi"><div class="v green">${totalLikes}</div><div class="l">Like</div></div>
                    <div class="kpi"><div class="v gold">${viewings}</div><div class="l">Visite</div></div>
                </div>
                <div class="card">${interested.map(clientRow).join('')}</div>`;
            } else if (tab === 'fisco') {
                main.innerHTML = `
                <h2 class="view-title">Adempimenti fiscali</h2>
                <p class="sec" style="font-size:12px;margin:-8px 0 16px">Generati da <code style="color:var(--gold)">fiscal-engine.js</code> su contratti e immobili. Cedolare, IMU, RLI, F24 società.</p>
                <div class="card">${fiscal.map(fiscRow).join('')}</div>
                <div class="card">
                    <div class="card-head"><span class="card-title">Riepilogo cedolare secca 2026</span></div>
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span class="sec">Imponibile annuo</span><b>${eur(monthly*12)}</b></div>
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span class="sec">Aliquota</span><b>21%</b></div>
                    <div style="display:flex;justify-content:space-between;padding:8px 0"><span class="sec">Imposta stimata</span><b style="color:var(--gold)">${eur(Math.round(monthly*12*0.21))}</b></div>
                </div>`;
            } else if (tab === 'docs') {
                main.innerHTML = `
                <h2 class="view-title">Documenti & Contratti</h2>
                <div class="tiles">
                    <div class="tile"><div class="ico">📝</div><div class="t">Contratti</div><div class="s">3 attivi · 1 in firma</div></div>
                    <div class="tile"><div class="ico">✍️</div><div class="t">Magic Sign</div><div class="s">Firma digitale remota</div></div>
                    <div class="tile"><div class="ico">📤</div><div class="t">Condividi col commercialista</div><div class="s">Link tracciato + watermark</div></div>
                    <div class="tile"><div class="ico">🧠</div><div class="t">OCR documenti</div><div class="s">Estrazione dati con AI</div></div>
                    <div class="tile"><div class="ico">🎫</div><div class="t">Apple Wallet</div><div class="s">Pass proprietario</div></div>
                    <div class="tile"><div class="ico">📦</div><div class="t">Tax Pack</div><div class="s">Bundle annuale ZIP</div></div>
                </div>`;
            }
        }

        function propRow(p) {
            return `<div class="prop">
                <img class="prop-thumb" src="${p.thumb}" alt="">
                <div class="prop-main">
                    <div class="prop-name">${p.name}</div>
                    <div class="prop-addr">📍 ${p.addr} · ${p.beds} cam · ${p.sqm} m²</div>
                    <div class="prop-meta">
                        <span class="tag ${p.status==='occupied'?'occ':'vac'}">${p.status==='occupied'?'Occupato · '+p.tenant:'Sfitto'}</span>
                        ${p.inPfs?'<span class="tag pfs">📡 Nel radar PFS</span>':''}
                    </div>
                </div>
                <div class="prop-right">
                    <div class="prop-rent">${eur(p.rent)}<span>/mese</span></div>
                    ${p.inPfs?`<div class="interest">👁 <b>${p.pfsViews}</b> · ♥ <b>${p.pfsLikes}</b></div>`:'<div class="interest muted">non pubblicato</div>'}
                </div>
            </div>`;
        }
        function clientRow(c) {
            const map = { like: ['♥ Like','like'], view: ['📅 Visita','view'], new: ['✨ Mostrato','new'] };
            const [label, cls] = map[c.action];
            return `<div class="client-row">
                <div class="client-av">${c.name.charAt(0)}</div>
                <div class="client-info"><div class="client-name">${c.name} <span class="sec" style="font-weight:400;font-size:11px">· ${c.match}% match</span></div><div class="client-sub">${c.prop} — ${c.when}</div></div>
                <span class="pill ${cls}">${label}</span>
            </div>`;
        }
        function fiscRow(f) {
            return `<div class="fisc">
                <div class="fisc-left"><div class="fisc-ico">${f.ico}</div><div><div class="fisc-name">${f.name}</div><div class="fisc-date">${f.date}</div></div></div>
                <div><div class="fisc-amt">${f.amt}</div><div class="fisc-due ${f.cls}">${f.due}</div></div>
            </div>`;
        }

        render();
    </script>
</body>
</html>
