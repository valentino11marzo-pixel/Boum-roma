<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Preview — Portale Proprietario — BOOM Rome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* === PREVIEW DEMO — autonomo, dati finti, nessun Firebase ===
           Look ESTRATTO da portal.html (viste ruolo landlord) ed elevato.
           Modello: agency-managed → il proprietario CONSULTA (archivio + scadenze
           + stato), non pubblica. Responsive: 1 base, 2 layout (desktop / mobile). */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold:#D4AF37; --gold-dark:#B8960C; --gold-light:rgba(212,175,55,0.15); --gold-glow:rgba(212,175,55,0.4);
            --bg:#08080A; --bg-card:#0C0C0E; --bg-elevated:#16161A; --bg-input:#1A1A1A;
            --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.14);
            --text:#FFF; --text-secondary:#9a9a9a; --text-muted:#5a5a5a;
            --green:#00D26A; --green-light:rgba(0,210,106,0.12);
            --orange:#FF9F0A; --orange-light:rgba(255,159,10,0.12);
            --red:#FF3B30; --red-light:rgba(255,59,48,0.12);
            --blue:#0A84FF; --blue-light:rgba(10,132,255,0.12);
        }
        body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
        a { color:inherit; text-decoration:none; }

        /* ---- Topbar ---- */
        .topbar { position:fixed; top:0; left:0; right:0; height:64px; background:var(--bg-card); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 20px; z-index:200; }
        .tb-left { display:flex; align-items:center; gap:12px; }
        .logo-mark { width:32px; height:32px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); border-radius:50%; box-shadow:0 0 16px var(--gold-glow); flex:0 0 auto; }
        .logo-text { font-size:13px; letter-spacing:3px; }
        .role-badge { font-size:9px; letter-spacing:2px; color:var(--gold); background:var(--gold-light); border-radius:100px; padding:4px 10px; text-transform:uppercase; }
        .tb-right { display:flex; align-items:center; gap:12px; }
        .icon-btn { width:38px; height:38px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; position:relative; }
        .icon-btn .dot { position:absolute; top:-3px; right:-3px; min-width:16px; height:16px; background:var(--gold); color:#000; font-size:9px; font-weight:700; border-radius:8px; display:flex; align-items:center; justify-content:center; padding:0 4px; }
        .avatar { width:36px; height:36px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#000; }

        /* ---- Layout ---- */
        .layout { display:flex; padding-top:64px; }
        .sidebar { width:260px; flex:0 0 260px; background:var(--bg-card); border-right:1px solid var(--border); height:calc(100vh - 64px); position:sticky; top:64px; overflow-y:auto; padding:16px 10px; display:flex; flex-direction:column; }
        .nav-section { margin-bottom:14px; }
        .nav-label { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--text-muted); padding:8px 14px; margin-bottom:4px; }
        .nav-item { display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:10px; color:var(--text-secondary); font-size:13px; font-weight:500; cursor:pointer; transition:all .15s; margin-bottom:2px; }
        .nav-item:hover { background:var(--bg-elevated); color:var(--text); }
        .nav-item.active { background:var(--gold-light); color:var(--gold); }
        .nav-icon { font-size:15px; width:18px; text-align:center; }
        .nav-badge { margin-left:auto; min-width:18px; height:18px; background:var(--bg-elevated); border:1px solid var(--border); color:var(--text-secondary); font-size:10px; font-weight:700; border-radius:9px; display:flex; align-items:center; justify-content:center; padding:0 5px; }
        .nav-badge.gold { background:var(--gold); color:#000; border-color:transparent; }
        .sidebar-footer { margin-top:auto; padding-top:12px; border-top:1px solid var(--border); }

        .content { flex:1; min-width:0; }
        .main { max-width:1080px; margin:0 auto; padding:28px 28px 60px; }

        /* ---- Greeting / page head ---- */
        .pagehead { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:22px; flex-wrap:wrap; gap:14px; }
        .pagehead h1 { font-size:26px; font-weight:300; letter-spacing:0.3px; }
        .pagehead h1 .dot { color:var(--gold); }
        .pagehead .sub { color:var(--text-secondary); font-size:13px; margin-top:5px; }
        .head-actions { display:flex; gap:8px; flex-wrap:wrap; }
        .btn { padding:10px 16px; background:var(--gold); border:none; border-radius:10px; color:#000; font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
        .btn-sm { padding:8px 12px; font-size:11px; }
        .btn-secondary { background:var(--bg-elevated); color:var(--text); border:1px solid var(--border); }
        .btn-secondary:hover { border-color:var(--gold); color:var(--gold); }
        .btn-block { width:100%; justify-content:center; }
        .btn-success { background:var(--green); color:#000; }

        h2.view-title { font-size:20px; font-weight:300; letter-spacing:0.3px; margin-bottom:6px; }
        .view-sub { color:var(--text-secondary); font-size:12px; margin-bottom:18px; }

        /* ---- Agency status banner ---- */
        .agency { background:linear-gradient(135deg,rgba(212,175,55,0.10),rgba(10,132,255,0.05)); border:1px solid rgba(212,175,55,0.22); border-radius:16px; padding:16px 18px; margin-bottom:20px; }
        .agency-head { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
        .agency-head .pulse { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .agency-title { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); }
        .agency-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
        .agency-cell { background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:12px; padding:12px; }
        .agency-cell .v { font-size:18px; font-weight:700; }
        .agency-cell .v.green{color:var(--green)} .agency-cell .v.gold{color:var(--gold)} .agency-cell .v.blue{color:var(--blue)}
        .agency-cell .l { font-size:10px; color:var(--text-secondary); margin-top:4px; line-height:1.35; }

        /* ---- Alerts ---- */
        .alert { display:flex; align-items:center; gap:12px; padding:14px 16px; border-radius:12px; margin-bottom:10px; border:1px solid var(--border); background:var(--bg-card); }
        .alert.warning { border-color:rgba(255,159,10,0.35); background:var(--orange-light); }
        .alert.danger { border-color:rgba(255,59,48,0.35); background:var(--red-light); }
        .alert.gold { border-color:rgba(212,175,55,0.35); background:var(--gold-light); }
        .alert-icon { font-size:18px; flex:0 0 auto; }
        .alert-content { flex:1; min-width:0; }
        .alert-title { font-weight:600; font-size:13px; }
        .alert-text { font-size:12px; color:var(--text-secondary); margin-top:2px; }

        /* ---- KPI ---- */
        .kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px; }
        .kpi { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:18px; cursor:pointer; transition:border-color .15s; }
        .kpi:hover { border-color:var(--gold); }
        .kpi.gold { background:linear-gradient(135deg,rgba(212,175,55,0.15),rgba(212,175,55,0.02)); border-color:rgba(212,175,55,0.3); }
        .kpi-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
        .kpi-label { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; }
        .kpi-val { font-size:26px; font-weight:700; }
        .kpi-val.gold{color:var(--gold)} .kpi-val.green{color:var(--green)} .kpi-val.orange{color:var(--orange)}
        .kpi-sub { font-size:11px; color:var(--text-muted); margin-top:4px; }
        .bar { background:var(--bg-elevated); border-radius:4px; height:6px; overflow:hidden; margin-top:8px; }
        .bar > i { display:block; height:100%; background:var(--green); }

        /* ---- Cards / lists ---- */
        .grid-2 { display:grid; grid-template-columns:2fr 1fr; gap:20px; align-items:start; }
        .card { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; margin-bottom:20px; overflow:hidden; }
        .card.gold-soft { background:linear-gradient(135deg,rgba(212,175,55,0.08),transparent); border-color:rgba(212,175,55,0.2); }
        .card-header { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--border); }
        .card-title { font-size:13px; font-weight:600; letter-spacing:0.3px; }
        .card-body { padding:16px 18px; }
        .card-body.flush { padding:6px 0; }
        .list-item { display:flex; align-items:center; gap:14px; padding:13px 18px; cursor:pointer; transition:background .12s; }
        .list-item:hover { background:var(--bg-elevated); }
        .list-icon { width:40px; height:40px; border-radius:10px; background:var(--bg-elevated); display:flex; align-items:center; justify-content:center; font-size:16px; flex:0 0 auto; }
        .list-content { flex:1; min-width:0; }
        .list-title { font-size:13px; font-weight:600; }
        .list-subtitle { font-size:11px; color:var(--text-muted); margin-top:2px; }
        .list-value { font-weight:700; font-size:13px; flex:0 0 auto; }
        .text-red{color:var(--red)} .text-gold{color:var(--gold)} .text-green{color:var(--green)}

        .badge { padding:4px 10px; border-radius:100px; font-size:11px; font-weight:600; }
        .badge.green{background:var(--green-light); color:var(--green)} .badge.gray{background:var(--bg-elevated); color:var(--text-muted)}
        .badge.orange{background:var(--orange-light); color:var(--orange)} .badge.gold{background:var(--gold-light); color:var(--gold)}
        .badge.blue{background:var(--blue-light); color:var(--blue)} .badge.red{background:var(--red-light); color:var(--red)}

        .boom-contact { text-align:center; padding:24px; }
        .boom-logo { width:48px; height:48px; background:linear-gradient(135deg,#FFD54F,#F5A623); border-radius:50%; margin:0 auto 12px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; color:#000; }

        /* ---- Property grid ---- */
        .prop-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
        .prop-card { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; overflow:hidden; cursor:pointer; transition:border-color .15s; }
        .prop-card:hover { border-color:var(--gold); }
        .prop-cover { height:140px; position:relative; background:var(--bg-elevated); }
        .prop-cover img { width:100%; height:100%; object-fit:cover; }
        .prop-cover .st { position:absolute; top:10px; left:10px; }
        .prop-info { padding:14px 16px; }
        .prop-info .nm { font-weight:600; font-size:14px; }
        .prop-info .ad { font-size:11px; color:var(--text-secondary); margin-top:2px; }
        .prop-info .ft { display:flex; justify-content:space-between; align-items:center; margin-top:12px; }
        .prop-rent { font-weight:700; } .prop-rent span{font-size:11px;color:var(--text-secondary);font-weight:400}
        .market-chip { font-size:10px; color:var(--blue); margin-top:8px; display:flex; align-items:center; gap:5px; }

        /* ---- Summary strip ---- */
        .summary { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
        .sum-cell { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:16px; }
        .sum-cell .v { font-size:22px; font-weight:700; } .sum-cell .v.gold{color:var(--gold)} .sum-cell .v.green{color:var(--green)} .sum-cell .v.orange{color:var(--orange)}
        .sum-cell .l { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-top:5px; }

        /* ---- Fiscal ---- */
        .fiscal-status { display:flex; gap:16px; align-items:center; padding:20px; border-radius:16px; margin-bottom:20px; border:1px solid var(--border); }
        .fiscal-status.ready { background:var(--green-light); border-color:rgba(0,210,106,0.3); }
        .fiscal-status.almost { background:var(--orange-light); border-color:rgba(255,159,10,0.3); }
        .fs-emoji { font-size:40px; } .fs-main { flex:1; } .fs-head { font-size:18px; font-weight:600; } .fs-sub { font-size:12px; color:var(--text-secondary); margin-top:3px; }
        .money-line { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; font-size:13px; margin-bottom:20px; }
        .money-line b { color:var(--gold); }
        .fisc-row { display:flex; align-items:center; gap:12px; padding:12px 18px; }
        .fisc-row + .fisc-row { border-top:1px solid var(--border); }
        .fisc-ico { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; background:var(--bg-elevated); flex:0 0 auto; }
        .fisc-l { flex:1; min-width:0; } .fisc-name { font-size:13px; font-weight:600; } .fisc-when { font-size:11px; color:var(--text-secondary); margin-top:2px; }
        .fisc-amt { text-align:right; font-weight:700; font-size:13px; } .fisc-due { font-size:10px; margin-top:2px; }
        .fisc-due.urgent{color:var(--red)} .fisc-due.soon{color:var(--orange)} .fisc-due.ok{color:var(--text-muted)}
        .pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
        .pill { padding:8px 14px; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; color:var(--text-secondary); font-size:12px; cursor:pointer; }
        .pill.active { border-color:var(--gold); color:var(--gold); background:var(--gold-light); }
        .miss-row { display:flex; align-items:center; gap:10px; padding:10px 18px; cursor:pointer; color:var(--text-secondary); font-size:13px; }
        .miss-row:hover{ color:var(--gold); } .miss-row + .miss-row { border-top:1px solid var(--border); }
        .readiness { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
        .rd-item { display:flex; align-items:center; gap:10px; padding:12px 14px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:12px; }
        .rd-dot { width:10px; height:10px; border-radius:50%; flex:0 0 auto; }
        .rd-info { flex:1; min-width:0; } .rd-name { font-size:13px; font-weight:600; } .rd-meta { font-size:11px; color:var(--text-secondary); margin-top:2px; }
        .rd-pct { font-weight:700; font-size:13px; flex:0 0 auto; }
        .compare { display:grid; grid-template-columns:1fr 1fr; }
        .cmp-col { padding:18px; text-align:center; }
        .cmp-col.win { background:var(--green-light); }
        .cmp-col + .cmp-col { border-left:1px solid var(--border); }

        /* ---- Bottom nav (mobile) ---- */
        .bottom-nav { display:none; position:fixed; bottom:0; left:0; right:0; height:64px; background:rgba(8,8,10,0.96); backdrop-filter:blur(20px); border-top:1px solid var(--border); justify-content:space-around; align-items:center; z-index:200; }
        .bn-item { display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--text-muted); cursor:pointer; padding:6px 8px; position:relative; }
        .bn-item.active { color:var(--gold); }
        .bn-ico { font-size:18px; } .bn-l { font-size:9px; letter-spacing:0.5px; text-transform:uppercase; }
        .bn-dot { position:absolute; top:2px; right:6px; width:6px; height:6px; border-radius:50%; background:var(--red); }

        .demo-flag { position:fixed; bottom:12px; right:12px; z-index:300; font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); background:var(--bg-card); border:1px solid var(--border); padding:5px 12px; border-radius:100px; }

        /* ======= RESPONSIVE: il secondo layout ======= */
        @media (max-width:900px) {
            .sidebar { display:none; }
            .bottom-nav { display:flex; }
            .main { padding:18px 16px 84px; }
            .tb-search, .head-actions .desk-only { display:none; }
            .kpis { grid-template-columns:repeat(2,1fr); }
            .agency-grid { grid-template-columns:repeat(2,1fr); }
            .summary { grid-template-columns:repeat(2,1fr); }
            .grid-2 { grid-template-columns:1fr; }
            .readiness { grid-template-columns:1fr; }
            .pagehead h1 { font-size:22px; }
            .demo-flag { bottom:72px; }
        }
        @media (min-width:901px) { .mob-only { display:none; } }
    </style>
</head>
<body>

    <div class="layout">
        <aside class="sidebar">
            <div class="nav-section"><div class="nav-label">Home</div>

        <div class="bn-item" data-sec="immobili" onclick="go('immobili')"><span class="bn-ico">🏠</span><span class="bn-l">Immobili</span></div>

    <script>
        const U='https://images.unsplash.com/';
        const eur=n=>'€'+Math.round(n).toLocaleString('it-IT');
        const owner={ name:'Valentino' };
        // ---- Demo data (nessun Firebase) ----
        const props=[

            { id:'a4', name:'Studio Ostiense', addr:'Via Ostiense 84', beds:1, sqm:42, rent:850, status:'vacant', tenant:null, end:null, thumb:U+'photo-1567496898669-ee935f5f647a?w=500', market:{cand:4, view:0} }

            { prop:'Bilocale Centro', tenant:'S. Greco (proposto)', start:'2026-07-01', end:'2028-06-30', rent:1450, deposit:2900, sign:'pending-landlord' }
        ];
        const payments=[
            { prop:'Loft Trastevere', month:'Giu 2026', amount:1800, status:'paid', date:'02 giu' },
            { prop:'Attico Nomentano', month:'Giu 2026', amount:1200, status:'paid', date:'03 giu' },
            { prop:'Loft Trastevere', month:'Mag 2026', amount:1800, status:'paid', date:'04 mag' },
            { prop:'Attico Nomentano', month:'Mag 2026', amount:1200, status:'overdue', date:'scad. 05 mag' }
        ];
        const maintenance=[
            { title:'Caldaia — manutenzione annuale', prop:'Loft Trastevere', when:'2 giorni fa', status:'in_corso', pri:'normal' },
            { title:'Infiltrazione bagno', prop:'Loft Trastevere', when:'ieri', status:'aperta', pri:'urgent' },
            { title:'Tapparella cucina', prop:'Attico Nomentano', when:'1 sett. fa', status:'risolta', pri:'normal' }
        ];
        const documents=[
            { name:'Contratto Loft Trastevere — firmato', type:'Contratto', src:'BOOM', shared:true, date:'01 dic 2024', size:'420 KB', ico:'📝' },
            { name:'APE — Loft Trastevere', type:'Immobile', src:'BOOM', shared:false, date:'12 nov 2024', size:'1.1 MB', ico:'🏠' },
            { name:'Visura catastale — Bilocale Centro', type:'Immobile', src:'BOOM', shared:false, date:'08 gen 2026', size:'310 KB', ico:'🏛️' },
            { name:'Ricevuta affitto — Mag 2026', type:'Ricevuta', src:'BOOM', shared:true, date:'04 mag 2026', size:'88 KB', ico:'🧾' },
            { name:'Documento identità — J. Smith', type:'Identità', src:'BOOM', shared:false, date:'28 nov 2024', size:'640 KB', ico:'🪪' }
        ];
        const fiscal=[
            { ico:'🏛️', name:'IMU — acconto', when:'16 giu 2026', amt:'€1.240', due:'oggi', cls:'urgent' },
            { ico:'✍️', name:'RLI — registrazione proroga', when:'12 lug 2026', amt:'€67', due:'tra 25 gg', cls:'soon' },
            { ico:'📈', name:'Adeguamento ISTAT — Loft', when:'01 dic 2026', amt:'stima €38', due:'tra 167 gg', cls:'ok' },
            { ico:'🏛️', name:'IMU — saldo', when:'16 dic 2026', amt:'€1.240', due:'tra 182 gg', cls:'ok' }
        ];
        const missingDocs=['Ricevute affitto Gen–Apr 2026 (Attico)','Fatture manutenzione detraibili 2026'];
        const fiscalByProp=[
            { name:'Loft Trastevere', regime:'Cedolare 21%', complete:100, tax:'imposta €4.536' },
            { name:'Attico Nomentano', regime:'Cedolare 21%', complete:75, tax:'imposta €3.024' },
            { name:'Bilocale Centro', regime:'in registrazione', complete:40, tax:'in attesa contratto' },
            { name:'Studio Ostiense', regime:'—', complete:20, tax:'in promozione' }
        ];

        // ---- derived ----
        const occ=props.filter(p=>p.status==='occupied');
        const monthly=occ.reduce((s,p)=>s+p.rent,0);
        const occupancy=Math.round(occ.length/props.length*100);
        const paidMonth=payments.filter(p=>p.status==='paid'&&p.month.includes('Giu')).reduce((s,p)=>s+p.amount,0);
        const pending=payments.filter(p=>p.status!=='paid');
        const overdue=payments.filter(p=>p.status==='overdue');
        const openMaint=maintenance.filter(m=>m.status!=='risolta');

        let sec='panoramica';
        function go(s){ sec=s; document.querySelectorAll('[data-sec]').forEach(n=>n.classList.toggle('active',n.dataset.sec===s)); render(); window.scrollTo(0,0); }

        function agencyBanner(){
            const onMarket=props.filter(p=>p.market);
            const cand=onMarket.reduce((s,p)=>s+p.market.cand,0);
            const views=onMarket.reduce((s,p)=>s+p.market.view,0);
            return `<div class="agency">
                <div class="agency-head"><span class="pulse"></span><span class="agency-title">BOOM sta lavorando per te</span></div>
                <div class="agency-grid">
                    <div class="agency-cell"><div class="v gold">${onMarket.length}</div><div class="l">Immobili in promozione</div></div>
                    <div class="agency-cell"><div class="v blue">${cand}</div><div class="l">Candidati selezionati</div></div>
                    <div class="agency-cell"><div class="v">${views}</div><div class="l">Visite organizzate</div></div>
                    <div class="agency-cell"><div class="v green">1</div><div class="l">Contratto in firma</div></div>
                </div>
            </div>`;
        }

        function render(){
            const m=document.getElementById('main');
            if(sec==='panoramica'){
                let alerts='';
                alerts+=`<div class="alert warning"><span class="alert-icon">✏️</span><div class="alert-content"><div class="alert-title">Contratto da firmare</div><div class="alert-text">Il contratto per "Bilocale Centro" con S. Greco richiede la tua firma.</div></div><button class="btn btn-sm" onclick="go('contratti')">Firma ora →</button></div>`;
                alerts+=`<div class="alert danger"><span class="alert-icon">⚠️</span><div class="alert-content"><div class="alert-title">1 pagamento in ritardo</div><div class="alert-text">€1.200 da recuperare. Ci pensa BOOM, ti teniamo aggiornato.</div></div><button class="btn btn-sm btn-secondary" onclick="go('rendite')">Dettagli →</button></div>`;
                alerts+=`<div class="alert gold"><span class="alert-icon">🏛️</span><div class="alert-content"><div class="alert-title">Scadenza fiscale: IMU acconto oggi</div><div class="alert-text">€1.240 — trovi tutto pronto nella sezione Fisco.</div></div><button class="btn btn-sm btn-secondary" onclick="go('fisco')">Apri →</button></div>`;
                m.innerHTML=`
                <div class="pagehead">
                    <div><h1><span class="dot">●</span> Ciao ${owner.name}</h1><div class="sub">${new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} · Area Proprietario</div></div>
                    <div class="head-actions"><button class="btn btn-sm btn-secondary desk-only">🎟️ Tessera Partner</button><button class="btn btn-sm btn-secondary">📥 Report</button></div>
                </div>
                ${agencyBanner()}
                ${alerts}
                <div class="kpis">
                    <div class="kpi gold" onclick="go('rendite')"><div class="kpi-top"><span class="kpi-label">Incassi mese</span><span>💰</span></div><div class="kpi-val gold">${eur(paidMonth)}</div><div class="kpi-sub">di ${eur(monthly)} attesi</div></div>
                    <div class="kpi" onclick="go('immobili')"><div class="kpi-top"><span class="kpi-label">Immobili</span><span>🏠</span></div><div class="kpi-val">${props.length}</div><div class="kpi-sub"><span style="color:var(--green)">●</span> ${occ.length} affittati · ${props.length-occ.length} liberi</div></div>
                    <div class="kpi"><div class="kpi-top"><span class="kpi-label">Occupazione</span><span>📊</span></div><div class="kpi-val ${occupancy>=80?'green':'orange'}">${occupancy}%</div><div class="bar"><i style="width:${occupancy}%;background:var(--${occupancy>=80?'green':'orange'})"></i></div></div>
                    <div class="kpi" onclick="go('manutenzione')"><div class="kpi-top"><span class="kpi-label">Manutenzioni</span><span>🔧</span></div><div class="kpi-val orange">${openMaint.length}</div><div class="kpi-sub">${openMaint.filter(x=>x.pri==='urgent').length} urgenti</div></div>
                </div>
                <div class="grid-2">
                    <div>
                        <div class="card"><div class="card-header"><span class="card-title">🏠 I miei immobili</span><button class="btn btn-sm btn-secondary" onclick="go('immobili')">Vedi tutti</button></div><div class="card-body flush">
                            ${props.map(p=>`<div class="list-item" onclick="go('immobili')"><div class="list-icon" style="background:${p.status==='occupied'?'var(--green-light)':'var(--bg-elevated)'}">🏠</div><div class="list-content"><div class="list-title">${p.name}</div><div class="list-subtitle">${p.status==='occupied'?`${p.tenant} · scade ${fmtEnd(p.end)}`:'<span style="color:var(--text-muted)">Libero · in promozione</span>'}</div></div><span class="badge ${p.status==='occupied'?'green':'gray'}">${p.status==='occupied'?eur(p.rent):'Libero'}</span></div>`).join('')}
                        </div></div>
                        <div class="card"><div class="card-header"><span class="card-title">💳 Pagamenti in attesa</span><button class="btn btn-sm btn-secondary" onclick="go('rendite')">Storico</button></div><div class="card-body flush">
                            ${pending.length?pending.map(p=>`<div class="list-item" style="${p.status==='overdue'?'border-left:3px solid var(--red)':''}"><div class="list-icon" style="background:${p.status==='overdue'?'var(--red-light)':'var(--orange-light)'}">${p.status==='overdue'?'⚠️':'⏳'}</div><div class="list-content"><div class="list-title">${p.prop}</div><div class="list-subtitle">${p.month} · ${p.status==='overdue'?`<span style="color:var(--red)">${p.date}</span>`:p.date}</div></div><div class="list-value ${p.status==='overdue'?'text-red':'text-gold'}">${eur(p.amount)}</div></div>`).join(''):'<div style="padding:30px;text-align:center;color:var(--text-muted);font-size:13px">✔ Tutto in regola</div>'}
                        </div></div>
                    </div>
                    <div>
                        <div class="card gold-soft"><div class="boom-contact"><div class="boom-logo">B</div><div style="font-weight:600;font-size:14px">BOOM Property Management</div><div style="font-size:12px;color:var(--text-secondary);margin:4px 0 16px">Il tuo gestore immobiliare</div><div style="display:grid;gap:8px"><a class="btn btn-sm btn-success btn-block">💬 WhatsApp</a><a class="btn btn-sm btn-secondary btn-block">📧 Scrivi a BOOM</a></div></div></div>
                        <div class="card"><div class="card-header"><span class="card-title">📋 Contratti attivi</span></div><div class="card-body flush">
                            ${contracts.filter(c=>c.sign==='complete').map(c=>`<div class="list-item" onclick="go('contratti')"><div class="list-content"><div class="list-title" style="font-size:13px">${c.prop}</div><div class="list-subtitle">${fmtEnd(c.start)} → ${fmtEnd(c.end)}</div></div><span class="badge gray">${daysTo(c.end)}g</span></div>`).join('')}
                        </div></div>
                        <div class="card"><div class="card-header"><span class="card-title">🧮 Prossima scadenza</span></div><div class="card-body">
                            <div style="display:flex;align-items:center;gap:12px"><div class="fisc-ico">🏛️</div><div style="flex:1"><div style="font-size:13px;font-weight:600">IMU — acconto</div><div style="font-size:11px;color:var(--text-secondary)">16 giu 2026</div></div><div style="text-align:right"><div style="font-weight:700">€1.240</div><div style="font-size:10px;color:var(--red)">oggi</div></div></div>
                        </div></div>
                    </div>
                </div>`;
            }
            else if(sec==='immobili'){
                const proj=monthly*12;
                m.innerHTML=`<h2 class="view-title">I miei immobili</h2><div class="view-sub">Gestiti da BOOM. Tu consulti stato, inquilino e rendita — alla locazione pensiamo noi.</div>
                <div class="summary">
                    <div class="sum-cell"><div class="v gold">${eur(monthly)}</div><div class="l">Rendita / mese</div></div>
                    <div class="sum-cell"><div class="v green">${occupancy}%</div><div class="l">Occupazione</div></div>
                    <div class="sum-cell"><div class="v orange">${props.length-occ.length}</div><div class="l">Liberi</div></div>
                    <div class="sum-cell"><div class="v">${eur(proj)}</div><div class="l">Proiezione annua</div></div>
                </div>
                <div class="prop-grid">
                    ${props.map(p=>`<div class="prop-card"><div class="prop-cover"><img src="${p.thumb}"><span class="st badge ${p.status==='occupied'?'green':'orange'}">${p.status==='occupied'?'Affittato':'In promozione'}</span></div><div class="prop-info"><div class="nm">${p.name}</div><div class="ad">📍 ${p.addr} · ${p.beds} cam · ${p.sqm} m²</div><div class="ft"><div class="prop-rent">${eur(p.rent)}<span>/mese</span></div>${p.status==='occupied'?`<span class="badge gray">${p.tenant}</span>`:''}</div>${p.market?`<div class="market-chip">📡 ${p.market.cand} candidati · ${p.market.view} visita prenotata</div>`:''}</div></div>`).join('')}
                </div>`;
            }
            else if(sec==='contratti'){
                const pendSig=contracts.filter(c=>c.sign!=='complete').length;
                m.innerHTML=`<h2 class="view-title">Contratti</h2><div class="view-sub">Archivio dei contratti. L'unica azione che spetta a te: firmare quando richiesto.</div>
                <div class="summary">
                    <div class="sum-cell"><div class="v gold">${eur(contracts.reduce((s,c)=>s+c.rent,0))}</div><div class="l">Canone totale/mese</div></div>
                    <div class="sum-cell"><div class="v green">${contracts.filter(c=>c.sign==='complete').length}</div><div class="l">Attivi</div></div>
                    <div class="sum-cell"><div class="v orange">${pendSig}</div><div class="l">Da firmare</div></div>
                    <div class="sum-cell"><div class="v">${eur(contracts.reduce((s,c)=>s+c.deposit,0))}</div><div class="l">Cauzioni</div></div>
                </div>
                ${contracts.map(c=>{const pend=c.sign!=='complete';return `<div class="card"><div class="card-body" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
                    <div class="list-icon" style="font-size:18px">📋</div>
                    <div style="flex:1;min-width:180px"><div style="font-weight:600">${c.prop}</div><div style="font-size:12px;color:var(--text-secondary);margin-top:3px">${c.tenant} · ${fmtEnd(c.start)} → ${fmtEnd(c.end)}</div></div>
                    <div style="text-align:right"><div style="font-weight:700">${eur(c.rent)}<span style="font-size:11px;color:var(--text-secondary)">/mese</span></div><div style="font-size:11px;color:var(--text-muted)">cauzione ${eur(c.deposit)}</div></div>
                    ${pend?`<button class="btn btn-sm" onclick="alert('Demo: apre Magic Sign')">✍️ Firma</button>`:`<span class="badge green">✓ Firmato</span>`}
                </div></div>`;}).join('')}`;
            }
            else if(sec==='rendite'){
                const tot=payments.filter(p=>p.status==='paid').reduce((s,p)=>s+p.amount,0);
                m.innerHTML=`<h2 class="view-title">Rendite & Pagamenti</h2><div class="view-sub">Incassi tracciati da BOOM. Vedi cosa è entrato e cosa è in lavorazione.</div>
                <div class="summary" style="grid-template-columns:repeat(3,1fr)">
                    <div class="sum-cell"><div class="v green">${eur(tot)}</div><div class="l">Incassato (storico)</div></div>
                    <div class="sum-cell"><div class="v orange">${eur(pending.reduce((s,p)=>s+p.amount,0))}</div><div class="l">In attesa</div></div>
                    <div class="sum-cell"><div class="v">${payments.length}</div><div class="l">Movimenti</div></div>
                </div>
                <div class="card"><div class="card-header"><span class="card-title">Movimenti recenti</span></div><div class="card-body flush">
                    ${payments.map(p=>{const st=p.status==='paid'?['green','✓ Pagato']:p.status==='overdue'?['red','In ritardo']:['orange','In attesa'];return `<div class="list-item"><div class="list-icon" style="background:var(--${st[0]}-light)">${p.status==='paid'?'✓':p.status==='overdue'?'⚠️':'⏳'}</div><div class="list-content"><div class="list-title">${p.prop}</div><div class="list-subtitle">${p.month} · ${p.date}</div></div><div style="text-align:right"><div class="list-value">${eur(p.amount)}</div><span class="badge ${st[0]}" style="font-size:10px">${st[1]}</span></div></div>`;}).join('')}
                </div></div>`;
            }
            else if(sec==='manutenzione'){
                m.innerHTML=`<h2 class="view-title">Manutenzione</h2><div class="view-sub">BOOM gestisce gli interventi. Tu segui lo stato — non devi muovere un dito.</div>
                <div class="summary">
                    <div class="sum-cell"><div class="v" style="color:var(--red)">${maintenance.filter(x=>x.pri==='urgent'&&x.status!=='risolta').length}</div><div class="l">Urgenti</div></div>
                    <div class="sum-cell"><div class="v orange">${maintenance.filter(x=>x.status==='aperta').length}</div><div class="l">Aperte</div></div>
                    <div class="sum-cell"><div class="v blue" style="color:var(--blue)">${maintenance.filter(x=>x.status==='in_corso').length}</div><div class="l">In corso</div></div>
                    <div class="sum-cell"><div class="v green">${maintenance.filter(x=>x.status==='risolta').length}</div><div class="l">Risolte</div></div>
                </div>
                <div class="card"><div class="card-body flush">
                    ${maintenance.map(x=>{const map={aperta:['orange','Aperta'],in_corso:['blue','In corso'],risolta:['green','Risolta']};const t=map[x.status];return `<div class="list-item"><div class="list-icon" style="background:var(--${t[0]}-light)">${x.pri==='urgent'&&x.status!=='risolta'?'🚨':'🔧'}</div><div class="list-content"><div class="list-title">${x.title}</div><div class="list-subtitle">${x.prop} · ${x.when}</div></div><span class="badge ${t[0]}">${t[1]}</span></div>`;}).join('')}
                </div></div>`;
            }
            else if(sec==='documenti'){
                m.innerHTML=`<h2 class="view-title">Archivio documenti</h2><div class="view-sub">Tutto in un posto, per sempre. Caricato da BOOM o da te. Condividi col commercialista in un tap.</div>
                <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap"><button class="btn btn-sm">⬆ Carica documento</button><button class="btn btn-sm btn-secondary">📤 Condividi col commercialista</button></div>
                <div class="pills"><span class="pill active">Tutti (${documents.length})</span><span class="pill">Contratti</span><span class="pill">Immobile</span><span class="pill">Ricevute</span><span class="pill">Identità</span></div>
                <div class="card"><div class="card-body flush">
                    ${documents.map(d=>`<div class="list-item"><div class="list-icon">${d.ico}</div><div class="list-content"><div class="list-title">${d.name}</div><div class="list-subtitle">${d.type} · ${d.date} · ${d.size}</div></div><div style="display:flex;gap:6px;align-items:center">${d.src==='BOOM'?'<span class="badge gold" style="font-size:9px">DA BOOM</span>':'<span class="badge gray" style="font-size:9px">MIO</span>'}${d.shared?'<span class="badge blue" style="font-size:9px">🔗</span>':''}</div></div>`).join('')}
                </div></div>`;
            }
            else if(sec==='fisco'){
                const ready=missingDocs.length===0;
                const canoniAnno=monthly*12;
                const ced=Math.round(canoniAnno*0.21);
                const irpef=Math.round(canoniAnno*0.95*0.35);
                const saving=irpef-ced;
                m.innerHTML=`<h2 class="view-title">Fisco</h2><div class="view-sub">Calcolato dai tuoi contratti da <code style="color:var(--gold)">fiscal-engine.js</code> · <code style="color:var(--gold)">taxpack-engine.js</code>. Niente gergo: cosa devi, quando, quanto.</div>
                <div class="fiscal-status ${ready?'ready':'almost'}">
                    <div class="fs-emoji">${ready?'✅':'⏳'}</div>
                    <div class="fs-main"><div class="fs-head">${ready?'Sei pronto per il commercialista':'Ci sei quasi'}</div><div class="fs-sub">${ready?'Pacchetto fiscale completo, pronto da scaricare.':missingDocs.length+' cose da sistemare — ci pensa BOOM, ma puoi caricarle tu.'}</div></div>
                    <button class="btn">${ready?'📦 Scarica pacchetto':'📁 Documenti mancanti'}</button>
                </div>
                <div class="money-line">Quest'anno hai incassato <b>${eur(monthly*6)}</b> · imposta cedolare secca stimata <b>${eur(ced)}</b> <span style="color:var(--text-muted)">sull'anno (21%)</span></div>

                <div class="card"><div class="card-header"><span class="card-title">🏠 Pronti, per immobile</span></div><div class="card-body">
                    <div class="readiness">
                    ${fiscalByProp.map(p=>{const col=p.complete>=100?'green':p.complete>=60?'gold':'red';return `<div class="rd-item"><span class="rd-dot" style="background:var(--${col})"></span><div class="rd-info"><div class="rd-name">${p.name}</div><div class="rd-meta">${p.regime} · ${p.tax}</div></div><div class="rd-pct" style="color:var(--${col})">${p.complete}%</div></div>`;}).join('')}
                    </div>
                </div></div>

                <div class="card"><div class="card-header"><span class="card-title">⚖️ Cedolare secca vs IRPEF</span><span style="font-size:11px;color:var(--text-muted)">su ${eur(canoniAnno)}/anno</span></div>
                    <div class="compare">
                        <div class="cmp-col win"><div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--green)">Cedolare 21%</div><div style="font-size:24px;font-weight:700;margin:6px 0">${eur(ced)}</div><div style="font-size:11px;color:var(--text-secondary)">✓ Consigliata</div></div>
                        <div class="cmp-col"><div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted)">IRPEF ord. (35%)</div><div style="font-size:24px;font-weight:700;margin:6px 0">${eur(irpef)}</div><div style="font-size:11px;color:var(--text-secondary)">+ addizionali</div></div>
                    </div>
                    <div style="padding:12px 18px;border-top:1px solid var(--border);font-size:12px;text-align:center;color:var(--text-secondary)">Con la cedolare secca risparmi <b style="color:var(--green)">${eur(saving)}</b> all'anno</div>
                </div>

                <div class="card"><div class="card-header"><span class="card-title">📅 Scadenzario fiscale</span><button class="btn btn-sm btn-secondary">🔔 Promemoria</button></div><div class="card-body flush">
                    ${fiscal.map(f=>`<div class="fisc-row"><div class="fisc-ico">${f.ico}</div><div class="fisc-l"><div class="fisc-name">${f.name}</div><div class="fisc-when">${f.when}</div></div><div><div class="fisc-amt">${f.amt}</div><div class="fisc-due ${f.cls}">${f.due}</div></div></div>`).join('')}
                </div></div>
                <div class="card"><div class="card-header"><span class="card-title">📂 Da completare</span></div><div class="card-body flush">
                    ${missingDocs.map(d=>`<div class="miss-row">＋ ${d}</div>`).join('')}
                </div></div>`;
            }
            else { m.innerHTML=`<h2 class="view-title">${sec[0].toUpperCase()+sec.slice(1)}</h2><div class="view-sub">Sezione demo — la disegniamo quando arriviamo qui.</div>`; }
        }
        function fmtEnd(iso){ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'}); }
        function daysTo(iso){ return Math.max(0,Math.round((new Date(iso)-new Date('2026-06-17'))/864e5)); }

        // responsive flag (mostra quale layout è attivo)
        function updFlag(){ document.getElementById('layoutFlag').textContent = (window.innerWidth>900?'Demo · Layout Desktop':'Demo · Layout Mobile'); }
        window.addEventListener('resize',updFlag); updFlag();
        render();
    </script>
</body>
</html>
