<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BOOM Pay — Rent on autopilot</title>
<meta name="robots" content="noindex" />
<style>
  :root{
    --gold:#D4AF37; --gold-light:rgba(212,175,55,0.14); --gold-dark:#B8960C;
    --bg:#08080A; --bg-card:#0C0C0E; --bg-elevated:#141416; --bg-input:#1A1A1C;
    --border:rgba(255,255,255,0.08); --text:#FFF; --text-secondary:#999; --text-dim:#666;
    --green:#34D399; --green-dim:rgba(52,211,153,0.14);
    --amber:#F5B14C; --amber-dim:rgba(245,177,76,0.14);
    --red:#F87171; --red-dim:rgba(248,113,113,0.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Inter,Helvetica,Arial,sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;min-height:100vh;}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:760px;margin:0 auto;padding:24px 20px 80px}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 0 28px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand-dot{width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 14px var(--gold)}
  .brand-name{font-size:13px;letter-spacing:.42em;text-transform:uppercase;color:#EAEAEA}
  .brand-name b{color:var(--gold);font-weight:400}
  .back{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim)}
  .back:hover{color:var(--text-secondary)}

  /* hero status card */
  .hero{position:relative;background:linear-gradient(160deg,#101013 0%,#0A0A0C 100%);border:1px solid var(--border);border-radius:20px;overflow:hidden;padding:30px 28px}
  .hero::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),#F5D98B,var(--gold),transparent)}
  .eyebrow{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px}
  .hero h1{font-size:34px;font-weight:200;letter-spacing:-0.5px;line-height:1.1;margin-bottom:10px}
  .hero h1 .pay{color:var(--gold)}
  .hero p{font-size:14px;color:var(--text-secondary);line-height:1.6;max-width:48ch}
  .statuschip{display:inline-flex;align-items:center;gap:8px;margin-top:18px;padding:8px 14px;border-radius:999px;font-size:11px;letter-spacing:.14em;text-transform:uppercase}
  .statuschip .d{width:7px;height:7px;border-radius:50%}
  .sc-off{background:var(--bg-input);color:var(--text-secondary)} .sc-off .d{background:var(--text-dim)}
  .sc-pending{background:var(--amber-dim);color:var(--amber)} .sc-pending .d{background:var(--amber)}
  .sc-active{background:var(--green-dim);color:var(--green)} .sc-active .d{background:var(--green);box-shadow:0 0 10px var(--green)}

  .btn{display:inline-flex;align-items:center;gap:9px;margin-top:22px;padding:14px 26px;border:none;border-radius:12px;cursor:pointer;font-family:inherit;font-size:13px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;transition:.2s}
  .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0A0A0A}
  .btn-gold:hover{filter:brightness(1.08);transform:translateY(-1px)}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-secondary)}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold)}

  /* stat row */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:22px}
  .stat{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px 14px}
  .stat .lbl{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}
  .stat .val{font-size:21px;font-weight:300;letter-spacing:-0.3px}
  .stat .val.green{color:var(--green)} .stat .val.amber{color:var(--amber)} .stat .val.red{color:var(--red)}
  @media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.hero h1{font-size:28px}}

  /* section */
  .section{margin-top:34px}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
  .section-title{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--text-secondary)}
  .section-note{font-size:11px;color:var(--text-dim)}

  /* cashflow timeline */
  .timeline{position:relative;padding-left:26px}
  .timeline::before{content:"";position:absolute;left:6px;top:6px;bottom:6px;width:1px;background:linear-gradient(180deg,var(--gold),rgba(212,175,55,0.12))}
  .tl{position:relative;margin-bottom:14px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .tl::before{content:"";position:absolute;left:-23px;top:22px;width:11px;height:11px;border-radius:50%;background:var(--bg);border:2px solid var(--gold)}
  .tl.paid::before{background:var(--green);border-color:var(--green);box-shadow:0 0 10px var(--green)}
  .tl.processing::before{background:var(--amber);border-color:var(--amber)}
  .tl.failed::before{background:var(--red);border-color:var(--red)}
  .tl-left .m{font-size:14px;color:var(--text)}
  .tl-left .sub{font-size:11px;color:var(--text-dim);margin-top:3px}
  .tl-right{text-align:right}
  .tl-right .amt{font-size:16px;font-weight:300}
  .tl-right .net{font-size:11px;color:var(--green);margin-top:3px}
  .tl-right .fee{font-size:10px;color:var(--text-dim)}
  .pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:9px;letter-spacing:.12em;text-transform:uppercase}
  .pill.paid{background:var(--green-dim);color:var(--green)}
  .pill.processing{background:var(--amber-dim);color:var(--amber)}
  .pill.failed{background:var(--red-dim);color:var(--red)}
  .pill.pending{background:var(--bg-input);color:var(--text-secondary)}

  /* how it works */
  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .step{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:18px 16px}
  .step .n{font-size:11px;color:var(--gold);letter-spacing:.2em;margin-bottom:10px}
  .step .t{font-size:14px;margin-bottom:6px}
  .step .d{font-size:12px;color:var(--text-dim);line-height:1.55}
  @media(max-width:600px){.steps{grid-template-columns:1fr}}

  .empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:13px;border:1px dashed var(--border);border-radius:16px}
  .foot{margin-top:46px;text-align:center;font-size:10px;color:#333;letter-spacing:.06em}
  .skeleton{opacity:.4}
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><span class="brand-dot"></span><span class="brand-name">BOOM <b>Pay</b></span></div>
      <a class="back" href="/owner-dashboard.html">← Dashboard</a>
    </div>

    <div id="app" class="skeleton">
      <div class="hero">
        <div class="eyebrow">Rent collection</div>
        <h1>Loading…</h1>
      </div>
    </div>

    <div class="foot">BOOM · Egidi Immobiliare S.r.l. · Roma · payments secured by Stripe</div>
  </div>

  <!-- Firebase (compat) + shared portal lib -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/boom-portal.js"></script>

  <script>
    const euro = (cents) => '€' + (Math.round(Number(cents||0))/100).toLocaleString('it-IT', { maximumFractionDigits: 0 });
    const monthLabel = (m) => {
      if (!m) return '—';
      const [y, mo] = m.split('-');
      const names = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
      return (names[parseInt(mo,10)-1] || m) + ' ' + y;
    };

    async function api(path, body){
      const token = await firebase.auth().currentUser.getIdToken();
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+token },
        body: JSON.stringify(body || {}),
      });
      return res.json();
    }

    async function activate(){
      try {
        BoomPortal.showLoader('Connessione a Stripe');
        const r = await api('/api/pay/connect', { action: 'onboard' });
        if (r && r.url) { window.location.href = r.url; return; }
        BoomPortal.hideLoader();
        BoomPortal.showError(r.error || 'Could not start onboarding');
      } catch(e){ BoomPortal.hideLoader(); BoomPortal.showError(e.message || e); }
    }
    window.activate = activate;

    function heroFor(profile){
      if (profile.onboarded) {
        return `
          <div class="hero">
            <div class="eyebrow">Rent collection · live</div>
            <h1>Your rent is on <span class="pay">autopilot</span>.</h1>
            <p>Every month, rent is collected from your tenants by SEPA Direct Debit and paid straight to your account — minus BOOM's fee. You don't lift a finger.</p>
            <span class="statuschip sc-active"><span class="d"></span>Rails active · payouts enabled</span>
          </div>`;
      }
      if (profile.hasAccount) {
        return `
          <div class="hero">
            <div class="eyebrow">Rent collection · setup incomplete</div>
            <h1>One step <span class="pay">left</span>.</h1>
            <p>Stripe still needs a few details before BOOM can pay rent into your account. It takes about two minutes.</p>
            <span class="statuschip sc-pending"><span class="d"></span>Finish verification</span>
            <div><button class="btn btn-gold" onclick="activate()">Finish setup →</button></div>
          </div>`;
      }
      return `
        <div class="hero">
          <div class="eyebrow">Rent collection</div>
          <h1>Never chase rent <span class="pay">again</span>.</h1>
          <p>Activate BOOM Pay and rent is collected automatically every month and paid into your account. Set it up once — about two minutes — and forget it.</p>
          <span class="statuschip sc-off"><span class="d"></span>Not activated</span>
          <div><button class="btn btn-gold" onclick="activate()">⚡ Activate BOOM Pay</button></div>
        </div>`;
    }

    function statsFor(s){
      return `
        <div class="stats">
          <div class="stat"><div class="lbl">Expected · this month</div><div class="val">${euro(s.expectedThisMonthCents)}</div></div>
          <div class="stat"><div class="lbl">Collected</div><div class="val green">${euro(s.collectedThisMonthCents)}</div></div>
          <div class="stat"><div class="lbl">In transit</div><div class="val amber">${euro(s.inTransitCents)}</div></div>
          <div class="stat"><div class="lbl">On rails</div><div class="val">${s.onRailsCount||0}</div></div>
        </div>`;
    }

    function timelineFor(payments){
      if (!payments || !payments.length) {
        return `<div class="empty">No rent on the rails yet. Once a tenant sets up autopay, every month will appear here as it's collected and paid out to you.</div>`;
      }
      const statusPill = { paid:'Pagato', processing:'In transito', failed:'Non riuscito', pending:'In attesa', overdue:'Scaduto', disputed:'Contestato' };
      return `<div class="timeline">` + payments.map(p => {
        const cls = ['paid','processing','failed'].includes(p.status) ? p.status : '';
        const pillCls = ['paid','processing','failed'].includes(p.status) ? p.status : 'pending';
        const right = p.status === 'paid'
          ? `<div class="amt">${euro((p.chargedAmount!=null?p.chargedAmount: (p.amount*100)))}</div>
             <div class="net">Net to you ${euro((p.landlordNet!=null?p.landlordNet:(p.amount*100)))}</div>
             ${p.feeLandlord!=null?`<div class="fee">BOOM fee ${euro(p.feeLandlord)}</div>`:''}`
          : `<div class="amt">€${Number(p.amount||0).toLocaleString('it-IT')}</div>
             <div class="fee">${p.paymentRail==='sdd'?'SEPA':'Manual'}</div>`;
        return `
          <div class="tl ${cls}">
            <div class="tl-left">
              <div class="m">${monthLabel(p.month)} <span class="pill ${pillCls}">${statusPill[p.status]||p.status}</span></div>
              <div class="sub">Due ${p.dueDate||'—'}</div>
            </div>
            <div class="tl-right">${right}</div>
          </div>`;
      }).join('') + `</div>`;
    }

    const STEPS = `
      <div class="steps">
        <div class="step"><div class="n">01</div><div class="t">Activate once</div><div class="d">Connect your payout account with Stripe — about two minutes, fully secure.</div></div>
        <div class="step"><div class="n">02</div><div class="t">Tenant authorises</div><div class="d">Your tenant approves automatic SEPA rent once, at signing. No more bank transfers.</div></div>
        <div class="step"><div class="n">03</div><div class="t">Rent flows in</div><div class="d">Every month, rent is collected and paid into your account — you just watch it land.</div></div>
      </div>`;

    function render(data){
      const app = document.getElementById('app');
      app.classList.remove('skeleton');
      if (!data || !data.ok) {
        app.innerHTML = `<div class="empty">Couldn't load BOOM Pay${data && data.error ? ' ('+data.error+')' : ''}. Please refresh.</div>`;
        return;
      }
      const p = data.profile || {};
      let html = heroFor(p);
      if (p.onboarded) {
        html += statsFor(data.stats || {});
        html += `<div class="section"><div class="section-head"><div class="section-title">Cashflow</div><div class="section-note">${data.propertyCount||0} properties</div></div>${timelineFor(data.payments)}</div>`;
      } else {
        html += `<div class="section"><div class="section-head"><div class="section-title">How it works</div></div>${STEPS}</div>`;
      }
      app.innerHTML = html;
    }

    (async function init(){
      try {
        await BoomPortal.requireAuth(['owner','landlord','admin'], { loginUrl: '/login.html' });
      } catch(e){ return; } // requireAuth handles the redirect

      const params = new URLSearchParams(location.search);
      if (params.get('connect') === 'done') {
        try { await api('/api/pay/connect', { action: 'status' }); BoomPortal.toast('BOOM Pay activated', { type:'success' }); } catch(_){}
        history.replaceState({}, '', '/boom-pay.html');
      }
      if (params.get('connect') === 'refresh') {
        history.replaceState({}, '', '/boom-pay.html');
        return activate();
      }

      try {
        const summary = await api('/api/pay/summary', {});
        render(summary);
      } catch(e){
        render({ ok:false, error: e.message });
      }
    })();
  </script>
</body>
</html>
