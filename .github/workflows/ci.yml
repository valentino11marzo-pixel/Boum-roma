name: CI

# Rete di sicurezza pre-deploy: valida la sintassi di tutti gli script del
# sito e fa girare lo smoke test del flusso di autenticazione in un browser
# reale. Vercel deploya comunque a prescindere (advisory): se un check è
# rosso, il commit è già live — ma lo sai subito e fai revert in un minuto.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Sintassi inline JS + js/*.js + sw.js + vercel.json
        run: node scripts/check-pages.mjs
      - name: Sintassi moduli ESM api/
        run: |
          set -e
          for f in $(find api -name '*.js'); do
            cp "$f" /tmp/esmcheck.mjs
            node --check /tmp/esmcheck.mjs || { echo "FAIL $f"; exit 1; }
          done
          echo "api/: OK"
      - name: Test percorsi soldi (checkout + webhook + convert, tutto mockato)
        run: node tests/money/run.mjs
      - name: Test motori puri (fiscal + taxpack)
        run: |
          node tests/fiscal/test.mjs
          node tests/taxpack/test.mjs

  firestore-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Installa firebase-tools + deps test
        run: |
          npm install --no-save firebase-tools >/dev/null
          cd tests/rules && npm install >/dev/null
      - name: Test firestore.rules contro emulatore
        run: |
          cd tests/rules
          cp ../../firestore.rules ./firestore.rules
          npx firebase emulators:exec --only firestore --project demo-boom-rules 'node runner.mjs'

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Installa Playwright + Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright >/dev/null
          npx playwright install --with-deps chromium
      - name: Smoke test flusso auth
        run: node tests/smoke.mjs
