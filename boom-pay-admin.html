<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BOOM Pay — Collections</title>
<meta name="robots" content="noindex" />
<style>
  :root{
    --gold:#D4AF37; --gold-dark:#B8960C; --bg:#08080A; --bg-card:#0C0C0E;
    --bg-elevated:#141416; --bg-input:#1A1A1C; --border:rgba(255,255,255,0.08);
    --text:#FFF; --text-secondary:#999; --text-dim:#666;
    --green:#34D399; --green-dim:rgba(52,211,153,0.12);
    --amber:#F5B14C; --amber-dim:rgba(245,177,76,0.12);
    --red:#F87171; --red-dim:rgba(248,113,113,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Inter,Helvetica,Arial,sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;min-height:100vh}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:980px;margin:0 auto;padding:24px 20px 80px}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 0 26px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand-dot{width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 14px var(--gold)}
  .brand-name{font-size:13px;letter-spacing:.42em;text-transform:uppercase;color:#EAEAEA}
  .brand-name b{color:var(--gold);font-weight:400}
  .sub{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim)}
  .back{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim)}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
  .stat{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px 15px}
  .stat .lbl{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}
  .stat .val{font-size:22px;font-weight:300;letter-spacing:-0.3px}
  .stat .val.green{color:var(--green)} .stat .val.amber{color:var(--amber)} .stat .val.red{color:var(--red)} .stat .val.gold{color:var(--gold)}
  @media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}}

  .section{margin-top:34px}
  .section-title{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:16px}

  .rec{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px 17px;margin-bottom:12px}
  .rec.overdue{border-color:rgba(248,113,113,0.35)}
  .rec-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
  .rec-who{font-size:15px}
  .rec-meta{font-size:11px;color:var(--text-dim);margin-top:4px}
  .rec-amt{text-align:right;font-size:18px;font-weight:300;white-space:nowrap}
  .pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;margin-left:6px}
  .pill.failed{background:var(--red-dim);color:var(--red)}
  .pill.overdue{background:var(--amber-dim);color:var(--amber)}
  .reason{font-size:11.5px;color:var(--red);margin-top:10px;font-weight:300}
  .rec-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .btn{border:none;border-radius:10px;padding:10px 16px;cursor:pointer;font-family:inherit;font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;transition:.18s}
  .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0A0A0A}
  .btn-gold:hover{filter:brightness(1.08)}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-secondary)}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
  .btn:disabled{opacity:.4;cursor:default}
  .dun{display:none;margin-top:12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 13px;font-size:12px;color:var(--text-secondary);line-height:1.55;white-space:pre-wrap}
  .dun.show{display:block}

  .ledger{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .le{display:flex;align-items:center;gap:12px;background:var(--bg-card);padding:12px 15px}
  .le .ic{width:26px;text-align:center;font-size:15px}
  .le .tx{flex:1;font-size:12.5px;color:var(--text-secondary)}
  .le .tx b{color:var(--text);font-weight:400}
  .le .tm{font-size:10px;color:var(--text-dim);white-space:nowrap}
  .empty{text-align:center;padding:36px 20px;color:var(--text-dim);font-size:13px;border:1px dashed var(--border);border-radius:14px}
  .spin{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--gold);margin:60px auto;animation:s .8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .foot{margin-top:44px;text-align:center;font-size:10px;color:#333;letter-spacing:.06em}
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><span class="brand-dot"></span><span class="brand-name">BOOM <b>Pay</b></span> <span class="sub">· Collections</span></div>
      <a class="back" href="/portal.html">← Portal</a>
    </div>
    <div id="app"><div class="spin"></div></div>
    <div class="foot">BOOM · Egidi Immobiliare S.r.l. · Roma · live rail status</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/boom-portal.js"></script>

  <script>
    const app = document.getElementById('app');
    const euro = (cents) => '€' + (Math.round(Number(cents||0))/100).toLocaleString('it-IT',{maximumFractionDigits:0});
    const monthLabel = (m)=>{ if(!m) return '—'; const [y,mo]=m.split('-'); const n=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic']; return (n[parseInt(mo,10)-1]||m)+' '+y; };

    async function api(path, body){
      const token = await firebase.auth().currentUser.getIdToken();
      const res = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body: JSON.stringify(body||{}) });
      return res.json();
    }

    const LE = {
      collect_initiated:{i:'⚡',t:(d)=>`Collection started · <b>${d.chargeEur!=null?'€'+d.chargeEur:''}</b>`},
      rent_paid:{i:'✅',t:(d)=>`Rent collected · <b>${d.amount?euro(d.amount):''}</b>`},
      rent_failed:{i:'⚠️',t:(d)=>`Collection failed${d.reason?' · '+d.reason:''}`},
      collect_failed:{i:'⛔',t:(d)=>`Charge error${d.error?' · '+String(d.error).slice(0,60):''}`},
      mandate_active:{i:'🔗',t:()=>`Autopay mandate activated`},
      payout_paid:{i:'🏦',t:(d)=>`Payout to landlord · <b>${d.amount?euro(d.amount):''}</b>`},
      dispute_created:{i:'🚩',t:(d)=>`Dispute opened${d.reason?' · '+d.reason:''}`},
    };
    const ago = (iso)=>{ if(!iso) return ''; const s=(Date.now()-new Date(iso).getTime())/1000; if(s<60)return 'now'; if(s<3600)return Math.floor(s/60)+'m'; if(s<86400)return Math.floor(s/3600)+'h'; return Math.floor(s/86400)+'d'; };

    function render(d){
      if(!d || !d.ok){ app.innerHTML = `<div class="empty">Couldn't load collections${d&&d.error?' ('+d.error+')':''}.</div>`; return; }
      const s = d.stats||{};
      let html = `
        <div class="stats">
          <div class="stat"><div class="lbl">Expected · this month</div><div class="val">${euro(s.expectedThisMonthCents)}</div></div>
          <div class="stat"><div class="lbl">Collected</div><div class="val green">${euro(s.collectedThisMonthCents)}</div></div>
          <div class="stat"><div class="lbl">In transit</div><div class="val amber">${euro(s.inTransitCents)}</div></div>
          <div class="stat"><div class="lbl">BOOM fees · all time</div><div class="val gold">${euro(s.feesAllTimeCents)}</div></div>
        </div>
        <div class="stats">
          <div class="stat"><div class="lbl">On rails</div><div class="val">${s.onRailsCount||0}</div></div>
          <div class="stat"><div class="lbl">Failed</div><div class="val red">${s.failedCount||0}</div></div>
          <div class="stat"><div class="lbl">Overdue</div><div class="val amber">${s.overdueCount||0}</div></div>
          <div class="stat"><div class="lbl">Collected · all time</div><div class="val green">${euro(s.paidAllTimeCents)}</div></div>
        </div>`;

      // recovery queue
      html += `<div class="section"><div class="section-title">Recovery queue</div>`;
      if(!d.recovery || !d.recovery.length){
        html += `<div class="empty">Nothing to recover. Every rent on the rails is on track. ✨</div>`;
      } else {
        html += d.recovery.map(r => `
          <div class="rec ${r.status}">
            <div class="rec-top">
              <div>
                <div class="rec-who">${r.tenantName||'Tenant'} <span class="pill ${r.status}">${r.status}</span></div>
                <div class="rec-meta">${r.propertyName||'—'} · ${monthLabel(r.month)} · due ${r.dueDate||'—'} · ${r.attemptCount} attempt(s)</div>
              </div>
              <div class="rec-amt">€${Number(r.amount||0).toLocaleString('it-IT')}</div>
            </div>
            ${r.failureReason?`<div class="reason">${r.failureReason}</div>`:''}
            <div class="rec-actions">
              <button class="btn btn-gold" onclick="collectNow('${r.id}', this)">Collect now</button>
              <button class="btn btn-ghost" onclick="toggleDun('${r.id}')">Dunning draft</button>
              <button class="btn btn-ghost" onclick="copyDun('${r.id}')">Copy IT</button>
            </div>
            <div class="dun" id="dun-${r.id}">${(r.dunning&&r.dunning.it)||''}</div>
          </div>`).join('');
      }
      html += `</div>`;

      // ledger
      html += `<div class="section"><div class="section-title">Money ledger</div>`;
      if(!d.ledger || !d.ledger.length){
        html += `<div class="empty">No money has moved yet.</div>`;
      } else {
        html += `<div class="ledger">` + d.ledger.map(e=>{
          const def = LE[e.event] || { i:'•', t:()=>e.event };
          return `<div class="le"><div class="ic">${def.i}</div><div class="tx">${def.t(e)}</div><div class="tm">${ago(e.createdAt)}</div></div>`;
        }).join('') + `</div>`;
      }
      html += `</div>`;

      app.innerHTML = html;
      window.__rec = {}; (d.recovery||[]).forEach(r=> window.__rec[r.id]=r);
    }

    window.toggleDun = (id)=>{ const el=document.getElementById('dun-'+id); if(el) el.classList.toggle('show'); };
    window.copyDun = (id)=>{ const r=window.__rec[id]; if(r&&r.dunning){ navigator.clipboard.writeText(r.dunning.it).then(()=>BoomPortal.toast('Dunning copied',{type:'success'})); } };
    window.collectNow = async (id, btn)=>{
      btn.disabled = true; btn.textContent='Charging…';
      try {
        const r = await api('/api/pay/collect', { paymentId: id });
        if (r.ok) { BoomPortal.toast('Collection started · '+(r.piStatus||'processing'),{type:'success'}); }
        else { BoomPortal.toast('Could not collect: '+(r.error||'error').replace(/_/g,' '),{type:'error'}); }
      } catch(e){ BoomPortal.toast('Error: '+e.message,{type:'error'}); }
      setTimeout(load, 900);
    };

    async function load(){
      try { render(await api('/api/pay/admin-summary', {})); }
      catch(e){ render({ ok:false, error:e.message }); }
    }

    (async function init(){
      try { await BoomPortal.requireAuth(['admin'], { loginUrl:'/login.html' }); }
      catch(e){ return; }
      load();
    })();
  </script>
</body>
</html>
