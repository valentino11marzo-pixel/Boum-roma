<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="theme-color" content="#08080A">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>La Squadra · BOOM</title>
<link rel="icon" href="https://www.boomrome.com/BOOMlogogoldicon512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="/js/firebase-config.js"></script>
<script src="/js/boom-portal.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #D4AF37;
  --gold-light: rgba(212,175,55,0.15);
  --gold-dark: #B8960C;
  --bg: #000;
  --bg-card: #0A0A0A;
  --bg-elevated: #141414;
  --bg-input: #1A1A1A;
  --border: rgba(255,255,255,0.08);
  --text: #FFF;
  --text-secondary: #999;
  --text-muted: #555;
  --green: #00D26A;
  --amber: #F5A524;
  --red: #F31260;
}
body {
  font-family: 'Inter', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width: 1080px; margin: 0 auto; padding: 24px 18px 80px; }
header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 26px; flex-wrap: wrap; gap: 8px; }
header h1 { font-size: 20px; font-weight: 300; letter-spacing: 4px; }
header h1 b { color: var(--gold); font-weight: 600; }
header .sub { color: var(--text-secondary); font-size: 12px; letter-spacing: 1px; }
header a { color: var(--text-secondary); font-size: 12px; text-decoration: none; }
header a:hover { color: var(--gold); }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px; display: flex; flex-direction: column; gap: 10px;
}
.card .top { display: flex; align-items: center; gap: 10px; }
.card .emoji { font-size: 26px; }
.card h2 { font-size: 15px; font-weight: 600; letter-spacing: 1px; }
.card .role { font-size: 11px; color: var(--text-secondary); letter-spacing: .5px; }
.dot { width: 9px; height: 9px; border-radius: 50%; margin-left: auto; flex-shrink: 0; }
.dot.ok { background: var(--green); box-shadow: 0 0 8px var(--green); }
.dot.warn { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
.dot.err { background: var(--red); box-shadow: 0 0 8px var(--red); }
.dot.off { background: var(--text-muted); }
.meta { font-size: 11.5px; color: var(--text-secondary); line-height: 1.6; }
.meta b { color: var(--text); font-weight: 500; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 10.5px; color: var(--text-secondary); }
.chip b { color: var(--gold); font-weight: 600; }
.err-note { font-size: 11px; color: var(--red); }
.actions { display: flex; gap: 8px; margin-top: auto; padding-top: 6px; }
button.run {
  flex: 1; background: var(--gold-light); color: var(--gold); border: 1px solid rgba(212,175,55,.35);
  border-radius: 9px; padding: 9px 0; font-size: 12px; font-weight: 600; letter-spacing: 1px;
  cursor: pointer; font-family: inherit; transition: .15s;
}
button.run:hover { background: rgba(212,175,55,.28); }
button.run:disabled { opacity: .45; cursor: wait; }
a.open {
  flex: 1; display: block; text-align: center; background: var(--bg-elevated); color: var(--text-secondary);
  border: 1px solid var(--border); border-radius: 9px; padding: 9px 0; font-size: 12px; font-weight: 600;
  letter-spacing: 1px; text-decoration: none; transition: .15s;
}
a.open:hover { color: var(--gold); border-color: rgba(212,175,55,.35); }

section { margin-top: 34px; }
section > h3 { font-size: 12px; letter-spacing: 3px; color: var(--text-secondary); font-weight: 500; margin-bottom: 12px; text-transform: uppercase; }
.list { display: flex; flex-direction: column; gap: 8px; }
.row {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 11px;
  padding: 12px 14px; font-size: 12.5px; line-height: 1.55;
}
.row .who { color: var(--gold); font-weight: 600; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
.row .when { color: var(--text-muted); font-size: 10.5px; float: right; }
.row .body { color: var(--text-secondary); margin-top: 3px; white-space: pre-wrap; }
.empty { color: var(--text-muted); font-size: 12px; padding: 14px; text-align: center; border: 1px dashed var(--border); border-radius: 11px; }

#shield { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 50; color: var(--text-secondary); font-size: 12px; letter-spacing: 2px; }
</style>
</head>
<body>
<div id="shield">ACCESSO…</div>

<div class="wrap" style="display:none" id="app">
  <header>
    <div>
      <h1><b>BOOM</b> · LA SQUADRA</h1>
      <div class="sub">I dipendenti automatici — stato, report, azioni in attesa</div>
    </div>
    <a href="/portal">← Portale</a>
  </header>

  <div id="setupBanner"></div>

  <div class="grid" id="teamGrid"></div>

  <section>
    <h3>In attesa di approvazione</h3>
    <div class="list" id="pendingList"><div class="empty">Nessuna proposta in attesa.</div></div>
  </section>

  <section>
    <h3>Ultimi report</h3>
    <div class="list" id="reportList"><div class="empty">Ancora nessun report.</div></div>
  </section>
</div>

<script>
(async function () {
  const { user } = await BoomPortal.requireAuth(['admin'], { loginUrl: '/login.html' });
  document.getElementById('shield').style.display = 'none';
  document.getElementById('app').style.display = '';
  const db = firebase.firestore();

  const EMPLOYEES = [
    { key: 'contabile',   emoji: '🧮', name: 'Il Contabile',   role: 'Fisco, incassi, pacchetto commercialista', endpoint: '/api/employees/contabile' },
    { key: 'banca',       emoji: '🏦', name: 'La Banca',       role: 'Sync conti, riconciliazione, estratti CSV', endpoint: '/api/banking/sync', link: '/banca' },
    { key: 'gestore',     emoji: '🏢', name: 'Il Gestore',     role: 'Solleciti, firme, rinnovi, burocrazia',     endpoint: '/api/employees/gestore' },
    { key: 'commerciale', emoji: '🤝', name: 'Il Commerciale', role: 'Prima risposta e follow-up ai lead',        endpoint: '/api/employees/commerciale' },
    { key: 'smistatore',  emoji: '📥', name: 'Lo Smistatore',  role: 'Manda un doc al bot Telegram o via email → archiviato', endpoint: '/api/documents/scan-inbox' },
    { key: 'radar',       emoji: '📡', name: 'Lo Scout (PFS)', role: 'Radar di mercato per i clienti ricerca',    link: '/pfs-command' },
  ];

  const grid = document.getElementById('teamGrid');
  const health = {};   // key -> teamHealth doc

  const fmtAgo = (ts) => {
    if (!ts) return 'mai';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const m = Math.round((Date.now() - d.getTime()) / 60000);
    if (m < 1) return 'adesso';
    if (m < 60) return m + ' min fa';
    if (m < 48 * 60) return Math.round(m / 60) + ' h fa';
    return d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
  };
  const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  function statusOf(h) {
    if (!h || !h.lastRunAt) return 'off';
    if (!h.ok) return (h.consecutiveErrors || 0) >= 3 ? 'err' : 'warn';
    const d = h.lastRunAt.toDate ? h.lastRunAt.toDate() : new Date(h.lastRunAt);
    return (Date.now() - d.getTime()) > 30 * 3600 * 1000 ? 'warn' : 'ok';
  }

  function chipsFor(stats) {
    if (!stats) return '';
    const nice = {
      oblOverdue: 'fisco scad.', oblDueSoon: '≤30gg', packsReady: 'pacchi pronti', docsMissing: 'doc manc.',
      paymentsLate: 'ritardi', proposals: 'proposte', digestItems: 'attenzioni',
      firstReplies: 'prime risp.', followups: 'follow-up', leadsScanned: 'lead visti',
      txNew: 'movimenti', matched: 'riconciliati', suggested: 'da confermare', accounts: 'conti',
      filed: 'archiviati', needsFiling: 'da assegnare', daSmistare: 'da assegnare',
    };
    return Object.entries(stats)
      .filter(([k, v]) => nice[k] && (typeof v === 'number'))
      .slice(0, 5)
      .map(([k, v]) => `<span class="chip"><b>${esc(v)}</b> ${nice[k]}</span>`).join('');
  }

  function render() {
    grid.innerHTML = EMPLOYEES.map(e => {
      const h = health[e.key];
      const st = e.link ? (h ? statusOf(h) : 'ok') : statusOf(h);
      return `<div class="card">
        <div class="top">
          <span class="emoji">${e.emoji}</span>
          <div><h2>${e.name}</h2><div class="role">${e.role}</div></div>
          <span class="dot ${st}" title="${st}"></span>
        </div>
        <div class="meta">Ultimo run: <b>${fmtAgo(h && h.lastRunAt)}</b>${h && h.consecutiveErrors ? ` · <span class="err-note">${h.consecutiveErrors} errori di fila</span>` : ''}</div>
        ${h && h.lastError && !h.ok ? `<div class="err-note">${esc(String(h.lastError).slice(0, 120))}</div>` : ''}
        <div class="chips">${chipsFor(h && h.stats)}</div>
        <div class="actions">
          ${e.endpoint ? `<button class="run" data-ep="${e.endpoint}" data-key="${e.key}">ESEGUI ORA</button>` : ''}
          ${e.link ? `<a class="open" href="${e.link}">APRI CONSOLE</a>` : ''}
        </div>
      </div>`;
    }).join('');

    grid.querySelectorAll('button.run').forEach(btn => {
      btn.addEventListener('click', async () => {
        btn.disabled = true; btn.textContent = 'IN CORSO…';
        try {
          const token = await firebase.auth().currentUser.getIdToken();
          const r = await fetch(btn.dataset.ep, { method: 'POST', headers: { Authorization: 'Bearer ' + token } });
          const j = await r.json();
          if (j.ok) { BoomPortal.toast(j.summary || 'Run completato', { type: 'success' }); }
          else throw new Error(j.error || 'errore');
        } catch (e) {
          BoomPortal.toast('Run fallito: ' + e.message, { type: 'error', duration: 6000 });
        }
        btn.disabled = false; btn.textContent = 'ESEGUI ORA';
      });
    });
  }

  // Setup self-check: la console dice da sola cosa manca da configurare.
  (async function setupCheck() {
    try {
      const token = await firebase.auth().currentUser.getIdToken();
      const r = await fetch('/api/admin/setup-status', { method: 'POST', headers: { Authorization: 'Bearer ' + token } });
      const j = await r.json();
      if (!j.ok) return;
      const s = j.status;
      const FIXES = [
        [!s.firebaseAdmin, 'FIREBASE_ADMIN_EMAIL / _PASS / API_KEY mancanti — i dipendenti non possono scrivere su Firestore'],
        [!s.cron, 'CRON_SECRET mancante — i cron Vercel non si autenticano'],
        [!s.telegram, 'TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID mancanti — niente approvazioni e avvisi sul telefono'],
        [!s.gmail, 'GMAIL_USER / GMAIL_APP_PASS mancanti — i dipendenti non possono inviare email'],
        [!s.anthropic, 'ANTHROPIC_API_KEY mancante — il Commerciale non può scrivere le bozze AI'],
        [!s.gocardless, 'Collegamento banca API disattivo (GoCardless non accetta nuove iscrizioni) — usa l\'estratto conto via email o l\'import CSV in /banca: stessa riconciliazione automatica'],
      ].filter(f => f[0]);
      if (!FIXES.length) return;
      document.getElementById('setupBanner').innerHTML =
        `<div style="background:rgba(245,165,36,.08);border:1px solid rgba(245,165,36,.35);border-radius:13px;padding:14px 16px;margin-bottom:16px">
          <div style="font-size:12px;font-weight:600;letter-spacing:1px;color:var(--amber);margin-bottom:8px">⚙️ CONFIGURAZIONE DA COMPLETARE (variabili d'ambiente Vercel)</div>
          ${FIXES.map(f => `<div style="font-size:12px;color:var(--text-secondary);line-height:1.7">• ${f[1]}</div>`).join('')}
          <div style="font-size:11px;color:var(--text-muted);margin-top:8px">Vercel → Project → Settings → Environment Variables → aggiungi → Redeploy. Questa fascia sparisce da sola quando è tutto a posto.</div>
        </div>`;
    } catch { /* banner best-effort */ }
  })();

  // Radar PFS heartbeats live in pfsRadarHealth — roll them up into one dot.
  BoomPortal.listen(db.collection('teamHealth'), snap => {
    snap.docs.forEach(d => { health[d.id] = d.data(); });
    render();
  });
  BoomPortal.listen(db.collection('pfsRadarHealth'), snap => {
    let worst = null;
    snap.docs.forEach(d => {
      const h = d.data();
      if (d.id === 'needsAttention') return;
      if (!worst || (!h.ok && worst.ok) || (h.consecutiveErrors || 0) > (worst.consecutiveErrors || 0)) worst = h;
    });
    if (worst) { health.radar = worst; render(); }
  });

  // Pending proposals from the employees (status==pending only — single-field
  // filter, no composite index; employee filter client-side).
  const OURS = new Set(['contabile', 'gestore', 'commerciale']);
  BoomPortal.listen(db.collection('action_queue').where('status', '==', 'pending').limit(50), snap => {
    const items = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .filter(a => OURS.has(a.proposedBy))
      .sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
    const el = document.getElementById('pendingList');
    el.innerHTML = items.length ? items.map(a =>
      `<div class="row"><span class="when">${fmtAgo(a.createdAt)}</span><span class="who">${esc(a.proposedBy)}</span>
       <div class="body">${esc(a.summary)}${a.payload && a.payload.recipient ? `\n→ ${esc(a.payload.recipient)}` : ''}</div></div>`
    ).join('') : '<div class="empty">Nessuna proposta in attesa — approva da Telegram o dal portale.</div>';
  });

  BoomPortal.listen(db.collection('teamReports').orderBy('runAt', 'desc').limit(15), snap => {
    const el = document.getElementById('reportList');
    const items = snap.docs.map(d => d.data());
    el.innerHTML = items.length ? items.map(r =>
      `<div class="row"><span class="when">${fmtAgo(r.runAt)}</span><span class="who">${esc(r.employee)}</span>
       <div class="body">${esc(r.summary || '')}</div></div>`
    ).join('') : '<div class="empty">Ancora nessun report.</div>';
  });
})();
</script>
</body>
</html>
