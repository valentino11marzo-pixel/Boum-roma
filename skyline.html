<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Rent Rome from the sky — every BOOM apartment on a live 3D map of the city. Video-verified, transparent, 48-hour move-in.">
<title>BOOM Skyline — rent Rome from the sky</title>
<link rel="preconnect" href="https://tiles.openfreemap.org" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://i.imgur.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=optional" rel="stylesheet" media="print" onload="this.media='all'">
<style>
:root{--gold:#FFD700;--gold2:#FFA500;--bg:#08080A;--card:#0E0E12;--line:rgba(255,255,255,.09);--t1:#fff;--t2:#aaa;--t3:#777;--disp:'Helvetica Neue',Helvetica,Inter,Arial,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:Inter,system-ui,sans-serif;font-weight:300;overflow:hidden;-webkit-font-smoothing:antialiased}
#map{position:absolute;inset:0}
.maplibregl-ctrl-attrib{font-size:9px!important;opacity:.5}
/* top bar */
.bar{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px clamp(16px,4vw,32px);background:linear-gradient(180deg,rgba(8,8,10,.92),rgba(8,8,10,0));pointer-events:none}
.bar>*{pointer-events:auto}
.brand{display:flex;align-items:baseline;gap:14px;text-decoration:none}
.brand .logo{font-family:var(--disp);font-weight:200;font-size:22px;letter-spacing:6px;color:#fff}
.brand .logo b{color:var(--gold);font-weight:300}
.brand .ttl{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--t2)}
@media(max-width:640px){.brand .ttl{display:none}}
.bar-back{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);text-decoration:none;border:1px solid var(--line);border-radius:100px;padding:8px 16px;background:rgba(14,14,18,.6);backdrop-filter:blur(8px);transition:all .25s}
.bar-back:hover{border-color:var(--gold);color:var(--gold)}
/* filter chips */
.filters{position:absolute;top:64px;left:0;right:0;z-index:9;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:0 16px;pointer-events:none}
.filters .chip{pointer-events:auto;font-size:12px;color:var(--t2);background:rgba(14,14,18,.72);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:100px;padding:8px 15px;cursor:pointer;transition:all .2s}
.filters .chip:hover{border-color:var(--gold);color:#fff}
.filters .chip.on{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border-color:transparent;font-weight:600}
/* count pill */
.count{position:absolute;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:9;font-size:12px;letter-spacing:.5px;color:var(--t2);background:rgba(14,14,18,.8);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:100px;padding:9px 18px}
.count b{color:var(--gold);font-weight:500}
/* gold price pin */
.sky-pin{display:inline-flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .2s}
.sky-pin:hover{transform:translateY(-3px);z-index:50}
.sky-pin .p{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;font-weight:700;font-size:12px;padding:5px 11px;border-radius:100px;white-space:nowrap;box-shadow:0 5px 16px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.18)}
.sky-pin .p.rented{background:#2a2a30;color:#9a9aa2;box-shadow:0 4px 12px rgba(0,0,0,.5)}
.sky-pin::after{content:'';width:2px;height:9px;background:linear-gradient(#FFA500,transparent)}
.sky-pin.dim{opacity:.18;filter:grayscale(.7)}
/* popup */
.maplibregl-popup-content{background:var(--card)!important;border:1px solid var(--line)!important;border-radius:16px!important;padding:0!important;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.6)!important;width:230px}
.maplibregl-popup-close-button{color:#fff!important;font-size:20px!important;padding:2px 8px!important;z-index:2}
.maplibregl-popup-tip{border-top-color:var(--card)!important;border-bottom-color:var(--card)!important}
.pc-img{height:128px;background:linear-gradient(135deg,#17171c,#0e0e12) center/cover no-repeat}
.pc-body{padding:13px 15px 15px}
.pc-zone{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3)}
.pc-name{font-size:15px;font-weight:500;color:#fff;margin:3px 0 6px;letter-spacing:-.01em}
.pc-meta{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.pc-price{font-family:var(--disp);font-weight:200;font-size:22px;color:var(--gold)}
.pc-price small{font-size:11px;color:var(--t3)}
.pc-go{display:block;margin-top:11px;text-align:center;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-size:13px;font-weight:600;text-decoration:none;padding:10px;border-radius:10px}
/* loading + error */
.load{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg);transition:opacity .5s,visibility .5s}
.load.off{opacity:0;visibility:hidden}
.load .dot{width:10px;height:10px;border-radius:50%;background:var(--gold);animation:p 1.4s ease-in-out infinite}
@keyframes p{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,215,0,.4)}50%{transform:scale(1.25);box-shadow:0 0 0 14px rgba(255,215,0,0)}}
.load .t{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--t3)}
.load .s{font-size:11px;color:var(--t3);max-width:280px;text-align:center;line-height:1.6}
@media(prefers-reduced-motion:reduce){.load .dot{animation:none}.sky-pin{transition:none}}
</style>
</head>
<body>
<div id="map"></div>

<div class="bar">
  <a class="brand" href="/">
    <span class="logo">BO<b>O</b>M</span>
    <span class="ttl">Skyline · Rent Rome from the sky</span>
  </a>
  <a class="bar-back" href="/apartments">☰ List view</a>
</div>

<div class="filters" id="filters">
  <button class="chip on" data-max="0">All</button>
  <button class="chip" data-max="1500">≤ €1,500</button>
  <button class="chip" data-max="2000">≤ €2,000</button>
  <button class="chip" data-max="2500">≤ €2,500</button>
</div>

<div class="count" id="count" style="display:none"></div>

<div class="load" id="load">
  <div class="dot"></div>
  <div class="t">BOOM · Skyline</div>
  <div class="s" id="loadMsg">Mapping Rome…</div>
</div>

<script>
(function(){
'use strict';
var ROME=[12.4924,41.8902];
var sleep=function(ms){return new Promise(function(r){setTimeout(r,ms);});};
var fmt=function(n){return '€'+Math.round(n).toLocaleString('en-US');};
var $=function(id){return document.getElementById(id);};
var msg=function(t){var m=$('loadMsg');if(m)m.textContent=t;};
var map=null, MARKERS=[], MAXFILTER=0;

function num(v){v=Number(v);return isFinite(v)?v:null;}
function listingCoord(l,COORDS){
  var la=num(l.lat),ln=num(l.lng);
  if(la&&ln) return [ln,la];
  if(COORDS&&l.id&&COORDS[l.id]&&COORDS[l.id].length===2) return COORDS[l.id];
  return null; // geocoded later
}
function addrOf(l){ return l.address ? l.address+', Rome, Italy' : ((l.zone||l.neighborhood)? (l.zone||l.neighborhood)+', Rome, Italy' : null); }

async function geocode(addr){
  if(!addr) return null;
  var key='boomgeo:'+addr;
  try{var c=localStorage.getItem(key);if(c)return JSON.parse(c);}catch(e){}
  try{
    var r=await fetch('https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&countrycodes=it&q='+encodeURIComponent(addr),{headers:{Accept:'application/json'}});
    if(!r.ok)return null;
    var j=await r.json();
    if(Array.isArray(j)&&j[0]&&j[0].lat&&j[0].lon){var co=[Number(j[0].lon),Number(j[0].lat)];try{localStorage.setItem(key,JSON.stringify(co))}catch(e){}return co;}
  }catch(e){}
  return null;
}

function gradeDark(){
  try{
    map.getStyle().layers.forEach(function(L){try{
      if(L.type==='symbol'&&/poi|housenumber|aeroway|airport/.test(L.id)){map.setLayoutProperty(L.id,'visibility','none');return;}
      if(L.type==='background')map.setPaintProperty(L.id,'background-color','#0B0B0E');
      else if(L.type==='fill')map.setPaintProperty(L.id,'fill-color',/water/.test(L.id)?'#10181F':/park|grass|wood|green/.test(L.id)?'#101510':'#121216');
      else if(L.type==='line')map.setPaintProperty(L.id,'line-color',/primary|trunk|motorway|major/.test(L.id)?'#2B2B33':'#1C1C22');
      else if(L.type==='symbol'){map.setPaintProperty(L.id,'text-color','#8A8A92');map.setPaintProperty(L.id,'text-halo-color','#0B0B0E');}
    }catch(e){}});
    var srcs=Object.keys(map.getStyle().sources||{});
    var src=srcs.find(function(s){return /openmaptiles|vector|planet/i.test(s);})||srcs[0];
    if(src)map.addLayer({id:'sky-3d',type:'fill-extrusion',source:src,'source-layer':'building',minzoom:13,paint:{'fill-extrusion-color':'#22222a','fill-extrusion-height':['coalesce',['get','render_height'],12],'fill-extrusion-base':['coalesce',['get','render_min_height'],0],'fill-extrusion-opacity':.92}});
  }catch(e){}
  try{ if(map.setSky)map.setSky({'sky-color':'#0a0a12','horizon-color':'#1c1208','fog-color':'#0B0B0E','sky-horizon-blend':.6,'horizon-fog-blend':.5,'fog-ground-blend':.4}); }catch(e){}
}

function makePin(l,co){
  var price=num(l.price);
  var rented=/rented|affittato|off_market/.test(String(l.status||'available').toLowerCase());
  var el=document.createElement('div'); el.className='sky-pin'; el.__price=price||0; el.__rented=rented;
  el.innerHTML='<span class="p'+(rented?' rented':'')+'">'+(price?fmt(price):'—')+'</span>';
  var img=l.image||(l.images&&l.images[0])||'';
  var pop=new maplibregl.Popup({offset:18,closeButton:true,maxWidth:'240px'}).setHTML(
    '<div class="pc-img"'+(img?' style="background-image:url(\''+img+'\')"':'')+'></div>'+
    '<div class="pc-body"><div class="pc-zone">'+(l.zone||l.neighborhood||'Rome')+'</div>'+
    '<div class="pc-name">'+(l.name||'Apartment')+'</div>'+
    '<div class="pc-meta"><span class="pc-price">'+(price?fmt(price):'On request')+(price?'<small> /mo</small>':'')+'</span></div>'+
    '<a class="pc-go" href="/listing/'+encodeURIComponent(l.id)+'">View this home →</a></div>'
  );
  var mk=new maplibregl.Marker({element:el,anchor:'bottom'}).setLngLat(co).setPopup(pop).addTo(map);
  MARKERS.push(mk);
  return co;
}

function applyFilter(){
  var shown=0,bounds=null;
  MARKERS.forEach(function(mk){
    var el=mk.getElement();
    var ok=(MAXFILTER===0)||(el.__price>0&&el.__price<=MAXFILTER&&!el.__rented);
    el.classList.toggle('dim',!ok);
    if(ok){shown++; var c=mk.getLngLat(); bounds=bounds||new maplibregl.LngLatBounds(); bounds.extend([c.lng,c.lat]);}
  });
  var cEl=$('count'); if(cEl){cEl.style.display='block'; cEl.innerHTML='<b>'+shown+'</b> homes'+(MAXFILTER?' under '+fmt(MAXFILTER):' across Rome');}
}

async function boot(){
  // 1) listings (proxy works without the SDK)
  var listings=[];
  try{ var r=await fetch('/api/listings',{cache:'no-store'}); var j=await r.json(); if(j&&Array.isArray(j.listings))listings=j.listings; else if(Array.isArray(j))listings=j; }catch(e){}
  if(!listings.length){ msg('Could not load listings. Try the list view.'); return; }
  // 2) bulk coords (fast path; server-cached). Falls back to per-listing geocode.
  var COORDS={};
  try{ var gr=await fetch('/api/geocode-all',{cache:'force-cache'}); if(gr.ok){ var gj=await gr.json(); if(gj&&gj.coords)COORDS=gj.coords; } }catch(e){}
  // 3) map
  map=new maplibregl.Map({container:'map',style:'https://tiles.openfreemap.org/styles/liberty',center:ROME,zoom:11.5,pitch:55,bearing:-12,antialias:true,attributionControl:true});
  map.addControl(new maplibregl.NavigationControl({visualizePitch:true}),'bottom-right');
  map.addControl(new maplibregl.FullscreenControl(),'bottom-right');
  await new Promise(function(res){ map.on('load',res); });
  gradeDark();
  $('load').classList.add('off');
  // 4) place pins — those with coords immediately; geocode the rest progressively
  var bounds=new maplibregl.LngLatBounds(), placed=0, need=[];
  listings.forEach(function(l){ var co=listingCoord(l,COORDS); if(co){ makePin(l,co); bounds.extend(co); placed++; } else { need.push(l); } });
  if(placed){ try{ map.fitBounds(bounds,{padding:80,maxZoom:15,duration:1400}); }catch(e){} applyFilter(); }
  for(var i=0;i<need.length;i++){
    var l=need[i]; var co=await geocode(addrOf(l));
    if(co){ makePin(l,co); placed++; applyFilter(); }
    if(i===0&&!bounds.isEmpty&&placed<=1){ try{map.flyTo({center:co||ROME,zoom:13});}catch(e){} }
    await sleep(1100); // Nominatim courtesy
  }
  if(!placed){ msg('No locations found yet.'); $('load').classList.remove('off'); }
}

function loadMapLibre(cb){
  if(window.maplibregl)return cb();
  var css=document.createElement('link');css.rel='stylesheet';css.href='https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css';document.head.appendChild(css);
  var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.min.js';
  s.onload=cb;s.onerror=function(){msg('Map engine unavailable. Open the list view.');};document.head.appendChild(s);
}

// filters
[].forEach.call(document.querySelectorAll('#filters .chip'),function(c){
  c.addEventListener('click',function(){
    [].forEach.call(document.querySelectorAll('#filters .chip'),function(x){x.classList.toggle('on',x===c);});
    MAXFILTER=Number(c.getAttribute('data-max'))||0; applyFilter();
  });
});

loadMapLibre(function(){ boot().catch(function(e){ console.error('Skyline:',e); msg('Something went wrong. Open the list view.'); }); });
})();
</script>
</body>
</html>
